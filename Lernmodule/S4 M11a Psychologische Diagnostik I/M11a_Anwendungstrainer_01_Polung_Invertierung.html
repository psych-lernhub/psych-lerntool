ms:flex-start}.task-kicker{font-size:.78rem;text-transform:uppercase;letter-spacing:.08em;font-weight:800;color:var(--brand)}.task-title{font-weight:800;font-size:1.08rem;margin:3px 0 8px}.status{font-size:.82rem;font-weight:750;border-radius:99px;padding:4px 8px;background:var(--surface-2);white-space:nowrap}.status.good{color:var(--good)}.prompt{margin:13px 0}.options{display:grid;gap:9px;margin:14px 0}.option{display:flex;gap:10px;align-items:flex-start;border:1px solid var(--line);border-radius:11px;padding:11px 12px;background:var(--surface)}.option:hover{background:var(--surface-2)}.option input{margin-top:4px;accent-color:var(--brand)}.answer-row{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-top:13px}.number-input{width:min(210px,100%);padding:10px 12px;border:1px solid var(--line);border-radius:10px;background:var(--surface);color:var(--text)}.hint-box{margin-top:12px}.hint-box button{background:transparent;border:0;color:var(--brand);font-weight:700;padding:4px 0}.hint{display:none;background:var(--surface-2);border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-top:7px}.feedback{display:none;margin-top:14px;padding:13px 14px;border-radius:11px;border:1px solid var(--line)}.feedback.show{display:block}.feedback.good{border-color:var(--good);background:color-mix(in srgb,var(--good) 10%,var(--surface))}.feedback.bad{border-color:var(--bad);background:color-mix(in srgb,var(--bad) 8%,var(--surface))}.feedback strong{display:block;margin-bottom:4px}.misconception{font-size:.88rem;color:var(--muted);margin-top:7px}.order-list{list-style:none;padding:0;margin:14px 0;display:grid;gap:8px}.order-item{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;border:1px solid var(--line);border-radius:11px;padding:10px 11px;background:var(--surface-2)}.order-controls{display:flex;gap:5px}.order-controls button{width:36px;height:36px;border:1px solid var(--line);border-radius:8px;background:var(--surface);color:var(--te <script>
'use strict';
const MODULE = {
  id:'m11a-apptrainer-01-v1',
  title:'Polung, Invertierung und Datenaufbereitung',
  version:'1.0.0',
  sections:[
    {id:'start',nav:'Start',title:'Vom Rohdatensatz zur prüfbaren Arbeitsdatei',intro:true},
    {id:'workflow',nav:'1 · Ablauf',title:'Den Datenaufbereitungsprozess rekonstruieren',theory:`Das Aufgabenblatt verlangt eine nachvollziehbare Prozesskette: Variablen auswählen, eine Arbeitskopie erzeugen, negativ gepolte Items invertieren, die Invertierung kontrollieren, Fehler korrigieren und die bereinigten Daten für die nächste Analyse sichern. Der Rohdatensatz bleibt unverändert.`},
    {id:'polarity',nav:'2 · Polung',title:'Polung relativ zum Zielkonstrukt beurteilen',theory:`„Negativ gepolt“ bedeutet nicht „sprachlich negativ“ oder „unerwünscht“. Entscheidend ist die Richtung zum Zielkonstrukt: Führt hohe Zustimmung zu einer niedrigeren Ausprägung des intendierten Merkmals, muss das Item vor der Skalenbildung invertiert werden.`},
    {id:'invert',nav:'3 · Invertieren',title:'Invertierungswerte sicher berechnen',theory:`Allgemeine Regel: x′ = (u + o) − x. Dabei sind u und o die untere und obere Antwortgrenze. Für eine Skala von 1 bis 5 gilt deshalb x′ = 6 − x; für 1 bis 7 gilt x′ = 8 − x.`},
    {id:'rcode',nav:'4 · R-Code',title:'Den R-Arbeitsweg verstehen und Fehler vermeiden',theory:`Im Projekt wird zunächst eine Kopie erzeugt. Die korrigierte Invertierung wird erneut aus dem unveränderten Rohdatensatz berechnet. Dadurch wird verhindert, dass bereits invertierte Werte versehentlich ein zweites Mal umgepolt werden.`},
    {id:'diagnose',nav:'5 · Diagnose',title:'Korrelationsmuster als Fehlerhinweis nutzen',theory:`Ein systematisch negatives Zusammenhangsmuster zu inhaltlich gleichgerichteten Items kann auf eine fehlende Invertierung hinweisen. Geringe oder uneinheitliche Zusammenhänge können dagegen auf schwache Konstruktpassung oder eine andere Dimension hindeuten. Ein auffälliges Item ist deshalb nicht automatisch falsch gepolt.`},
    {id:'transfer',nav:'6 · Transfer',title:'Neue Skalen und mehrdeutige Fälle bearbeiten',theory:`In Transferaufgaben ändern sich Antwortgrenzen, Formulierungen und Fehlerbilder. Die Lösung muss aus dem Konstrukt, dem Schlüssel, dem Datenmuster und dem dokumentierten Arbeitsweg begründet werden.`},
    {id:'mastery',nav:'7 · Abschluss',title:'Kompetenzcheck ohne Schritt-für-Schritt-Führung',theory:`Der Kompetenzcheck mischt Rechen-, Code-, Polungs- und Diagnoseentscheidungen. Hinweise bleiben verfügbar, die Aufgaben geben aber keine feste Bearbeitungsreihenfolge mehr vor.`},
    {id:'result',nav:'Ergebnis',title:'Lernstand und Fehlkonzeptprofil',result:true}
  ]
};
const tasks = [
 {id:'wf-1',section:'workflow',type:'order',title:'Prozesskette ordnen',prompt:'Bringe die Arbeitsschritte in die fachlich sinnvolle Reihenfolge.',items:[
  'Konstruktbezogene Itemvariablen aus dem Rohdatensatz auswählen',
  'Eine Arbeitskopie des Rohdatensatzes erzeugen',
  'Negativ gepolte Items in der Arbeitskopie invertieren',
  'Das Korrelationsmuster kontrollieren und mögliche Schlüsselfehler prüfen',
  'Korrigierte Invertierung erneut aus dem Rohdatensatz berechnen',
  'Bereinigte Teildatensätze beziehungsweise die Arbeitsdatei speichern'
 ],start:[2,0,5,1,3,4],answer:[0,1,2,3,4,5],hints:[
  'Beginne mit der fachlichen Auswahl: Welche Variablen gehören überhaupt zum zu prüfenden Konstrukt?',
  'Erzeuge vor jeder Transformation eine Arbeitskopie, damit der Rohdatensatz unverändert als Referenz erhalten bleibt.',
  'Wende den zunächst dokumentierten Polungsschlüssel nur auf die negativ gepolten Items der Arbeitskopie an.',
  'Prüfe danach Korrelationsmuster und Itemtexte gemeinsam; eine Auffälligkeit ist zunächst ein Diagnosehinweis.',
  'Falls sich der Schlüssel ändert, berechne die Invertierung vollständig neu aus den Rohwerten und nicht aus der schon invertierten Kopie.',
  'Speichere bereinigte Teildatensätze erst, nachdem Auswahl, Invertierung und Kontrolllauf abgeschlossen sind.'
 ],explanation:'1. Zuerst werden nur die konstruktbezogenen Itemvariablen ausgewählt, damit keine sachfremden Variablen in die Skala eingehen. 2. Danach wird eine Arbeitskopie erzeugt; der Rohdatensatz bleibt dadurch als unveränderte Referenz erhalten. 3. In dieser Kopie werden die laut Schlüssel negativ gepolten Items invertiert. 4. Erst am resultierenden Datenmuster werden Korrelationen, Itemtexte und mögliche Schlüsselfehler kontrolliert. 5. Ergibt die Kontrolle einen korrigierten Schlüssel, wird die Arbeitskopie erneut aus den Rohwerten aufgebaut; dadurch entsteht keine Doppel-Invertierung. 6. Abschließend werden die kontrollierten Teildatensätze beziehungsweise die bereinigte Arbeitsdatei eindeutig gespeichert.',source:'Aufgabenblatt 3 · fa.R'},
 {id:'wf-2',section:'workflow',type:'single',title:'Warum eine Arbeitskopie?',prompt:'Welcher Grund ist für die Kopie des Datensatzes am wichtigsten?',options:['Die Datei wird dadurch automatisch kleiner.','Der Rohdatensatz bleibt als unveränderte Referenz erhalten.','R kann Invertierungen ausschließlich in Kopien ausführen.','Korrelationsmatrizen lassen sich nur aus Kopien berechnen.'],answer:1,hints:['Denke an Nachvollziehbarkeit und Fehlerkorrektur.'],explanation:'Eine unveränderte Referenz ermöglicht Reproduktion, Kontrolle und erneute Berechnung. R benötigt technisch keine Kopie; sie ist eine Maßnahme guter Datenpraxis.',misconception:'rohdatensatz_ueberschrieben',source:'fa.R'},
 {id:'wf-3',section:'workflow',type:'multi',title:'Was gehört zur Kontrolle?',prompt:'Welche Handlungen sind nach der ersten Invertierung fachlich sinnvoll?',options:['Korrelationsmuster der Items prüfen','Itemtexte und Polungsschlüssel erneut abgleichen','Jedes schwach korrelierende Item automatisch invertieren','Auffällige Fälle dokumentieren','Den Rohdatensatz löschen'],answer:[0,1,3],hints:['Auffälligkeit ist ein Hinweis, noch keine automatische Diagnose.'],explanation:'Option 1 ist richtig: Das Korrelationsmuster zeigt, ob ein Item systematisch gegen die übrige Skala läuft. Option 2 ist richtig: Erst der Abgleich mit Wortlaut und Polungsschlüssel erlaubt eine inhaltliche Diagnose. Option 3 ist falsch: Schwache Zusammenhänge können auch geringe Varianz, Fremddimensionalität oder Messrauschen widerspiegeln und rechtfertigen keine automatische Invertierung. Option 4 ist richtig: Dokumentation macht die spätere Korrektur nachvollziehbar. Option 5 ist falsch: Der Rohdatensatz muss als unveränderte Referenz erhalten bleiben.',misconception:'schwaches_item_mit_falsch_gepolt_verwechselt',source:'Aufgabenblatt 3 · fa.R'},

 {id:'pol-1',section:'polarity',type:'single',title:'Projektitem o12',prompt:'Zielkonstrukt ist Offenheit. Wie ist das Item „Kunst, Musik und schöne Dinge berühren mich oft stark.“ gepolt?',options:['positiv','negativ','aus dem Wortlaut nicht entscheidbar'],answer:0,hints:['Hohe Zustimmung spricht hier für mehr oder weniger Offenheit?'],explanation:'Hohe Zustimmung zeigt eine höhere Ausprägung der intendierten Offenheitsfacette. Das Item ist positiv gepolt.',source:'Items.xlsx'},
 {id:'pol-2',section:'polarity',type:'single',title:'Projektitem o6',prompt:'Zielkonstrukt ist Offenheit. Wie ist „Kunst oder esthetische Eindrucke interessieren mich wenig.“ gepolt?',options:['positiv','negativ','aus dem Wortlaut nicht entscheidbar'],answer:1,hints:['Das Item beschreibt geringes Interesse an ästhetischen Eindrücken.'],explanation:'Hohe Zustimmung spricht für geringere Offenheit. Vor der Bildung eines Offenheitsscores muss das Item invertiert werden.',source:'Items.xlsx'},
 {id:'pol-3',section:'polarity',type:'single',title:'Verdeckter Schlüsselfehler o11',prompt:'In der Itemdatei war o11 nicht als negativ markiert. Das Item lautet: „Künstlerische Aktivitäten machen mit keinen Spaß.“ Welche Behandlung entspricht dem später korrigierten Projektschlüssel?',options:['unverändert als positives Item verwenden','als negativ gepoltes Item invertieren','Itemwerte immer auf null setzen'],answer:1,hints:['Achte auf „keinen Spaß“ relativ zu Offenheit.'],explanation:'Der Wortlaut zeigt eine Gegenrichtung zu Offenheit. Das R-Skript ergänzt o11 deshalb zur Liste der zu invertierenden Items. Die Originalschreibweise des Items wurde hier beibehalten.',misconception:'polung_aus_wortlaut_statt_konstrukt',source:'Items.xlsx · fa.R'},
 {id:'pol-4',section:'polarity',type:'single',title:'Negativer Inhalt ist nicht automatisch negative Polung',prompt:'Zielkonstrukt ist Neurotizismus. Wie ist das neue Übungsitem „Ich verliere auch bei kleinen Rückschlägen schnell die Fassung.“ gepolt?',options:['positiv','negativ','nicht auswertbar'],answer:0,hints:['Das Zielkonstrukt ist Neurotizismus, nicht emotionale Stabilität.'],explanation:'Obwohl die Aussage unerwünschtes Verhalten beschreibt, bedeutet hohe Zustimmung mehr Neurotizismus. Das Item ist daher positiv gepolt.',misconception:'polung_aus_wortlaut_statt_konstrukt',source:'Neu konstruierte Parallelaufgabe'},
 {id:'pol-5',section:'polarity',type:'single',title:'Kritisch, aber nicht falsch gepolt',prompt:'c19 lautet „Ich kann meine Rolle flexibel anpassen, ohne meine Werte zu verlieren“. Das Skript bezeichnet das Item als kritisch, aber nicht falsch gepolt. Welche Schlussfolgerung ist angemessen?',options:['Das Item muss zwingend invertiert werden.','Das Item kann in der vorgesehenen Richtung bleiben, seine Konstruktpassung sollte aber geprüft werden.','Jedes kritische Item muss gelöscht werden.','Eine Polungsentscheidung ist nur anhand des Mittelwerts möglich.'],answer:1,hints:['Polung und Konstruktpassung sind zwei verschiedene Fragen.'],explanation:'Ein Item kann in die richtige Richtung gepolt sein und trotzdem schwach oder inhaltlich unklar zum Konstrukt passen.',misconception:'schwaches_item_mit_falsch_gepolt_verwechselt',source:'Items.xlsx · fa.R'},
 {id:'pol-6',section:'polarity',type:'single',title:'Mögliche Fremddimensionalität',prompt:'e19 lautet „Mir fällt es schwer, andere abzuweisen“. Das Skript bezeichnet es als kritisch, aber nicht falsch gepolt und vermutet eher Verträglichkeit. Was ist die beste Einordnung?',options:['Sicherer Beweis für eine fehlerhafte Invertierung','Mögliches Problem der Konstruktzuordnung statt der Polung','Beweis für einen Dateneingabefehler','Unproblematisches Kernitem der Extraversion'],answer:1,hints:['Ein Item kann korrekt invertiert sein und trotzdem eher ein anderes Merkmal erfassen.'],explanation:'Der Projektkommentar weist auf mögliche Fremddimensionalität hin. Die Polung allein löst dieses Problem nicht.',misconception:'schwaches_item_mit_falsch_gepolt_verwechselt',source:'Items.xlsx · fa.R'},
 {id:'pol-7',section:'polarity',type:'single',title:'Mehrdeutiger Grenzfall a19',prompt:'a19 lautet „Ich lasse mich leicht ausnutzen“ und war als negativ markiert. Im Skript wird notiert, man könne auch für positive Polung argumentieren. Welche Reaktion ist methodisch am besten?',options:['Die zuerst eingetragene Polung gilt immer als Wahrheit.','Nur das Korrelationsvorzeichen entscheidet, ohne den Inhalt zu prüfen.','Mehrdeutigkeit dokumentieren und Inhalt sowie Datenmuster gemeinsam beurteilen.','Das Item automatisch doppelt invertieren.'],answer:2,hints:['Der Projektkommentar selbst markiert eine begründbare Mehrdeutigkeit.'],explanation:'Bei mehrdeutigen Items ist eine transparente, inhaltlich und empirisch begründete Entscheidung nötig. Die Polung darf nicht still oder rein mechanisch festgelegt werden.',source:'Items.xlsx · fa.R'},
 {id:'pol-8',section:'polarity',type:'single',title:'Neue Parallelaufgabe',prompt:'Zielkonstrukt ist Extraversion. Wie ist „Ich suche häufig den Austausch mit anderen.“ gepolt?',options:['positiv','negativ','mehrdeutig'],answer:0,hints:['Hohe Zustimmung zeigt mehr Geselligkeit.'],explanation:'Die Aussage verläuft in Richtung einer höheren Extraversion und ist positiv gepolt.',source:'Neu konstruierte Parallelaufgabe'},

 {id:'inv-1',section:'invert',type:'number',title:'1–5-Skala: niedriger Rohwert',prompt:'Ein negativ gepoltes Item wurde mit x = 1 beantwortet. Die Antwortskala reicht von 1 bis 5. Wie lautet der invertierte Wert?',answer:5,tolerance:0,hints:['Setze u = 1 und o = 5 in x′ = (u + o) − x ein.'],explanation:'x′ = (1 + 5) − 1 = 5. Die Endpunkte werden vertauscht.',source:'PD04 · PD05'},
 {id:'inv-2',section:'invert',type:'number',title:'1–5-Skala: hoher Rohwert',prompt:'Ein negativ gepoltes Item hat x = 4 auf einer Skala von 1 bis 5. Wie lautet x′?',answer:2,tolerance:0,hints:['Für 1 bis 5 gilt 6 − x.'],explanation:'x′ = 6 − 4 = 2.',source:'PD04 · PD05'},
 {id:'inv-3',section:'invert',type:'number',title:'1–7-Skala',prompt:'Ein Item wird auf einer Skala von 1 bis 7 beantwortet. Für x = 6: Wie lautet der invertierte Wert?',answer:2,tolerance:0,hints:['Die Summe der Skalenenden beträgt 8.'],explanation:'x′ = (1 + 7) − 6 = 2.',source:'Transfer auf Grundlage der Vorlesungsformel'},
 {id:'inv-4',section:'invert',type:'number',title:'0–10-Skala',prompt:'Eine visuelle Analogskala reicht von 0 bis 10. Wie wird x = 3 invertiert?',answer:7,tolerance:0,hints:['Auch bei einer Null als Untergrenze gilt dieselbe allgemeine Formel.'],explanation:'x′ = (0 + 10) − 3 = 7.',source:'Transfer auf Grundlage der Vorlesungsformel'},
 {id:'inv-5',section:'invert',type:'single',title:'Typischer Formelfehler',prompt:'Welche Formel invertiert eine 1–5-Skala korrekt?',options:['5 − x','6 − x','1 / x','x − 6'],answer:1,hints:['Prüfe den Endpunkt x = 1. Er muss zu 5 werden.'],explanation:'Die Summe aus Unter- und Obergrenze beträgt 6. Die Formel 5 − x würde x = 5 fälschlich in 0 transformieren.',misconception:'invertierungsgrenzen_verwechselt',source:'PD04 · PD05'},

 {id:'r-1',section:'rcode',type:'single',title:'Arbeitskopie erzeugen',prompt:'Welche Zeile entspricht dem dokumentierten Projektvorgehen?',options:['sose2026 <- sose2026i','sose2026i <- sose2026','sose2026i <- 6','rm(sose2026)'],answer:1,hints:['Links steht die neue Arbeitskopie, rechts der Rohdatensatz.'],explanation:'`sose2026i <- sose2026` erstellt die Arbeitskopie, in der anschließend invertiert wird.',source:'fa.R'},
 {id:'r-2',section:'rcode',type:'single',title:'Vektorisierte Invertierung',prompt:'Welche Zeile invertiert alle in `negitems` aufgeführten Variablen einer 1–5-Skala korrekt?',options:['sose2026i[,negitems] <- 5 - sose2026[,negitems]','sose2026i[,negitems] <- 6 - sose2026[,negitems]','sose2026[,negitems] <- 6 + sose2026i[,negitems]','negitems <- 6 - negitems'],answer:1,hints:['Die Werte stammen rechts aus dem Rohdatensatz; die Skalenendpunkte summieren sich zu 6.'],explanation:'Die korrekte Zeile verbindet die Formel `6 − x` mit der Trennung von Rohdaten und Arbeitskopie.',misconception:'invertierungsgrenzen_verwechselt',source:'fa.R'},
 {id:'r-3',section:'rcode',type:'single',title:'Korrekturlauf ohne Doppel-Invertierung',prompt:'Nach der Kontrolle wird die Liste `negitems` um o11 und a11 ergänzt. Welche rechte Seite sollte für die erneute Berechnung verwendet werden?',options:['die bereits invertierte Arbeitskopie `sose2026i`','der unveränderte Rohdatensatz `sose2026`','nur die Itemnamen aus `Items.xlsx`','eine leere Matrix'],answer:1,hints:['Was würde passieren, wenn bereits invertierte Items erneut aus `sose2026i` berechnet würden?'],explanation:'Der Korrekturlauf wird erneut aus den Rohwerten berechnet. Sonst würden alle schon korrekt invertierten Items ein zweites Mal umgepolt.',misconception:'doppel_invertiert',source:'fa.R'},
 {id:'r-4',section:'rcode',type:'order',title:'R-Arbeitsweg nach der Korrektur',prompt:'Ordne die vier Schritte.',items:['Korrigierte Liste der negativ gepolten Items festlegen','Arbeitskopie aus den Rohwerten erneut invertieren','Konstruktspezifische Datensätze neu erzeugen','Bereinigte Datensätze speichern'],start:[2,0,3,1],answer:[0,1,2,3],hints:['Teildatensätze müssen die korrigierten Werte enthalten.'],explanation:'Zuerst wird der Schlüssel korrigiert, dann die Arbeitskopie neu berechnet. Erst anschließend werden Teildatensätze neu erzeugt und gespeichert.',source:'fa.R'},

 {id:'diag-1',section:'diagnose',type:'single',title:'Systematisch negatives Muster',prompt:'Ein Offenheitsitem korreliert mit vier klar positiv gepolten Offenheitsitems mit −.42, −.35, −.39 und −.31. Nach der Invertierung werden daraus +.42, +.35, +.39 und +.31. Welche Diagnose ist am plausibelsten?',options:['Das Item war wahrscheinlich noch nicht korrekt invertiert.','Das gesamte Konstrukt ist nicht messbar.','Negative Korrelationen beweisen immer einen Eingabefehler.','Das Item ist zwingend ein Neurotizismusitem.'],answer:0,hints:['Achte auf den systematischen Vorzeichenwechsel nach der Invertierung.'],explanation:'Ein konsistentes Gegenrichtungsmuster, das sich durch Invertierung in ein plausibles positives Muster verwandelt, ist ein starker Hinweis auf einen Schlüsselfehler. Es ist aber kein allgemeiner Beweis, ohne Inhalt und Schlüssel zu prüfen.',misconception:'korrelationsvorzeichen_ignoriert',source:'Synthetisches Muster, inspiriert durch o11'},
 {id:'diag-2',section:'diagnose',type:'single',title:'Schwache Zusammenhänge ohne klare Gegenrichtung',prompt:'Ein Item korreliert mit den übrigen Items seiner Skala mit +.08, +.02, −.04 und +.10. Welche Schlussfolgerung ist am angemessensten?',options:['Sicher falsch gepolt','Möglicherweise schwache Konstruktpassung; Polungsfehler ist nicht belegt','Muss zwingend doppelt invertiert werden','Perfektes Skalenitem'],answer:1,hints:['Fehlt ein systematisch negatives Muster?'],explanation:'Nahe-null und uneinheitliche Korrelationen sprechen eher für geringe Passung, geringe Varianz oder Messrauschen. Eine Invertierung würde das Grundproblem nicht automatisch lösen.',misconception:'schwaches_item_mit_falsch_gepolt_verwechselt',source:'Synthetisches Muster, inspiriert durch c19'},
 {id:'diag-3',section:'diagnose',type:'single',title:'Mögliche Fremddimensionalität im Datenmuster',prompt:'Ein als Extraversion vorgesehenes Item korreliert mit Extraversion nur zwischen −.03 und +.09, mit mehreren Verträglichkeitsitems aber zwischen +.29 und +.36. Was ist die beste Arbeitshypothese?',options:['Das Item misst möglicherweise eher Verträglichkeit.','Das Item ist sicher negativ gepolt.','Die Antwortskala muss 0–10 gewesen sein.','Die Stichprobe enthält keine Varianz.'],answer:0,hints:['Vergleiche Eigen- und Fremdzusammenhänge.'],explanation:'Das Muster legt eine mögliche Fremddimensionalität nahe. Für die endgültige Entscheidung müssen Iteminhalt, Faktorladungen und weitere Kennwerte gemeinsam betrachtet werden.',source:'Synthetisches Muster, inspiriert durch e19'},
 {id:'diag-4',section:'diagnose',type:'multi',title:'Auffälliges Item systematisch prüfen',prompt:'Welche Informationen sollten vor einer Polungskorrektur gemeinsam betrachtet werden?',options:['Wortlaut relativ zum Zielkonstrukt','Dokumentierter Polungsschlüssel','Korrelationsmuster vor und nach einer probeweisen Invertierung','Farbe der Tabellenzelle','Mögliche Fremddimensionalität'],answer:[0,1,2,4],hints:['Eine rein optische Eigenschaft der Darstellung ist kein psychometrisches Kriterium.'],explanation:'Option 1 ist relevant, weil die Polungsrichtung immer relativ zum Zielkonstrukt beurteilt wird. Option 2 ist relevant, weil der dokumentierte Schlüssel den vorgesehenen Auswertungsweg festhält. Option 3 ist relevant, weil ein systematischer Vorzeichenwechsel nach probeweiser Invertierung einen Schlüsselfehler stützen kann. Option 4 ist irrelevant: Die Farbe einer Tabellenzelle ist kein psychometrischer Befund. Option 5 ist relevant, weil geringe Eigen- bei höheren Fremdzusammenhängen auch für eine andere Dimension statt für falsche Polung sprechen können.',source:'fa.R · Items.xlsx'},

 {id:'tr-1',section:'transfer',type:'single',title:'Neue Antwortgrenzen',prompt:'Ein neuer Datensatz verwendet eine Skala von 2 bis 8. Welche Invertierungsformel ist korrekt?',options:['8 − x','10 − x','9 − x','16 − x'],answer:1,hints:['Addiere untere und obere Grenze.'],explanation:'u + o = 2 + 8 = 10, daher x′ = 10 − x.',misconception:'invertierungsgrenzen_verwechselt',source:'Neu konstruierte Transferaufgabe'},
 {id:'tr-2',section:'transfer',type:'number',title:'Transferrechnung 2–8',prompt:'Auf der Skala von 2 bis 8 beträgt der Rohwert x = 7. Wie lautet der invertierte Wert?',answer:3,tolerance:0,hints:['Verwende die zuvor bestimmte Formel.'],explanation:'x′ = 10 − 7 = 3.',source:'Neu konstruierte Transferaufgabe'},
 {id:'tr-3',section:'transfer',type:'single',title:'Doppel-Invertierung erkennen',prompt:'Ein korrekt invertiertes Item einer 1–5-Skala enthält die Werte 5, 3, 1. Ein zweiter Lauf berechnet erneut `6 - sose2026i[,item]`. Welche Werte entstehen?',options:['5, 3, 1','1, 3, 5','6, 4, 2','0, 2, 4'],answer:1,hints:['Eine zweite Invertierung stellt die ursprüngliche Richtung wieder her.'],explanation:'6 − (5,3,1) ergibt (1,3,5). Doppel-Invertierung hebt die erste Invertierung auf.',misconception:'doppel_invertiert',source:'Neu konstruierte Transferaufgabe'},
 {id:'tr-4',section:'transfer',type:'multi',title:'Reproduzierbare Datenaufbereitung',prompt:'Welche Maßnahmen erhöhen die Nachvollziehbarkeit?',options:['Rohdaten unverändert aufbewahren','Polungskorrekturen im Skript dokumentieren','Korrigierte Daten unter eindeutigem Namen speichern','Auffällige Items ohne Begründung löschen','Den verwendeten Skalenbereich festhalten'],answer:[0,1,2,4],hints:['Reproduzierbarkeit verlangt dokumentierte Entscheidungen.'],explanation:'Option 1 ist richtig: Unveränderte Rohdaten ermöglichen Kontrolle und erneute Berechnung. Option 2 ist richtig: Dokumentierte Polungskorrekturen machen den verwendeten Schlüssel prüfbar. Option 3 ist richtig: Ein eindeutiger Dateiname trennt Roh-, Arbeits- und Ergebnisstand. Option 4 ist falsch: Eine unbegründete Löschung ist weder fachlich noch reproduzierbar. Option 5 ist richtig: Nur mit dokumentierten Skalenenden lässt sich die verwendete Invertierungsformel nachvollziehen.',source:'Methodische Transferaufgabe'},
 {id:'tr-5',section:'transfer',type:'single',title:'Inhalt gegen bloße Wortstimmung',prompt:'Zielkonstrukt ist emotionale Stabilität. Das Item lautet „Ich gerate selten in Panik.“ Wie ist es gepolt?',options:['positiv für emotionale Stabilität','negativ für emotionale Stabilität','unabhängig vom Konstrukt immer negativ, weil „Panik“ vorkommt'],answer:0,hints:['Achte auf das Wort „selten“ und auf das Zielkonstrukt.'],explanation:'Hohe Zustimmung bedeutet mehr emotionale Stabilität. Einzelne negativ klingende Wörter bestimmen die Polung nicht.',misconception:'polung_aus_wortlaut_statt_konstrukt',source:'Neu konstruierte Transferaufgabe'},

 {id:'mas-1',section:'mastery',type:'single',title:'Kompetenzcheck 1',prompt:'Ein negativ gepoltes Item auf einer 0–4-Skala hat x = 4. Welcher invertierte Wert ist korrekt?',options:['0','1','4','8'],answer:0,hints:['u + o = 4.'],explanation:'x′ = 4 − 4 = 0.',source:'Kompetenzcheck'},
 {id:'mas-2',section:'mastery',type:'single',title:'Kompetenzcheck 2',prompt:'Ein Item zeigt nach der ersten Aufbereitung durchgehend negative Korrelationen mit inhaltlich gleichgerichteten Skalenitems. Was ist der beste nächste Schritt?',options:['Sofort löschen','Wortlaut und Schlüssel prüfen und eine probeweise Invertierung vergleichen','Die gesamte Skala invertieren','Nur den Mittelwert des Items erhöhen'],answer:1,hints:['Die Daten geben einen Hinweis, aber die Inhaltsprüfung entscheidet mit.'],explanation:'Eine systematische Prüfung verknüpft Iteminhalt, Schlüssel und verändertes Korrelationsmuster nach probeweiser Invertierung.',source:'Kompetenzcheck'},
 {id:'mas-3',section:'mastery',type:'single',title:'Kompetenzcheck 3',prompt:'Welche Aussage trennt Polungsfehler und Konstruktproblem korrekt?',options:['Jedes schwache Item ist falsch gepolt.','Ein korrekt gepoltes Item kann trotzdem ein anderes Konstrukt erfassen.','Negative Polung und negative Korrelation sind immer identisch.','Die Polung lässt sich nur mit Cronbachs Alpha bestimmen.'],answer:1,hints:['Denke an den Projektfall e19.'],explanation:'Polung beschreibt die Richtung zum Zielscore. Konstruktpassung beschreibt, ob das Item überhaupt das intendierte Merkmal erfasst.',misconception:'schwaches_item_mit_falsch_gepolt_verwechselt',source:'Kompetenzcheck'},
 {id:'mas-4',section:'mastery',type:'single',title:'Kompetenzcheck 4',prompt:'Welche Zeile ist für einen Korrekturlauf am sichersten, wenn `negitems` geändert wurde?',options:['sose2026i[,negitems] <- 6 - sose2026i[,negitems]','sose2026i <- sose2026; sose2026i[,negitems] <- 6 - sose2026[,negitems]','sose2026 <- 6 - sose2026','negitems <- sose2026i'],answer:1,hints:['Beginne erneut mit einer sauberen Arbeitskopie.'],explanation:'Der Korrekturlauf wird reproduzierbar aus dem Rohdatensatz aufgebaut und vermeidet Doppel-Invertierung.',misconception:'doppel_invertiert',source:'Kompetenzcheck'},
 {id:'mas-5',section:'mastery',type:'multi',title:'Kompetenzcheck 5',prompt:'Welche Aussagen sind richtig?',options:['Bei einer 1–5-Skala lautet die Invertierung 6 − x.','Ein unerwünscht klingendes Item ist immer negativ gepolt.','Ein systematisch negatives Korrelationsmuster kann ein Hinweis auf fehlende Invertierung sein.','Rohdaten sollten nach erfolgreicher Aufbereitung gelöscht werden.','Mehrdeutige Polung sollte dokumentiert werden.'],answer:[0,2,4],hints:['Beurteile jede Aussage unabhängig.'],explanation:'Option 1 ist richtig, weil sich die Skalenenden 1 und 5 zu 6 summieren. Option 2 ist falsch, weil Polung relativ zum Zielkonstrukt und nicht nach der Wortstimmung bestimmt wird. Option 3 ist richtig: Ein durchgehend gegenläufiges Muster kann auf eine fehlende Invertierung hinweisen, muss aber inhaltlich geprüft werden. Option 4 ist falsch, weil Rohdaten als unveränderte Referenz erhalten bleiben sollen. Option 5 ist richtig, weil eine begründbare Mehrdeutigkeit transparent dokumentiert und mit dem Datenmuster geprüft werden muss.',source:'Kompetenzcheck'},
 {id:'mas-6',section:'mastery',type:'number',title:'Kompetenzcheck 6',prompt:'Eine Skala reicht von 3 bis 9. Ein negativ gepoltes Item hat x = 4. Berechne x′.',answer:8,tolerance:0,hints:['x′ = (3 + 9) − 4.'],explanation:'x′ = 12 − 4 = 8.',source:'Kompetenzcheck'}
];

const sectionTasks = id => tasks.filter(t=>t.section===id);
let state = loadState();
let current = state.current || 'start';

function defaultState(){return {version:MODULE.version,current:'start',tasks:{},errors:{},startedAt:new Date().toISOString(),updatedAt:new Date().toISOString()}}
function loadState(){try{const raw=localStorage.getItem(MODULE.id);if(!raw)return defaultState();const s=JSON.parse(raw);return s&&s.version===MODULE.version?s:defaultState()}catch(e){return defaultState()}}
function saveState(){state.current=current;state.updatedAt=new Date().toISOString();try{localStorage.setItem(MODULE.id,JSON.stringify(state))}catch(e){}updateProgress()}
function taskState(id){return state.tasks[id]||(state.tasks[id]={attempts:0,correct:false,hints:0,lastAnswer:null})}
function esc(s){return String(s).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
function announce(msg){document.getElementById('live').textContent='';setTimeout(()=>document.getElementById('live').textContent=msg,20)}

function renderNav(){const nav=document.getElementById('nav');nav.innerHTML='';MODULE.sections.forEach(s=>{const b=document.createElement('button');b.type='button';b.dataset.page=s.id;b.innerHTML=`${esc(s.nav)}<small>${sectionStatus(s.id)}</small>`;b.addEventListener('click',()=>showPage(s.id));nav.appendChild(b)})}
function sectionStatus(id){const ts=sectionTasks(id);if(!ts.length)return id==='result'?'Auswertung':'Übersicht';const done=ts.filter(t=>taskState(t.id).correct).length;return `${done}/${ts.length} gelöst`}

function renderPages(){const root=document.getElementById('pages');root.innerHTML='';MODULE.sections.forEach((s,idx)=>{const page=document.createElement('section');page.className='page';page.id=`page-${s.id}`;page.dataset.page=s.id;if(s.intro)page.innerHTML=renderStart();else if(s.result)page.innerHTML=renderResult();else page.innerHTML=renderSection(s,idx);root.appendChild(page)});bindTaskEvents();bindPageButtons()}
function renderStart(){return `<div class="hero"><div class="eyebrow">Interaktives Anwendungslabor</div><h1>Polung, Invertierung und Datenaufbereitung</h1><p class="lead">Du bearbeitest neue Parallel- und Transferaufgaben auf Grundlage der Vorlesungsfolien, Aufgabenblätter, Projektitems und des dokumentierten R-Arbeitswegs. Das Ziel ist nicht Wiedererkennen, sondern eine sichere psychometrische Entscheidung.</p><div class="pill-row"><span class="pill">${tasks.length} Aufgaben</span><span class="pill">7 Lernbereiche</span><span class="pill">offline nutzbar</span><span class="pill">lokaler Lernstand</span></div><button class="btn btn-primary" data-goto="workflow">Training starten</button></div>
<div class="grid" style="margin-top:18px"><article class="card"><h3>Du lernst</h3><p>Polungen konstruktbezogen zu beurteilen, Werte auf beliebigen Skalen zu invertieren und eine reproduzierbare Datenaufbereitung zu planen.</p></article><article class="card"><h3>Du diagnostizierst</h3><p>Schlüsselfehler, Doppel-Invertierungen, schwache Konstruktpassung und mögliche Fremddimensionalität.</p></article><article class="card"><h3>Du transferierst</h3><p>Die Regeln auf neue Skalenbereiche, neue Items und synthetische Korrelationsmuster.</p></article></div>
<div class="callout warn"><strong>Datenschutz:</strong> Das Modul enthält keine realen individuellen Antwortprofile. Korrelationsmuster und Zahlenbeispiele sind synthetisch; einzelne Itemformulierungen und Projektentscheidungen stammen aus den bereitgestellten Lehrmaterialien.</div>
<div class="card"><h3>Fachliche Grundlagen</h3><div class="pill-row"><span class="source">Aufgabenblatt 3</span><span class="source">PD04 EFA</span><span class="source">PD05 Itemanalyse</span><span class="source">fa.R</span><span class="source">Items.xlsx</span></div><p>Projektinterne Entscheidungen – etwa die Behandlung einzelner mehrdeutiger Items – werden als solche bezeichnet und nicht als allgemeingültige psychometrische Wahrheit dargestellt.</p></div>`}
function renderSection(s,idx){const ts=sectionTasks(s.id);const done=ts.filter(t=>taskState(t.id).correct).length;return `<div class="section-head"><div><div class="eyebrow">Lernbereich ${idx}</div><h2>${esc(s.title)}</h2></div><div class="section-count">${done} von ${ts.length} gelöst</div></div><details class="card theory"><summary>Kompakte fachliche Grundlage</summary><p>${s.theory}</p></details><div class="task-list">${ts.map(renderTask).join('')}</div>${renderFooter(idx)}`}
function renderTask(t){const st=taskState(t.id);const source=t.source?`<span class="source">${esc(t.source)}</span>`:'';return `<article class="task ${st.correct?'done':''}" id="task-${t.id}" data-task="${t.id}"><div class="task-head"><div><div class="task-kicker">${taskTypeLabel(t.type)}</div><div class="task-title">${esc(t.title)}</div>${source}</div><span class="status ${st.correct?'good':''}">${st.correct?'gelöst':st.attempts?`${st.attempts} Versuch${st.attempts===1?'':'e'}`:'offen'}</span></div><div class="prompt">${esc(t.prompt)}</div>${renderInput(t,st)}<div class="hint-box">${(t.hints||[]).map((h,i)=>`<button type="button" data-hint="${i}">Hinweis ${i+1} anzeigen</button><div class="hint" id="hint-${t.id}-${i}">${esc(h)}</div>`).join('')}</div><div class="feedback" role="status"></div></article>`}
function taskTypeLabel(type){return ({single:'Einzelauswahl',multi:'Mehrfachauswahl',number:'Rechenaufgabe',order:'Reihenfolge'})[type]||'Aufgabe'}
function renderInput(t,st){if(t.type==='single'||t.type==='multi'){const inputType=t.type==='single'?'radio':'checkbox';return `<div class="options">${t.options.map((o,i)=>`<label class="option"><input type="${inputType}" name="${t.id}" value="${i}"><span>${esc(o)}</span></label>`).join('')}</div><div class="answer-row"><button class="btn btn-primary" type="button" data-check>Antwort prüfen</button></div>`}if(t.type==='number'){return `<div class="answer-row"><label><span class="sr-only">Numerische Antwort</span><input class="number-input" type="text" inputmode="decimal" autocomplete="off" aria-label="Numerische Antwort"></label><button class="btn btn-primary" type="button" data-check>Antwort prüfen</button></div>`}if(t.type==='order'){const seq=st.correct?t.answer:(t.start||t.items.map((_,i)=>i));const arr=seq.map(orig=>({text:t.items[orig],orig}));return `<ol class="order-list">${arr.map((x,i)=>orderItem(t.id,x.text,x.orig,i)).join('')}</ol><div class="answer-row"><button class="btn btn-primary" type="button" data-check>Reihenfolge prüfen</button></div>`}return ''}
function orderItem(id,text,orig,pos){return `<li class="order-item" data-orig="${orig}"><span><strong>${pos+1}.</strong> ${esc(text)}</span><span class="order-controls"><button type="button" data-move="up" aria-label="Schritt nach oben">↑</button><button type="button" data-move="down" aria-label="Schritt nach unten">↓</button></span></li>`}
function renderFooter(idx){const prev=MODULE.sections[idx-1],next=MODULE.sections[idx+1];return `<div class="footer-nav">${prev?`<button class="btn" data-goto="${prev.id}">← ${esc(prev.nav)}</button>`:'<span></span>'}${next?`<button class="btn btn-primary" data-goto="${next.id}">${esc(next.nav)} →</button>`:''}</div>`}
function renderResult(){const done=tasks.filter(t=>taskState(t.id).correct).length;const attempts=tasks.reduce((a,t)=>a+taskState(t.id).attempts,0);const hints=tasks.reduce((a,t)=>a+taskState(t.id).hints,0);const errs=Object.entries(state.errors).sort((a,b)=>b[1]-a[1]);return `<div class="section-head"><div><div class="eyebrow">Auswertung</div><h2>Lernstand und Fehlkonzeptprofil</h2></div></div><div class="dashboard"><div class="metric"><span>Gelöste Aufgaben</span><b>${done}/${tasks.length}</b></div><div class="metric"><span>Abgaben</span><b>${attempts}</b></div><div class="metric"><span>Genutzte Hinweise</span><b>${hints}</b></div><div class="metric"><span>Erfolgsquote</span><b>${tasks.length?Math.round(done/tasks.length*100):0}%</b></div></div><div class="card"><h3>Bereiche</h3>${MODULE.sections.filter(s=>sectionTasks(s.id).length).map(s=>{const ts=sectionTasks(s.id),d=ts.filter(t=>taskState(t.id).correct).length;return `<div class="error-item"><span>${esc(s.nav)} – ${esc(s.title)}</span><strong>${d}/${ts.length}</strong></div>`}).join('')}</div><div class="card" style="margin-top:16px"><h3>Wiederkehrende Fehlkonzepte</h3>${errs.length?`<div class="error-list">${errs.map(([e,n])=>`<div class="error-item"><span>${esc(humanError(e))}</span><strong>${n}×</strong></div>`).join('')}</div>`:'<p>Noch keine Fehlversuche mit klassifizierbarem Fehlkonzept.</p>'}</div><div class="callout"><strong>Interpretation:</strong> Ein gelöster Status zeigt, dass du die jeweilige Aufgabe mindestens einmal korrekt bearbeitet hast. Für nachhaltiges Lernen solltest du besonders die Bereiche mit mehreren Fehlversuchen später erneut bearbeiten.</div><div class="footer-nav"><button class="btn" data-goto="mastery">← Kompetenzcheck</button><button class="btn btn-primary" data-goto="workflow">Training wiederholen</button></div>`}
function humanError(e){return ({polung_aus_wortlaut_statt_konstrukt:'Polung nach Wortstimmung statt Zielkonstrukt beurteilt',invertierungsgrenzen_verwechselt:'Skalenunter- und -obergrenze verwechselt',rohdatensatz_ueberschrieben:'Rohdatensatz nicht als Referenz geschützt',korrelationsvorzeichen_ignoriert:'Systematisches Korrelationsvorzeichen nicht genutzt',schwaches_item_mit_falsch_gepolt_verwechselt:'Schwache Konstruktpassung mit Polungsfehler verwechselt',doppel_invertiert:'Bereits invertierte Werte erneut invertiert'})[e]||e.replaceAll('_',' ')}

function bindTaskEvents(){document.querySelectorAll('[data-task]').forEach(el=>{el.querySelectorAll('[data-check]').forEach(b=>b.addEventListener('click',()=>checkTask(el.dataset.task)));el.querySelectorAll('[data-hint]').forEach(b=>b.addEventListener('click',()=>showHint(el.dataset.task,Number(b.dataset.hint),b)));el.querySelectorAll('[data-move]').forEach(b=>b.addEventListener('click',()=>moveOrder(b)))})}
function bindPageButtons(){document.querySelectorAll('[data-goto]').forEach(b=>b.addEventListener('click',()=>showPage(b.dataset.goto)))}
function moveOrder(btn){const li=btn.closest('li'),list=li.parentElement;if(btn.dataset.move==='up'&&li.previousElementSibling)list.insertBefore(li,li.previousElementSibling);if(btn.dataset.move==='down'&&li.nextElementSibling)list.insertBefore(li.nextElementSibling,li);[...list.children].forEach((x,i)=>x.querySelector('strong').textContent=`${i+1}.`)}
function showHint(id,i,btn){const box=document.getElementById(`hint-${id}-${i}`);if(!box)return;const opening=box.style.display!=='block';box.style.display=opening?'block':'none';btn.textContent=opening?`Hinweis ${i+1} ausblenden`:`Hinweis ${i+1} anzeigen`;if(opening){const st=taskState(id);st.hints+=1;saveState()}}
function selectedValues(article){return [...article.querySelectorAll('input:checked')].map(x=>Number(x.value)).sort((a,b)=>a-b)}
function retryText(t,attempts){const hints=t.hints||[];if(hints.length){const i=Math.min(Math.max(attempts-1,0),hints.length-1);return `Nächster Ansatz bei „${t.title}“: ${hints[i]}`}return `Prüfe bei „${t.title}“ jeden geforderten Teilschritt noch einmal.`}
function checkTask(id){const t=tasks.find(x=>x.id===id),article=document.getElementById(`task-${id}`),st=taskState(id);let ans,ok=false;if(t.type==='single'||t.type==='multi'){ans=selectedValues(article);if(t.type==='single')ans=ans.length?ans[0]:null;ok=t.type==='single'?ans===t.answer:JSON.stringify(ans)===JSON.stringify([...t.answer].sort((a,b)=>a-b))}else if(t.type==='number'){const raw=article.querySelector('.number-input').value.trim().replace(',','.');ans=Number(raw);ok=raw!==''&&Number.isFinite(ans)&&Math.abs(ans-t.answer)<=Number(t.tolerance||0)}else if(t.type==='order'){ans=[...article.querySelectorAll('.order-item')].map(x=>Number(x.dataset.orig));ok=JSON.stringify(ans)===JSON.stringify(t.answer)}st.attempts+=1;st.lastAnswer=ans;if(ok)st.correct=true;else if(t.misconception)state.errors[t.misconception]=(state.errors[t.misconception]||0)+1;const fb=article.querySelector('.feedback');fb.className=`feedback show ${ok?'good':'bad'}`;const body=ok?t.explanation:retryText(t,st.attempts);const reveal=(!ok&&st.attempts>=2)?`<div class="answer-row"><button type="button" class="btn" data-reveal>Erklärung anzeigen</button></div>`:'';fb.innerHTML=`<strong>${ok?'Richtig.':'Noch nicht richtig.'}</strong><div>${esc(body)}</div>${!ok&&t.misconception?`<div class="misconception">Möglicher Denkfehler: ${esc(humanError(t.misconception))}</div>`:''}${reveal}`;const revealBtn=fb.querySelector('[data-reveal]');if(revealBtn)revealBtn.addEventListener('click',()=>revealExplanation(id,revealBtn));article.classList.toggle('done',st.correct);article.querySelector('.status').textContent=st.correct?'gelöst':`${st.attempts} Versuch${st.attempts===1?'':'e'}`;article.querySelector('.status').classList.toggle('good',st.correct);announce(`${t.title}: ${ok?'richtig':'noch nicht richtig'}`);saveState();renderNav();updateSectionCounts();if(current==='result'){renderPages();showPage('result',false)}}
function revealExplanation(id,btn){const t=tasks.find(x=>x.id===id),st=taskState(id),fb=document.querySelector(`#task-${id} .feedback`);if(!t||!fb)return;st.hints+=1;fb.innerHTML+=`<div class="hint" style="display:block;margin-top:10px"><strong>Erklärung:</strong> ${esc(t.explanation)}</div>`;btn.remove();saveState()}

function showPage(id,focus=true){if(!MODULE.sections.some(s=>s.id===id))id='start';current=id;document.querySelectorAll('.page').forEach(p=>p.classList.toggle('active',p.dataset.page===id));document.querySelectorAll('.nav button').forEach(b=>{const active=b.dataset.page===id;b.setAttribute('aria-current',active?'page':'false')});if(id==='result'){const old=document.getElementById('page-result');old.innerHTML=renderResult();bindPageButtons()}saveState();if(focus){window.scrollTo({top:0,behavior:'smooth'});document.getElementById('main').focus()}}

function updateSectionCounts(){MODULE.sections.forEach(s=>{const ts=sectionTasks(s.id);if(!ts.length)return;const page=document.getElementById(`page-${s.id}`);if(!page)return;const el=page.querySelector('.section-count');if(el){const d=ts.filter(t=>taskState(t.id).correct).length;el.textContent=`${d} von ${ts.length} gelöst`}})}

function updateProgress(){const done=tasks.filter(t=>taskState(t.id).correct).length,pct=tasks.length?Math.round(done/tasks.length*100):0;document.getElementById('progressText').textContent=`${done} / ${tasks.length}`;document.getElementById('progressBar').style.width=`${pct}%`;const p=document.querySelector('.progress');p.setAttribute('aria-valuenow',String(pct));document.querySelectorAll('.section-count').forEach(()=>{});}

function exportState(){const blob=new Blob([JSON.stringify({schema:'m11a-application-trainer-progress',module:MODULE.id,exportedAt:new Date().toISOString(),state},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='m11a_anwendungstrainer_01_lernstand.json';a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}
function importState(file){const reader=new FileReader();reader.onload=()=>{try{const obj=JSON.parse(reader.result);const incoming=obj.state||obj;if(!incoming.tasks)throw new Error('Ungültiges Format');state=incoming;state.version=MODULE.version;current=state.current||'start';saveState();renderNav();renderPages();showPage(current);announce('Lernstand importiert')}catch(e){alert('Die Datei konnte nicht als Lernstand importiert werden.')}};reader.readAsText(file)}
function resetState(){if(!confirm('Soll der gesamte Lernstand dieses Moduls gelöscht werden?'))return;state=defaultState();current='start';try{localStorage.removeItem(MODULE.id)}catch(e){}renderNav();renderPages();showPage('start');announce('Lernstand zurückgesetzt')}

document.getElementById('exportBtn').addEventListener('click',exportState);document.getElementById('importBtn').addEventListener('click',()=>document.getElementById('importFile').click());document.getElementById('importFile').addEventListener('change',e=>{if(e.target.files[0])importState(e.target.files[0]);e.target.value=''});document.getElementById('resetBtn').addEventListener('click',resetState);
renderNav();renderPages();updateProgress();showPage(current,false);
</script>
</body>
</html>
