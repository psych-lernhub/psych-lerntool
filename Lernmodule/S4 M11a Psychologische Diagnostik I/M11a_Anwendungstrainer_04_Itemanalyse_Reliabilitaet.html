ms:flex-start}.task-kicker{font-size:.78rem;text-transform:uppercase;letter-spacing:.08em;font-weight:800;color:var(--brand)}.task-title{font-weight:800;font-size:1.08rem;margin:3px 0 8px}.status{font-size:.82rem;font-weight:750;border-radius:99px;padding:4px 8px;background:var(--surface-2);white-space:nowrap}.status.good{color:var(--good)}.prompt{margin:13px 0}.options{display:grid;gap:9px;margin:14px 0}.option{display:flex;gap:10px;align-items:flex-start;border:1px solid var(--line);border-radius:11px;padding:11px 12px;background:var(--surface)}.option:hover{background:var(--surface-2)}.option input{margin-top:4px;accent-color:var(--brand)}.answer-row{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-top:13px}.number-input{width:min(210px,100%);padding:10px 12px;border:1px solid var(--line);border-radius:10px;background:var(--surface);color:var(--text)}.hint-box{margin-top:12px}.hint-box button{background:transparent;border:0;color:var(--brand);font-weight:700;padding:4px 0}.hint{display:none;background:var(--surface-2);border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-top:7px}.feedback{display:none;margin-top:14px;padding:13px 14px;border-radius:11px;border:1px solid var(--line)}.feedback.show{display:block}.feedback.good{border-color:var(--good);background:color-mix(in srgb,var(--good) 10%,var(--surface))}.feedback.bad{border-color:var(--bad);background:color-mix(in srgb,var(--bad) 8%,var(--surface))}.feedback strong{display:block;margin-bottom:4px}.misconception{font-size:.88rem;color:var(--muted);margin-top:7px}.order-list{list-style:none;padding:0;margin:14px 0;display:grid;gap:8px}.order-item{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;border:1px solid var(--line);border-radius:11px;padding:10px 11px;background:var(--surface-2)}.order-controls{display:flex;gap:5px}.order-controls button{width:36px;height:36px;border:1px solid var(--line);border-radius:8px;background:var(--surface);color:var(--te <script>
'use strict';
const MODULE = {"id": "m11a-apptrainer-04-v1", "title": "Itemanalyse und Reliabilität", "version": "1.0.0", "sections": [{"id": "start", "nav": "Start", "title": "Vom Einzelitem zur belastbaren Skala", "intro": true}, {"id": "workflow", "nav": "1 · Analyseweg", "title": "Itemanalyse als mehrstufigen Entscheidungsprozess ordnen", "theory": "Vor der Itemanalyse müssen Polung und Dimensionen geklärt sein. Danach werden Itemschwierigkeit, Streuung, korrigierte Trennschärfe und Reliabilität gemeinsam beurteilt. Kein einzelner Kennwert entscheidet automatisch über Behalten oder Entfernen."}, {"id": "difficulty", "nav": "2 · Schwierigkeit", "title": "Itemschwierigkeit bei Aufgaben und Ratings korrekt bestimmen", "theory": "Der Schwierigkeitsindex p_j ist der Mittelwert der Itemwerte. Bei dichotomen Leistungsitems entspricht er dem Anteil gelöster Aufgaben. Ein hoher Wert bedeutet dort ein leichtes Item; bei Ratings bedeutet er nach korrekter Polung hohe Zustimmung beziehungsweise hohe Merkmalsausprägung."}, {"id": "normdifficulty", "nav": "3 · Normierung", "title": "Normierte Schwierigkeit und Extrembereiche sicher verwenden", "theory": "Für eine Skala mit Untergrenze u und Obergrenze o wird die normierte Schwierigkeit als p* = ((p − u)/(o − u)) · 100 berechnet. Die in der Veranstaltung verwendeten Bereiche von ungefähr 15 bis 85 sind Daumenregeln und keine universellen Löschbefehle."}, {"id": "variance", "nav": "4 · Streuung", "title": "Itemvarianz und Standardabweichung interpretieren", "theory": "Streuung beschreibt, wie stark sich Personen in ihren Antworten unterscheiden. Bei SD = 0 antworten alle gleich. Extreme Schwierigkeiten begrenzen die mögliche Varianz; mittlere Schwierigkeiten erlauben typischerweise größere Streuung. Eine hohe SD allein macht ein Item aber noch nicht gut."}, {"id": "discrimination", "nav": "5 · Trennschärfe", "title": "Korrigierte Trennschärfen diagnostisch lesen", "theory": "Die korrigierte Trennschärfe korreliert ein Item mit dem Testwert aus allen anderen Items derselben Dimension. Die Part-whole-Korrektur verhindert eine künstliche Überschätzung. Negative Werte nach korrekter Invertierung sind ein Warnsignal für Codierung, Polung oder Konstruktpassung."}, {"id": "alpha", "nav": "6 · Cronbach α", "title": "Interne Konsistenz berechnen und kontextbezogen beurteilen", "theory": "Cronbachs α fasst die Interitem-Konsistenz zusammen. Unter essentieller τ-Äquivalenz und unkorrelierten Messfehlern entspricht α der Reliabilität; bei verletzten Annahmen ist die Interpretation begrenzt. Ein pauschaler Grenzwert wie .70 ersetzt weder Zweckbezug noch inhaltliche Prüfung."}, {"id": "output", "nav": "7 · R-Ausgabe", "title": "psych::alpha-Ausgaben vollständig auswerten", "theory": "Die R-Ausgabe trennt Skalenkennwerte, „Reliability if an item is dropped“ und Itemstatistiken. Für die Itemdiagnostik sind insbesondere aktuelles raw_alpha, r.drop, Mittelwert, SD und das Alpha nach Entfernung relevant. Auch ein sichtbarer Alpha-Anstieg rechtfertigt zunächst eine Ursachenprüfung."}, {"id": "selection", "nav": "8 · Selektion", "title": "Items unter statistischen und inhaltlichen Kriterien auswählen", "theory": "Eine belastbare Auswahl berücksichtigt Schwierigkeit, Streuung, Trennschärfe, Alpha-Veränderung, Facettenabdeckung, Redundanz, Polungsverteilung und Zielpopulation. Grenzwerte strukturieren die Prüfung, ersetzen aber keine begründete Abwägung."}, {"id": "mastery", "nav": "9 · Abschluss", "title": "Kompetenzcheck: Eine Skala vollständig diagnostizieren", "theory": "Im Abschlussfall werden alle Kennwerte gemeinsam ausgewertet. Gefordert ist eine sinnvolle Reihenfolge: Auffälligkeiten lokalisieren, mögliche Ursachen prüfen, Kennwerte neu berechnen und erst danach über Revision oder Entfernung entscheiden."}, {"id": "result", "nav": "Ergebnis", "title": "Lernstand und Fehlkonzeptprofil", "result": true}]};
const tasks = [{"id":"workflow-1","section":"workflow","type":"order","title":"Vom Datensatz zur revidierten Skala","prompt":"Bringe die Schritte in eine fachlich sinnvolle Reihenfolge.","items":["Polung und Codierung kontrollieren","Dimensionalität und faktorweise Itemzuordnung festlegen","Items je Dimension zusammenstellen","Itemschwierigkeit, SD und korrigierte Trennschärfe berechnen","Cronbachs α und Alpha nach Itementfernung auswerten","Auffällige Items inhaltlich und statistisch diagnostizieren","Begründete Revision oder Auswahl vornehmen","Kennwerte der revidierten Skala erneut berechnen"],"start":[4,2,6,0,5,1,7,3],"answer":[0,1,2,3,4,5,6,7],"hints":["Beginne mit der Datengrundlage: Prüfe zuerst Polung und Codierung, damit hohe Werte überall dieselbe inhaltliche Richtung haben.","Kläre danach die Dimensionalität und die faktorweise Itemzuordnung; erst dann weißt du, welche Items gemeinsam analysiert werden dürfen.","Stelle nun für jede festgelegte Dimension die zugehörigen Items zusammen. Das ist die konkrete Arbeitsmenge für die folgenden Kennwerte.","Berechne zuerst die Itemkennwerte Schwierigkeit, SD und korrigierte Trennschärfe; sie beschreiben einzelne Items innerhalb ihrer Dimension.","Beurteile anschließend die Skala als Ganzes mit Cronbachs α und vergleiche für jedes Item das Alpha nach Entfernung.","Diagnostiziere Auffälligkeiten inhaltlich und statistisch, bevor du revidierst oder auswählst. Nach jeder tatsächlichen Änderung werden alle Kennwerte erneut berechnet."],"retry":"Ordne die Kette in vier Blöcke: Datengrundlage klären → dimensionsbezogene Items festlegen → Item- und Skalenkennwerte diagnostizieren → revidieren und erneut prüfen.","explanation":"1. Polung und Codierung werden kontrolliert, damit alle Itemwerte korrekt gerichtet und interpretierbar sind. 2. Danach wird die Dimensionalität samt faktorweiser Itemzuordnung festgelegt, weil Kennwerte dimensionsbezogen interpretiert werden. 3. Auf dieser Grundlage werden die Items je Dimension zusammengestellt. 4. Für diese Items folgen Schwierigkeit, SD und korrigierte Trennschärfe als Itemdiagnostik. 5. Anschließend werden Cronbachs α und das Alpha nach Entfernung jedes Items als Skaleninformation ausgewertet. 6. Erst die gemeinsame statistische und inhaltliche Diagnose erklärt, warum ein Item auffällig ist. 7. Darauf folgt eine begründete Revision oder Auswahl, nicht eine automatische Löschung nach einem Einzelwert. 8. Abschließend werden alle Kennwerte der veränderten Skala neu berechnet, weil jede Änderung das Kennwertmuster verändern kann.","source":"PD05 Itemanalyse · PD06 Gütekriterien I · fa.R","misconception":"selektion_vor_diagnose"},{"id":"workflow-2","section":"workflow","type":"match","title":"Kennwert und Funktion zuordnen","prompt":"Ordne jedem Kennwert seine primäre Aussage zu.","rows":["Itemschwierigkeit p","normierte Schwierigkeit p*","Standardabweichung","korrigierte Trennschärfe r.drop","Alpha nach Itementfernung"],"options":["mittlere Itemausprägung","Mittelwert auf 0–100 transformiert","Streuung der Itemantworten","Zusammenhang mit dem Rest der eigenen Skala","interne Konsistenz ohne das betreffende Item"],"answer":[0,1,2,3,4],"hints":["Beginne mit p: Der unnormierte Schwierigkeitsindex ist bei Ratingitems der Mittelwert und beschreibt damit die mittlere Itemausprägung.","p* verändert nicht die inhaltliche Aussage von p, sondern überführt den Mittelwert anhand von Unter- und Obergrenze auf eine 0–100-Skala.","Die Standardabweichung beantwortet keine Mittelwertsfrage, sondern beschreibt, wie stark die Itemantworten zwischen Personen streuen.","r.drop enthält das betreffende Item nicht im Restscore und zeigt dessen Zusammenhang mit dem Rest der eigenen Skala.","Beim Alpha nach Itementfernung wird die interne Konsistenz der Skala ohne genau das betreffende Item berechnet."],"retry":"Trenne die fünf Funktionen nacheinander: Lage des Items, auf 0–100 transformierte Lage, Streuung, Zusammenhang mit dem Restscore und Konsistenz der Skala ohne das Item.","explanation":"Itemschwierigkeit p gehört zur mittleren Itemausprägung. Die normierte Schwierigkeit p* ist derselbe Lagewert, auf 0–100 transformiert. Die Standardabweichung beschreibt die Streuung der Itemantworten. Die korrigierte Trennschärfe r.drop ist der Zusammenhang des Items mit dem Rest seiner eigenen Skala, wobei das Item aus dem Restscore entfernt ist. Das Alpha nach Itementfernung ist die interne Konsistenz der Skala, wenn das betreffende Item weggelassen wird. Die fünf Kennwerte sind deshalb nicht austauschbar, sondern beantworten fünf verschiedene Diagnosefragen.","source":"PD05 Itemanalyse · psych::alpha","misconception":"kennwerte_vertauscht"},{"id":"workflow-3","section":"workflow","type":"single","title":"Warum faktorweise analysieren?","prompt":"Warum werden Trennschärfen bei einem mehrdimensionalen Test für jede Dimension getrennt berechnet?","options":["Weil jede Dimension eine andere Stichprobengröße benötigt.","Weil ein Item mit dem Testwert seiner vorgesehenen Dimension zusammenhängen soll und Fremdtrennschärfen deutlich niedriger sein sollten.","Weil Cronbachs α nur bei genau einer Person berechnet werden kann.","Weil Itemmittelwerte sonst immer negativ werden."],"answer":1,"hints":["Denke an Eigen- und Fremdtrennschärfen."],"explanation":"Ein Item soll vor allem mit dem Rest seiner eigenen Dimension zusammenhängen. Eine einzige Gesamtskala könnte gute dimensionale Items fälschlich schwach erscheinen lassen.","source":"PD05 Itemanalyse","misconceptionByAnswer":{"0":"stichprobe_mit_dimension_verwechselt","2":"alpha_personenverwechslung","3":"mittelwert_vorzeichen"}},{"id":"workflow-4","section":"workflow","type":"multi","title":"Voraussetzungen vor der Kennwertberechnung","prompt":"Welche Punkte sollten vor der eigentlichen Itemanalyse geklärt sein?","options":["Negativ gepolte Items sind korrekt invertiert.","Die vorgesehene Dimensionalität beziehungsweise faktorweise Zuordnung ist begründet.","Die Antwortcodierung und Skalenrichtung sind bekannt.","Eine Normstichprobe von mindestens 1000 Personen ist zwingend abgeschlossen.","Die Zielpopulation und der spätere Zweck werden bei der Interpretation berücksichtigt."],"answer":[0,1,2,4],"hints":["Itemanalyse erfolgt an der Analysestichprobe; Normierung ist ein späterer Schritt."],"explanation":"Polung, Codierung, Dimension und Interpretationskontext sind zentral. Eine abgeschlossene Normierung ist keine Voraussetzung der Itemanalyse.","source":"PD04 EFA · PD05 Itemanalyse · PD06 Gütekriterien I","misconception":"normierung_als_voraussetzung"},{"id":"difficulty-1","section":"difficulty","type":"number","title":"Mittelwert als Itemschwierigkeit","prompt":"Sechs Personen antworten auf einer Skala von 1 bis 5 mit 1, 2, 3, 4, 5 und 5. Berechne p als Mittelwert.","answer":3.3333,"tolerance":0.01,"unit":"","hints":["Addiere die sechs Werte und teile durch 6."],"explanation":"Die Summe beträgt 20; 20/6 = 3.33. Bei Ratings entspricht der Schwierigkeitsindex dem Itemmittelwert.","source":"PD05 Itemanalyse","misconception":"mittelwert_falsch"},{"id":"difficulty-2","section":"difficulty","type":"number","title":"Dichotomes Leistungsitem","prompt":"18 von 24 Personen lösen eine Aufgabe richtig. Wie groß ist der unnormierte Schwierigkeitsindex p?","answer":0.75,"tolerance":0.001,"unit":"","hints":["Bei 0/1-Codierung ist p der Lösungsanteil."],"explanation":"p = 18/24 = .75. Das Item wurde von 75 % der Personen gelöst.","source":"PD05 Itemanalyse","misconception":"loesungsanteil_falsch"},{"id":"difficulty-3","section":"difficulty","type":"single","title":"Hoher Wert – leicht oder schwierig?","prompt":"Ein dichotomes Leistungsitem besitzt p = .88. Welche Interpretation ist korrekt?","options":["Das Item ist umgangssprachlich sehr schwierig, weil der Index hoch ist.","Das Item ist umgangssprachlich eher leicht, weil 88 % es lösen.","Das Item besitzt automatisch eine hohe Trennschärfe.","Der Wert beschreibt ausschließlich die Reliabilität."],"answer":1,"hints":["Der Index zählt den Anteil korrekter Antworten."],"explanation":"Ein hoher Schwierigkeitsindex bedeutet bei einem Leistungsitem, dass viele Personen es lösen; umgangssprachlich ist es daher leicht.","source":"PD05 Itemanalyse","misconceptionByAnswer":{"0":"index_und_alltagsschwierigkeit_vertauscht","2":"schwierigkeit_als_trennschaerfe","3":"schwierigkeit_als_reliabilitaet"}},{"id":"difficulty-4","section":"difficulty","type":"number","title":"Fehlende Werte korrekt behandeln","prompt":"Von 30 Personen geben 27 eine gültige Antwort; 19 lösen das dichotome Item. Berechne p auf Basis der gültigen Antworten.","answer":0.7037,"tolerance":0.001,"unit":"","hints":["Der Nenner ist 27, nicht 30."],"explanation":"p = 19/27 = .704. Bei fehlenden Antworten wird durch die Zahl der gültigen Antworten geteilt.","source":"PD05 Itemanalyse","misconception":"missing_im_nenner_ignoriert"},{"id":"norm-1","section":"normdifficulty","type":"number","title":"p* auf einer 1–5-Skala","prompt":"Ein Ratingitem hat auf einer Skala von 1 bis 5 den Mittelwert p = 3.40. Berechne p* in Prozent.","answer":60,"tolerance":0.01,"unit":"%","hints":["p* = ((3.40 − 1)/(5 − 1)) · 100."],"explanation":"(2.40/4) · 100 = 60 %. Der Mittelwert liegt bei 60 % des möglichen Skalenwegs oberhalb der Untergrenze.","source":"PD05 Itemanalyse","misconception":"normschwierigkeit_falsch"},{"id":"norm-2","section":"normdifficulty","type":"number","title":"Grenzwert zurückrechnen","prompt":"Welcher Rohmittelwert entspricht auf einer 1–5-Skala einer normierten Schwierigkeit von 15 %?","answer":1.6,"tolerance":0.001,"unit":"","hints":["p = u + (p*/100) · (o − u)."],"explanation":"1 + .15 · 4 = 1.60. Entsprechend liegt 85 % bei 4.40.","source":"PD05 Itemanalyse · fa.R","misconception":"grenzwert_rueckrechnung_falsch"},{"id":"norm-3","section":"normdifficulty","type":"multi","title":"Illustrative Schwierigkeitsspanne anwenden","promptHtml":"<div class=\"matrix-wrap\"><table class=\"mini-table item-table\"><caption>Fünf neu konstruierte Items</caption><thead><tr><th scope=\"col\">Item</th><th scope=\"col\">p*</th></tr></thead><tbody><tr><th scope=\"row\">A</th><td>12</td></tr><tr><th scope=\"row\">B</th><td>18</td></tr><tr><th scope=\"row\">C</th><td>50</td></tr><tr><th scope=\"row\">D</th><td>84</td></tr><tr><th scope=\"row\">E</th><td>91</td></tr></tbody></table></div><p>Wähle nach der Übungsregel 15 &lt; p* &lt; 85 die Items, die den Schwierigkeitsbereich erfüllen.</p>","options":["A","B","C","D","E"],"answer":[1,2,3],"hints":["Die Grenzwerte werden hier ausdrücklich streng angewendet."],"explanation":"B, C und D liegen zwischen 15 und 85. A und E sind nach dieser Übungsregel extrem; die reale Entscheidung bleibt dennoch mehrkriterial.","source":"Neu konstruierte Kennwerte · PD05 Itemanalyse","misconception":"schwierigkeitsgrenzen_falsch"},{"id":"norm-4","section":"normdifficulty","type":"single","title":"Extremes Item nicht automatisch löschen","prompt":"Ein Item besitzt p* = 91, eine korrigierte Trennschärfe von .44 und deckt als einziges eine wichtige Facette ab. Welche Reaktion ist fachlich am besten?","options":["Sofort löschen; p* über 85 beendet jede weitere Prüfung.","Behalten, ohne die extreme Verteilung zu erwähnen.","Zielpopulation, Facettenrelevanz, Trennschärfe und mögliche Revision gemeinsam prüfen; erst danach entscheiden.","Die Trennschärfe auf 1 setzen."],"answer":2,"hints":["Die Cutoffs sind Daumenregeln, kein fester Algorithmus."],"explanation":"Das Item ist hinsichtlich der Schwierigkeit auffällig, differenziert aber noch sinnvoll und besitzt einzigartige Inhaltsfunktion. Revision oder Stichprobenprüfung kann geeigneter sein als sofortige Entfernung.","source":"PD05 Itemanalyse","misconceptionByAnswer":{"0":"cutoff_als_loeschbefehl","1":"extremwert_ignoriert","3":"kennwert_manuell_veraendert"}},{"id":"variance-1","section":"variance","type":"single","title":"SD = 0 diagnostizieren","prompt":"Alle 82 Personen beantworten ein Item mit dem Wert 4. Welche Aussage ist korrekt?","options":["Der Mittelwert ist 0.","Die Itemvarianz und SD sind 0; das Item differenziert in dieser Stichprobe nicht.","Die Trennschärfe ist automatisch 1.","Das Item ist wegen der großen Stichprobe optimal."],"answer":1,"hints":["Ohne Unterschiede zwischen Personen gibt es keine Streuung."],"explanation":"Konstante Antworten führen zu Varianz und SD von 0. Ein solches Item kann in dieser Stichprobe keine interindividuellen Unterschiede abbilden.","source":"PD05 Itemanalyse","misconception":"keine_streuung_uebersehen"},{"id":"variance-2","section":"variance","type":"number","title":"Stichproben-SD berechnen","prompt":"Die Antworten lauten 1, 1, 5, 5. Berechne die Stichproben-Standardabweichung mit dem Nenner n − 1.","answer":2.3094,"tolerance":0.01,"unit":"","hints":["Der Mittelwert ist 3; die quadrierten Abweichungen summieren sich zu 16."],"explanation":"s² = 16/3 = 5.333; s = √5.333 = 2.31.","source":"Neu konstruierte Mini-Stichprobe · PD05 Itemanalyse","misconception":"standardabweichung_falsch"},{"id":"variance-3","section":"variance","type":"single","title":"Gleicher Mittelwert, andere Streuung","promptHtml":"<div class=\"matrix-wrap\"><table class=\"mini-table item-table\"><caption>Zwei Items mit gleichem Mittelwert</caption><thead><tr><th scope=\"col\">Item</th><th scope=\"col\">M</th><th scope=\"col\">SD</th></tr></thead><tbody><tr><th scope=\"row\">A</th><td>3.0</td><td>0.25</td></tr><tr><th scope=\"row\">B</th><td>3.0</td><td>1.30</td></tr></tbody></table></div><p>Welches Item differenziert allein anhand der Streuung stärker zwischen Personen?</p>","options":["Item A","Item B","Beide gleich, weil der Mittelwert identisch ist.","Das lässt sich nur aus Cronbachs α bestimmen."],"answer":1,"hints":["Vergleiche die SD, nicht den Mittelwert."],"explanation":"Item B weist deutlich mehr Antwortstreuung auf. Das ist günstig für Differenzierung, garantiert aber noch keine hohe Trennschärfe oder inhaltliche Passung.","source":"Neu konstruierte Kennwerte","misconception":"mittelwert_und_streuung_verwechselt"},{"id":"variance-4","section":"variance","type":"multi","title":"Aussagen zu Schwierigkeit und Varianz","prompt":"Welche Aussagen sind richtig?","options":["Bei p* = 0 oder 100 ist die Itemvarianz 0.","Mittlere Schwierigkeiten erlauben typischerweise größere Varianzen.","Die höchste SD bestimmt automatisch das beste Item.","Eine extreme Schwierigkeit begrenzt die maximal mögliche Varianz.","Die SD besitzt dieselbe Maßeinheit wie die Itemwerte."],"answer":[0,1,3,4],"hints":["Streuung ist wichtig, aber nicht das einzige Kriterium."],"explanation":"Extreme Schwierigkeiten gehen im Grenzfall mit fehlender Streuung einher; mittlere Schwierigkeiten erlauben höhere Varianz. Die SD ist in der Einheit der Itemskala, entscheidet aber nicht allein über Itemqualität.","source":"PD05 Itemanalyse","misconception":"varianz_als_alleinkriterium"},{"id":"disc-1","section":"discrimination","type":"single","title":"Part-whole-Korrektur erkennen","prompt":"Welche Berechnung entspricht der korrigierten Trennschärfe eines Items j?","options":["Cor(Item j, Gesamtscore einschließlich Item j)","Cor(Item j, Gesamtscore minus Item j)","Mittelwert(Item j) / SD(Item j)","Cronbachs α × Itemmittelwert"],"answer":1,"hints":["Das Item darf nicht zugleich in beiden Korrelationsvariablen stecken."],"explanation":"Die korrigierte Trennschärfe korreliert das Item mit dem Restscore. Dadurch wird die künstliche Part-whole-Überlappung entfernt.","source":"PD05 Itemanalyse","misconception":"part_whole_unkorrigiert"},{"id":"disc-2","section":"discrimination","type":"single","title":"Stärkstes Item lokalisieren","promptHtml":"<div class=\"matrix-wrap\"><table class=\"mini-table item-table\"><caption>Itemstatistiken einer eindimensionalen Skala</caption><thead><tr><th scope=\"col\">Item</th><th scope=\"col\">r.drop</th></tr></thead><tbody><tr><th scope=\"row\">K1</th><td>.62</td></tr><tr><th scope=\"row\">K2</th><td>.18</td></tr><tr><th scope=\"row\">K3</th><td>.47</td></tr><tr><th scope=\"row\">K4</th><td>−.09</td></tr></tbody></table></div><p>Welches Item besitzt die höchste korrigierte Trennschärfe?</p>","options":["K1","K2","K3","K4"],"answer":0,"hints":["Vergleiche die positiven Korrelationswerte."],"explanation":"K1 besitzt mit .62 den stärksten Zusammenhang mit dem Rest der Skala.","source":"Neu konstruierte Itemstatistiken","misconception":"trennschaerfe_falsch_gelesen"},{"id":"disc-3","section":"discrimination","type":"multi","title":"Negative Trennschärfe diagnostizieren","prompt":"Ein bereits angeblich invertiertes Item besitzt r.drop = −.21. Welche Ursachen sollten geprüft werden?","options":["Fehlerhafte oder doppelte Invertierung","Item misst inhaltlich eine andere Dimension","Codierungs- oder Dateneingabefehler","Das Item trennt besonders gut und sollte ungeprüft behalten werden","Unklare oder missverständliche Formulierung"],"answer":[0,1,2,4],"hints":["Ein negativer Zusammenhang ist nach korrekter Polung ein Warnsignal."],"explanation":"Polung, Codierung, Formulierung und Konstruktpassung sind plausible Ursachen. Eine negative Trennschärfe ist kein Qualitätsbeleg.","source":"PD05 Itemanalyse · fa.R","misconception":"negative_trennschaerfe_als_gut"},{"id":"disc-4","section":"discrimination","type":"single","title":"Eigen- und Fremdtrennschärfe","prompt":"Ein Extraversion-Item korreliert mit dem restlichen Extraversionstest r = .58 und mit Gewissenhaftigkeit r = .56. Welche Diagnose ist am besten?","options":["Perfekte diskriminante Zuordnung, weil beide Werte hoch sind.","Die Eigentrennschärfe ist hoch, aber kaum höher als die Fremdtrennschärfe; die dimensionsspezifische Zuordnung ist fraglich.","Das Item muss negativ invertiert werden, weil beide Werte positiv sind.","Die Skala ist automatisch unreliabel."],"answer":1,"hints":["Die Fremdtrennschärfe sollte deutlich niedriger sein."],"explanation":"Das Item hängt zwar mit Extraversion zusammen, aber fast ebenso stark mit einer anderen Dimension. Dadurch ist seine Spezifität problematisch.","source":"PD05 Itemanalyse","misconception":"fremdtrennschaerfe_ignoriert"},{"id":"alpha-1","section":"alpha","type":"number","title":"Cronbachs α berechnen","prompt":"Eine Skala besitzt m = 4 Items. Die Summe der Itemvarianzen beträgt 4.8, die Varianz des Summenscores 12. Berechne α = m/(m−1) · (1 − Σs²/Var(X)).","answer":0.8,"tolerance":0.001,"unit":"","hints":["4/3 · (1 − 4.8/12)."],"explanation":"4.8/12 = .40; 1 − .40 = .60; 4/3 · .60 = .80.","source":"PD06 Gütekriterien I","misconception":"alpha_formel_falsch"},{"id":"alpha-2","section":"alpha","type":"single","title":"Alpha nach Itementfernung lesen","promptHtml":"<div class=\"matrix-wrap\"><table class=\"mini-table item-table\"><caption>Skala mit aktuellem α = .78</caption><thead><tr><th scope=\"col\">entferntes Item</th><th scope=\"col\">α ohne Item</th></tr></thead><tbody><tr><th scope=\"row\">I1</th><td>.69</td></tr><tr><th scope=\"row\">I2</th><td>.74</td></tr><tr><th scope=\"row\">I3</th><td>.73</td></tr><tr><th scope=\"row\">I4</th><td>.73</td></tr></tbody></table></div><p>Welche Schlussfolgerung folgt allein aus dieser Tabelle?</p>","options":["Jedes Item muss entfernt werden.","Kein Entfernen erhöht α; aus Alpha-Sicht gibt es hier keinen Kandidaten für eine Verbesserung.","I1 muss entfernt werden, weil .69 kleiner ist.","Die Tabelle beweist Eindimensionalität."],"answer":1,"hints":["Vergleiche jeden Wert mit dem aktuellen α = .78."],"explanation":"Alle Alpha-Werte ohne Item liegen unter .78. Die Entfernung eines Items würde die interne Konsistenz nicht erhöhen.","source":"PD05/PD06 Beispielausgabe","misconception":"alpha_drop_richtung_vertauscht"},{"id":"alpha-3","section":"alpha","type":"multi","title":"Cronbachs α nicht überinterpretieren","prompt":"Welche Aussagen sind richtig?","options":["Ein hoher α-Wert beweist Eindimensionalität.","α hängt unter anderem von Itemzahl und Interitemzusammenhängen ab.","Die Bewertung hängt vom Messzweck, Merkmal und der Ziel function sectionStatus(id){const ts=sectionTasks(id);if(!ts.length)return id==='result'?'Auswertung':'Übersicht';const done=ts.filter(t=>taskState(t.id).correct).length;return `${done}/${ts.length} gelöst`}
function renderPages(){const root=document.getElementById('pages');root.innerHTML='';MODULE.sections.forEach((s,idx)=>{const page=document.createElement('section');page.className='page';page.id=`page-${s.id}`;page.dataset.page=s.id;if(s.intro)page.innerHTML=renderStart();else if(s.result)page.innerHTML=renderResult();else page.innerHTML=renderSection(s,idx);root.appendChild(page)});bindTaskEvents();bindPageButtons()}
function renderStart(){return `<div class="hero"><div class="eyebrow">Interaktives Itemdiagnostik-Labor</div><h1>Itemanalyse und Reliabilität</h1><p class="lead">Du berechnest Itemschwierigkeiten, normierst Kennwerte, diagnostizierst Streuung und Trennschärfen, liest vollständige <code>psych::alpha</code>-Ausgaben und triffst mehrkriteriale Selektionsentscheidungen. Reale Projektkennwerte erscheinen ausschließlich aggregiert; alle Personenprofile bleiben außerhalb des Moduls.</p><div class="pill-row"><span class="pill">${tasks.length} Aufgaben</span><span class="pill">9 Lernbereiche</span><span class="pill">Rechen- und Outputtraining</span><span class="pill">offline nutzbar</span></div><button class="btn btn-primary" data-goto="workflow">Training starten</button></div>
<div class="grid" style="margin-top:18px"><div class="card"><h3>Du trainierst</h3><p>p und p*, Standardabweichung, korrigierte Trennschärfe, Cronbachs α, Alpha nach Itementfernung und begründete Itemselektion.</p></div><div class="card"><h3>Diagnose vor Löschung</h3><p>Auffällige Kennwerte führen zunächst zu einer Ursachenprüfung: Polung, Codierung, Konstruktpassung, Zielpopulation und Facettenabdeckung.</p></div><div class="card"><h3>Projektbezug</h3><p>Ein aggregierter Verträglichkeitsfall aus <code>sose2026i.RData</code> zeigt, warum ein extremer Mittelwert nicht automatisch eine Löschentscheidung ist.</p></div></div>`}
function renderSection(s,idx){const ts=sectionTasks(s.id);const done=ts.filter(t=>taskState(t.id).correct).length;return `<div class="section-head"><div><div class="eyebrow">Lernbereich ${idx}</div><h2>${esc(s.title)}</h2></div><div class="section-count">${done} von ${ts.length} gelöst</div></div><details class="card theory"><summary>Kompakte fachliche Grundlage</summary><p>${esc(s.theory)}</p></details><div class="task-list">${ts.map(renderTask).join('')}</div>${renderFooter(idx)}`}
function renderTask(t){const st=taskState(t.id);const source=t.source?`<span class="source">${esc(t.source)}</span>`:'';const prompt=t.promptHtml||esc(t.prompt||'');return `<article class="task ${st.correct?'done':''}" id="task-${t.id}" data-task="${t.id}"><div class="task-head"><div><div class="task-kicker">${taskTypeLabel(t.type)}</div><div class="task-title">${esc(t.title)}</div>${source}</div><span class="status ${st.correct?'good':''}">${st.correct?'gelöst':st.attempts?`${st.attempts} Versuch${st.attempts===1?'':'e'}`:'offen'}</span></div><div class="prompt">${prompt}</div>${renderInput(t,st)}<div class="hint-box">${(t.hints||[]).map((h,i)=>`<button type="button" data-hint="${i}">Hinweis ${i+1} anzeigen</button><div class="hint" id="hint-${t.id}-${i}">${esc(h)}</div>`).join('')}</div><div class="feedback" role="status"></div></article>`}
function taskTypeLabel(type){return ({single:'Einzelauswahl',multi:'Mehrfachauswahl',number:'Rechenaufgabe',order:'Reihenfolge',matrix:'Matrix markieren',match:'Zuordnung'})[type]||'Aufgabe'}
function checkedAttr(st,i,type){if(st.lastAnswer==null)return '';if(type==='single')return st.lastAnswer===i?' checked':'';return Array.isArray(st.lastAnswer)&&st.lastAnswer.includes(i)?' checked':''}
function renderInput(t,st){
 if(t.type==='single'||t.type==='multi'){const inputType=t.type==='single'?'radio':'checkbox';return `<div class="options">${t.options.map((o,i)=>`<label class="option"><input type="${inputType}" name="${t.id}" value="${i}"${checkedAttr(st,i,t.type)}><span>${esc(o)}</span></label>`).join('')}</div><div class="answer-row"><button class="btn btn-primary" type="button" data-check>Antwort prüfen</button></div>`}
 if(t.type==='number'){const val=typeof st.lastAnswer==='number'?String(st.lastAnswer):'';return `<div class="answer-row"><label><span class="sr-only">Numerische Antwort</span><input class="number-input" type="text" inputmode="decimal" autocomplete="off" aria-label="Numerische Antwort" value="${esc(val)}"></label>${t.unit?`<span>${esc(t.unit)}</span>`:''}<button class="btn btn-primary" type="button" data-check>Antwort prüfen</button></div>`}
 if(t.type==='order'){const seq=Array.isArray(st.lastAnswer)?st.lastAnswer:(st.correct?t.answer:(t.start||t.items.map((_,i)=>i)));const arr=seq.map(orig=>({text:t.items[orig],orig}));return `<ol class="order-list">${arr.map((x,i)=>orderItem(t.id,x.text,x.orig,i)).join('')}</ol><div class="answer-row"><button class="btn btn-primary" type="button" data-check>Reihenfolge prüfen</button></div>`}
 if(t.type==='matrix')return renderMatrix(t,st);
 if(t.type==='match')return renderMatch(t,st);
 return ''
}
function orderItem(id,text,orig,pos){return `<li class="order-item" data-orig="${orig}"><span><strong>${pos+1}.</strong> ${esc(text)}</span><span class="order-controls"><button type="button" data-move="up" aria-label="Schritt nach oben">↑</button><button type="button" data-move="down" aria-label="Schritt nach unten">↓</button></span></li>`}
function fmtNum(v){if(v===1)return '1.00';const s=Number(v).toFixed(2);return s.replace(/^(-?)0\./,'$1.')}
function renderMatrix(t,st){const selected=new Set(Array.isArray(st.lastAnswer)?st.lastAnswer:[]);let rows='';for(let i=0;i<t.labels.length;i++){let cells=`<th scope="row">${esc(t.labels[i])}</th>`;for(let j=0;j<t.labels.length;j++){const key=`${Math.min(i,j)}-${Math.max(i,j)}`;if(i===j)cells+=`<td class="diag">${fmtNum(t.values[i][j])}</td>`;else if(i<j)cells+=`<td><button type="button" class="matrix-cell" data-pair="${key}" aria-pressed="${selected.has(key)}" aria-label="${esc(t.labels[i])} mit ${esc(t.labels[j])}: ${fmtNum(t.values[i][j])}">${fmtNum(t.values[i][j])}</button></td>`;else cells+=`<td class="mirror">${fmtNum(t.values[i][j])}</td>`}rows+=`<tr>${cells}</tr>`}return `<div class="matrix-wrap"><table class="matrix-table"><caption>Symmetrische Matrix; auswählbar ist das obere Dreieck</caption><thead><tr><th></th>${t.labels.map(x=>`<th scope="col">${esc(x)}</th>`).join('')}</tr></thead><tbody>${rows}</tbody></table></div><div class="answer-row"><button class="btn btn-primary" type="button" data-check>Markierung prüfen</button></div>`}
function renderMatch(t,st){const ans=Array.isArray(st.lastAnswer)?st.lastAnswer:[];const rows=t.rows.map((r,i)=>`<tr><th scope="row">${esc(r)}</th><td><select data-match-row="${i}" aria-label="Kategorie für ${esc(r)}"><option value="">Bitte wählen</option>${t.options.map((o,j)=>`<option value="${j}"${ans[i]===j?' selected':''}>${esc(o)}</option>`).join('')}</select></td></tr>`).join('');return `<table class="match-table"><thead><tr><th>Wert</th><th>Kategorie</th></tr></thead><tbody>${rows}</tbody></table><div class="answer-row"><button class="btn btn-primary" type="button" data-check>Zuordnung prüfen</button></div>`}
function renderFooter(idx){const prev=MODULE.sections[idx-1],next=MODULE.sections[idx+1];return `<div class="footer-nav">${prev?`<button class="btn" data-goto="${prev.id}">← ${esc(prev.nav)}</button>`:'<span></span>'}${next?`<button class="btn btn-primary" data-goto="${next.id}">${esc(next.nav)} →</button>`:''}</div>`}
function renderResult(){const done=tasks.filter(t=>taskState(t.id).correct).length;const attempts=tasks.reduce((a,t)=>a+taskState(t.id).attempts,0);const hints=tasks.reduce((a,t)=>a+taskState(t.id).hints,0);const errs=Object.entries(state.errors).sort((a,b)=>b[1]-a[1]);return `<div class="section-head"><div><div class="eyebrow">Auswertung</div><h2>Lernstand und Fehlkonzeptprofil</h2></div></div><div class="dashboard"><div class="metric"><span>Gelöste Aufgaben</span><b>${done}/${tasks.length}</b></div><div class="metric"><span>Abgaben</span><b>${attempts}</b></div><div class="metric"><span>Genutzte Hinweise</span><b>${hints}</b></div><div class="metric"><span>Kompetenzabdeckung</span><b>${tasks.length?Math.round(done/tasks.length*100):0}%</b></div></div><div class="card"><h3>Bereiche</h3>${MODULE.sections.filter(s=>sectionTasks(s.id).length).map(s=>{const ts=sectionTasks(s.id),d=ts.filter(t=>taskState(t.id).correct).length;return `<div class="error-item"><span>${esc(s.nav)} – ${esc(s.title)}</span><strong>${d}/${ts.length}</strong></div>`}).join('')}</div><div class="card" style="margin-top:16px"><h3>Wiederkehrende Fehlkonzepte</h3>${errs.length?`<div class="error-list">${errs.map(([e,n])=>`<div class="error-item"><span>${esc(humanError(e))}</span><strong>${n}×</strong></div>`).join('')}</div>`:'<p>Noch keine Fehlversuche mit klassifizierbarem Fehlkonzept.</p>'}</div><div class="callout"><strong>Interpretation:</strong> Entscheidend ist, ob du Kennwerte korrekt berechnen, negative Trennschärfen diagnostisch behandeln, Alpha-Ausgaben vollständig lesen und statistische mit inhaltlichen Kriterien verbinden kannst. Wiederhole besonders Bereiche, in denen ein einzelner Cutoff als automatischer Löschbefehl verwendet wurde.</div><div class="footer-nav"><button class="btn" data-goto="mastery">← Kompetenzcheck</button><button class="btn btn-primary" data-goto="workflow">Training wiederholen</button></div>`}
function humanError(e){return ({"selektion_vor_diagnose": "Items ausgewählt oder gelöscht, bevor Ursachen und Kennwerte vollständig geprüft wurden", "kennwerte_vertauscht": "Itemschwierigkeit, Streuung, Trennschärfe oder Alpha-Funktion verwechselt", "stichprobe_mit_dimension_verwechselt": "Dimensionsspezifische Analyse mit einer anderen Stichprobengröße verwechselt", "alpha_personenverwechslung": "Cronbachs Alpha fälschlich als Kennwert einer einzelnen Person behandelt", "mittelwert_vorzeichen": "Itemmittelwerte fälschlich automatisch als negativ angenommen", "normierung_als_voraussetzung": "Abgeschlossene Normierung fälschlich als Voraussetzung der Itemanalyse behandelt", "mittelwert_falsch": "Itemmittelwert beziehungsweise Schwierigkeitsindex falsch berechnet", "loesungsanteil_falsch": "Dichotomen Schwierigkeitsindex nicht als Lösungsanteil berechnet", "index_und_alltagsschwierigkeit_vertauscht": "Hohen Lösungsanteil mit hoher umgangssprachlicher Schwierigkeit verwechselt", "schwierigkeit_als_trennschaerfe": "Itemschwierigkeit automatisch als Trennschärfe interpretiert", "schwierigkeit_als_reliabilitaet": "Itemschwierigkeit mit Reliabilität verwechselt", "missing_im_nenner_ignoriert": "Fehlende Antworten im Nenner der Schwierigkeit nicht berücksichtigt", "normschwierigkeit_falsch": "Normierte Itemschwierigkeit falsch transformiert", "grenzwert_rueckrechnung_falsch": "Normierten Grenzwert falsch in einen Rohmittelwert zurückgerechnet", "schwierigkeitsgrenzen_falsch": "Items falsch dem vorgegebenen Schwierigkeitsspektrum zugeordnet", "cutoff_als_loeschbefehl": "Daumenregel als automatischen Löschbefehl verwendet", "extremwert_ignoriert": "Extremen Schwierigkeitswert nicht dokumentiert oder geprüft", "kennwert_manuell_veraendert": "Empirischen Kennwert unzulässig manuell verändert", "keine_streuung_uebersehen": "Fehlende Antwortstreuung und mangelnde Differenzierung übersehen", "standardabweichung_falsch": "Stichproben-Standardabweichung falsch berechnet", "mittelwert_und_streuung_verwechselt": "Gleichen Mittelwert mit gleicher Streuung gleichgesetzt", "varianz_als_alleinkriterium": "Hohe Itemvarianz als alleinigen Qualitätsnachweis verwendet", "part_whole_unkorrigiert": "Item fälschlich mit einem Gesamtscore einschließlich desselben Items korreliert", "trennschaerfe_falsch_gelesen": "Korrigierte Trennschärfen falsch verglichen", "negative_trennschaerfe_als_gut": "Negative Trennschärfe als besonders gute Differenzierung interpretiert", "fremdtrennschaerfe_ignoriert": "Hohe Fremdtrennschärfe bei der dimensionsspezifischen Zuordnung ignoriert", "alpha_formel_falsch": "Cronbachs Alpha aus Item- und Testvarianz falsch berechnet", "alpha_drop_richtung_vertauscht": "Alpha nach Itementfernung in die falsche Richtung interpretiert", "alpha_als_guetesiegel": "Cronbachs Alpha als universellen Beweis für Qualität oder Eindimensionalität behandelt", "minimalen_alphaanstieg_ueberbewertet": "Minimalen Alpha-Anstieg stärker gewichtet als Inhalt und Trennschärfe", "alpha_ignoriert": "Alpha-Ausgabe trotz relevanter Information vollständig ignoriert", "alpha_aufgerundet": "Reliabilitätskennwert unzulässig auf einen Zielwert aufgerundet", "r_output_problemitem_falsch": "Problemitem in der psych::alpha-Ausgabe falsch lokalisiert", "aktuelles_alpha_mit_drop_verwechselt": "Aktuelles Skalenalpha mit Alpha nach Itementfernung verwechselt", "alpha_drop_zeile_falsch": "Alpha nach Entfernung aus der falschen Itemzeile gelesen", "r_output_ueberinterpretiert": "R-Ausgabe als Beweis statt als Diagnosegrundlage interpretiert", "cutoffs_nicht_gemeinsam": "Schwierigkeits- und Trennschärfekriterium nicht gemeinsam angewendet", "redundanz_vor_inhalt": "Redundanz ungeprüft gegenüber Facettenabdeckung bevorzugt", "projekt_extremitem_falsch": "Extremes Item im aggregierten Projektfall falsch identifiziert", "projekt_cutoff_automatisch": "Projektitem allein aufgrund eines Cutoffs automatisch gelöscht", "positive_trennschaerfe_als_zwang": "Positive Trennschärfe als z function bindTaskEvents(){document.querySelectorAll('[data-task]').forEach(el=>{el.querySelectorAll('[data-check]').forEach(b=>b.addEventListener('click',()=>checkTask(el.dataset.task)));el.querySelectorAll('[data-hint]').forEach(b=>b.addEventListener('click',()=>showHint(el.dataset.task,Number(b.dataset.hint),b)));el.querySelectorAll('[data-move]').forEach(b=>b.addEventListener('click',()=>moveOrder(b)));el.querySelectorAll('.matrix-cell').forEach(b=>b.addEventListener('click',()=>{b.setAttribute('aria-pressed',b.getAttribute('aria-pressed')!=='true')}))})}
function bindPageButtons(){document.querySelectorAll('[data-goto]').forEach(b=>b.addEventListener('click',()=>showPage(b.dataset.goto)))}
function moveOrder(btn){const li=btn.closest('li'),list=li.parentElement;if(btn.dataset.move==='up'&&li.previousElementSibling)list.insertBefore(li,li.previousElementSibling);if(btn.dataset.move==='down'&&li.nextElementSibling)list.insertBefore(li.nextElementSibling,li);[...list.children].forEach((x,i)=>x.querySelector('strong').textContent=`${i+1}.`)}
function showHint(id,i,btn){const box=document.getElementById(`hint-${id}-${i}`);if(!box)return;const opening=box.style.display!=='block';box.style.display=opening?'block':'none';btn.textContent=opening?`Hinweis ${i+1} ausblenden`:`Hinweis ${i+1} anzeigen`;if(opening){const st=taskState(id);st.hints+=1;saveState()}}
function selectedValues(article){return [...article.querySelectorAll('input:checked')].map(x=>Number(x.value)).sort((a,b)=>a-b)}
function arraysEqual(a,b){return JSON.stringify(a)===JSON.stringify(b)}
function getMisconception(t,ans){if(t.misconceptionByAnswer&&t.type==='single'&&ans!=null)return t.misconceptionByAnswer[String(ans)]||t.misconception;return t.misconception}
function checkTask(id){const t=tasks.find(x=>x.id===id),article=document.getElementById(`task-${id}`),st=taskState(id);let ans,ok=false;
 if(t.type==='single'||t.type==='multi'){ans=selectedValues(article);if(t.type==='single')ans=ans.length?ans[0]:null;ok=t.type==='single'?ans===t.answer:arraysEqual(ans,[...t.answer].sort((a,b)=>a-b))}
 else if(t.type==='number'){const raw=article.querySelector('.number-input').value.trim().replace(',','.');ans=Number(raw);ok=raw!==''&&Number.isFinite(ans)&&Math.abs(ans-t.answer)<=Number(t.tolerance||0)}
 else if(t.type==='order'){ans=[...article.querySelectorAll('.order-item')].map(x=>Number(x.dataset.orig));ok=arraysEqual(ans,t.answer)}
 else if(t.type==='matrix'){ans=[...article.querySelectorAll('.matrix-cell[aria-pressed="true"]')].map(x=>x.dataset.pair).sort();ok=arraysEqual(ans,[...t.answer].sort())}
 else if(t.type==='match'){ans=[...article.querySelectorAll('[data-match-row]')].map(x=>x.value===''?null:Number(x.value));ok=arraysEqual(ans,t.answer)}
 st.attempts+=1;st.lastAnswer=ans;if(ok)st.correct=true;const misconception=!ok?getMisconception(t,ans):null;if(misconception)state.errors[misconception]=(state.errors[misconception]||0)+1;const fb=article.querySelector('.feedback');fb.className=`feedback show ${ok?'good':'bad'}`;const fallbackHint=(t.hints&&t.hints.length)?t.hints[Math.min(st.attempts-1,t.hints.length-1)]:'Prüfe deine Antwort noch einmal schrittweise.';const body=ok?t.explanation:(t.retry||fallbackHint);const reveal=(!ok&&st.attempts>=2)?`<div class="solution-reveal"><button type="button" data-reveal>Erklärung anzeigen</button></div>`:'';fb.innerHTML=`<strong>${ok?'Richtig.':'Noch nicht richtig.'}</strong><div>${esc(body)}</div>${misconception?`<div class="misconception">Möglicher Denkfehler: ${esc(humanError(misconception))}</div>`:''}${reveal}`;const revealBtn=fb.querySelector('[data-reveal]');if(revealBtn)revealBtn.addEventListener('click',()=>revealExplanation(id,revealBtn));article.classList.toggle('done',st.correct);article.querySelector('.status').textContent=st.correct?'gelöst':`${st.attempts} Versuch${st.attempts===1?'':'e'}`;article.querySelector('.status').classList.toggle('good',st.correct);announce(`${t.title}: ${ok?'richtig':'noch nicht richtig'}`);saveState();renderNav();updateSectionCounts()}
function revealExplanation(id,btn){const t=tasks.find(x=>x.id===id),st=taskState(id),fb=document.querySelector(`#task-${id} .feedback`);if(!t||!fb)return;st.hints+=1;fb.innerHTML+=`<div class="hint" style="display:block;margin-top:10px"><strong>Erklärung:</strong> ${esc(t.explanation)}</div>`;btn.remove();saveState()}
function showPage(id,focus=true){if(!MODULE.sections.some(s=>s.id===id))id='start';current=id;document.querySelectorAll('.page').forEach(p=>p.classList.toggle('active',p.dataset.page===id));document.querySelectorAll('.nav button').forEach(b=>{const active=b.dataset.page===id;b.setAttribute('aria-current',active?'page':'false')});if(id==='result'){const old=document.getElementById('page-result');old.innerHTML=renderResult();bindPageButtons()}saveState();if(focus){window.scrollTo({top:0,behavior:'smooth'});document.getElementById('main').focus()}}
function updateSectionCounts(){MODULE.sections.forEach(s=>{const ts=sectionTasks(s.id);if(!ts.length)return;const page=document.getElementById(`page-${s.id}`);if(!page)return;const el=page.querySelector('.section-count');if(el){const d=ts.filter(t=>taskState(t.id).correct).length;el.textContent=`${d} von ${ts.length} gelöst`}})}
function updateProgress(){const done=tasks.filter(t=>taskState(t.id).correct).length,pct=tasks.length?Math.round(done/tasks.length*100):0;document.getElementById('progressText').textContent=`${done} / ${tasks.length}`;document.getElementById('progressBar').style.width=`${pct}%`;document.querySelector('.progress').setAttribute('aria-valuenow',String(pct))}
function exportState(){const blob=new Blob([JSON.stringify({schema:'m11a-application-trainer-progress',module:MODULE.id,exportedAt:new Date().toISOString(),state},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='m11a_anwendungstrainer_04_lernstand.json';a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}
function importState(file){const reader=new FileReader();reader.onload=()=>{try{const obj=JSON.parse(reader.result);const incoming=obj.state||obj;if(!incoming.tasks)throw new Error('Ungültiges Format');state=incoming;state.version=MODULE.version;current=state.current||'start';saveState();renderNav();renderPages();showPage(current);announce('Lernstand importiert')}catch(e){alert('Die Datei konnte nicht als Lernstand importiert werden.')}};reader.readAsText(file)}
function resetState(){if(!confirm('Soll der gesamte Lernstand dieses Moduls gelöscht werden?'))return;state=defaultState();current='start';try{localStorage.removeItem(MODULE.id)}catch(e){}renderNav();renderPages();showPage('start');announce('Lernstand zurückgesetzt')}
document.getElementById('exportBtn').addEventListener('click',exportState);document.getElementById('importBtn').addEventListener('click',()=>document.getElementById('importFile').click());document.getElementById('importFile').addEventListener('change',e=>{if(e.target.files[0])importState(e.target.files[0]);e.target.value=''});document.getElementById('resetBtn').addEventListener('click',resetState);
window.__TRAINER__={MODULE,tasks,taskState,checkTask,showPage};
renderNav();renderPages();updateProgress();showPage(current,false);
</script>
