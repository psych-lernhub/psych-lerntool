ms:flex-start}.task-kicker{font-size:.78rem;text-transform:uppercase;letter-spacing:.08em;font-weight:800;color:var(--brand)}.task-title{font-weight:800;font-size:1.08rem;margin:3px 0 8px}.status{font-size:.82rem;font-weight:750;border-radius:99px;padding:4px 8px;background:var(--surface-2);white-space:nowrap}.status.good{color:var(--good)}.prompt{margin:13px 0}.options{display:grid;gap:9px;margin:14px 0}.option{display:flex;gap:10px;align-items:flex-start;border:1px solid var(--line);border-radius:11px;padding:11px 12px;background:var(--surface)}.option:hover{background:var(--surface-2)}.option input{margin-top:4px;accent-color:var(--brand)}.answer-row{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-top:13px}.number-input{width:min(210px,100%);padding:10px 12px;border:1px solid var(--line);border-radius:10px;background:var(--surface);color:var(--text)}.hint-box{margin-top:12px}.hint-box button{background:transparent;border:0;color:var(--brand);font-weight:700;padding:4px 0}.hint{display:none;background:var(--surface-2);border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-top:7px}.feedback{display:none;margin-top:14px;padding:13px 14px;border-radius:11px;border:1px solid var(--line)}.feedback.show{display:block}.feedback.good{border-color:var(--good);background:color-mix(in srgb,var(--good) 10%,var(--surface))}.feedback.bad{border-color:var(--bad);background:color-mix(in srgb,var(--bad) 8%,var(--surface))}.feedback strong{display:block;margin-bottom:4px}.misconception{font-size:.88rem;color:var(--muted);margin-top:7px}.order-list{list-style:none;padding:0;margin:14px 0;display:grid;gap:8px}.order-item{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;border:1px solid var(--line);border-radius:11px;padding:10px 11px;background:var(--surface-2)}.order-controls{display:flex;gap:5px}.order-controls button{width:36px;height:36px;border:1px solid var(--line);border-radius:8px;background:var(--surface);color:var(--te <script>
'use strict';
const MODULE = {"id": "m11a-apptrainer-05-v2", "title": "Reliabilitätsverfahren und Testverlängerung", "version": "2.0.0", "sections": [{"id": "start", "nav": "Start", "title": "Reliabilität nicht nur berechnen, sondern diagnostisch planen", "intro": true}, {"id": "concept", "nav": "1 · Grundidee", "title": "Reliabilität als Varianzverhältnis und populationsabhängigen Kennwert verstehen", "level": "Basis", "theory": "In der Klassischen Testtheorie ist Reliabilität der Anteil wahrer Varianz an beobachteter Varianz: Rel = Var(τ) / Var(x). Sie beschreibt die Genauigkeit dessen, was ein Test faktisch misst, nicht automatisch die Gültigkeit der intendierten Interpretation. Mehr Messfehler und eine geringere Varianz der wahren Werte – etwa in einer sehr homogenen Population – können den Koeffizienten senken."}, {"id": "methods", "nav": "2 · Verfahren", "title": "Messwiederholungen, Testteilungen und Äquivalenzannahmen unterscheiden", "level": "Basis", "theory": "Paralleltest, Retest, Split-Half und Interitem-Konsistenz beruhen auf unterschiedlichen Vorstellungen gleichwertiger Messungen. Parallelität fordert gleiche wahre Werte und gleiche Fehlervarianzen; schwächere Formen wie essentielle Parallelität, τ-Äquivalenz oder Kongenerität lockern einzelne Annahmen. Ein Koeffizient ist nur unter seinen jeweiligen Voraussetzungen als Reliabilität interpretierbar."}, {"id": "retest", "nav": "3 · Retest", "title": "Konstante Verschiebung, differentielle Veränderung und Messfehler auseinanderhalten", "level": "Basis", "theory": "Eine Retest-Korrelation verbindet dieselben Testwerte zu zwei Zeitpunkten. Ein für alle Personen gleicher additiver Zuwachs verändert die Korrelation nicht. Unterschiedlich starke Veränderungen, zufälliger Messfehler oder Rangordnungswechsel können sie senken. Aus einem beobachteten Retest-Koeffizienten allein lässt sich nicht bestimmen, welcher Anteil auf Messfehler, wahre Veränderung oder verletzte Fehlerannahmen zurückgeht."}, {"id": "interval", "nav": "4 · Intervall", "title": "Gedächtnis-, Lern- und Merkmalsänderungseffekte über das Retest-Intervall abwägen", "level": "Standard", "theory": "Kurze Intervalle reduzieren das Risiko echter Merkmalsänderungen, erhöhen aber Gedächtnis- und Übungseinflüsse. Lange Intervalle mindern Erinnerung, erhöhen jedoch das Risiko von Traitveränderungen und veränderten Bedingungen. Erinnerung oder korrelierte Fehler können die Messgenauigkeit überschätzen; Instabilität und differentielle wahre Veränderungen können sie unterschätzen."}, {"id": "split", "nav": "5 · Interne Konsistenz", "title": "Split-Half, Spearman-Brown, Guttman und Cronbachs α korrekt einordnen", "level": "Standard", "theory": "Split-Half und Interitem-Konsistenz benötigen nur eine Testdurchführung. Die Korrelation zweier Testhälften bezieht sich auf halb so lange Messungen und wird bei parallelen Hälften mit Spearman-Brown korrigiert. Guttmans Split-Half-Koeffizient fordert nur essentielle τ-Äquivalenz. Cronbachs α entspricht unter essentieller τ-Äquivalenz und unkorrelierten Messfehlern der Reliabilität; es ist kein Maß zeitlicher Stabilität."}, {"id": "matrix", "nav": "6 · Fehlerquellen", "title": "Die Fehlerquellenmatrix aktiv rekonstruieren statt eine fertige Lösung abzulesen", "level": "Standard", "theory": "Die Lösung zu Aufgabenblatt 4 ordnet sieben Fehlerquellen fünf Verfahren qualitativ zu. 0, + und ++ sind grobe Wirksamkeitsstufen; 0/+ und +/++ markieren Übergangsbeurteilungen. Die Zeichen sind keine metrischen Effektgrößen. Entscheidend ist die Logik: zeitliche Einflüsse treffen Retests, Iteminhomogenität interne Konsistenz und fehlende Parallelität Paralleltest beziehungsweise Split-Half."}, {"id": "forward", "nav": "7 · Hochrechnung", "title": "Reliabilität bei Verlängerung und Verkürzung mit Spearman-Brown berechnen", "level": "Standard", "theory": "Für eine Änderung der Testlänge um den Faktor c = m*/m gilt Rel* = c·Rel / [1 + (c−1)·Rel]. c > 1 beschreibt Verlängerung, 0 < c < 1 Verkürzung. Die Hochrechnung setzt voraus, dass hinzugefügte oder entfernte Items zur bestehenden Messung parallel sind. Mit wachsender Länge nähert sich Rel* der 1 nur asymptotisch."}, {"id": "target", "nav": "8 · Zielwert", "title": "Aus einer Zielreliabilität eine realistische Testlänge und einen Prüfplan ableiten", "level": "Transfer", "theory": "Nach c umgestellt lautet die Formel c = Rel*·(1−Rel) / [Rel·(1−Rel*)]. Die rechnerische Itemzahl muss auf eine ganze Zahl aufgerundet werden. Sie ist eine Planungsgröße, keine Garantie: neue Items müssen konstruiert, pilotiert und die revidierte Skala erneut geprüft werden. Parallelität, Inhaltsabdeckung, Ökonomie und Zumutbarkeit begrenzen rein rechnerische Lösungen."}, {"id": "mastery", "nav": "9 · Abschlussfall", "title": "Eine widersprüchliche Reliabilitätsstudie unter einer Zeitrestriktion entscheiden", "level": "Transfer", "theory": "Im Abschlussfall werden interne Konsistenz, kurze und lange Retests sowie eine Testzeitgrenze gemeinsam interpretiert. Die Aufgabe besteht nicht darin, den größten Koeffizienten auszuwählen, sondern unterschiedliche Fehlerquellen zu diagnostizieren, eine rechnerische Planungsgröße zu bestimmen und eine fachlich belastbare Maßnahme zu begründen."}, {"id": "result", "nav": "Ergebnis", "title": "Lernstand und Fehlkonzeptprofil", "result": true}]};
const tasks = [{"id":"concept-1","section":"concept","type":"order","level":"Basis","title":"Eine Reliabilitätsstudie fachlich planen","prompt":"Bringe die Schritte in eine sinnvolle Reihenfolge.","items":["Messzweck, Zielpopulation und Merkmalscharakter klären","Benötigte Form der Messwiederholung beziehungsweise Konsistenz bestimmen","Passendes Reliabilitätsverfahren und Intervall planen","Durchführung und Auswertung standardisieren","Reliabilitätskoeffizient berechnen","Koeffizient unter Verfahren, Population und Zweck interpretieren","Bei Bedarf Revision oder ergänzende Studie planen"],"start":[4,0,5,2,6,1,3],"answer":[0,1,2,3,4,5,6],"hints":["Beginne mit Messzweck, Zielpopulation und Merkmalscharakter; erst daraus ergibt sich, welche Art von Messgenauigkeit relevant ist.","Leite danach ab, ob du Gleichwertigkeit über Formen, Zeitpunkte, Testhälften oder Items untersuchen musst.","Wähle auf dieser Grundlage das Verfahren und – falls es einen Retest gibt – das Intervall.","Plane erst dann eine standardisierte Durchführung und Auswertung, damit Bedingungen nicht unnötig zwischen Messungen variieren.","Nach dem Design und der Durchführung wird der Koeffizient berechnet; die Zahl wird anschließend im Licht von Verfahren, Population und Zweck interpretiert.","Revision oder eine ergänzende Studie folgt erst aus dieser Interpretation und steht deshalb am Ende."],"retry":"Bilde vier Blöcke: Fragestellung klären → Messwiederholung, Verfahren und Intervall festlegen → standardisiert erheben und berechnen → kontextbezogen interpretieren und Folgemaßnahmen planen.","explanation":"1. Messzweck, Zielpopulation und Merkmalscharakter werden geklärt, weil Reliabilität immer auf eine konkrete Messung in einer Population bezogen ist. 2. Danach wird bestimmt, welche Form von Messwiederholung oder Konsistenz die Fragestellung benötigt. 3. Erst dann lassen sich das passende Verfahren und gegebenenfalls das Retest-Intervall planen. 4. Durchführung und Auswertung werden standardisiert, damit vermeidbare Bedingungsunterschiede nicht als Messfehler eingehen. 5. Auf den erhobenen Daten wird der Reliabilitätskoeffizient berechnet. 6. Der Koeffizient wird unter den Annahmen des Verfahrens sowie im Kontext von Population und Messzweck interpretiert. 7. Erst daraus folgt bei Bedarf eine Revision oder ergänzende Studie.","source":"PD06 Gütekriterien I, S. 8–29","misconception":"koeffizient_vor_design"},{"id":"concept-2","section":"concept","type":"multi","level":"Basis","title":"Reliabilität in der KTT präzise beschreiben","prompt":"Welche Aussagen werden durch die Veranstaltungsgrundlage gestützt?","options":["Reliabilität ist der Anteil wahrer Varianz an beobachteter Varianz.","Reliabilität beschreibt die Genauigkeit dessen, was der Test faktisch misst.","Ein reliabler Test misst automatisch das intendierte Konstrukt.","Wachsender Messfehler kann die Reliabilität senken.","Eine geringere Varianz der wahren Werte kann die Reliabilität senken."],"answer":[0,1,3,4],"hints":["Trenne Messgenauigkeit von der Frage, ob das richtige Merkmal erfasst wird.","Betrachte Zähler und Nenner des Varianzverhältnisses."],"retry":"Mindestens eine gewählte Aussage verwechselt Messgenauigkeit mit Validität oder ignoriert das Varianzverhältnis.","explanation":"Reliabilität ist Var(τ)/Var(x) und beschreibt Messgenauigkeit unabhängig davon, ob die intendierte Merkmalsdimension erfasst wird. Mehr Fehler oder weniger wahre Varianz können den Koeffizienten senken.","source":"PD06 Gütekriterien I, S. 8 · Lösungen Aufgabenblatt 4, S. 1","misconception":"reliabilitaet_mit_validitaet"},{"id":"concept-3","section":"concept","type":"single","level":"Basis","title":"Populationseffekt diagnostizieren","prompt":"Derselbe Test wird unter vergleichbaren Bedingungen zuerst in einer breit streuenden Allgemeinbevölkerung und danach in einer sehr homogenen Auswahlgruppe eingesetzt. Welche Aussage ist fachlich am besten?","options":["Die Reliabilität muss in beiden Gruppen identisch sein, weil der Test gleich bleibt.","Die Reliabilität kann in der homogenen Gruppe niedriger sein, weil weniger wahre Varianz vorhanden ist.","Die Reliabilität muss in der homogenen Gruppe höher sein, weil die Personen ähnlicher sind.","Nur der Mittelwert, nie die Reliabilität, kann populationsabhängig sein."],"answer":1,"hints":["Reliabilität ist ein Verhältnis von Varianzanteilen.","Range Restriction kann die zwischenpersonale wahre Streuung reduzieren."],"retry":"Die Testdatei ist gleich, aber der Koeffizient wird in einer konkreten Population bestimmt.","explanation":"Eine eingeschränkte wahre Varianz kann den Reliabilitätskoeffizienten senken. Reliabilität ist deshalb keine unveränderliche Eigenschaft des Testhefts, sondern auch populations- und situationsabhängig.","source":"PD06 Gütekriterien I, S. 26 · Lösungen Aufgabenblatt 4, S. 1","misconceptionByAnswer":{"0":"reliabilitaet_als_testkonstante","2":"homogenitaet_richtung_vertauscht","3":"populationseffekt_geleugnet"}},{"id":"concept-4","section":"concept","type":"match","level":"Basis","title":"Veränderung und erwartete Koeffizientenwirkung zuordnen","prompt":"Ordne jedem Fall die primäre Konsequenz für die Reliabilität beziehungsweise Korrelation zu.","rows":["Mehr zufälliger Messfehler bei gleicher wahrer Varianz","Geringere wahre Varianz bei vergleichbarem Messfehler","Für alle Personen derselbe additive Zuwachs","Unterschiedlich starke wahre Veränderungen zwischen Personen"],"options":["tendenziell geringere Reliabilität","tendenziell geringere Reliabilität durch Homogenisierung","keine Änderung der Korrelation","tendenziell geringere Retest-Korrelation"],"answer":[0,1,2,3],"hints":["Eine Korrelation ist gegenüber einer für alle gleichen additiven Verschiebung invariant.","Differentielle Veränderung kann die Rangordnung verändern."],"retry":"Achte darauf, dass zwei Fälle den Koeffizienten senken, aber aus unterschiedlichen Gründen.","explanation":"Messfehler und geringe wahre Varianz senken das Varianzverhältnis auf unterschiedlichen Wegen. Ein konstanter additiver Zuwachs verändert die Korrelation nicht; differentielle Veränderungen können sie verringern.","source":"PD06 Gütekriterien I, S. 8, 15–17 · Lösungen Aufgabenblatt 4, S. 1","misconception":"varianz_und_veraenderung_vertauscht"},{"id":"methods-1","section":"methods","type":"match","level":"Basis","title":"Verfahren und Datengrundlage verbinden","prompt":"Ordne jedem Reliabilitätsverfahren die passende Datengrundlage zu.","rows":["Paralleltest-Reliabilität","Retest-Reliabilität","Split-Half-Reliabilität","Cronbachs α"],"options":["zwei möglichst gleichwertige Testformen","derselbe Test zu zwei Zeitpunkten","eine Durchführung, zwei Testhälften","eine Durchführung, Items als feingliedrige Teilmessungen"],"answer":[0,1,2,3],"hints":["Nur ein Verfahren benötigt zwingend zwei verschiedene Testformen.","Cronbachs α benötigt keinen zweiten Messzeitpunkt."],"retry":"Prüfe, ob sich die Wiederholung auf Testformen, Zeitpunkte, Hälften oder einzelne Items bezieht.","explanation":"Paralleltest-Reliabilität verbindet zwei möglichst gleichwertige Testformen. Retest-Reliabilität verbindet denselben Test zu zwei Zeitpunkten. Split-Half-Reliabilität teilt eine einzige Durchführung in zwei Testhälften. Cronbachs α behandelt die Items einer Durchführung als feingliedrige Teilmessungen. Weil die vier Verfahren unterschiedliche Vergleichseinheiten verwenden, reagieren sie auch auf unterschiedliche Fehlerquellen.","source":"PD06 Gütekriterien I, S. 12–23","misconception":"verfahren_datengrundlage_vertauscht"},{"id":"methods-2","section":"methods","type":"match","level":"Standard","title":"Äquivalenzformen anhand ihrer Annahmen erkennen","prompt":"Ordne den beschriebenen Annahmen die passende Äquivalenzform zu.","rows":["gleiche wahre Werte und gleiche Fehlervarianzen","wahre Werte unterscheiden sich nur um eine Konstante; gleiche Fehlervarianzen","gleiche wahre Werte; keine Gleichheit der Fehlervarianzen gefordert","wahre Werte unterscheiden sich um eine Konstante; keine Gleichheit der Fehlervarianzen gefordert","lineare Beziehung τj = a·τk + c"],"options":["parallel","essentiell parallel","τ-äquivalent","essentiell τ-äquivalent","τ-kongenerisch"],"answer":[0,1,2,3,4],"hints":["Beginne mit der strengsten Form: Exakt gleiche wahre Werte und gleiche Fehlervarianzen kennzeichnen Parallelität.","„Essentiell“ erlaubt eine additive Konstante. Bei weiterhin gleichen Fehlervarianzen wird aus parallel daher essentiell parallel.","Fällt nur die Forderung gleicher Fehlervarianzen weg, bleiben bei τ-Äquivalenz die wahren Werte exakt gleich.","Kombiniere additive Konstante und nicht notwendigerweise gleiche Fehlervarianzen zur essentiellen τ-Äquivalenz.","Die schwächste Form ist τ-Kongenerität: τj = a·τk + c erlaubt zusätzlich zur Verschiebung einen Multiplikationsfaktor."],"retry":"Nutze zwei Fragen: Sind die wahren Werte exakt gleich oder nur linear verbunden? Werden gleiche Fehlervarianzen verlangt?","explanation":"Gleiche wahre Werte plus gleiche Fehlervarianzen bedeuten parallel. Unterscheiden sich die wahren Werte nur um eine Konstante und bleiben die Fehlervarianzen gleich, ist die Beziehung essentiell parallel. Gleiche wahre Werte ohne Forderung gleicher Fehlervarianzen sind τ-äquivalent. Eine additive Konstante ohne Forderung gleicher Fehlervarianzen kennzeichnet essentielle τ-Äquivalenz. Die allgemeine lineare Beziehung τj = a·τk + c ist τ-kongenerisch, weil sie zusätzlich einen Skalierungsfaktor zulässt.","source":"PD06 Gütekriterien I, S. 9","misconception":"aequivalenzformen_vertauscht"},{"id":"methods-3","section":"methods","type":"single","level":"Standard","title":"Cronbachs α korrekt begrenzen","prompt":"Unter welcher in der Vorlesung genannten Bedingung entspricht Cronbachs α der Reliabilität?","options":["Wenn die Items essentiell τ-äquivalent sind und ihre Messfehler unkorreliert sind.","Sobald mindestens drei Items vorliegen.","Wenn alle Itemmittelwerte identisch sind, unabhängig von den Fehlern.","Wenn der Test zweimal im Abstand von sechs Monaten durchgeführt wird."],"answer":0,"hints":["Die Bedingung betrifft wahre Itemwerte und Fehlerkorrelationen.","Cronbachs α ist ein Interitem-Konsistenzverfahren, kein Retest."],"retry":"Die reine Itemzahl reicht nicht. Suche die Aussage zu Äquivalenz und unkorrelierten Fehlern.","explanation":"Unter essentieller τ-Äquivalenz und unkorrelierten Messfehlern entspricht α der Reliabilität. Werden diese Voraussetzungen verletzt, ist die Interpretation eingeschränkt.","source":"PD06 Gütekriterien I, S. 23","misconceptionByAnswer":{"1":"itemzahl_als_alpha_voraussetzung","2":"mittelwerte_als_alpha_voraussetzung","3":"alpha_mit_retest_verwechselt"}},{"id":"methods-4","section":"methods","type":"multi","level":"Standard","title":"Welche Frage beantwortet welcher Koeffizient?","prompt":"Welche Aussagen sind korrekt?","options":["Ein hoher Retest-Koeffizient kann zeitliche Stabilität und Messgenauigkeit vermischen.","Cronbachs α belegt zeitliche Stabilität über Monate.","Split-Half-Ergebnisse können von der konkreten Testteilung abhängen.","Ein Paralleltest setzt gleichwertige Formen voraus.","Keiner der Koeffizienten beweist für sich allein die Validität der Testinterpretation."],"answer":[0,2,3,4],"hints":["Interne Konsistenz wird innerhalb eines Zeitpunkts bestimmt.","Reliabilität ist notwendig, aber nicht hinreichend für Validität."],"retry":"Eine Aussage schreibt einer einmaligen Interitem-Analyse eine zeitliche Information zu, die sie nicht liefern kann.","explanation":"Retest vermischt Stabilität und Genauigkeit; Split-Half hängt von der Teilung ab; Paralleltests verlangen gleichwertige Formen. Kein Reliabilitätskoeffizient ist allein ein Validitätsbeleg.","source":"PD06 Gütekriterien I, S. 12–26","misconception":"koeffizienten_ueberinterpretiert"},{"id":"retest-1","section":"retest","type":"number","level":"Basis","title":"Konstanten Lernzuwachs rechnerisch erkennen","promptHtml":"<figure class=\"trajectory\"><figc \"175.0\" r=\"6\"/><text class=\"traj-label\" x=\"132\" y=\"202.3\" text-anchor=\"end\">P2</text><line class=\"traj-series s2\" x1=\"150\" y1=\"151.7\" x2=\"490\" y2=\"128.3\"/><circle class=\"traj-dot s2\" cx=\"150\" cy=\"151.7\" r=\"6\"/><circle class=\"traj-dot s2\" cx=\"490\" cy=\"128.3\" r=\"6\"/><text class=\"traj-label\" x=\"132\" y=\"155.7\" text-anchor=\"end\">P3</text><line class=\"traj-series s3\" x1=\"150\" y1=\"105.0\" x2=\"490\" y2=\"81.7\"/><circle class=\"traj-dot s3\" cx=\"150\" cy=\"105.0\" r=\"6\"/><circle class=\"traj-dot s3\" cx=\"490\" cy=\"81.7\" r=\"6\"/><text class=\"traj-label\" x=\"132\" y=\"109.0\" text-anchor=\"end\">P4</text><line class=\"traj-series s4\" x1=\"150\" y1=\"58.3\" x2=\"490\" y2=\"35.0\"/><circle class=\"traj-dot s4\" cx=\"150\" cy=\"58.3\" r=\"6\"/><circle class=\"traj-dot s4\" cx=\"490\" cy=\"35.0\" r=\"6\"/><text class=\"traj-label\" x=\"132\" y=\"62.3\" text-anchor=\"end\">P5</text><text class=\"traj-title\" x=\"150\" y=\"278\" text-anchor=\"middle\">T1</text><text class=\"traj-title\" x=\"490\" y=\"278\" text-anchor=\"middle\">T2</text></svg></figure><div class=\"matrix-wrap\"><table class=\"mini-table item-table\"><caption>Zugängliche Datentabelle</caption><thead><tr><th scope=\"col\">Person</th><th scope=\"col\">T1</th><th scope=\"col\">T2</th><th scope=\"col\">Veränderung</th></tr></thead><tbody><tr><th scope=\"row\">P1</th><td>10</td><td>15</td><td>+5</td></tr><tr><th scope=\"row\">P2</th><td>20</td><td>25</td><td>+5</td></tr><tr><th scope=\"row\">P3</th><td>30</td><td>35</td><td>+5</td></tr><tr><th scope=\"row\">P4</th><td>40</td><td>45</td><td>+5</td></tr><tr><th scope=\"row\">P5</th><td>50</td><td>55</td><td>+5</td></tr></tbody></table></div><p>Welche Interpretation ist korrekt?</p>","options":["Der Lernzuwachs senkt zwingend die Retest-Reliabilität.","Die Korrelation bleibt unverändert, weil alle Personen denselben additiven Zuwachs zeigen.","Die Korrelation wird 0, weil T1 und T2 unterschiedliche Mittelwerte besitzen.","Aus dem Zuwachs folgt automatisch perfekte Validität."],"answer":1,"hints":["Korrelationen sind gegenüber additiven Konstanten invariant.","Mittelwertsänderung und Rangordnungsstabilität sind verschiedene Eigenschaften."],"retry":"Die Personen behalten exakt dieselbe Rangordnung; nur das Niveau verschiebt sich.","explanation":"Ein gleicher additiver Zuwachs verändert den Mittelwert, nicht aber den linearen Zusammenhang. Deshalb bleibt die Retest-Korrelation in diesem konstruierten Fall perfekt.","source":"Lösungen Aufgabenblatt 4, S. 1 · Transferdaten","misconceptionByAnswer":{"0":"jeder_lerneffekt_senkt_retest","2":"mittelwertsdifferenz_als_nullkorrelation","3":"retest_als_validitaet"}},{"id":"retest-3","section":"retest","type":"single","level":"Standard","title":"Differentielle Veränderung diagnostizieren","promptHtml":"<figure class=\"trajectory\"><figcaption>Fall B: unterschiedlich starke Veränderungen</figcaption><svg viewBox=\"0 0 640 300\" role=\"img\" aria-label=\"Personenwerte zu T1 und T2\"><line class=\"traj-axis\" x1=\"150\" y1=\"35\" x2=\"150\" y2=\"245\"/><line class=\"traj-axis\" x1=\"490\" y1=\"35\" x2=\"490\" y2=\"245\"/><line class=\"traj-series s0\" x1=\"150\" y1=\"245.0\" x2=\"490\" y2=\"203.0\"/><circle class=\"traj-dot s0\" cx=\"150\" cy=\"245.0\" r=\"6\"/><circle class=\"traj-dot s0\" cx=\"490\" cy=\"203.0\" r=\"6\"/><text class=\"traj-label\" x=\"132\" y=\"249.0\" text-anchor=\"end\">P1</text><line class=\"traj-series s1\" x1=\"150\" y1=\"192.5\" x2=\"490\" y2=\"234.5\"/><circle class=\"traj-dot s1\" cx=\"150\" cy=\"192.5\" r=\"6\"/><circle class=\"traj-dot s1\" cx=\"490\" cy=\"234.5\" r=\"6\"/><text class=\"traj-label\" x=\"132\" y=\"196.5\" text-anchor=\"end\">P2</text><line class=\"traj-series s2\" x1=\"150\" y1=\"140.0\" x2=\"490\" y2=\"108.5\"/><circle class=\"traj-dot s2\" cx=\"150\" cy=\"140.0\" r=\"6\"/><circle class=\"traj-dot s2\" cx=\"490\" cy=\"108.5\" r=\"6\"/><text class=\"traj-label\" x=\"132\" y=\"144.0\" text-anchor=\"end\">P3</text><line class=\"traj-series s3\" x1=\"150\" y1=\"87.5\" x2=\"490\" y2=\"40.2\"/><circle class=\"traj-dot s3\" cx=\"150\" cy=\"87.5\" r=\"6\"/><circle class=\"traj-dot s3\" cx=\"490\" cy=\"40.2\" r=\"6\"/><text class=\"traj-label\" x=\"132\" y=\"91.5\" text-anchor=\"end\">P4</text><line class=\"traj-series s4\" x1=\"150\" y1=\"35.0\" x2=\"490\" y2=\"103.2\"/><circle class=\"traj-dot s4\" cx=\"150\" cy=\"35.0\" r=\"6\"/><circle class=\"traj-dot s4\" cx=\"490\" cy=\"103.2\" r=\"6\"/><text class=\"traj-label\" x=\"132\" y=\"39.0\" text-anchor=\"end\">P5</text><text class=\"traj-title\" x=\"150\" y=\"278\" text-anchor=\"middle\">T1</text><text class=\"traj-title\" x=\"490\" y=\"278\" text-anchor=\"middle\">T2</text></svg></figure><div class=\"matrix-wrap\"><table class=\"mini-table item-table\"><caption>Zugängliche Datentabelle</caption><thead><tr><th scope=\"col\">Person</th><th scope=\"col\">T1</th><th scope=\"col\">T2</th><th scope=\"col\">Veränderung</th></tr></thead><tbody><tr><th scope=\"row\">P1</th><td>10</td><td>18</td><td>+8</td></tr><tr><th scope=\"row\">P2</th><td>20</td><td>12</td><td>-8</td></tr><tr><th scope=\"row\">P3</th><td>30</td><td>36</td><td>+6</td></tr><tr><th scope=\"row\">P4</th><td>40</td><td>49</td><td>+9</td></tr><tr><th scope=\"row\">P5</th><td>50</td><td>37</td><td>-13</td></tr></tbody></table></div><p>Die Korrelation beträgt hier ungefähr r = .78. Welche Erklärung passt am besten?</p>","options":["Alle Personen haben denselben Zuwachs, daher müsste r = 1 sein.","Unterschiedlich starke Veränderungen und Rangordnungswechsel vermindern den linearen Zusammenhang.","Der Mittelwert von T2 ist allein für die Verringerung verantwortlich.","Ein r unter 1 beweist ausschließlich zufälligen Messfehler."],"answer":1,"hints":["Beachte die gekreuzten Linien und die verschieden großen Veränderungen.","Ein beobachteter Retest-Koeffizient kann mehrere Ursachen haben."],"retry":"Suche die Erklärung, die differentielle Veränderung beschreibt, ohne den gesamten Effekt ausschließlich Messfehlern zuzuschreiben.","explanation":"Die Personen verändern sich unterschiedlich stark und teilweise in der Rangordnung. Das senkt die Korrelation. Ob zusätzlich Messfehler beteiligt ist, lässt sich aus r allein nicht entscheiden.","source":"PD06 Gütekriterien I, S. 15–16 · neuer Parallelfall","misconception":"differentielle_veraenderung_ignoriert"},{"id":"retest-4","section":"retest","type":"multi","level":"Standard","title":"Beobachteten Retest-Koeffizienten nicht überdeuten","prompt":"Für einen Test wird nach acht Wochen r = .82 beobachtet. Welche Ursachen können mit diesem einen Koeffizienten nicht eindeutig voneinander getrennt werden?","options":["zufälliger Messfehler","wahre differentielle Merkmalsänderungen","korrelierte Fehler beider Testungen","reine mathematische Identität von T1 und T2","Verletzungen der Parallelitätsannahmen"],"answer":[0,1,2,4],"hints":["Die Vorlesung betont, dass empirisch nur beobachtete Werte vorliegen.","Ein einzelner Koeffizient zerlegt seine Ursachen nicht."],"retry":"Nicht jede Option ist eine mögliche unbekannte Ursache; eine mathematische Identität wäre direkt erkennbar.","explanation":"Zufälliger Messfehler kann r senken, lässt sich aus .82 aber nicht beziffern. Wahre differentielle Merkmalsänderungen können Rangordnungen verändern und r ebenfalls senken. Korrelierte Fehler beider Testungen können r dagegen künstlich erhöhen. Verletzte Parallelitäts- beziehungsweise Fehlerannahmen können den Koeffizienten zusätzlich verzerren. Eine reine mathematische Identität von T1 und T2 ist keine verborgene konkurrierende Ursache: Bei identischen Wertereihen wäre unmittelbar r = 1 zu beobachten. Deshalb sind die Optionen Messfehler, wahre Veränderung, korrelierte Fehler und Annahmenverletzung auszuwählen, nicht die mathematische Identität.","source":"PD06 Gütekriterien I, S. 16","misconception":"retest_ursachen_eindeutig"},{"id":"interval-1","section":"interval","type":"match","level":"Standard","title":"Kurzes und langes Retest-Intervall vergleichen","prompt":"Ordne jeder Tendenz das passendere Intervall zu.","rows":["höheres Risiko von Erinnerungseffekten","höheres Risiko von Traitveränderungen","geringeres Risiko von Erinnerungseffekten","typischerweise geringerer Retest-Koeffizient"],"options":["eher kurzes Intervall","eher langes Intervall"],"answer":[0,1,1,1],"hints":["Mit wachsender Zeit verblasst Erinnerung, aber reale Veränderung wird wahrscheinlicher.","Die Kategorien sind Tendenzen, keine Naturgesetze für jeden Test."],"retry":"Betrachte für jede Zeile getrennt, ob Zeit Erinnerung vermindert oder reale Veränderung ermöglicht.","explanation":"Kurze Intervalle begünstigen Erinnerung. Längere Intervalle reduzieren diesen Einfluss, erhöhen aber das Risiko realer Veränderungen und führen daher in der Regel zu geringeren Koeffizienten.","source":"PD06 Gütekriterien I, S. 17","misconception":"retestintervall_risiken_vertauscht"},{"id":"interval-2","section":"interval","type":"single","level":"Standard","title":"Überschätzung durch Gedächtniseffekte","prompt":"Teilnehmende erinnern sich nach drei Tagen an ihre Antworten und reproduzieren sie. Welche Auswirkung ist am plausibelsten?","options":["Die Retest-Korrelation kann die Messgenauigkeit überschätzen.","Die Retest-Korrelation muss dadurch sinken.","Nur Cronbachs α wird beeinflusst.","Die wahre Varianz wird zwingend 0."],"answer":0,"hints":["Die Fehler beziehungsweise Antworttendenzen beider Zeitpunkte werden ähnlicher.","Korrelierte Fehler können den Zusammenhang künstlich erhöhen."],"retry":"Gedächtnis erzeugt zusätzliche Übereinstimmung zwischen T1 und T2, nicht zusätzliche Unabhängigkeit.","explanation":"Erinnerung kann Antworten oder Fehler über die Zeit korrelieren und damit eine zu hohe Retest-Korrelation erzeugen. Die Messgenauigkeit des Tests wird dann überschätzt.","source":"PD06 Gütekriterien I, S. 17","misconceptionByAnswer":{"1":"gedaechtnis_richtung_vertauscht","2":"gedaechtnis_nur_alpha","3":"gedaechtnis_als_nullvarianz"}},{"id":"interval-3","section":"interval","type":"single","level":"Standard","title":"Unterschätzung durch wahre Veränderung","prompt":"Zwischen zwei Messungen erhalten Personen unterschiedlich intensive Trainings. Der Test selbst misst fehlerfrei. Was kann mit der Retest-Korrelation geschehen?","options":["Sie kann sinken und die Messgenauigkeit unterschätzen, weil sich wahre Werte differentiell verändert haben.","Sie muss 1 bleiben, weil der Test fehlerfrei ist.","Sie misst dann ausschließlich Cronbachs α.","Sie wird automatisch negativ."],"answer":0,"hints":["Fehlerfreiheit garantiert nicht die zeitliche Konstanz wahrer Werte.","Retest-Reliabilität vermischt Stabilität und Genauigkeit, wenn sich das Merkmal verändert."],"retry":"Trenne die Qualität der Messung von der Stabilität des gemessenen Merkmals.","explanation":"Auch fehlerfreie Messungen können niedrig korrelieren, wenn sich wahre Werte unterschiedlich verändern. Der Retest-Koeffizient unterschätzt dann die reine Messgenauigkeit.","source":"PD06 Gütekriterien I, S. 15–17","misconception":"fehlerfrei_bedeutet_retest_eins"},{"id":"interval-4","section":"interval","type":"multi","level":"Transfer","title":"Retest-Studie gegen konkurrierende Erklärungen absichern","prompt":"Welche Maßnahmen helfen, einen Retest-Befund fachlich besser einzuordnen?","options":["Interventionen und relevante Ereignisse zwischen T1 und T2 dokumentieren.","Durchführungsbedingungen an beiden Zeitpunkten standardisieren.","Ein alternatives, hinreichend gleichwertiges Testformat ergänzend erwägen.","Das Intervall ohne Begründung möglichst kurz wählen.","Merkmalsstabilität und erwartbare Lern- beziehungsweise Gedächtniseffekte vorab begründen."],"answer":[0,1,2,4],"hints":["Ziel ist nicht ein maximaler Koeffizient, sondern eine interpretierbare Schätzung.","Ein sehr kurzes Intervall kann Erinnerung vergrößern."],"retry":"Eine Maßnahme maximiert lediglich kurzfristige Ähnlichkeit, ohne die Interpretierbarkeit zu verbessern.","explanation":"Dokumentation, Standardisierung, begründete Intervallwahl und gegebenenfalls alternative Formen helfen, konkurrierende Erklärungen zu prüfen. Ein künstlich kurzes Intervall ist kein Qualitätsbeweis.","source":"PD06 Gütekriterien I, S. 12–17 · Transfer","misconception":"retest_auf_maximalwert_optimiert"},{"id":"split-1","section":"split","type":"number","level":"Standard","title":"Halbtestkorrelation mit Spearman-Brown korrigieren","promptHtml":"<div class=\"formula-card\"><div class=\"formula-main\">Rel = 2·r<sub>H1,H2</sub> / (1 + r<sub>H1,H2</sub>)</div><div class=\"formula-note\">Korrektur von zwei parallelen Halbtests auf die Länge des Gesamttests</div></div><p>Die beiden Testhälften korrelieren mit r = .60. Wie hoch ist die korrigierte Split-Half-Reliabilität?</p>","answer":0.75,"tolerance":0.005,"unit":"","hints":["Setze .60 sowohl in den Zähler als auch in den Nenner ein.","2·.60 / 1.60 = 1.20 / 1.60."],"retry":"Die rohe Halbtestkorrelation bezieht sich auf kürzere Messungen und ist nicht bereits die Gesamttestreliabilität.","explanation":"Rel = 2·.60/(1+.60) = 1.20/1.60 = .75. Die Korrektur berücksichtigt, dass der Gesamttest doppelt so lang ist wie jede Hälfte.","source":"PD06 Gütekriterien I, S. 18–20","misconception":"split_half_nicht_korrigiert"},{"id":"split-2","section":"split","type":"match","level":"Standard","title":"Testhälften passend bilden","prompt":"Ordne dem Testkontext die in der Vorlesung genannte passende Teilungsmethode zu.","rows":["Leistungstest mit ansteigenden Schwierigkeiten","inhaltlich sehr heterogene Items mit bekannten Kennwerten","Speedtest mit klarer Zeitgrenze"],"options":["odd-even-Aufteilung","Item-Zwillinge nach Schwierigkeit und Trennschärfe","Teilung nach der halben Testzeit"],"answer":[0,1,2],"hints":["Erste gegen zweite Hälfte wäre bei ansteigender Schwierigkeit systematisch ungleich.","Beim Speedtest kann die Bearbeitungszeit die natürliche Teilung bilden."],"retry":"Wähle die Teilung so, dass die Hälften möglichst vergleichbar werden und den jeweiligen Testtyp berücksichtigen.","explanation":"Odd-even verteilt ansteigende Schwierigkeiten, Item-Zwillinge gleichen heterogene Inhalte und Kennwerte aus, und eine Zeitteilung ist speziell für Speedtests geeignet.","source":"PD06 Gütekriterien I, S. 22","misconception":"testteilung_unpassend"},{"id":"split-3","section":"split","type":"multi","level":"Standard","title":"Split-Half und Guttman korrekt unterscheiden","prompt":"Welche Aussagen sind korrekt?","options":["Die Spearman-Brown-Korrektur setzt parallele Testhälften voraus.","Guttmans Split-Half-Koeffizient fordert laut Vorlesung nur essentielle τ-Äquivalenz.","Jede zufällige Testteilung liefert zwingend denselben Koeffizienten.","Die Wahl der Testteilung kann das Ergebnis verändern.","Split-Half benötigt zwei Erhebungstermine."],"answer":[0,1,3],"hints":["Die Vorlesung nennt die Uneindeutigkeit der Testteilung als zentrales Problem.","Beide Verfahren gehören zur internen Konsistenz und benötigen nur eine Durchführung."],"retry":"Mindestens eine Aussage ignoriert die Abhängigkeit von der konkreten Teilung oder erfindet einen zweiten Messzeitpunkt.","explanation":"Spearman-Brown beruht auf Parallelität, Guttman auf der schwächeren essentiellen τ-Äquivalenz. Unterschiedliche Teilungen können unterschiedliche Koeffizienten liefern; ein zweiter Termin ist nicht erforderlich.","source":"PD06 Gütekriterien I, S. 21–22","misconception":"split_half_annahmen_falsch"},{"id":"split-4","section":"split","type":"single","level":"Standard","title":"Cronbachs α nicht als zeitliche Stabilität lesen","prompt":"Eine 10-Item-Skala besitzt α = .86. Welche Schlussfolgerung ist allein daraus zulässig?","options":["Die Itemantworten zeigen in dieser Stichprobe eine Interitem-Konsistenz von .86.","Das Merkmal ist über sechs Monate stabil.","Der Test ist valide.","Alle Items sind exakt parallel."],"answer":0,"hints":["α wird aus einer einmaligen Erhebung und den Itemzusammenhängen bestimmt.","Hohe Konsistenz beweist weder Stabilität noch Validität noch strenge Parallelität."],"retry":"Suche die Aussage, die sich auf die tatsächlich verwendete Datengrundlage beschränkt.","explanation":"α = .86 beschreibt die interne Konsistenz in dieser Stichprobe unter den jeweiligen Annahmen. Zeitliche Stabilität, Validität und strenge Parallelität müssen separat geprüft werden.","source":"PD06 Gütekriterien I, S. 23–26","misconceptionByAnswer":{"1":"alpha_als_retest","2":"alpha_als_validitaet","3":"alpha_beweist_parallelitaet"}},{"id":"matrix-1","section":"matrix","type":"grid","level":"Standard","title":"Grundlegende und itembezogene Fehlerquellen rekonstruieren","prompt":"Wähle für jede Zelle die qualitative Stufe aus der Lösung zu Aufgabenblatt 4.","gridRows":["Unsystematischer Messfehler","Inhomogenität der Items","Fehlende Parallelität der Tests bzw. Testhälften"],"gridCols":["Paralleltest<br><small>1 Tag</small>","Retest<br><small>1 Woche</small>","Retest<br><small>6 Monate</small>","Split-Half","Cronbachs α"],"choices":["0","+","++","0/+","+/++"],"answer":[["+","+","+","+","+"],["0","0","0","+","+"],["+","0","0","+","0"]],"hints":["Bearbeite zuerst die erste Zeile: Unsystematischer Messfehler kann jede der fünf Schätzungen beeinflussen und wird in der Lösung überall gleich stark eingestuft.","Iteminhomogenität ist kein zeitlicher Effekt. Deshalb erhalten Paralleltest und beide Retests in dieser Zeile 0.","Split-Half und Cronbachs α beruhen auf Beziehungen zwischen Testteilen beziehungsweise Items; Iteminhomogenität wird bei beiden mit + bewertet.","Fehlende Parallelität betrifft den Vergleich zweier Testformen und zweier Testhälften, also Paralleltest und Split-Half.","Retests verwenden denselben Test, und α verlangt keine zwei parallelen Formen oder Hälften. Diese drei Zellen der Parallelitätszeile erhalten 0."],"retry":"Fülle zeilenweise: Messfehler wirkt bei allen fünf Verfahren; Iteminhomogenität nur bei den beiden internen Verfahren; fehlende Parallelität nur beim Formen- und Hälftenvergleich.","explanation":"Unsystematischer Messfehler erhält beim Paralleltest, bei beiden Retests, bei Split-Half und bei Cronbachs α jeweils +, weil jede Messung zufällige Fehler enthalten kann. Inhomogenität der Items erhält bei Paralleltest, Retest nach einer Woche und Retest nach sechs Monaten jeweils 0, weil diese Zeile in der Lösung die internen Itembeziehungen meint; Split-Half und α erhalten jeweils +, da heterogene Items die Übereinstimmung von Hälften beziehungsweise Items mindern. Fehlende Parallelität erhält beim Paralleltest +, weil zwei Testformen gleichwertig sein müssen, bei beiden Retests 0, weil derselbe Test wiederholt wird, bei Split-Half +, weil die Hälften vergleichbar sein müssen, und bei α 0, weil keine zwei parallelen Formen oder Hälften gebildet werden.","source":"Lösungen Aufgabenblatt 4, S. 2","misconception":"matrix_grundmuster_falsch"},{"id":"matrix-2","section":"matrix","type":"grid","level":"Standard","title":"Bedingungen und Merkmalsänderungen über Verfahren verteilen","prompt":"Rekonstruiere die beiden Zeilen der qualitativen Lösungsmatrix.","gridRows":["Variierende Bedingungen zwischen Testungen","Merkmalsänderungen"],"gridCols":["Paralleltest<br><small>1 Tag</small>","Retest<br><small>1 Woche</small>","Retest<br><small>6 Monate</small>","Split-Half","Cronbachs α"],"choices":["0","+","++","0/+","+/++"],"answer":[["+","+/++","++","0","0"],["0/+","+","++","0","0"]],"hints":["Setze bei Split-Half und Cronbachs α in beiden Zeilen 0: Beide Verfahren vergleichen Teile innerhalb derselben Durchführung und haben kein Intervall zwischen Testungen.","Beim Retest nach sechs Monaten werden variierende Bedingungen und Merkmalsänderungen wegen des langen Zeitraums jeweils mit ++ bewertet.","Beim Retest nach einer Woche sind Bedingungen in der Lösung bereits stark gefährdet (+/++), Merkmalsänderungen aber nur mit +.","Beim Paralleltest nach einem Tag können sich Bedingungen merklich unterscheiden (+); echte Merkmalsänderungen sind wegen des sehr kurzen Abstands nur als Übergang 0/+ eingestuft.","Kontrollgerüst je Zeile: zeitvergleichende Verfahren zuerst, danach für Split-Half und α jeweils 0."],"retry":"Fixiere zuerst die sicheren Zellen: Split-Half und α sind in beiden Zeilen 0, der Sechs-Monats-Retest ist in beiden Zeilen ++. Unterscheide dann +/++ für Bedingungen nach einer Woche von 0/+ für Merkmalsänderungen nach einem Tag.","explanation":"Bei variierenden Bedingungen erhält der Paralleltest nach einem Tag +, weil zwei Durchführungen bereits situativ abweichen können; der Ein-Wochen-Retest erhält +/++, der Sechs-Monats-Retest wegen der langen Zeitspanne ++. Split-Half und α erhalten jeweils 0, weil ihre Teilmessungen aus derselben Durchführung stammen. Bei Merkmalsänderungen erhält der Paralleltest nach einem Tag nur 0/+, der Ein-Wochen-Retest + und der Sechs-Monats-Retest ++, weil wahre Veränderung mit dem Intervall wahrscheinlicher wird. Split-Half und α erhalten wiederum jeweils 0, da zwischen ihren Teilmessungen keine Zeit vergeht.","source":"Lösungen Aufgabenblatt 4, S. 2","misconception":"matrix_zeitmuster_falsch"},{"id":"matrix-3","section":"matrix","type":"grid","level":"Standard","title":"Gedächtnis- und Lerneffekte rekonstruieren","prompt":"Vervollständige die beiden Zeilen der Lösungsmatrix.","gridRows":["Gedächtniseffekte","Lerneffekte"],"gridCols":["Paralleltest<br><small>1 Tag</small>","Retest<br><small>1 Woche</small>","Retest<br><small>6 Monate</small>","Split-Half","Cronbachs α"],"choices":["0","+","++","0/+","+/++"],"answer":[["0","++","+","0","0"],["+","++","+","0","0"]],"hints":["Split-Half und Cronbachs α beruhen auf einer Durchführung; setze für Gedächtnis- und Lerneffekte in beiden Spalten jeweils 0.","Der Ein-Wochen-Retest verwendet denselben Test nach kurzer Zeit und ist deshalb für Gedächtnis wie Lernen am stärksten gefährdet: beide Zellen erhalten ++.","Nach sechs Monaten sind konkrete Erinnerung und übertragene Lerneffekte schwächer, aber noch möglich; beide Retest-Zellen erhalten +.","Beim Paralleltest wird eine andere Form verwendet: konkrete Antworterinnerung erhält deshalb 0, übertragbares Lernen aber +.","Prüfgerüst: Nur die Paralleltest-Spalte unterscheidet sich zwischen den beiden Zeilen; die vier übrigen Spalten haben dasselbe Muster."],"retry":"Setze zuerst bei Split-Half und α jeweils 0 sowie beim kurzen Retest jeweils ++ und beim langen Retest jeweils +. Entscheide zuletzt, warum nur der Paralleltest zwischen Gedächtnis und Lernen unterscheidet.","explanation":"Bei Gedächtniseffekten erhält der Paralleltest 0, weil die andere Testform konkrete Antworterinnerung begrenzt; der Ein-Wochen-Retest erhält ++, weil dieselben Aufgaben rasch wiederkehren; der Sechs-Monats-Retest erhält +, weil Erinnerung schwächer, aber nicht ausgeschlossen ist; Split-Half und α erhalten jeweils 0, weil keine zweite Durchführung stattfindet. Bei Lerneffekten erhält der Paralleltest +, weil allgemeines Lernen auf die andere Form übertragbar sein kann; der Ein-Wochen-Retest erhält ++ und der Sechs-Monats-Retest +; Split-Half und α erhalten erneut jeweils 0. Damit unterscheiden sich die beiden Zeilen nur beim Paralleltest.","source":"Lösungen Aufgabenblatt 4, S. 2","misconception":"matrix_lern_gedaechtnis_falsch"},{"id":"matrix-4","section":"matrix","type":"multi","level":"Transfer","title":"Qualitative Matrix fachlich lesen","prompt":"Welche Aussagen zur Lösungsmatrix sind angemessen?","options":["Die Zeichen sind qualitative Grobstufen und keine metrischen Effektgrößen.","+/++ bedeutet exakt das arithmetische Mittel von + und ++.","0 bedeutet „kann nicht oder kaum wirksam werden“, nicht mathematisch zwingend exakt null.","Die Matrix ist eine kontextbezogene didaktische Zuordnung und ersetzt keine konkrete Studienanalyse.","Ein ++ garantiert einen niedrigeren Koeffizienten als jedes + in jeder denkbaren Studie."],"answer":[0,2,3],"hints":["Die ursprüngliche Aufgabe definiert 0, + und ++ verbal.","Übergangskategorien werden in der Lösung verwendet, ohne als Zahlenmaß definiert zu werden."],"retry":"Mindestens eine Aussage behandelt qualitative Zeichen fälschlich wie präzise Zahlen.","explanation":"Die Matrix strukturiert plausible Wirksamkeit qualitativ. Sie liefert keine metrischen Effektstärken und keine deterministischen Rangordnungen für jede konkrete Studie.","source":"Aufgabenblatt 4, S. 2 · Lösungen Aufgabenblatt 4, S. 2","misconception":"matrix_als_metrische_skala"},{"id":"forward-1","section":"forward","type":"number","level":"Standard","title":"Längenfaktor aus Itemzahlen bestimmen","prompt":"Eine Skala wird von 12 auf 18 parallele Items verlängert. Berechne c = m*/m.","answer":1.5,"tolerance":0.001,"unit":"","hints":["m* ist die neue Gesamtzahl, nicht die Zahl zusätzlich entwickelter Items.","c = 18/12."],"retry":"Verwende die neue Gesamtlänge im Zähler und die ursprüngliche Länge im Nenner.","explanation":"c = 18/12 = 1.50. Der Test ist danach anderthalbmal so lang wie zuvor.","source":"PD06 Gütekriterien I, S. 29","misconception":"laengenfaktor_falsch"},{"id":"forward-2","section":"forward","type":"number","level":"Standard","title":"Reliabilität nach Verlängerung berechnen","promptHtml":"<div class=\"formula-card\"><div class=\"formula-main\">Rel* = c·Rel / [1 + (c−1)·Rel]</div></div><p>Ausgangsreliabilität Rel = .60, Längenfaktor c = 1.50. Berechne Rel*.</p>","answer":0.6923,"tolerance":0.005,"unit":"","hints":["Der Nenner lautet 1 + .50·.60.","Zähler .90; Nenner 1.30."],"retry":"Achte darauf, dass c−1 nur den zusätzlichen Längenanteil beschreibt.","explanation":"Rel* = 1.50·.60 / [1 + .50·.60] = .90/1.30 ≈ .692. Die Reliabilität steigt, aber nicht proportional zur Itemzahl.","source":"PD06 Gütekriterien I, S. 29 · neuer Rechenfall","misconception":"spearman_brown_vorwaerts_falsch"},{"id":"forward-3","section":"forward","type":"number","level":"Standard","title":"Testverkürzung berechnen","prompt":"Ein Test mit Rel = .80 wird auf die Hälfte seiner parallelen Items verkürzt. Welche Reliabilität ist nach Spearman-Brown zu erwarten?","answer":0.6667,"tolerance":0.005,"unit":"","hints":["Bei Halbierung ist c = .50.","Zähler .40; Nenner 1 + (−.50·.80) = .60."],"retry":"Bei einer Verkürzung ist c kleiner als 1; der Term c−1 wird negativ.","explanation":"Rel* = .50·.80 / [1 + (.50−1)·.80] = .40/.60 ≈ .667. Eine Verkürzung verringert die Messpräzision.","source":"PD06 Gütekriterien I, S. 29 · neuer Rechenfall","misconception":"spearman_brown_verkuerzung_falsch"},{"id":"forward-4","section":"forward","type":"single","level":"Transfer","title":"Kurve und abnehmenden Grenznutzen interpretieren","promptHtml":"<figure class=\"sb-curve\"><figcaption>Spearman-Brown-Kurve für Ausgangsreliabilität Rel = .60</figcaption><svg viewBox=\"0 0 700 330\" role=\"img\" aria-label=\"Reliabilität in Abhängigkeit vom Längenfaktor c\"><line class=\"curve-grid\" x1=\"109.0\" y1=\"30\" x2=\"109.0\" y2=\"270\"/><text class=\"curve-label\" x=\"109.0\" y=\"295\" text-anchor=\"middle\">0.5</text><line class=\"curve-grid\" x1=\"187.0\" y1=\"30\" x2=\"187.0\" y2=\"270\"/><text class=\"curve-label\" x=\"187.0\" y=\"295\" text-anchor=\"middle\">1</text><line class=\"curve-grid\" x1=\"343.0\" y1=\"30\" x2=\"343.0\" y2=\"270\"/><text class=\"curve-label\" x=\"343.0\" y=\"295\" text-anchor=\"middle\">2</text><line class=\"curve-grid\" x1=\"499.0\" y1=\"30\" x2=\"499.0\" y2=\"270\"/><text class=\"curve-label\" x=\"499.0\" y=\"295\" text-anchor=\"middle\">3</text><line class=\"curve-grid\" x1=\"655.0\" y1=\"30\" x2=\"655.0\" y2=\"270\"/><text class=\"curve-label\" x=\"655.0\" y=\"295\" text-anchor=\"middle\">4</text><line class=\"curve-grid\" x1=\"70\" y1=\"174.0\" x2=\"655\" y2=\"174.0\"/><text class=\"curve-label\" x=\"60\" y=\"178.0\" text-anchor=\"end\">0.4</text><line class=\"curve-grid\" x1=\"70\" y1=\"126.0\" x2=\"655\" y2=\"126.0\"/><text class=\"curve-label\" x=\"60\" y=\"130.0\" text-anchor=\"end\">0.6</text><line class=\"curve-grid\" x1=\"70\" y1=\"78.0\" x2=\"655\" y2=\"78.0\"/><text class=\"curve-label\" x=\"60\" y=\"82.0\" text-anchor=\"end\">0.8</text><line class=\"curve-grid\" x1=\"70\" y1=\"30.0\" x2=\"655\" y2=\"30.0\"/><text class=\"curve-label\" x=\"60\" y=\"34.0\" text-anchor=\"end\">1.0</text><line class=\"curve-axis\" x1=\"70\" y1=\"270\" x2=\"655\" y2=\"270\"/><line class=\"curve-axis\" x1=\"70\" y1=\"30\" x2=\"70\" y2=\"270\"/><polyline class=\"curve-line\" points=\"70.0,204.5 89.5,183.6 109.0,167.1 128.5,153.9 148.0,142.9 167.5,133.8 187.0,126.0 206.5,119.3 226.0,113.5 245.5,108.4 265.0,103.8 284.5,99.8 304.0,96.2 323.5,93.0 343.0,90.0 362.5,87.3 382.0,84.9 401.5,82.6 421.0,80.5 440.5,78.6 460.0,76.8 479.5,75.2 499.0,73.6 518.5,72.2 538.0,70.9 557.5,69.6 577.0,68.4 596.5,67.3 616.0,66.2 635.5,65.2 655.0,64.3\"/><circle class=\"curve-point\" cx=\"187.0\" cy=\"126.0\" r=\"7\"/><text class=\"curve-axis-label\" x=\"362.5\" y=\"325\" text-anchor=\"middle\">Längenfaktor c</text><text class=\"curve-axis-label\" transform=\"translate(20 150.0) rotate(-90)\" text-anchor=\"middle\">Rel*</text></svg></figure><p>Welche Aussage beschreibt die Kurve fachlich korrekt?</p>","options":["Rel* wächst linear und überschreitet bei genügend Items 1.","Bei c = 1 entspricht Rel* der Ausgangsreliabilität; zusätzliche parallele Items bringen mit wachsender Reliabilität abnehmende Zugewinne.","Eine Verdopplung führt bei jeder Ausgangsreliabilität zum gleichen absoluten Gewinn.","Für c < 1 steigt die Reliabilität."],"answer":1,"hints":["Betrachte den markierten Punkt bei c = 1 und die abflachende Kurve.","Die 1 ist eine asymptotische Obergrenze."],"retry":"Die Kurve ist gekrümmt, nicht linear, und bleibt unter beziehungsweise bei 1.","explanation":"Bei unveränderter Länge c = 1 bleibt Rel* = Rel. Die Kurve nähert sich 1 asymptotisch; zusätzliche parallele Items liefern bei bereits hoher Reliabilität kleinere absolute Zugewinne.","source":"PD06 Gütekriterien I, S. 20, 29 · neu gezeichnete Kurve","misconception":"spearman_brown_linearitaet"},{"id":"target-1","section":"target","type":"number","level":"Transfer","title":"Erforderlichen Verlängerungsfaktor berechnen","promptHtml":"<div class=\"formula-card\"><div class=\"formula-main\">c = Rel*·(1−Rel) / [Rel·(1−Rel*)]</div></div><p>Eine Skala besitzt Rel = .65 und soll Rel* = .80 erreichen. Berechne c.</p>","answer":2.1538,"tolerance":0.01,"unit":"","hints":["Zähler: .80·.35. Nenner: .65·.20.","c = .28/.13."],"retry":"Setze Ausgangs- und Zielreliabilität nicht gegeneinander vertauscht ein.","explanation":"c = [.80·(1−.65)]/[.65·(1−.80)] = .28/.13 ≈ 2.154. Die Skala müsste unter Parallelitätsannahme mehr als verdoppelt werden.","source":"PD06 Gütekriterien I, S. 29 · neuer Rechenfall","misconception":"ziel_faktor_falsch"},{"id":"target-2","section":"target","type":"number","level":"Transfer","title":"Gesamtzahl der Items aufrunden","prompt":"Die Ausgangsskala umfasst 14 Items und der berechnete Faktor beträgt c = 2.1538. Wie viele Items werden insgesamt mindestens benötigt?","answer":31,"tolerance":0.001,"unit":"Items","hints":["14·2.1538 ≈ 30.15.","Eine Mindestlänge wird auf die nächste ganze Itemzahl aufgerundet."],"retry":"Runde nicht auf 30 ab; die Zielreliabilität soll mindestens erreicht werden.","explanation":"m* = 14·2.1538 ≈ 30.15. Da nur ganze Items möglich sind und die Zielreliabilität mindestens erreicht werden soll, werden 31 Items benötigt.","source":"PD06 Gütekriterien I, S. 29 · neuer Rechenfall","misconception":"ziel_gesamtitems_falsch"},{"id":"target-3","section":"target","type":"number","level":"Transfer","title":"Zusätzliche Items von der Gesamtzahl trennen","prompt":"Die Skala wird von 14 auf insgesamt 31 Items verlängert. Wie viele neue Items müssen entwickelt werden?","answer":17,"tolerance":0.001,"unit":"Items","hints":["Zusatzitems = Zielgesamtlänge − Ausgangslänge.","31 − 14."],"retry":"Die 31 sind die gesamte neue Testlänge, nicht die Zahl zusätzlich benötigter Items.","explanation":"31 − 14 = 17 zusätzliche Items. Gesamtzahl und Zusatzbedarf müssen in Planung und Bericht klar getrennt werden.","source":"Neuer Parallelfall","misconception":"gesamt_und_zusatzitems_verwechselt"},{"id":"target-4","section":"target","type":"multi","level":"Transfer","title":"Hochrechnung in einen belastbaren Entwicklungsplan übersetzen","prompt":"Welche Schritte sind nach der rechnerischen Zieltestlänge fachlich erforderlich?","options":["Neue Items müssen dieselbe Dimension in vergleichbarer Weise messen.","Die neuen Items sollten pilotiert und ihre Kennwerte geprüft werden.","Die Reliabilität der revidierten Skala muss empirisch neu geschätzt werden.","Die Formel garantiert den Zielwert unabhängig von Itemqualität und Population.","Inhaltsabdeckung, Redundanz, Ökonomie und Zumutbarkeit müssen berücksichtigt werden."],"answer":[0,1,2,4],"hints":["Spearman-Brown ist eine Prognose unter Parallelitätsannahme.","Reliabilität ist populationsabhängig und neue Items können von der Annahme abweichen."],"retry":"Eine Aussage behandelt eine modellbasierte Planungsrechnung fälschlich als Garantie.","explanation":"Die Formel liefert eine Planungsgröße. Erst Konstruktion, Pilotierung und erneute Prüfung zeigen, ob die neuen Items hinreichend parallel sind und der praktische Nutzen die längere Testzeit rechtfertigt.","source":"PD06 Gütekriterien I, S. 28–29","misconception":"hochrechnung_als_garantie"},{"id":"mastery-1","section":"mastery","type":"multi","level":"Transfer","title":"Widersprüchliche Koeffizienten diagnostisch interpretieren","promptHtml":"<div class=\"matrix-wrap\"><table class=\"mini-table item-table\"><caption>Abschlussfall: Skala „stabile Arbeitsplanung“</caption><thead><tr><th scope=\"col\">Information</th><th scope=\"col\">Befund</th></tr></thead><tbody><tr><th scope=\"row\">Ausgangslänge</th><td>16 Items</td></tr><tr><th scope=\"row\">Cronbachs α</th><td>.70</td></tr><tr><th scope=\"row\">Retest nach 1 Woche</th><td>.88</td></tr><tr><th scope=\"row\">Retest nach 6 Monaten</th><td>.61</td></tr><tr><th scope=\"row\">gewünschte Reliabilität</th><td>.82</td></tr><tr><th scope=\"row\">maximal zulässige Länge</th><td>28 Items</td></tr><tr><th scope=\"row\">neue Items</th><td>inhaltlich parallel konstruierbar, aber noch nicht pilotiert</td></tr></tbody></table></div><p>Welche Aussagen sind fachlich vertretbar?</p>","options":["Der kurze Retest kann durch Gedächtnis- oder Übungseffekte erhöht sein.","Der lange Retest kann wahre Veränderungen und veränderte Bedingungen enthalten.","α = .70 beweist die Validität der Skala.","Die Koeffizienten beantworten unterschiedliche Fragen und müssen nicht identisch sein.","Der größte Koeffizient ist automatisch die unverzerrte Reliabilität."],"answer":[0,1,3],"hints":["Kurze und lange Intervalle besitzen gegensätzliche Risikoprofile.","Interne Konsistenz und zeitliche Stabilität sind nicht dasselbe."],"retry":"Vermeide sowohl den Validitätsbeweis durch α als auch die automatische Wahl des größten Koeffizienten.","explanation":"Der kurze Retest kann überschätzt, der lange durch wahre Veränderung unterschätzt sein. α beschreibt interne Konsistenz. Die Unterschiede sind diagnostisch zu erklären, nicht durch Auswahl des größten Werts zu beseitigen.","source":"PD06 Gütekriterien I, S. 13–17, 23–26 · neuer Abschlussfall","misconception":"abschluss_groesster_koeffizient"},{"id":"mastery-2","section":"mastery","type":"number","level":"Transfer","title":"Zieltestlänge unter Parallelitätsannahme bestimmen","promptHtml":"<div class=\"matrix-wrap\"><table class=\"mini-table item-table\"><caption>Abschlussfall: Skala „stabile Arbeitsplanung“</caption><thead><tr><th scope=\"col\">Information</th><th scope=\"col\">Befund</th></tr></thead><tbody><tr><th scope=\"row\">Ausgangslänge</th><td>16 Items</td></tr><tr><th scope=\"row\">Cronbachs α</th><td>.70</td></tr><tr><th scope=\"row\">Retest nach 1 Woche</th><td>.88</td></tr><tr><th scope=\"row\">Retest nach 6 Monaten</th><td>.61</td></tr><tr><th scope=\"row\">gewünschte Reliabilität</th><td>.82</td></tr><tr><th scope=\"row\">maximal zulässige Länge</th><td>28 Items</td></tr><tr><th scope=\"row\">neue Items</th><td>inhaltlich parallel konstruierbar, aber noch nicht pilotiert</td></tr></tbody></table></div><p>Wie viele Items wären bei Rel = .70 für Rel* = .82 insgesamt mindestens erforderlich?</p>","answer":32,"tolerance":0.001,"unit":"Items","hints":["c = [.82·.30]/[.70·.18] ≈ 1.952.","16·1.952 ≈ 31.24; auf ganze Items aufrunden."],"retry":"Die rechnerische Länge liegt knapp über 31 und muss nach oben gerundet werden.","explanation":"c ≈ 1.952; m* = 16·1.952 ≈ 31.24. Unter der Modellannahme werden daher mindestens 32 Items benötigt.","source":"PD06 Gütekriterien I, S. 29 · neuer Abschlussfall","misconception":"abschluss_zieltestlaenge_falsch"},{"id":"mastery-3","section":"mastery","type":"number","level":"Transfer","title":"Maximal erreichbare Reliabilität unter der Zeitgrenze berechnen","promptHtml":"<div class=\"matrix-wrap\"><table class=\"mini-table item-table\"><caption>Abschlussfall: Skala „stabile Arbeitsplanung“</caption><thead><tr><th scope=\"col\">Information</th><th scope=\"col\">Befund</th></tr></thead><tbody><tr><th scope=\"row\">Ausgangslänge</th><td>16 Items</td></tr><tr><th scope=\"row\">Cronbachs α</th><td>.70</td></tr><tr><th scope=\"row\">Retest nach 1 Woche</th><td>.88</td></tr><tr><th scope=\"row\">Retest nach 6 Monaten</th><td>.61</td></tr><tr><th scope=\"row\">gewünschte Reliabilität</th><td>.82</td></tr><tr><th scope=\"row\">maximal zulässige Länge</th><td>28 Items</td></tr><tr><th scope=\"row\">neue Items</th><td>inhaltlich parallel konstruierbar, aber noch nicht pilotiert</td></tr></tbody></table></div><p>Bei maximal 28 Items gilt c = 28/16 = 1.75. Welche Reliabilität ist nach Spearman-Brown zu erwarten?</p>","answer":0.8033,"tolerance":0.005,"unit":"","hints":["Setze Rel = .70 und c = 1.75 in die Vorwärtsformel ein.","Zähler 1.225; Nenner 1.525."],"retry":"Die Zeitgrenze begrenzt c auf 1.75; verwende nicht den größeren Faktor aus der Zielwertrechnung.","explanation":"Rel* = 1.75·.70/[1+.75·.70] = 1.225/1.525 ≈ .803. Die rechnerische Zielreliabilität .82 wird unter der 28-Item-Grenze nicht erreicht.","source":"PD06 Gütekriterien I, S. 29 · neuer Abschlussfall","misconception":"abschluss_maxreliabilitaet_falsch"},{"id":"mastery-4","section":"mastery","type":"single","level":"Transfer","title":"Fachlich belastbare Entscheidung formulieren","promptHtml":"<div class=\"matrix-wrap\"><table class=\"mini-table item-table\"><caption>Abschlussfall: Skala „stabile Arbeitsplanung“</caption><thead><tr><th scope=\"col\">Information</th><th scope=\"col\">Befund</th></tr></thead><tbody><tr><th scope=\"row\">Ausgangslänge</th><td>16 Items</td></tr><tr><th scope=\"row\">Cronbachs α</th><td>.70</td></tr><tr><th scope=\"row\">Retest nach 1 Woche</th><td>.88</td></tr><tr><th scope=\"row\">Retest nach 6 Monaten</th><td>.61</td></tr><tr><th scope=\"row\">gewünschte Reliabilität</th><td>.82</td></tr><tr><th scope=\"row\">maximal zulässige Länge</th><td>28 Items</td></tr><tr><th scope=\"row\">neue Items</th><td>inhaltlich parallel konstruierbar, aber noch nicht pilotiert</td></tr></tbody></table></div><p>Welche Empfehlung ist am besten begründet?</p>","options":["28 beliebige Items verwenden und .82 berichten, weil der Unterschied klein ist.","Die Zeitgrenze ignorieren und 32 ungeprüfte Items sofort einsetzen.","Die 28-Item-Variante als höchstens ungefähr .80 prognostizieren, neue Items pilotieren, Standardisierung und Itemqualität verbessern und anschließend Reliabilität sowie Validität neu prüfen.","Nur den sechsmonatigen Retest aus dem Bericht entfernen."],"answer":2,"hints":["Die Rechnung ist eine Prognose, und die Zielvorgabe ist unter der Zeitgrenze rechnerisch nicht erreichbar.","Die Vorlesung nennt Standardisierung, Verlängerung und grundlegende Überarbeitung als mögliche Maßnahmen."],"retry":"Die beste Empfehlung verschweigt weder die Zeitrestriktion noch die Unsicherheit der Parallelitätsannahme.","explanation":"Die Zeitgrenze erlaubt rechnerisch nur etwa .80. Eine transparente Empfehlung kombiniert Pilotierung paralleler Items, stärkere Standardisierung beziehungsweise Revision und erneute empirische Prüfung, statt einen Zielwert zu behaupten.","source":"PD06 Gütekriterien I, S. 26–29 · neuer Abschlussfall","misconceptionByAnswer":{"0":"zielwert_aufgerundet","1":"oekonomie_ignoriert","3":"unpassenden_befund_entfernt"}}];
function sectionTasks(id){return tasks.filter(t=>t.section===id)}
let state=loadState();let current=state.current||'start';
function defaultState(){return {version:MODULE.version,current:'start',tasks:{},errors:{},startedAt:new Date().toISOString(),updatedAt:new Date().toISOString()}}
function loadState(){try{const raw=localStorage.getItem(MODULE.id);if(!raw)return defaultState();const s=JSON.parse(raw);return s&&s.version===MODULE.version?s:defaultState()}catch(e){return defaultState()}}
function saveState(){state.current=current;state.updatedAt=new Date().toISOString();try{localStorage.setItem(MODULE.id,JSON.stringify(state))}catch(e){}updateProgress()}
function taskState(id){return state.tasks[id]||(state.tasks[id]={attempts:0,correct:false,hints:0,lastAnswer:null})}
function esc(s){return String(s).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
function announce(msg){const live=document.getElementById('live');live.textContent='';setTimeout(()=>live.textContent=msg,20)}
function renderNav(){const nav=document.getElementById('nav');nav.innerHTML='';MODULE.sections.forEach(s=>{const b=document.createElement('button');b.type='button';b.dataset.page=s.id;b.innerHTML=`${esc(s.nav)}<small>${sectionStatus(s.id)}</small>`;b.addEventListener('click',()=>showPage(s.id));nav.appendChild(b)})}
function sectionStatus(id){const ts=sectionTasks(id);if(!ts.length)return id==='result'?'Auswertung':'Übersicht';const done=ts.filter(t=>taskState(t.id).correct).length;return `${done}/${ts.length} gelöst`}
function renderPages(){const root=document.getElementById('pages');root.innerHTML='';MODULE.sections.forEach((s,idx)=>{const page=document.createElement('section');page.className='page';page.id=`page-${s.id}`;page.dataset.page=s.id;if(s.intro)page.innerHTML=renderStart();else if(s.result)page.innerHTML=renderResult();else page.innerHTML=renderSection(s,idx);root.appendChild(page)});bindTaskEvents();bindPageButtons()}
function renderStart(){return `<div class="hero"><div class="eyebrow">Interaktives Reliabilitätslabor · vollständig überarbeitete Fassung</div><h1>Reliabilitätsverfahren und Testverlängerung</h1><p class="lead">Du planst Reliabilitätsstudien, unterscheidest Äquivalenzannahmen, diagnostizierst Retest-Verläufe, rekonstruierst die Fehlerquellenmatrix ohne Lösungsvorgabe und rechnest Spearman-Brown vorwärts wie rückwärts. Die Aufgaben verwenden neue Daten und Transferfälle; die Kompetenzen entsprechen Aufgabenblatt 4 und der Vorlesung.</p><div class="pill-row"><span class="pill">${tasks.length} Aufgaben</span><span class="pill">9 Lernbereiche</span><span class="pill">Basis → Standard → Transfer</span><span class="pill">offline nutzbar</span></div><button class="btn btn-primary" data-goto="concept">Training starten</button></div><div class="grid" style="margin-top:18px"><div class="card"><h3>Diagnose statt Koeffizientenvergleich</h3><p>Du lernst, warum Alpha, kurzer Retest und langer Retest unterschiedliche Fehlerquellen enthalten und nicht durch die Wahl des größten Wertes ersetzt werden dürfen.</p></div><div class="card"><h3>Aktive Matrixrekonstruktion</h3><p>Die Lösungsmatrix wird nicht angezeigt. Du füllst ihre 35 Zellen selbst und erhältst erst nach der Bearbeitung erklärendes Feedback.</p></div><div class="card"><h3>Planungsrechnungen mit Grenzen</h3><p>Spearman-Brown wird als Modell unter Parallelitätsannahme verwendet – einschließlich Verkürzung, Zielwertrechnung, Aufrundung und Testzeitrestriktion.</p></div></div>`}
function renderSection(s,idx){const ts=sectionTasks(s.id);const done=ts.filter(t=>taskState(t.id).correct).length;return `<div class="section-head"><div><div class="eyebrow">Lernbereich ${idx} · ${esc(s.level||'')}</div><h2>${esc(s.title)}</h2></div><div class="section-count">${done} von ${ts.length} gelöst</div></div><details class="card theory"><summary>Kompakte fachliche Grundlage</summary><p>${esc(s.theory)}</p></details><div class="task-list">${ts.map(renderTask).join('')}</div>${renderFooter(idx)}`}
function renderTask(t){const st=taskState(t.id);const source=t.source?`<span class="source">${esc(t.source)}</span>`:'';const prompt=t.promptHtml||esc(t.prompt||'');return `<article class="task ${st.correct?'done':''}" id="task-${t.id}" data-task="${t.id}"><div class="task-head"><div><div class="task-kicker">${taskTypeLabel(t.type)}<span class="level-badge">${esc(t.level||'Standard')}</span></div><div class="task-title">${esc(t.title)}</div>${source}</div><span class="status ${st.correct?'good':''}">${st.correct?'gelöst':st.attempts?`${st.attempts} Versuch${st.attempts===1?'':'e'}`:'offen'}</span></div><div class="prompt">${prompt}</div>${renderInput(t,st)}<div class="hint-box">${(t.hints||[]).map((h,i)=>`<button type="button" data-hint="${i}">Hinweis ${i+1} anzeigen</button><div class="hint" id="hint-${t.id}-${i}">${esc(h)}</div>`).join('')}</div><div class="feedback" role="status"></div></article>`}
function taskTypeLabel(type){return ({single:'Einzelauswahl',multi:'Mehrfachauswahl',number:'Rechenaufgabe',order:'Reihenfolge',matrix:'Matrix markieren',match:'Zuordnung',grid:'Matrix ausfüllen'})[type]||'Aufgabe'}
function checkedAttr(st,i,type){if(st.lastAnswer==null)return '';if(type==='single')return st.lastAnswer===i?' checked':'';return Array.isArray(st.lastAnswer)&&st.lastAnswer.includes(i)?' checked':''}
function renderInput(t,st){
 if(t.type==='single'||t.type==='multi'){const inputType=t.type==='single'?'radio':'checkbox';return `<div class="options">${t.options.map((o,i)=>`<label class="option"><input type="${inputType}" name="${t.id}" value="${i}"${checkedAttr(st,i,t.type)}><span>${esc(o)}</span></label>`).join('')}</div><div class="answer-row"><button class="btn btn-primary" type="button" data-check>Antwort prüfen</button></div>`}
 if(t.type==='number'){const val=typeof st.lastAnswer==='number'?String(st.lastAnswer):'';return `<div class="answer-row"><label><span class="sr-only">Numerische Antwort</span><input class="number-input" type="text" inputmode="decimal" autocomplete="off" aria-label="Numerische Antwort" value="${esc(val)}"></label>${t.unit?`<span>${esc(t.unit)}</span>`:''}<button class="btn btn-primary" type="button" data-check>Antwort prüfen</button></div>`}
 if(t.type==='order'){const seq=Array.isArray(st.lastAnswer)?st.lastAnswer:(st.correct?t.answer:(t.start||t.items.map((_,i)=>i)));const arr=seq.map(orig=>({text:t.items[orig],orig}));return `<ol class="order-list">${arr.map((x,i)=>orderItem(t.id,x.text,x.orig,i)).join('')}</ol><div class="answer-row"><button class="btn btn-primary" type="button" data-check>Reihenfolge prüfen</button></div>`}
 if(t.type==='matrix')return renderMatrix(t,st);
 if(t.type==='match')return renderMatch(t,st);
 if(t.type==='grid')return renderGrid(t,st);
 return ''
}
function orderItem(id,text,orig,pos){return `<li class="order-item" data-orig="${orig}"><span><strong>${pos+1}.</strong> ${esc(text)}</span><span class="order-controls"><button type="button" data-move="up" aria-label="Schritt nach oben">↑</button><button type="button" data-move="down" aria-label="Schritt nach unten">↓</button></span></li>`}
function fmtNum(v){if(v===1)return '1.00';const s=Number(v).toFixed(2);return s.replace(/^(-?)0\./,'$1.')}
function renderMatrix(t,st){const selected=new Set(Array.isArray(st.lastAnswer)?st.lastAnswer:[]);let rows='';for(let i=0;i<t.labels.length;i++){let cells=`<th scope="row">${esc(t.labels[i])}</th>`;for(let j=0;j<t.labels.length;j++){const key=`${Math.min(i,j)}-${Math.max(i,j)}`;if(i===j)cells+=`<td class="diag">${fmtNum(t.values[i][j])}</td>`;else if(i<j)cells+=`<td><button type="button" class="matrix-cell" data-pair="${key}" aria-pressed="${selected.has(key)}" aria-label="${esc(t.labels[i])} mit ${esc(t.labels[j])}: ${fmtNum(t.values[i][j])}">${fmtNum(t.values[i][j])}</button></td>`;else cells+=`<td class="mirror">${fmtNum(t.values[i][j])}</td>`}rows+=`<tr>${cells}</tr>`}return `<div class="matrix-wrap"><table class="matrix-table"><caption>Symmetrische Matrix; auswählbar ist das obere Dreieck</caption><thead><tr><th></th>${t.labels.map(x=>`<th scope="col">${esc(x)}</th>`).join('')}</tr></thead><tbody>${rows}</tbody></table></div><div class="answer-row"><button class="btn btn-primary" type="button" data-check>Markierung prüfen</button></div>`}
function renderMatch(t,st){const ans=Array.isArray(st.lastAnswer)?st.lastAnswer:[];const rows=t.rows.map((r,i)=>`<tr><th scope="row">${esc(r)}</th><td><select data-match-row="${i}" aria-label="Kategorie für ${esc(r)}"><option value="">Bitte wählen</option>${t.options.map((o,j)=>`<option value="${j}"${ans[i]===j?' selected':''}>${esc(o)}</option>`).join('')}</select></td></tr>`).join('');return `<table class="match-table"><thead><tr><th>Wert</th><th>Kategorie</th></tr></thead><tbody>${rows}</tbody></table><div class="answer-row"><button class="btn btn-primary" type="button" data-check>Zuordnung prüfen</button></div>`}

function renderGrid(t,st){const ans=Array.isArray(st.lastAnswer)?st.lastAnswer:[];const rows=t.gridRows.map((r,ri)=>`<tr><th scope="row">${esc(r)}</th>${t.gridCols.map((c,ci)=>{const val=ans[ri]&&ans[ri][ci]!=null?ans[ri][ci]:'';return `<td><select data-grid-row="${ri}" data-grid-col="${ci}" aria-label="${esc(r)}, ${String(c).replace(/<[^>]+>/g,'')}"><option value="">–</option>${t.choices.map(o=>`<option value="${esc(o)}"${val===o?' selected':''}>${esc(o)}</option>`).join('')}</select></td>`}).join('')}</tr>`).join('');return `<div class="matrix-wrap"><table class="grid-table"><caption>Qualitative Fehlerquellenmatrix – alle Felder selbst ausfüllen</caption><thead><tr><th scope="col">Fehlerquelle</th>${t.gridCols.map(c=>`<th scope="col">${c}</th>`).join('')}</tr></thead><tbody>${rows}</tbody></table></div><div class="grid-legend">0 = nicht oder kaum wirksam · + = wirksam · ++ = sehr stark · Übergänge: 0/+ und +/++</div><div class="answer-row"><button class="btn btn-primary" type="button" data-check>Matrix prüfen</button></div>`}
function renderFooter(idx){const prev=MODULE.sections[idx-1],next=MODULE.sections[idx+1];return `<div class="footer-nav">${prev?`<button class="btn" data-goto="${prev.id}">← ${esc(prev.nav)}</button>`:'<span></span>'}${next?`<button class="btn btn-primary" data-goto="${next.id}">${esc(next.nav)} →</button>`:''}</div>`}
function renderResult(){const done=tasks.filter(t=>taskState(t.id).correct).length;const attempts=tasks.reduce((a,t)=>a+taskState(t.id).attempts,0);const hints=tasks.reduce((a,t)=>a+taskState(t.id).hints,0);const errs=Object.entries(state.errors).sort((a,b)=>b[1]-a[1]);return `<div class="section-head"><div><div class="eyebrow">Auswertung</div><h2>Lernstand und Fehlkonzeptprofil</h2></div></div><div class="dashboard"><div class="metric"><span>Gelöste Aufgaben</span><b>${done}/${tasks.length}</b></div><div class="metric"><span>Abgaben</span><b>${attempts}</b></div><div class="metric"><span>Genutzte Hinweise</span><b>${hints}</b></div><div class="metric"><span>Kompetenzabdeckung</span><b>${tasks.length?Math.round(done/tasks.length*100):0}%</b></div></div><div class="card"><h3>Bereiche</h3>${MODULE.sections.filter(s=>sectionTasks(s.id).length).map(s=>{const ts=sectionTasks(s.id),d=ts.filter(t=>taskState(t.id).correct).length;return `<div class="error-item"><span>${esc(s.nav)} – ${esc(s.title)}</span><strong>${d}/${ts.length}</strong></div>`}).join('')}</div><div class="card" style="margin-top:16px"><h3>Wiederkehrende Fehlkonzepte</h3>${errs.length?`<div class="error-list">${errs.map(([e,n])=>`<div class="error-item"><span>${esc(humanError(e))}</span><strong>${n}×</strong></div>`).join('')}</div>`:'<p>Noch keine klassifizierten Fehlversuche.</p>'}</div><div class="callout"><strong>Beherrschungskriterium:</strong> Du kannst Reliabilitätsverfahren nicht nur benennen, sondern ihre Voraussetzungen und Fehlerquellen unterscheiden, Retest-Verläufe diagnostizieren, die Lösungsmatrix aktiv rekonstruieren und Spearman-Brown-Rechnungen in einen realistischen Entwicklungsplan übersetzen.</div><div class="footer-nav"><button class="btn" data-goto="mastery">← Abschlussfall</button><button class="btn btn-primary" data-goto="concept">Training wiederholen</button></div>`}

function bindTaskEvents(){document.querySelectorAll('[data-task]').forEach(el=>{el.querySelectorAll('[data-check]').forEach(b=>b.addEventListener('click',()=>checkTask(el.dataset.task)));el.querySelectorAll('[data-hint]').forEach(b=>b.addEventListener('click',()=>showHint(el.dataset.task,Number(b.dataset.hint),b)));el.querySelectorAll('[data-move]').forEach(b=>b.addEventListener('click',()=>moveOrder(b)));el.querySelectorAll('.matrix-cell').forEach(b=>b.addEventListener('click',()=>{b.setAttribute('aria-pressed',b.getAttribute('aria-pressed')!=='true')}))})}
function bindPageButtons(){document.querySelectorAll('[data-goto]').forEach(b=>b.addEventListener('click',()=>showPage(b.dataset.goto)))}
function moveOrder(btn){const li=btn.closest('li'),list=li.parentElement;if(btn.dataset.move==='up'&&li.previousElementSibling)list.insertBefore(li,li.previousElementSibling);if(btn.dataset.move==='down'&&li.nextElementSibling)list.insertBefore(li.nextElementSibling,li);[...list.children].forEach((x,i)=>x.querySelector('strong').textContent=`${i+1}.`)}
function showHint(id,i,btn){const box=document.getElementById(`hint-${id}-${i}`);if(!box)return;const opening=box.style.display!=='block';box.style.display=opening?'block':'none';btn.textContent=opening?`Hinweis ${i+1} ausblenden`:`Hinweis ${i+1} anzeigen`;if(opening){const st=taskState(id);st.hints+=1;saveState()}}
function selectedValues(article){return [...article.querySelectorAll('input:checked')].map(x=>Number(x.value)).sort((a,b)=>a-b)}
function arraysEqual(a,b){return JSON.stringify(a)===JSON.stringify(b)}
function getMisconception(t,ans){if(t.misconceptionByAnswer&&t.type==='single'&&ans!=null)return t.misconceptionByAnswer[String(ans)]||t.misconception;return t.misconception}
function checkTask(id){const t=tasks.find(x=>x.id===id),article=document.getElementById(`task-${id}`),st=taskState(id);let ans,ok=false;
 if(t.type==='single'||t.type==='multi'){ans=selectedValues(article);if(t.type==='single')ans=ans.length?ans[0]:null;ok=t.type==='single'?ans===t.answer:arraysEqual(ans,[...t.answer].sort((a,b)=>a-b))}
 else if(t.type==='number'){const raw=article.querySelector('.number-input').value.trim().replace(',','.');ans=Number(raw);ok=raw!==''&&Number.isFinite(ans)&&Math.abs(ans-t.answer)<=Number(t.tolerance||0)}
 else if(t.type==='order'){ans=[...article.querySelectorAll('.order-item')].map(x=>Number(x.dataset.orig));ok=arraysEqual(ans,t.answer)}
 else if(t.type==='matrix'){ans=[...article.querySelectorAll('.matrix-cell[aria-pressed="true"]')].map(x=>x.dataset.pair).sort();ok=arraysEqual(ans,[...t.answer].sort())}
 else if(t.type==='match'){ans=[...article.querySelectorAll('[data-match-row]')].map(x=>x.value===''?null:Number(x.value));ok=arraysEqual(ans,t.answer)}
 else if(t.type==='grid'){ans=t.gridRows.map((_,ri)=>t.gridCols.map((_,ci)=>{const el=article.querySelector(`[data-grid-row="${ri}"][data-grid-col="${ci}"]`);return el?el.value:''}));ok=arraysEqual(ans,t.answer)}
 st.attempts+=1;st.lastAnswer=ans;if(ok)st.correct=true;const misconception=!ok?getMisconception(t,ans):null;if(misconception)state.errors[misconception]=(state.errors[misconception]||0)+1;const fb=article.querySelector('.feedback');fb.className=`feedback show ${ok?'good':'bad'}`;const body=ok?t.explanation:(t.retry||'Prüfe deine Antwort erneut.');const reveal=(!ok&&st.attempts>=2)?`<div class="solution-reveal"><button type="button" data-reveal>Erklärung anzeigen</button></div>`:'';fb.innerHTML=`<strong>${ok?'Richtig.':'Noch nicht richtig.'}</strong><div>${esc(body)}</div>${misconception?`<div class="misconception">Möglicher Denkfehler: ${esc(humanError(misconception))}</div>`:''}${reveal}`;const revealBtn=fb.querySelector('[data-reveal]');if(revealBtn)revealBtn.addEventListener('click',()=>revealExplanation(id,revealBtn));article.classList.toggle('done',st.correct);article.querySelector('.status').textContent=st.correct?'gelöst':`${st.attempts} Versuch${st.attempts===1?'':'e'}`;article.querySelector('.status').classList.toggle('good',st.correct);announce(`${t.title}: ${ok?'richtig':'noch nicht richtig'}`);saveState();renderNav();updateSectionCounts()}
function revealExplanation(id,btn){const t=tasks.find(x=>x.id===id),st=taskState(id),fb=document.querySelector(`#task-${id} .feedback`);if(!t||!fb)return;st.hints+=1;fb.innerHTML+=`<div class="hint" style="display:block;margin-top:10px"><strong>Erklärung:</strong> ${esc(t.explanation)}</div>`;btn.remove();saveState()}
function showPage(id,focus=true){if(!MODULE.sections.some(s=>s.id===id))id='start';current=id;document.querySelectorAll('.page').forEach(p=>p.classList.toggle('active',p.dataset.page===id));document.querySelectorAll('.nav button').forEach(b=>{const active=b.dataset.page===id;b.setAttribute('aria-current',active?'page':'false')});if(id==='result'){const old=document.getElementById('page-result');old.innerHTML=renderResult();bindPageButtons()}saveState();if(focus){window.scrollTo({top:0,behavior:'smooth'});document.getElementById('main').focus()}}
function updateSectionCounts(){MODULE.sections.forEach(s=>{const ts=sectionTasks(s.id);if(!ts.length)return;const page=document.getElementById(`page-${s.id}`);if(!page)return;const el=page.querySelector('.section-count');if(el){const d=ts.filter(t=>taskState(t.id).correct).length;el.textContent=`${d} von ${ts.length} gelöst`}})}
function updateProgress(){const done=tasks.filter(t=>taskState(t.id).correct).length,pct=tasks.length?Math.round(done/tasks.length*100):0;document.getElementById('progressText').textContent=`${done} / ${tasks.length}`;document.getElementById('progressBar').style.width=`${pct}%`;document.querySelector('.progress').setAttribute('aria-valuenow',String(pct))}
function exportState(){const blob=new Blob([JSON.stringify({schema:'m11a-application-trainer-progress',module:MODULE.id,exportedAt:new Date().toISOString(),state},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='m11a_anwendungstrainer_05_lernstand.json';a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}
function importState(file){const reader=new FileReader();reader.onload=()=>{try{const obj=JSON.parse(reader.result);const incoming=obj.state||obj;if(!incoming.tasks)throw new Error('Ungültiges Format');state=incoming;state.version=MODULE.version;current=state.current||'start';saveState();renderNav();renderPages();showPage(current);announce('Lernstand importiert')}catch(e){alert('Die Datei konnte nicht als Lernstand importiert werden.')}};reader.readAsText(file)}
function resetState(){if(!confirm('Soll der gesamte Lernstand dieses Moduls gelöscht werden?'))return;state=defaultState();current='start';try{localStorage.removeItem(MODULE.id)}catch(e){}renderNav();renderPages();showPage('start');announce('Lernstand zurückgesetzt')}
document.getElementById('exportBtn').addEventListener('click',exportState);document.getElementById('importBtn').addEventListener('click',()=>document.getElementById('importFile').click());document.getElementById('importFile').addEventListener('change',e=>{if(e.target.files[0])importState(e.target.files[0]);e.target.value=''});document.getElementById('resetBtn').addEventListener('click',resetState);
window.__TRAINER__={MODULE,tasks,taskState,checkTask,showPage};
renderNav();renderPages();updateProgress();showPage(current,false);
</script>
</body>
