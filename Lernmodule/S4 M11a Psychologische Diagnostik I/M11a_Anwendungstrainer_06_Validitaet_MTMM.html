function renderPages(){const root=document.getElementById('pages');root.innerHTML='';MODULE.sections.forEach((s,idx)=>{const page=document.createElement('section');page.className='page';page.id=`page-${s.id}`;page.dataset.page=s.id;if(s.intro)page.innerHTML=renderStart();else if(s.result)page.innerHTML=renderResult();else page.innerHTML=renderSection(s,idx);root.appendChild(page)});bindTaskEvents();bindPageButtons()}
function renderStart(){return `<div class="hero"><div class="eyebrow">Interaktives Validitätslabor · einzeln überarbeitete Fassung</div><h1>Validität und MTMM</h1><p class="lead">Du entwickelst aus einer Testaussage prüfbare Evidenz, berechnest Minderung und Korrektur, liest MTMM-Matrizen zellgenau und formulierst ein begrenztes Validitätsurteil. Die Originalmatrix aus Aufgabenblatt 5 wird aktiv ausgewertet; rechnerische Quellenabweichungen werden transparent statt still behandelt.</p><div class="pill-row"><span class="pill">${tasks.length} Aufgaben</span><span class="pill">9 Lernbereiche</span><span class="pill">Basis → Standard → Transfer</span><span class="pill">offline nutzbar</span></div><button class="btn btn-primary" data-goto="question">Training starten</button></div><div class="grid" style="margin-top:18px"><div class="card"><h3>Evidenz statt Etikett</h3><p>Du lernst, eine konkrete Interpretation mit Inhalts-, Kriterien- und Konstruktevidenz zu verbinden, ohne aus einem Einzelbefund ein universelles Gütesiegel abzuleiten.</p></div><div class="card"><h3>Aktives Matrixlesen</h3><p>MTHM-, HTMM- und HTHM-Zellen werden markiert und verglichen. Die Big-Five-Matrix wird nicht durch eine vorweggenommene Musterlösung ersetzt.</p></div><div class="card"><h3>Quellenkritische Rechnung</h3><p>Eine rechnerische Abweichung zwischen den sichtbaren Matrixwerten und der PDF-Lösung wird erst in der zugehörigen Aufgabe eigenständig berechnet und anschließend transparent aufgearbeitet.</p></div></div>`}
function renderSection(s,idx){const ts=sectionTasks(s.id);const done=ts.filter(t=>taskState(t.id).correct).length;return `<div class="section-head"><div><div class="eyebrow">Lernbereich ${idx} · ${esc(s.level||'')}</div><h2>${esc(s.title)}</h2></div><div class="section-count">${done} von ${ts.length} gelöst</div></div><details class="card theory"><summary>Kompakte fachliche Grundlage</summary><p>${esc(s.theory)}</p></details><div class="task-list">${ts.map(renderTask).join('')}</div>${renderFooter(idx)}`}
function renderTask(t){const st=taskState(t.id);const source=t.source?`<span class="source">${esc(t.source)}</span>`:'';const prompt=t.promptHtml||esc(t.prompt||'');return `<article class="task ${st.correct?'done':''}" id="task-${t.id}" data-task="${t.id}"><div class="task-head"><div><div class="task-kicker">${taskTypeLabel(t.type)}<span class="level-badge">${esc(t.level||'Standard')}</span></div><div class="task-title">${esc(t.title)}</div>${source}</div><span class="status ${st.correct?'good':''}">${st.correct?'gelöst':st.attempts?`${st.attempts} Versuch${st.attempts===1?'':'e'}`:'offen'}</span></div><div class="prompt">${prompt}</div>${renderInput(t,st)}<div class="hint-box">${(t.hints||[]).map((h,i)=>`<button type="button" data-hint="${i}">Hinweis ${i+1} anzeigen</button><div class="hint" id="hint-${t.id}-${i}">${esc(h)}</div>`).join('')}</div><div class="feedback" role="status"></div></article>`}
function taskTypeLabel(type){return ({single:'Einzelauswahl',multi:'Mehrfachauswahl',number:'Rechenaufgabe',order:'Reihenfolge',matrix:'Matrix markieren',match:'Zuordnung',grid:'Matrix ausfüllen'})[type]||'Aufgabe'}
function checkedAttr(st,i,type){if(st.lastAnswer==null)return '';if(type==='single')return st.lastAnswer===i?' checked':'';return Array.isArray(st.lastAnswer)&&st.lastAnswer.includes(i)?' checked':''}
function renderInput(t,st){
 if(t.type==='single'||t.type==='multi'){const inputType=t.type==='single'?'radio':'checkbox';return `<div class="options">${t.options.map((o,i)=>`<label class="option"><input type="${inputType}" name="${t.id}" value="${i}"${checkedAttr(st,i,t.type)}><span>${esc(o)}</span></label>`).join('')}</div><div class="answer-row"><button class="btn btn-primary" type="button" data-check>Antwort prüfen</button></div>`}
 if(t.type==='number'){const val=typeof st.lastAnswer==='number'?String(st.lastAnswer):'';return `<div class="answer-row"><label><span class="sr-only">Numerische Antwort</span><input class="number-input" type="text" inputmode="decimal" autocomplete="off" aria-label="Numerische Antwort" value="${esc(val)}"></label>${t.unit?`<span>${esc(t.unit)}</span>`:''}<button class="btn btn-primary" type="button" data-check>Antwort prüfen</button></div>`}
 if(t.type==='order'){const seq=Array.isArray(st.lastAnswer)?st.lastAnswer:(st.correct?t.answer:(t.start||t.items.map((_,i)=>i)));const arr=seq.map(orig=>({text:t.items[orig],orig}));return `<ol class="order-list">${arr.map((x,i)=>orderItem(t.id,x.text,x.orig,i)).join('')}</ol><div class="answer-row"><button class="btn btn-primary" type="button" data-check>Reihenfolge prüfen</button></div>`}
 if(t.type==='matrix')return renderMatrix(t,st);
 if(t.type==='match')return renderMatch(t,st);
 if(t.type==='grid')return renderGrid(t,st);
 return ''
}
function orderItem(id,text,orig,pos){return `<li class="order-item" data-orig="${orig}"><span><strong>${pos+1}.</strong> ${esc(text)}</span><span class="order-controls"><button type="button" data-move="up" aria-label="Schritt nach oben">↑</button><button type="button" data-move="down" aria-label="Schritt nach unten">↓</button></span></li>`}
function fmtNum(v){if(v===null||v===undefined||v==='')return '–';if(typeof v==='string')return v;if(v===1)return '1.00';const s=Number(v).toFixed(2);return s.replace(/^(-?)0\./,'$1.')}
function renderMatrix(t,st){const selected=new Set(Array.isArray(st.lastAnswer)?st.lastAnswer:[]);let rows='';for(let i=0;i<t.labels.length;i++){let cells=`<th scope="row">${esc(t.labels[i])}</th>`;for(let j=0;j<t.labels.length;j++){const key=`${Math.min(i,j)}-${Math.max(i,j)}`;const shown=fmtNum(t.values[i][j]);if(i===j){const diag=t.diagDisplay&&t.diagDisplay[i]!=null?t.diagDisplay[i]:shown;cells+=`<td class="diag ${diag==='–'?'diag-empty':''}">${esc(String(diag))}</td>`}else if(i<j)cells+=`<td><button type="button" class="matrix-cell" data-pair="${key}" aria-pressed="${selected.has(key)}" aria-label="${esc(t.labels[i])} mit ${esc(t.labels[j])}: ${esc(String(shown))}">${esc(String(shown))}</button></td>`;else cells+=`<td class="mirror">${esc(String(shown))}</td>`}rows+=`<tr>${cells}</tr>`}return `<div class="matrix-wrap"><table class="matrix-table"><caption>${esc(t.caption||'Symmetrische Matrix; auswählbar ist das obere Dreieck')}</caption><thead><tr><th></th>${t.labels.map(x=>`<th scope="col">${esc(x)}</th>`).join('')}</tr></thead><tbody>${rows}</tbody></table></div>${t.legend?`<div class="matrix-key">${t.legend}</div>`:''}<div class="answer-row"><button class="btn btn-primary" type="button" data-check>Markierung prüfen</button></div>`}
function renderMatch(t,st){const ans=Array.isArray(st.lastAnswer)?st.lastAnswer:[];const rows=t.rows.map((r,i)=>`<tr><th scope="row">${esc(r)}</th><td><select data-match-row="${i}" aria-label="Kategorie für ${esc(r)}"><option value="">Bitte wählen</option>${t.options.map((o,j)=>`<option value="${j}"${ans[i]===j?' selected':''}>${esc(o)}</option>`).join('')}</select></td></tr>`).join('');return `<table class="match-table"><thead><tr><th>Wert</th><th>Kategorie</th></tr></thead><tbody>${rows}</tbody></table><div class="answer-row"><button class="btn btn-primary" type="button" data-check>Zuordnung prüfen</button></div>`}

function renderGrid(t,st){const ans=Array.isArray(st.lastAnswer)?st.lastAnswer:[];const rows=t.gridRows.map((r,ri)=>`<tr><th scope="row">${esc(r)}</th>${t.gridCols.map((c,ci)=>{const val=ans[ri]&&ans[ri][ci]!=null?ans[ri][ci]:'';return `<td><select data-grid-row="${ri}" data-grid-col="${ci}" aria-label="${esc(r)}, ${String(c).replace(/<[^>]+>/g,'')}"><option value="">–</option>${t.choices.map(o=>`<option value="${esc(o)}"${val===o?' selected':''}>${esc(o)}</option>`).join('')}</select></td>`}).join('')}</tr>`).join('');return `<div class="matrix-wrap"><table class="grid-table"><caption>Qualitative Fehlerquellenmatrix – alle Felder selbst ausfüllen</caption><thead><tr><th scope="col">Fehlerquelle</th>${t.gridCols.map(c=>`<th scope="col">${c}</th>`).join('')}</tr></thead><tbody>${rows}</tbody></table></div><div class="grid-legend">0 = nicht oder kaum wirksam · + = wirksam · ++ = sehr stark · Übergänge: 0/+ und +/++</div><div class="answer-row"><button class="btn btn-primary" type="button" data-check>Matrix prüfen</button></div>`}
function renderFooter(idx){const prev=MODULE.sections[idx-1],next=MODULE.sections[idx+1];return `<div class="footer-nav">${prev?`<button class="btn" data-goto="${prev.id}">← ${esc(prev.nav)}</button>`:'<span></span>'}${next?`<button class="btn btn-primary" data-goto="${next.id}">${esc(next.nav)} →</button>`:''}</div>`}
function renderResult(){const done=tasks.filter(t=>taskState(t.id).correct).length;const attempts=tasks.reduce((a,t)=>a+taskState(t.id).attempts,0);const hints=tasks.reduce((a,t)=>a+taskState(t.id).hints,0);const errs=Object.entries(state.errors).sort((a,b)=>b[1]-a[1]);return `<div class="section-head"><div><div class="eyebrow">Auswertung</div><h2>Lernstand und Fehlkonzeptprofil</h2></div></div><div class="dashboard"><div class="metric"><span>Gelöste Aufgaben</span><b>${done}/${tasks.length}</b></div><div class="metric"><span>Abgaben</span><b>${attempts}</b></div><div class="metric"><span>Genutzte Hinweise</span><b>${hints}</b></div><div class="metric"><span>Kompetenzabdeckung</span><b>${tasks.length?Math.round(done/tasks.length*100):0}%</b></div></div><div class="card"><h3>Bereiche</h3>${MODULE.sections.filter(s=>sectionTasks(s.id).length).map(s=>{const ts=sectionTasks(s.id),d=ts.filter(t=>taskState(t.id).correct).length;return `<div class="error-item"><span>${esc(s.nav)} – ${esc(s.title)}</span><strong>${d}/${ts.length}</strong></div>`}).join('')}</div><div class="card" style="margin-top:16px"><h3>Wiederkehrende Fehlkonzepte</h3>${errs.length?`<div class="error-list">${errs.map(([e,n])=>`<div class="error-item"><span>${esc(humanError(e))}</span><strong>${n}×</strong></div>`).join('')}</div>`:'<p>Noch keine klassifizierten Fehlversuche.</p>'}</div><div class="callout"><strong>Beherrschungskriterium:</strong> Du kannst eine Validitätsfrage präzisieren, Inhalts- und Kriterienbezüge unterscheiden, Minderung in beide Richtungen rechnen, Reliabilitätsgrenzen prüfen, MTMM-Zelltypen sicher klassifizieren und aus einem gemischten Muster ein kontextgebundenes Urteil ableiten.</div><div class="footer-nav"><button class="btn" data-goto="mastery">← Abschlussfall</button><button class="btn btn-primary" data-goto="question">Training wiederholen</button></div>`}
function humanError(e){return ({"korrelation_vor_validitaetsfrage": "Korrelation berechnet, bevor die beanspruchte Testaussage und Validitätshypothese geklärt wurden", "validitaetsarten_vertauscht": "Inhalts-, Kriterien-, Konstrukt- oder Augenscheinevidenz verwechselt", "validitaet_als_pauschales_testsiegel": "Validität pauschal als kontextfreies Gütesiegel des Tests behandelt", "signifikanz_als_validitaetsbeweis": "Statistische Signifikanz als vollständigen Validitätsbeweis interpretiert", "reliabilitaet_als_validitaetsbeweis": "Hohe Reliabilität als hinreichenden Validitätsbeweis behandelt", "konstruktion_garantiert_validitaet": "Aus formaler Testkonstruktion automatisch auf die intendierte Bedeutung der Testwerte geschlossen", "itemuniversum_auf_verstaendlichkeit_reduziert": "Inhaltsvalidität auf Verständlichkeit oder Augenschein reduziert", "face_mit_inhalt_verwechselt": "Augenscheinvalidität mit systematischer Inhaltsrepräsentation verwechselt", "kriteriumsdesign_vertauscht": "Retrogrades, konkurrentes und prädiktives Validierungsdesign vertauscht", "korrelation_nicht_quadriert": "Korrelation statt ihres Quadrats als erklärte Varianz verwendet", "minderung_vorwaerts_falsch": "Beobachtete Validität aus korrigierter Beziehung und Reliabilitäten falsch berechnet", "minderung_rueckwaerts_falsch": "Doppelte Minderungskorrektur falsch berechnet", "einfache_und_doppelte_korrektur_vertauscht": "Einfache und doppelte Minderungskorrektur verwechselt", "reliabilitaetsindex_falsch": "Reliabilitätsindex nicht als Quadratwurzel der Reliabilität bestimmt", "reliabilitaetsgrenze_ignoriert": "Theoretische Obergrenze einer Validitätskorrelation durch den Reliabilitätsindex übersehen", "konstrukt_evidenz_vertauscht": "Konvergente, diskriminante und faktorielle Evidenz verwechselt", "vorzeichen_im_netzwerk_falsch": "Theoretisch erwartete Richtung einer Konstruktbeziehung falsch angegeben", "negative_korrelation_nicht_als_konvergenz": "Starke erwartete negative Beziehung fälschlich als fehlende Konvergenz behandelt", "konstruktvaliditaet_posthoc": "Konstruktvalidität ohne vorab formulierte theoretische Vorhersagen nachträglich gedeutet", "mtmm_abkuerzungen_vertauscht": "MTHM, HTMM und HTHM verwechselt", "mthm_zellen_falsch": "Konvergente Mono-Trait-Hetero-Method-Zellen falsch markiert", "mtmm_zelltypen_vertauscht": "Merkmal- und Methodengleichheit bei der Zellklassifikation verwechselt", "campbell_fiske_regeln_falsch": "Relative MTMM-Forderungen durch eine Forderung nach überall exakt null ersetzt", "originalmatrix_mthm_falsch": "MTHM-Zellen der Big-Five-Originalmatrix falsch markiert", "mthm_mittelwert_falsch": "Mittelwert der fünf sichtbaren MTHM-Werte falsch berechnet oder die Quellenangabe ungeprüft übernommen", "positivwert_mit_betrag_verwechselt": "Größten positiven Korrelationswert mit größtem Korrelationsbetrag verwechselt", "originalmatrix_ueberinterpretiert": "Günstiges MTMM-Muster als universellen Validitätsbeweis oder fehlende Alpha-Werte als Nullreliabilität behandelt", "methodeneffekt_nicht_erkannt": "Hohe Heterotrait-Beziehung innerhalb derselben Methode nicht als möglichen Methoden- oder Abgrenzungsbefund erkannt", "methodeneffekt_durch_loeschen": "Auffälligen Methodenbefund gelöscht statt durch zusätzliche Methoden und Vergleiche untersucht", "einzelitem_alpha_falsch": "Cronbachs Alpha fälschlich für ein einzelnes Item bestimmt oder fehlenden Alpha-Wert als Null interpretiert", "reliabilitaet_erfunden": "Unbekannte Einzelitem-Reliabilität durch einen willkürlichen Wert ersetzt", "abschluss_minderung_falsch": "Minderungskorrektur im Abschlussfall falsch berechnet", "abschluss_methodeneffekt_falsch": "Problematische Selbstbericht-Heterotrait-Beziehung im Abschlussfall nicht erkannt", "abschluss_evidenz_einseitig": "Gemischte Validitätsevidenz nur positiv oder nur negativ zusammengefasst", "abschluss_uebergeneralisiert": "Vorläufige Evidenz auf ungeprüfte Zwecke und Einzelentscheidungen übertragen", "abschluss_schwarzweiss": "Eine problematische Zelle als vollständige Widerlegung des gesamten Verfahrens behandelt", "korrektur_als_alleiniger_beweis": "Minderungskorrigierten Koeffizienten als alleinigen Validitätsbeweis verwendet"})[e]||String(e).replaceAll('_',' ')}
function bindTaskEvents(){document.querySelectorAll('[data-task]').forEach(el=>{el.querySelectorAll('[data-check]').forEach(b=>b.addEventListener('click',()=>checkTask(el.dataset.task)));el.querySelectorAll('[data-hint]').forEach(b=>b.addEventListener('click',()=>showHint(el.dataset.task,Number(b.dataset.hint),b)));el.querySelectorAll('[data-move]').forEach(b=>b.addEventListener('click',()=>moveOrder(b)));el.querySelectorAll('.matrix-cell').forEach(b=>b.addEventListener('click',()=>{b.setAttribute('aria-pressed',b.getAttribute('aria-pressed')!=='true')}))})}
function bindPageButtons(){document.querySelectorAll('[data-goto]').forEach(b=>b.addEventListener('click',()=>showPage(b.dataset.goto)))}
function moveOrder(btn){const li=btn.closest('li'),list=li.parentElement;if(btn.dataset.move==='up'&&li.previousElementSibling)list.insertBefore(li,li.previousElementSibling);if(btn.dataset.move==='down'&&li.nextElementSibling)list.insertBefore(li.nextElementSibling,li);[...list.children].forEach((x,i)=>x.querySelector('strong').textContent=`${i+1}.`)}
function showHint(id,i,btn){const box=document.getElementById(`hint-${id}-${i}`);if(!box)return;const opening=box.style.display!=='block';box.style.display=opening?'block':'none';btn.textContent=opening?`Hinweis ${i+1} ausblenden`:`Hinweis ${i+1} anzeigen`;if(opening){const st=taskState(id);st.hints+=1;saveState()}}
function selectedValues(article){return [...article.querySelectorAll('input:checked')].map(x=>Number(x.value)).sort((a,b)=>a-b)}
function arraysEqual(a,b){return JSON.stringify(a)===JSON.stringify(b)}
function getMisconception(t,ans){if(t.misconceptionByAnswer&&t.type==='single'&&ans!=null)return t.misconceptionByAnswer[String(ans)]||t.misconception;return t.misconception}
function checkTask(id){const t=tasks.find(x=>x.id===id),article=document.getElementById(`task-${id}`),st=taskState(id);let ans,ok=false;
 if(t.type==='single'||t.type==='multi'){ans=selectedValues(article);if(t.type==='single')ans=ans.length?ans[0]:null;ok=t.type==='single'?ans===t.answer:arraysEqual(ans,[...t.answer].sort((a,b)=>a-b))}
 else if(t.type==='number'){const raw=article.querySelector('.number-input').value.trim().replace(',','.');ans=Number(raw);ok=raw!==''&&Number.isFinite(ans)&&Math.abs(ans-t.answer)<=Number(t.tolerance||0)}
 else if(t.type==='order'){ans=[...article.querySelectorAll('.order-item')].map(x=>Number(x.dataset.orig));ok=arraysEqual(ans,t.answer)}
 else if(t.type==='matrix'){ans=[...article.querySelectorAll('.matrix-cell[aria-pressed="true"]')].map(x=>x.dataset.pair).sort();ok=arraysEqual(ans,[...t.answer].sort())}
 else if(t.type==='match'){ans=[...article.querySelectorAll('[data-match-row]')].map(x=>x.value===''?null:Number(x.value));ok=arraysEqual(ans,t.answer)}
 else if(t.type==='grid'){ans=t.gridRows.map((_,ri)=>t.gridCols.map((_,ci)=>{const el=article.querySelector(`[data-grid-row="${ri}"][data-grid-col="${ci}"]`);return el?el.value:''}));ok=arraysEqual(ans,t.answer)}
 st.attempts+=1;st.lastAnswer=ans;if(ok)st.correct=true;const misconception=!ok?getMisconception(t,ans):null;if(misconception)state.errors[misconception]=(state.errors[misconception]||0)+1;const fb=article.querySelector('.feedback');fb.className=`feedback show ${ok?'good':'bad'}`;const genericRetry=t.retry&&t.retry.startsWith('Prüfe zunächst, welche Validitätshypothese');const stagedHint=(t.hints&&t.hints.length)?t.hints[Math.min(st.attempts-1,t.hints.length-1)]:'Prüfe deine Antwort erneut und zerlege die Aufgabe in Einzelschritte.';const body=ok?t.explanation:((t.retry&&!genericRetry)?t.retry:stagedHint);const reveal=(!ok&&st.attempts>=2)?`<div class="solution-reveal"><button type="button" data-reveal>Erklärung anzeigen</button></div>`:'';fb.innerHTML=`<strong>${ok?'Richtig.':'Noch nicht richtig.'}</strong><div>${esc(body)}</div>${misconception?`<div class="misconception">Möglicher Denkfehler: ${esc(humanError(misconception))}</div>`:''}${reveal}`;const revealBtn=fb.querySelector('[data-reveal]');if(revealBtn)revealBtn.addEventListener('click',()=>revealExplanation(id,revealBtn));article.classList.toggle('done',st.correct);article.querySelector('.status').textContent=st.correct?'gelöst':`${st.attempts} Versuch${st.attempts===1?'':'e'}`;article.querySelector('.status').classList.toggle('good',st.correct);announce(`${t.title}: ${ok?'richtig':'noch nicht richtig'}`);saveState();renderNav();updateSectionCounts()}
function revealExplanation(id,btn){const t=tasks.find(x=>x.id===id),st=taskState(id),fb=document.querySelector(`#task-${id} .feedback`);if(!t||!fb)return;st.hints+=1;fb.innerHTML+=`<div class="hint" style="display:block;margin-top:10px"><strong>Erklärung:</strong> ${esc(t.explanation)}</div>`;btn.remove();saveState()}
function showPage(id,focus=true){if(!MODULE.sections.some(s=>s.id===id))id='start';current=id;document.querySelectorAll('.page').forEach(p=>p.classList.toggle('active',p.dataset.page===id));document.querySelectorAll('.nav button').forEach(b=>{const active=b.dataset.page===id;b.setAttribute('aria-current',active?'page':'false')});if(id==='result'){const old=document.getElementById('page-result');old.innerHTML=renderResult();bindPageButtons()}saveState();if(focus){window.scrollTo({top:0,behavior:'smooth'});document.getElementById('main').focus()}}
function updateSectionCounts(){MODULE.sections.forEach(s=>{const ts=sectionTasks(s.id);if(!ts.length)return;const page=document.getElementById(`page-${s.id}`);if(!page)return;const el=page.querySelector('.section-count');if(el){const d=ts.filter(t=>taskState(t.id).correct).length;el.textContent=`${d} von ${ts.length} gelöst`}})}
function updateProgress(){const done=tasks.filter(t=>taskState(t.id).correct).length,pct=tasks.length?Math.round(done/tasks.length*100):0;document.getElementById('progressText').textContent=`${done} / ${tasks.length}`;document.getElementById('progressBar').style.width=`${pct}%`;document.querySelector('.progress').setAttribute('aria-valuenow',String(pct))}
function exportState(){const blob=new Blob([JSON.stringify({schema:'m11a-application-trainer-progress',module:MODULE.id,exportedAt:new Date().toISOString(),state},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='m11a_anwendungstrainer_06_lernstand.json';a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}
function importState(file){const reader=new FileReader();reader.onload=()=>{try{const obj=JSON.parse(reader.result);const incoming=obj.state||obj;if(!incoming.tasks)throw new Error('Ungültiges Format');state=incoming;state.version=MODULE.version;current=state.current||'start';saveState();renderNav();renderPages();showPage(current);announce('Lernstand importiert')}catch(e){alert('Die Datei konnte nicht als Lernstand importiert werden.')}};reader.readAsText(file)}
function resetState(){if(!confirm('Soll der gesamte Lernstand dieses Moduls gelöscht werden?'))return;state=defaultState();current='start';try{localStorage.removeItem(MODULE.id)}catch(e){}renderNav();renderPages();showPage('start');announce('Lernstand zurückgesetzt')}
document.getElementById('exportBtn').addEventListener('click',exportState);document.getElementById('importBtn').addEventListener('click',()=>document.getElementById('importFile').click());document.getElementById('importFile').addEventListener('change',e=>{if(e.target.files[0])importState(e.target.files[0]);e.target.value=''});document.getElementById('resetBtn').addEventListener('click',resetState);
window.__TRAINER__={MODULE,tasks,taskState,checkTask,showPage};
renderNav();renderPages();updateProgress();showPage(current,false);
</script>
