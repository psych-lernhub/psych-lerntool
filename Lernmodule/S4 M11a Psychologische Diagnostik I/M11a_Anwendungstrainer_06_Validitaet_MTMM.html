<script>
'use strict';
const MODULE = {"id": "m11a-apptrainer-06-v2", "title": "Validität und MTMM", "version": "2.0.0", "sections": [{"id": "start", "nav": "Start", "title": "Validität als begründetes Evidenzurteil bearbeiten", "intro": true}, {"id": "question", "nav": "1 · Validitätsfrage", "title": "Von der beanspruchten Testaussage zur prüfbaren Evidenz gelangen", "level": "Basis", "theory": "Validität gibt an, ob und in welchem Ausmaß ein Test das misst, was er zu messen beansprucht. Sie wird durch die Konstruktion nicht automatisch sichergestellt. Die klassische Unterscheidung in Inhalts-, Kriteriums- und Konstruktvalidität bleibt für die Beurteilung nützlich, obwohl sie zunehmend durch eine einheitliche Validitätsauffassung ergänzt wird. Eine Analyse beginnt daher mit der konkreten Aussage, die über Testwerte gemacht werden soll."}, {"id": "contentcriterion", "nav": "2 · Inhalt & Kriterium", "title": "Inhaltsrepräsentation, Augenschein und zeitliche Kriteriumsdesigns unterscheiden", "level": "Basis", "theory": "Inhaltsvalidität betrifft die Repräsentativität der Items für das Itemuniversum. Expert*innen prüfen sowohl dessen Abgrenzung als auch die Auswahl und Formulierung der Items. Augenscheinvalidität bezeichnet dagegen den plausiblen Eindruck bei Testanwender*innen oder Testpersonen. Kriteriumsvalidität ist der Zusammenhang von Testwerten mit einem Außenkriterium; retrograde, konkurrente und prädiktive Designs unterscheiden sich durch die zeitliche Relation."}, {"id": "attenuation", "nav": "3 · Minderung", "title": "Aus einer reliabilitätskorrigierten Beziehung die beobachtbare Validität ableiten", "level": "Standard", "theory": "Unreliabilität in Test und Kriterium mindert die beobachtete Korrelation. Ist Val** die Beziehung unter angenommener perfekter Reliabilität, gilt Val = Val** · √Rel_x · √Rel_y. Die resultierende empirische Validität ist deshalb typischerweise kleiner als die korrigierte Beziehung. Die Rechnung ist eine modellbasierte Erwartung unter den Annahmen der Klassischen Testtheorie."}, {"id": "correction", "nav": "4 · Korrektur & Grenze", "title": "Minderungskorrektur, einfache Korrektur und Reliabilitätsindex korrekt verwenden", "level": "Standard", "theory": "Die doppelte Minderungskorrektur lautet Val** = Val / (√Rel_x · √Rel_y). Wird nur für die Unreliabilität des Tests oder nur für das Kriterium korrigiert, liegt eine einfache Minderungskorrektur vor. Der Reliabilitätsindex √Rel ist zugleich die theoretische Obergrenze der Korrelation beobachteter Testwerte mit einem perfekt reliablen Außenkriterium. Eine Korrektur verbessert keine Messung, sondern schätzt eine Beziehung unter Annahmen."}, {"id": "construct", "nav": "5 · Konstruktvalidität", "title": "Konvergente, diskriminante und faktorielle Vorhersagen aus einem nomologischen Netzwerk prüfen", "level": "Standard", "theory": "Konstruktvalidität wird durch empirische Vorhersagen geprüft: Ein Test sollte mit theoretisch verwandten Variablen positiv oder negativ zusammenhängen, mit theoretisch verschiedenen Variablen dagegen wenig oder gar nicht. Bestätigte Beziehungen zu verwandten Konstrukten liefern konvergente, geringe Beziehungen zu verschiedenen Konstrukten diskriminante Evidenz. Eine erwartungsgemäße Dimensionalität stützt die faktorielle Validität."}, {"id": "mtmmlogic", "nav": "6 · MTMM-Logik", "title": "MTHM-, HTMM- und HTHM-Zellen systematisch klassifizieren", "level": "Standard", "theory": "Eine Multi-Trait-Multi-Method-Matrix erfasst mindestens zwei Konstrukte mit mindestens zwei Methoden. Mono-Trait-Hetero-Method-Korrelationen (MTHM) verbinden dasselbe Merkmal über verschiedene Methoden. Hetero-Trait-Mono-Method-Korrelationen (HTMM) verbinden verschiedene Merkmale innerhalb derselben Methode; Hetero-Trait-Hetero-Method-Korrelationen (HTHM) verbinden verschiedene Merkmale über verschiedene Methoden. Campbell und Fiske fordern unter anderem positive MTHM-Werte, die höher als die beiden Heterotrait-Vergleichsklassen ausfallen."}, {"id": "bigfive", "nav": "7 · Originalmatrix", "title": "Die Big-Five-MTMM-Matrix aus Aufgabenblatt 5 aktiv und quellenkritisch auswerten", "level": "Transfer", "theory": "Die Matrix kombiniert fünf Big-Five-Merkmale, die jeweils durch ein Einzelitem und den NEO-FFI erfasst wurden. Die fünf korrespondierenden Beziehungen über Methoden sind die MTHM-Zellen. Für die Beurteilung werden sie mit HTHM- und HTMM-Beziehungen verglichen. Die Zahlen sollen direkt aus der Matrix berechnet werden; abweichende Rechenaussagen der Lösung werden nicht still übernommen."}, {"id": "methodsingle", "nav": "8 · Methode & Einzelitem", "title": "Methodenvarianz, Skalenrichtung und Grenzen von Einzelitems diagnostizieren", "level": "Transfer", "theory": "Hohe Beziehungen verschiedener Konstrukte innerhalb einer Methode können auf gemeinsame Methodenvarianz oder inhaltliche Überlappung hinweisen. Negative Korrelationen können theoretisch erwartete Konvergenz darstellen, wenn zwei Skalen entgegengesetzte Pole messen. Cronbachs Alpha setzt mehrere Items beziehungsweise Teilmessungen voraus und ist für ein einzelnes Item nicht berechenbar; eine fehlende Alpha-Angabe bedeutet daher weder Reliabilität null noch perfekte Reliabilität."}, {"id": "mastery", "nav": "9 · Abschlussfall", "title": "Ein gemischtes Validitätsmuster berechnen, diagnostizieren und begrenzt beurteilen", "level": "Transfer", "theory": "Der Abschlussfall verbindet eine beobachtete Kriteriumsvalidität mit Reliabilitäten und einer MTMM-Struktur. Eine belastbare Schlussfolgerung integriert konvergente und diskriminante Befunde, mögliche Methodenvarianz, die Grenzen der Minderungskorrektur und den konkreten Geltungsbereich. Weder eine einzelne hohe Korrelation noch eine problematische Zelle erlaubt ein pauschales Ja-oder-Nein-Urteil."}, {"id": "result", "nav": "Ergebnis", "title": "Lernstand und Fehlkonzeptprofil", "result": true}]};
const tasks = [{"id":"question-1","section":"question","type":"order","title":"Eine Validierung als Evidenzprozess planen","level":"Basis","prompt":"Bringe die Schritte in eine fachlich sinnvolle Reihenfolge.","items":["Beanspruchte Interpretation und Verwendung der Testwerte konkretisieren","Aus Theorie prüfbare Validitätshypothesen ableiten","Passende Evidenzarten, Methoden und Außenmaße auswählen","Reliabilität, Stichprobe und mögliche Methodenprobleme prüfen","Daten analysieren und Hypothesen mit den Befunden vergleichen","Alternative Erklärungen und Grenzen beurteilen","Ein kontextgebundenes Validitätsurteil formulieren"],"start":[4,1,6,0,3,5,2],"answer":[0,1,2,3,4,5,6],"hints":["Die Validierung beginnt mit der beanspruchten Interpretation und Verwendung der Testwerte, nicht mit einer beliebigen Korrelation.","Leite aus der zugrunde liegenden Theorie anschließend konkrete, prüfbare Validitätshypothesen ab.","Wähle erst für diese Hypothesen passende Evidenzarten, Methoden und Außenmaße aus.","Prüfe vor der inhaltlichen Deutung, ob Reliabilität, Stichprobe und Methodenprobleme die Befunde begrenzen können.","Analysiere dann die Daten und vergleiche das beobachtete Muster ausdrücklich mit den vorab formulierten Hypothesen.","Beurteile alternative Erklärungen und Grenzen, bevor du am Ende ein kontextgebundenes Validitätsurteil formulierst."],"explanation":"1. Zuerst werden beanspruchte Interpretation und Verwendung der Testwerte konkretisiert, weil Validität immer eine bestimmte Aussage und Nutzung betrifft. 2. Daraus werden theoretisch prüfbare Validitätshypothesen abgeleitet. 3. Für diese Hypothesen werden passende Evidenzarten, Methoden und Außenmaße ausgewählt. 4. Reliabilität, Stichprobe und mögliche Methodenprobleme werden geprüft, weil sie das beobachtete Muster begrenzen oder verzerren können. 5. Erst danach werden die Daten analysiert und die Befunde mit den vorab formulierten Hypothesen verglichen. 6. Abweichungen, Alternativerklärungen und Grenzen werden beurteilt, statt sie zu ignorieren. 7. Am Ende steht ein kontextgebundenes Validitätsurteil mit Zweck, Population und Geltungsgrenzen.","source":"PD07 Gütekriterien II, S. 2–3 und 32–34","misconception":"korrelation_vor_validitaetsfrage","retry":"Prüfe zunächst, welche Validitätshypothese, Matrixklasse oder Formel die Aufgabe tatsächlich verlangt. Nutze bei Bedarf einen Hinweis; die vollständige Erklärung wird nicht nach dem ersten Fehler offengelegt."},{"id":"question-2","section":"question","type":"match","title":"Klassische Evidenzarten unterscheiden","level":"Basis","prompt":"Ordne jede Leitfrage der passenden Evidenzart zu.","rows":["Repräsentieren die Items den definierten Inhaltsbereich?","Hängen Testwerte mit einem relevanten Außenkriterium zusammen?","Entspricht das Zusammenhangsmuster theoretischen Vorhersagen zum Konstrukt?","Wirkt der Test für Anwender*innen auf den ersten Blick plausibel?"],"options":["Inhaltsvalidität","Kriteriumsvalidität","Konstruktvalidität","Augenscheinvalidität"],"answer":[0,1,2,3],"hints":["Inhalt betrifft das Itemuniversum; Kriterium ein Außenmaß; Konstrukt ein theoretisches Beziehungsnetz.","Augenschein beschreibt einen plausiblen Eindruck und ist keine eigene der drei klassischen Hauptgruppen."],"explanation":"Die Frage nach der Repräsentation des definierten Inhaltsbereichs gehört zur Inhaltsvalidität. Der Zusammenhang mit einem relevanten Außenkriterium gehört zur Kriteriumsvalidität. Ein theoretisch vorhergesagtes Zusammenhangsmuster im nomologischen Netzwerk liefert Konstruktvaliditätsevidenz. Der bloße plausible Eindruck bei Anwender*innen beschreibt Augenscheinvalidität und ist von den drei klassischen Hauptgruppen abzugrenzen.","source":"PD07 Gütekriterien II, S. 3–6","misconception":"validitaetsarten_vertauscht","retry":"Prüfe zunächst, welche Validitätshypothese, Matrixklasse oder Formel die Aufgabe tatsächlich verlangt. Nutze bei Bedarf einen Hinweis; die vollständige Erklärung wird nicht nach dem ersten Fehler offengelegt."},{"id":"question-3","section":"question","type":"single","title":"Ein Validitätsurteil präzise begrenzen","level":"Basis","prompt":"Welche Formulierung ist fachlich am belastbarsten?","options":["Der Test ist valide.","Die Befunde stützen die Nutzung der Testwerte zur Vorhersage des Ausbildungserfolgs in der untersuchten Zielpopulation; eine Übertragung auf andere Zwecke ist damit nicht geprüft.","Ein signifikantes Ergebnis beweist, dass der Test exakt das intendierte Konstrukt misst.","Ein hoher Alpha-Wert macht eine weitere Validierung überflüssig."],"answer":1,"hints":["Nenne Zweck, Zielpopulation und Geltungsgrenze.","Weder statistische Signifikanz noch interne Konsistenz beantwortet allein die Validitätsfrage."],"explanation":"Ein gutes Urteil benennt die konkrete Interpretation und Anwendung sowie ihren empirisch geprüften Kontext. Ein pauschales Gütesiegel geht über die Evidenz hinaus.","source":"PD07 Gütekriterien II, S. 2–3 · quellennahe Transferformulierung","misconceptionByAnswer":{"0":"validitaet_als_pauschales_testsiegel","2":"signifikanz_als_validitaetsbeweis","3":"reliabilitaet_als_validitaetsbeweis"},"retry":"Prüfe zunächst, welche Validitätshypothese, Matrixklasse oder Formel die Aufgabe tatsächlich verlangt. Nutze bei Bedarf einen Hinweis; die vollständige Erklärung wird nicht nach dem ersten Fehler offengelegt."},{"id":"question-4","section":"question","type":"multi","title":"Warum Konstruktion Validität nicht garantiert","level":"Basis","prompt":"Welche Fälle zeigen, dass ein formal korrekt konstruierter Test dennoch etwas anderes oder Zusätzliches erfassen kann?","options":["Eine Raumvorstellungsaufgabe ist durch eine einfache Oberflächenstrategie lösbar.","Ein Konzentrationstest für jüngere Kinder setzt zugleich Rechenfertigkeiten voraus.","Ein Gewissenhaftigkeitsfragebogen in der Personalauswahl erfasst teilweise Impression Management.","Ein Test enthält eine standardisierte Instruktion.","Ein Fragebogen besitzt eine eindeutige Auswertungsregel."],"answer":[0,1,2],"hints":["Suche alternative Prozesse, die eine Testleistung erzeugen können.","Standardisierung und eindeutige Auswertung betreffen vor allem Objektivität, nicht automatisch die intendierte Bedeutung."],"explanation":"Strategien, Zusatzanforderungen und situationsabhängige Selbstdarstellung können die Interpretation der Testwerte verändern, obwohl der Test formal sauber aufgebaut ist.","source":"PD07 Gütekriterien II, S. 2","misconception":"konstruktion_garantiert_validitaet","retry":"Prüfe zunächst, welche Validitätshypothese, Matrixklasse oder Formel die Aufgabe tatsächlich verlangt. Nutze bei Bedarf einen Hinweis; die vollständige Erklärung wird nicht nach dem ersten Fehler offengelegt."},{"id":"content-1","section":"contentcriterion","type":"single","title":"Das Itemuniversum richtig nutzen","level":"Basis","promptHtml":"<figure class=\"universe\"><figcaption>Repräsentationsschluss bei Inhaltsvalidität</figcaption><div class=\"universe-flow\"><div class=\"universe-cloud\"><b>Itemuniversum</b><span>alle grundsätzlich geeigneten Aufgaben</span></div><div class=\"universe-arrow\"><span>Auswahlregel</span>→</div><div class=\"universe-test\"><b>Test</b><span>repräsentative Auswahl</span></div></div></figure><p>Welche Prüfung ist für Inhaltsvalidität zentral?</p>","options":["Nur ob die ausgewählten Items leicht verständlich wirken.","Ob das Itemuniversum das Merkmal angemessen abgrenzt und die Testitems dieses Universum repräsentativ sowie adäquat formuliert abdecken.","Ob der Test mit irgendeinem Außenmaß signifikant korreliert.","Ob alle Items möglichst hoch miteinander korrelieren."],"answer":1,"hints":["Es sind zwei Schlüsse zu prüfen: die Definition des Universums und die Auswahl daraus.","Hohe Interitem-Korrelationen können Inhaltsbreite sogar reduzieren."],"explanation":"Inhaltsvalidität verlangt eine begründete Abgrenzung des Itemuniversums und eine repräsentative, angemessen formulierte Auswahl von Items.","source":"PD07 Gütekriterien II, S. 4–5","misconception":"itemuniversum_auf_verstaendlichkeit_reduziert","retry":"Prüfe zunächst, welche Validitätshypothese, Matrixklasse oder Formel die Aufgabe tatsächlich verlangt. Nutze bei Bedarf einen Hinweis; die vollständige Erklärung wird nicht nach dem ersten Fehler offengelegt."},{"id":"content-2","section":"contentcriterion","type":"single","title":"Augenschein nicht mit Inhalt verwechseln","level":"Basis","prompt":"Testpersonen sagen: „Der Fragebogen sieht so aus, als würde er Teamfähigkeit messen.“ Was ist damit unmittelbar belegt?","options":["Hohe Inhaltsvalidität","Hohe prädiktive Validität","Allenfalls Augenscheinvalidität","Perfekte Konstruktvalidität"],"answer":2,"hints":["Die Aussage bezieht sich auf den Eindruck der Testpersonen.","Eine repräsentative Abdeckung des Itemuniversums wurde nicht geprüft."],"explanation":"Der plausible Eindruck betrifft Face Validity. Inhaltsvalidität erfordert eine systematische Begründung der Inhaltsrepräsentation.","source":"PD07 Gütekriterien II, S. 6","misconception":"face_mit_inhalt_verwechselt","retry":"Prüfe zunächst, welche Validitätshypothese, Matrixklasse oder Formel die Aufgabe tatsächlich verlangt. Nutze bei Bedarf einen Hinweis; die vollständige Erklärung wird nicht nach dem ersten Fehler offengelegt."},{"id":"content-3","section":"contentcriterion","type":"match","title":"Zeitliche Designs der Kriteriumsvalidität","level":"Basis","promptHtml":"<figure class=\"validity-timeline\"><figcaption>Zeitliche Relation von Test und Außenkriterium</figcaption><div class=\"time-track\"><span class=\"time-point\"><b>t−1</b><small>Kriterium vor Test</small></span><span class=\"time-point main\"><b>t0</b><small>Testzeitpunkt</small></span><span class=\"time-point\"><b>t1</b><small>Kriterium nach Test</small></span></div><div class=\"time-labels\"><span>retrograd</span><span>konkurrent</span><span>prädiktiv</span></div></figure><p>Ordne die drei Designs zu.</p>","rows":["Der Test soll eine bereits vorliegende Schulnote erklären.","Test und Vorgesetztenbeurteilung werden in derselben Woche erhoben.","Ein Auswahltest soll die Leistung nach einem Jahr vorhersagen."],"options":["retrograde Validität","konkurrente Validität","prädiktive Validität"],"answer":[0,1,2],"hints":["Prädiktiv: der Test liegt zeitlich vor dem Kriterium.","Retrograd: das Kriterium liegt bereits in der Vergangenheit."],"explanation":"Eine bereits vor dem Test vorliegende Schulnote ist ein retrogrades Kriterium. Werden Test und Vorgesetztenbeurteilung ungefähr gleichzeitig erhoben, handelt es sich um konkurrente Validität. Soll der heutige Auswahltest die Leistung nach einem Jahr vorhersagen, liegt prädiktive Validität vor. Entscheidend ist jeweils die zeitliche Position des Außenkriteriums relativ zum Test.","source":"PD07 Gütekriterien II, S. 7","misconception":"kriteriumsdesign_vertauscht","retry":"Prüfe zunächst, welche Validitätshypothese, Matrixklasse oder Formel die Aufgabe tatsächlich verlangt. Nutze bei Bedarf einen Hinweis; die vollständige Erklärung wird nicht nach dem ersten Fehler offengelegt."},{"id":"content-4","section":"contentcriterion","type":"number","title":"Aufgeklärte Kriteriumsvarianz berechnen","level":"Basis","prompt":"Ein Test korreliert mit einem Außenkriterium zu r = .46. Wie viel Prozent der Kriteriumsvarianz werden durch den linearen Zusammenhang aufgeklärt? Runde auf eine Dezimalstelle.","answer":21.2,"tolerance":0.05,"unit":"%","hints":["Quadriere die Korrelation.","0,46² = 0,2116; multipliziere anschließend mit 100."],"explanation":"r² = .2116. Das entspricht rund 21,2 % aufgeklärter Varianz; daraus folgt weder Kausalität noch eine vollständige Erklärung des Kriteriums.","source":"PD07 Gütekriterien II, S. 8","misconception":"korrelation_nicht_quadriert","retry":"Prüfe zunächst, welche Validitätshypothese, Matrixklasse oder Formel die Aufgabe tatsächlich verlangt. Nutze bei Bedarf einen Hinweis; die vollständige Erklärung wird nicht nach dem ersten Fehler offengelegt."},{"id":"attenuation-1","section":"attenuation","type":"number","title":"Empirische Validität – Fall 1","level":"Standard","promptHtml":"<div class=\"formula-card\"><div class=\"formula-main\">Val = Val** · √Relₓ · √Relᵧ</div><div class=\"formula-note\">Gesucht ist die unter Messfehler erwartete beobachtete Korrelation.</div></div><p>Val** = 0.65, Relₓ = 0.80, Relᵧ = 0.60. Berechne Val und runde auf drei Dezimalstellen.</p>","answer":0.45,"tolerance":0.004,"hints":["Ziehe zuerst die beiden Quadratwurzeln und multipliziere anschließend alle drei Faktoren.","√0.80 ≈ 0.894; √0.60 ≈ 0.775."],"explanation":"Val = 0.65 · √0.80 · √0.60 ≈ 0.450. Unreliabilität mindert die beobachtete Beziehung.","source":"Lösungen Aufgabenblatt 5, S. 1","misconception":"minderung_vorwaerts_falsch","retry":"Prüfe zunächst, welche Validitätshypothese, Matrixklasse oder Formel die Aufgabe tatsächlich verlangt. Nutze bei Bedarf einen Hinweis; die vollständige Erklärung wird nicht nach dem ersten Fehler offengelegt."},{"id":"attenuation-2","section":"attenuation","type":"number","title":"Empirische Validität – Fall 2","level":"Standard","promptHtml":"<div class=\"formula-card\"><div class=\"formula-main\">Val = Val** · √Relₓ · √Relᵧ</div><div class=\"formula-note\">Gesucht ist die unter Messfehler erwartete beobachtete Korrelation.</div></div><p>Val** = 0.72, Relₓ = 0.81, Relᵧ = 0.64. Berechne Val und runde auf drei Dezimalstellen.</p>","answer":0.518,"tolerance":0.004,"hints":["Ziehe zuerst die beiden Quadratwurzeln und multipliziere anschließend alle drei Faktoren.","√0.81 ≈ 0.900; √0.64 ≈ 0.800."],"explanation":"Val = 0.72 · √0.81 · √0.64 ≈ 0.518. Unreliabilität mindert die beobachtete Beziehung.","source":"PD07 Gütekriterien II, S. 30 · neuer Transferfall","misconception":"minderung_vorwaerts_falsch","retry":"Prüfe zunächst, welche Validitätshypothese, Matrixklasse oder Formel die Aufgabe tatsächlich verlangt. Nutze bei Bedarf einen Hinweis; die vollständige Erklärung wird nicht nach dem ersten Fehler offengelegt."},{"id":"attenuation-3","section":"attenuation","type":"number","title":"Empirische Validität – Fall 3","level":"Standard","promptHtml":"<div class=\"formula-card\"><div class=\"formula-main\">Val = Val** · √Relₓ · √Relᵧ</div><div class=\"formula-note\">Gesucht ist die unter Messfehler erwartete beobachtete Korrelation.</div></div><p>Val** = 0.50, Relₓ = 0.90, Relᵧ = 0.90. Berechne Val und runde auf drei Dezimalstellen.</p>","answer":0.45,"tolerance":0.004,"hints":["Ziehe zuerst die beiden Quadratwurzeln und multipliziere anschließend alle drei Faktoren.","√0.90 ≈ 0.949; √0.90 ≈ 0.949."],"explanation":"Val = 0.50 · √0.90 · √0.90 ≈ 0.450. Unreliabilität mindert die beobachtete Beziehung.","source":"PD07 Gütekriterien II, S. 30 · neuer Transferfall","misconception":"minderung_vorwaerts_falsch","retry":"Prüfe zunächst, welche Validitätshypothese, Matrixklasse oder Formel die Aufgabe tatsächlich verlangt. Nutze bei Bedarf einen Hinweis; die vollständige Erklärung wird nicht nach dem ersten Fehler offengelegt."},{"id":"attenuation-4","section":"attenuation","type":"number","title":"Empirische Validität – Fall 4","level":"Standard","promptHtml":"<div class=\"formula-card\"><div class=\"formula-main\">Val = Val** · √Relₓ · √Relᵧ</div><div class=\"formula-note\">Gesucht ist die unter Messfehler erwartete beobachtete Korrelation.</div></div><p>Val** = 0.80, Relₓ = 0.49, Relᵧ = 0.81. Berechne Val und runde auf drei Dezimalstellen.</p>","answer":0.504,"tolerance":0.004,"hints":["Ziehe zuerst die beiden Quadratwurzeln und multipliziere anschließend alle drei Faktoren.","√0.49 ≈ 0.700; √0.81 ≈ 0.900."],"explanation":"Val = 0.80 · √0.49 · √0.81 ≈ 0.504. Unreliabilität mindert die beobachtete Beziehung.","source":"PD07 Gütekriterien II, S. 30 · neuer Transferfall","misconception":"minderung_vorwaerts_falsch","retry":"Prüfe zunächst, welche Validitätshypothese, Matrixklasse oder Formel die Aufgabe tatsächlich verlangt. Nutze bei Bedarf einen Hinweis; die vollständige Erklärung wird nicht nach dem ersten Fehler offengelegt."},{"id":"correction-1","section":"correction","type":"number","title":"Doppelte Minderungskorrektur","level":"Standard","promptHtml":"<div class=\"formula-card\"><div class=\"formula-main\">Val** = Val / (√Relₓ · √Relᵧ)</div><div class=\"formula-note\">Beide Messungen werden auf angenommene perfekte Reliabilität korrigiert.</div></div><p>Beobachtet wird Val = .36; Relₓ = .64 und Relᵧ = .81. Berechne Val**.</p>","answer":0.5,"tolerance":0.004,"hints":["√.64 = .80 und √.81 = .90.","Dividiere .36 durch .80 · .90."],"explanation":".36 / (.80 · .90) = .50. Der Wert ist eine reliabilitätskorrigierte Schätzung und keine verbesserte empirische Messung.","source":"PD07 Gütekriterien II, S. 30","misconception":"minderung_rueckwaerts_falsch","retry":"Prüfe zunächst, welche Validitätshypothese, Matrixklasse oder Formel die Aufgabe tatsächlich verlangt. Nutze bei Bedarf einen Hinweis; die vollständige Erklärung wird nicht nach dem ersten Fehler offengelegt."},{"id":"correction-2","section":"correction","type":"number","title":"Einfache Minderungskorrektur","level":"Standard","prompt":"Ein Test korreliert zu .42 mit einem als perfekt reliabel angenommenen Kriterium. Die Testreliabilität beträgt .49. Korrigiere nur für die Unreliabilität des Tests.","answer":0.6,"tolerance":0.004,"hints":["Bei der einfachen Korrektur wird nur durch eine Quadratwurzel geteilt.","√.49 = .70."],"explanation":".42 / √.49 = .42 / .70 = .60.","source":"PD07 Gütekriterien II, S. 30","misconception":"einfache_und_doppelte_korrektur_vertauscht","retry":"Prüfe zunächst, welche Validitätshypothese, Matrixklasse oder Formel die Aufgabe tatsächlich verlangt. Nutze bei Bedarf einen Hinweis; die vollständige Erklärung wird nicht nach dem ersten Fehler offengelegt."},{"id":"correction-3","section":"correction","type":"number","title":"Reliabilitätsindex bestimmen","level":"Standard","prompt":"Ein Test hat Rel = .64. Bestimme den Reliabilitätsindex √Rel.","answer":0.8,"tolerance":0.001,"hints":["Der Reliabilitätsindex ist die Quadratwurzel aus dem Reliabilitätskoeffizienten.","Er entspricht unter der KTT der Korrelation beobachteter und wahrer Werte."],"explanation":"√.64 = .80. Dieser Wert ist zugleich die theoretische Obergrenze der Korrelation mit einem perfekt reliablen Außenkriterium.","source":"PD07 Gütekriterien II, S. 31","misconception":"reliabilitaetsindex_falsch","retry":"Prüfe zunächst, welche Validitätshypothese, Matrixklasse oder Formel die Aufgabe tatsächlich verlangt. Nutze bei Bedarf einen Hinweis; die vollständige Erklärung wird nicht nach dem ersten Fehler offengelegt."},{"id":"correction-4","section":"correction","type":"single","title":"Theoretische Obergrenze prüfen","level":"Standard","prompt":"Welcher populationsbezogene Befund wäre unter der KTT-Annahme eines perfekt reliablen Kriteriums mit Relₓ = .49 nicht vereinbar?","options":["Val = .48","Val = −.55","Val = .69","Val = .74"],"answer":3,"hints":["Die Betragsobergrenze ist √.49 = .70.","Vergleiche den Betrag jeder Korrelation mit .70."],"explanation":"Bei Relₓ = .49 ist |Val| ≤ .70. Ein populationsbezogener Wert von .74 verletzt diese theoretische Grenze; in realen Stichproben wären zudem Schätzfehler und fehlerhafte Eingaben zu prüfen.","source":"PD07 Gütekriterien II, S. 31","misconception":"reliabilitaetsgrenze_ignoriert","retry":"Prüfe zunächst, welche Validitätshypothese, Matrixklasse oder Formel die Aufgabe tatsächlich verlangt. Nutze bei Bedarf einen Hinweis; die vollständige Erklärung wird nicht nach dem ersten Fehler offengelegt."},{"id":"construct-1","section":"construct","type":"match","title":"Evidenz im nomologischen Netzwerk klassifizieren","level":"Standard","prompt":"Ordne die Befunde der passenden Evidenzform zu.","rows":["Der neue Angsttest korreliert hoch mit einem etablierten Angsttest.","Der Angsttest korreliert nur gering mit Körpergröße.","Die erwartete zweidimensionale Struktur aus Sorge und Erregung wird bestätigt."],"options":["konvergente Evidenz","diskriminante Evidenz","faktorielle Evidenz"],"answer":[0,1,2],"hints":["Konvergenz betrifft erwartete Beziehungen, Diskriminanz erwartete Unabhängigkeit.","Faktorielle Evidenz prüft die postulierte Dimensionalität."],"explanation":"Die hohe Korrelation des neuen Angsttests mit einem etablierten Angsttest ist konvergente Evidenz, weil zwei Messungen desselben beziehungsweise eines eng verwandten Konstrukts zusammenhängen. Die geringe Korrelation mit Körpergröße ist diskriminante Evidenz, weil ein theoretisch fremdes Merkmal kaum zusammenhängt. Die bestätigte Zweidimensionalität aus Sorge und Erregung ist faktorielle Evidenz, weil die postulierte innere Struktur des Konstrukts geprüft wird.","source":"PD07 Gütekriterien II, S. 32–34","misconception":"konstrukt_evidenz_vertauscht","retry":"Prüfe zunächst, welche Validitätshypothese, Matrixklasse oder Formel die Aufgabe tatsächlich verlangt. Nutze bei Bedarf einen Hinweis; die vollständige Erklärung wird nicht nach dem ersten Fehler offengelegt."},{"id":"construct-2","section":"construct","type":"match","title":"Vorzeichen eines Netzwerks vorhersagen","level":"Standard","promptHtml":"<figure class=\"nomological\"><figcaption>Beispiel eines prüfbaren nomologischen Netzwerks</figcaption><div class=\"network-grid\"><div class=\"node center\">Prüfungsangst</div><div class=\"node top\">Sorgen vor Prüfungen <b>+</b></div><div class=\"node left\">Gelassenheit <b>−</b></div><div class=\"node right\">Vermeidungsverhalten <b>+</b></div><div class=\"node bottom\">Körpergröße <b>0</b></div><span class=\"edge e1\"></span><span class=\"edge e2\"></span><span class=\"edge e3\"></span><span class=\"edge e4\"></span></div></figure><p>Ordne jeder Variable das erwartete Vorzeichen ihrer Beziehung zur Prüfungsangst zu.</p>","rows":["Sorgen vor Prüfungen","Gelassenheit","Vermeidungsverhalten","Körpergröße"],"options":["positiv","negativ","nahe null"],"answer":[0,1,0,2],"hints":["Konvergenz kann positiv oder negativ sein – entscheidend ist die theoretisch erwartete Richtung.","Körpergröße gehört nicht zum intendierten nomologischen Netzwerk."],"explanation":"Sorge und Vermeidung sollten positiv, Gelassenheit negativ und Körpergröße kaum mit Prüfungsangst zusammenhängen.","source":"PD07 Gütekriterien II, S. 32–33 · neuer Transferfall","misconception":"vorzeichen_im_netzwerk_falsch","retry":"Prüfe zunächst, welche Validitätshypothese, Matrixklasse oder Formel die Aufgabe tatsächlich verlangt. Nutze bei Bedarf einen Hinweis; die vollständige Erklärung wird nicht nach dem ersten Fehler offengelegt."},{"id":"construct-3","section":"construct","type":"single","title":"Negative Korrelation als Konvergenz erkennen","level":"Standard","prompt":"Ein Belastungstest korreliert mit einer Skala „psychische Erholung“ zu r = −.67. Beide Skalen sollen entgegengesetzte Pole desselben Merkmalsbereichs erfassen. Welche Interpretation ist am besten?","options":["Die negative Korrelation widerlegt Konvergenz.","Der starke negative Zusammenhang kann konvergente Evidenz in der theoretisch erwarteten Gegenrichtung darstellen.","Die Skalen sind automatisch diskriminant valide.","Nur positive Zusammenhänge können Teil eines nomologischen Netzwerks sein."],"answer":1,"hints":["Konvergente Validität verlangt eine erwartungsgemäße Beziehung, nicht zwingend ein positives Vorzeichen.","Prüfe, ob hohe Werte inhaltlich dieselbe oder die entgegengesetzte Richtung bedeuten."],"explanation":"Wenn die Skalen Gegenpole erfassen, ist eine starke negative Beziehung genau die erwartete konvergente Evidenz.","source":"PD07 Gütekriterien II, S. 32","misconception":"negative_korrelation_nicht_als_konvergenz","retry":"Prüfe zunächst, welche Validitätshypothese, Matrixklasse oder Formel die Aufgabe tatsächlich verlangt. Nutze bei Bedarf einen Hinweis; die vollständige Erklärung wird nicht nach dem ersten Fehler offengelegt."},{"id":"construct-4","section":"construct","type":"order","title":"Konstruktvalidität hypothesengeleitet prüfen","level":"Standard","prompt":"Bringe die Arbeitsschritte in eine sinnvolle Reihenfolge.","items":["Konstrukt und nomologisches Netzwerk präzisieren","Richtung und Stärke erwarteter Beziehungen vorab formulieren","Geeignete Vergleichskonstrukte und Methoden auswählen","Faktorielle, konvergente und diskriminante Befunde erheben","Befunde mit den Vorhersagen statt nur mit Nullhypothesen vergleichen","Abweichungen und alternative Erklärungen untersuchen"],"start":[3,0,5,2,1,4],"answer":[0,1,2,3,4,5],"hints":["Beginne mit einer präzisen Definition des Konstrukts und seines nomologischen Netzwerks.","Formuliere danach vorab Richtung und ungefähre Stärke der erwarteten Beziehungen; sonst wäre fast jedes Muster nachträglich deutbar.","Wähle erst auf Basis dieser Vorhersagen geeignete Vergleichskonstrukte und Methoden aus.","Erhebe anschließend faktorielle, konvergente und diskriminante Befunde und vergleiche sie mit den Vorhersagen statt nur mit Nullhypothesen.","Abweichungen und alternative Erklärungen werden im letzten Schritt diagnostisch untersucht, nicht gelöscht."],"explanation":"1. Zuerst werden Konstrukt und nomologisches Netzwerk präzisiert, damit klar ist, welche Beziehungen theoretisch relevant sind. 2. Dann werden Richtung und Stärke erwarteter Beziehungen vorab formuliert; das verhindert beliebige Post-hoc-Deutungen. 3. Danach werden geeignete Vergleichskonstrukte und Methoden ausgewählt, die diese Vorhersagen tatsächlich prüfen können. 4. Nun werden faktorielle, konvergente und diskriminante Befunde erhoben. 5. Das beobachtete Muster wird mit den Vorhersagen verglichen und nicht nur darauf geprüft, ob einzelne Nullhypothesen signifikant sind. 6. Abschließend werden Abweichungen und Alternativerklärungen untersucht, damit ein unerwarteter Befund diagnostisch statt selektiv behandelt wird.","source":"PD07 Gütekriterien II, S. 32–34","misconception":"konstruktvaliditaet_posthoc","retry":"Prüfe zunächst, welche Validitätshypothese, Matrixklasse oder Formel die Aufgabe tatsächlich verlangt. Nutze bei Bedarf einen Hinweis; die vollständige Erklärung wird nicht nach dem ersten Fehler offengelegt."},{"id":"mtmm-1","section":"mtmmlogic","type":"match","title":"MTMM-Abkürzungen korrekt zuordnen","level":"Standard","prompt":"Ordne die drei in der Vorlesung verwendeten Klassen zu.","rows":["MTHM","HTMM","HTHM"],"options":["gleiches Merkmal, verschiedene Methode","verschiedene Merkmale, gleiche Methode","verschiedene Merkmale, verschiedene Methode"],"answer":[0,1,2],"hints":["Lies die Abkürzung als Trait zuerst und Method danach.","Mono-Trait-Hetero-Method ist die direkte Konvergenzklasse."],"explanation":"MTHM verbindet dasselbe Merkmal über Methoden; HTMM verschiedene Merkmale innerhalb einer Methode; HTHM verschiedene Merkmale über Methoden.","source":"PD07 Gütekriterien II, S. 35","misconception":"mtmm_abkuerzungen_vertauscht","retry":"Prüfe zunächst, welche Validitätshypothese, Matrixklasse oder Formel die Aufgabe tatsächlich verlangt. Nutze bei Bedarf einen Hinweis; die vollständige Erklärung wird nicht nach dem ersten Fehler offengelegt."},{"id":"mtmm-2","section":"mtmmlogic","type":"matrix","title":"Konvergente MTHM-Zellen markieren","level":"Standard","prompt":"Markiere in der synthetischen Matrix alle Paare mit gleichem Merkmal und verschiedener Methode.","labels":["E–SB","V–SB","N–SB","E–FB","V–FB","N–FB"],"values":[[1,0.2,-0.25,0.7,0.14,-0.2],[0.2,1,-0.18,0.18,0.66,-0.15],[-0.25,-0.18,1,-0.22,-0.1,0.72],[0.7,0.18,-0.22,1,0.16,-0.21],[0.14,0.66,-0.1,0.16,1,-0.12],[-0.2,-0.15,0.72,-0.21,-0.12,1]],"diagDisplay":["1.00","1.00","1.00","1.00","1.00","1.00"],"caption":"Synthetische MTMM-Matrix: SB = Selbstbericht, FB = Fremdbericht","legend":"<b>E</b> = Extraversion · <b>V</b> = Verträglichkeit · <b>N</b> = Neurotizismus","answer":["0-3","1-4","2-5"],"hints":["Verbinde E mit E, V mit V und N mit N – jeweils über SB und FB.","Die drei MTHM-Werte sind .70, .66 und .72."],"explanation":"E–SB mit E–FB (.70) ist MTHM, weil Extraversion über Selbst- und Fremdbericht verbunden wird. V–SB mit V–FB (.66) ist MTHM, weil Verträglichkeit über beide Methoden verbunden wird. N–SB mit N–FB (.72) ist MTHM, weil Neurotizismus über beide Methoden verbunden wird. Alle übrigen auswählbaren Zellen verbinden entweder verschiedene Merkmale innerhalb derselben Methode (HTMM) oder verschiedene Merkmale über verschiedene Methoden (HTHM) und sind deshalb nicht zu markieren.","source":"Neu konstruierte Matrix nach PD07 Gütekriterien II, S. 35","misconception":"mthm_zellen_falsch","retry":"Prüfe zunächst, welche Validitätshypothese, Matrixklasse oder Formel die Aufgabe tatsächlich verlangt. Nutze bei Bedarf einen Hinweis; die vollständige Erklärung wird nicht nach dem ersten Fehler offengelegt."},{"id":"mtmm-3","section":"mtmmlogic","type":"match","title":"Beziehungspaare nach Zelltyp klassifizieren","level":"Standard","prompt":"Ordne jedes Paar der passenden Matrixklasse zu.","rows":["E–SB mit E–FB","E–SB mit V–SB","E–SB mit V–FB","N–FB mit V–FB"],"options":["MTHM","HTMM","HTHM"],"answer":[0,1,2,1],"hints":["Prüfe zuerst: gleiches oder verschiedenes Merkmal? Danach: gleiche oder verschiedene Methode?","Zwei Fremdberichte verschiedener Merkmale sind HTMM."],"explanation":"E–SB mit E–FB ist MTHM: gleiches Merkmal, verschiedene Methoden. E–SB mit V–SB ist HTMM: verschiedene Merkmale, gleiche Selbstberichtsmethode. E–SB mit V–FB ist HTHM: verschiedene Merkmale und verschiedene Methoden. N–FB mit V–FB ist HTMM: verschiedene Merkmale innerhalb derselben Fremdberichtsmethode.","source":"PD07 Gütekriterien II, S. 35","misconception":"mtmm_zelltypen_vertauscht","retry":"Prüfe zunächst, welche Validitätshypothese, Matrixklasse oder Formel die Aufgabe tatsächlich verlangt. Nutze bei Bedarf einen Hinweis; die vollständige Erklärung wird nicht nach dem ersten Fehler offengelegt."},{"id":"mtmm-4","section":"mtmmlogic","type":"multi","title":"Forderungen nach Campbell und Fiske","level":"Standard","prompt":"Welche Aussagen entsprechen der in der Vorlesung dargestellten MTMM-Logik?","options":["MTHM-Korrelationen sollen positiv sein.","HTMM-Korrelationen sollen niedriger als MTHM-Korrelationen sein.","HTHM-Korrelationen sollen niedriger als MTHM-Korrelationen sein.","HTHM- und HTMM-Korrelationen sollten ein vergleichbares Muster zeigen.","Jede Heterotrait-Korrelation muss exakt null sein."],"answer":[0,1,2,3],"hints":["Die Forderungen sind relative Mustervergleiche, keine Forderung nach überall exakt null.","Konvergenz muss die Heterotrait-Vergleiche übertreffen."],"explanation":"Die Vorlesung fordert positive MTHM-Werte, niedrigere Heterotrait-Werte und ein vergleichbares Muster der beiden Heterotrait-Klassen.","source":"PD07 Gütekriterien II, S. 35","misconception":"campbell_fiske_regeln_falsch","retry":"Prüfe zunächst, welche Validitätshypothese, Matrixklasse oder Formel die Aufgabe tatsächlich verlangt. Nutze bei Bedarf einen Hinweis; die vollständige Erklärung wird nicht nach dem ersten Fehler offengelegt."},{"id":"bigfive-1","section":"bigfive","type":"matrix","title":"Fünf MTHM-Zellen der Originalmatrix markieren","level":"Standard","prompt":"Markiere die fünf Beziehungen desselben Big-Five-Merkmals zwischen Einzelitem und NEO-FFI.","labels":["EI–E","EI–V","EI–G","EI–N","EI–O","NEO–E","NEO–V","NEO–G","NEO–N","NEO–O"],"values":[[null,0.21,0.1,-0.08,0.31,0.6,0.26,0.21,-0.26,-0.17],[0.21,null,0.17,-0.35,0.15,0.26,0.6,0.4,-0.35,0.09],[0.1,0.17,null,-0.03,0.07,0.15,0.36,0.8,-0.41,0.05],[-0.08,-0.35,-0.03,null,-0.14,-0.37,-0.11,-0.34,0.68,-0.04],[0.31,0.15,0.07,-0.14,null,0.14,0.02,0.04,-0.05,0.64],[0.6,0.26,0.15,-0.37,0.14,null,0.29,0.22,-0.48,0.01],[0.26,0.6,0.36,-0.11,0.02,0.29,null,0.3,-0.23,0.18],[0.21,0.4,0.8,-0.34,0.04,0.22,0.3,null,-0.54,0.01],[-0.26,-0.35,-0.41,0.68,-0.05,-0.48,-0.23,-0.54,null,0],[-0.17,0.09,0.05,-0.04,0.64,0.01,0.18,0.01,0,null]],"diagDisplay":["–","–","–","–","–","(.74)","(.83)","(.87)","(.86)","(.77)"],"caption":"MTMM-Matrix aus Aufgabenblatt 5; auswählbar ist das obere Dreieck","legend":"<b>EI</b> = Einzelitem · <b>NEO</b> = NEO-FFI · <b>E/V/G/N/O</b> = Big-Five-Merkmale · Klammern auf der NEO-Diagonale = Cronbachs α","answer":["0-5","1-6","2-7","3-8","4-9"],"hints":["Jedes Merkmal steht einmal im EI- und einmal im NEO-Block.","Die gesuchten Werte sind .60, .60, .80, .68 und .64."],"explanation":"EI–E mit NEO–E (.60) ist die MTHM-Zelle für Extraversion. EI–V mit NEO–V (.60) ist die MTHM-Zelle für Verträglichkeit. EI–G mit NEO–G (.80) ist die MTHM-Zelle für Gewissenhaftigkeit. EI–N mit NEO–N (.68) ist die MTHM-Zelle für Neurotizismus. EI–O mit NEO–O (.64) ist die MTHM-Zelle für Offenheit. Alle anderen auswählbaren Beziehungen verbinden verschiedene Merkmale und gehören deshalb zu einer Heterotrait-Klasse, nicht zur direkten Konvergenzklasse.","source":"Aufgabenblatt 5 und Lösungen Aufgabenblatt 5, S. 1–2","misconception":"originalmatrix_mthm_falsch","retry":"Prüfe zunächst, welche Validitätshypothese, Matrixklasse oder Formel die Aufgabe tatsächlich verlangt. Nutze bei Bedarf einen Hinweis; die vollständige Erklärung wird nicht nach dem ersten Fehler offengelegt."},{"id":"bigfive-2","section":"bigfive","type":"number","title":"Mittelwert der MTHM-Korrelationen nachrechnen","level":"Standard","prompt":"Berechne den arithmetischen Mittelwert der fünf MTHM-Werte .60, .60, .80, .68 und .64. Gib drei Dezimalstellen an.","answer":0.664,"tolerance":0.001,"hints":["Addiere die fünf Werte und teile durch 5.","Die Summe beträgt 3.32."],"explanation":"3.32 / 5 = .664. Die PDF-Lösung nennt .672; dieser Wert folgt nicht aus den fünf sichtbaren Matrixwerten. Der Trainer verwendet deshalb die direkt nachrechenbare Zahl .664 und kennzeichnet die Quellenabweichung.","source":"Lösungen Aufgabenblatt 5, S. 2 · direkter Rechenabgleich","misconception":"mthm_mittelwert_falsch","retry":"Prüfe zunächst, welche Validitätshypothese, Matrixklasse oder Formel die Aufgabe tatsächlich verlangt. Nutze bei Bedarf einen Hinweis; die vollständige Erklärung wird nicht nach dem ersten Fehler offengelegt."},{"id":"bigfive-3","section":"bigfive","type":"single","title":"Größten positiven Wert und größten Betrag trennen","level":"Standard","prompt":"Unter den HTHM-Werten der Originalmatrix treten .40 und −.41 auf. Welche Aussage ist mathematisch präzise?","options":[".40 ist der größte positive Wert; −.41 hat den größeren Betrag.","−.41 ist wegen des Minuszeichens immer kleiner und deshalb für Diskriminanz irrelevant.","Beide Werte besitzen denselben Betrag.",".40 ist zugleich der größte Betrag aller Heterotrait-Werte."],"answer":0,"hints":["Vergleiche einmal die algebraische Größe und einmal |r|.","|−.41| = .41 und ist damit geringfügig größer als .40."],"explanation":"Die Lösung bezeichnet .40 als größten HTHM-Wert. Das ist als größter positiver Wert verständlich; nach Betrag ist −.41 größer. Die Vergleichsregel muss ausdrücklich benannt werden.","source":"Lösungen Aufgabenblatt 5, S. 2 · transparenter Quellenbefund","misconception":"positivwert_mit_betrag_verwechselt","retry":"Prüfe zunächst, welche Validitätshypothese, Matrixklasse oder Formel die Aufgabe tatsächlich verlangt. Nutze bei Bedarf einen Hinweis; die vollständige Erklärung wird nicht nach dem ersten Fehler offengelegt."},{"id":"bigfive-4","section":"bigfive","type":"multi","title":"Gesamtmuster der Originalmatrix beurteilen","level":"Standard","promptHtml":"<div class=\"matrix-wrap\"><table class=\"mini-table item-table\"><caption>Für die Gesamtbeurteilung benötigte Werte der Big-Five-Matrix</caption><thead><tr><th scope=\"col\">Befund</th><th scope=\"col\">Werte</th></tr></thead><tbody><tr><th scope=\"row\">MTHM: EI mit NEO desselben Merkmals</th><td>.60, .60, .80, .68, .64</td></tr><tr><th scope=\"row\">größter sichtbarer Heterotrait-Betrag</th><td>.54</td></tr><tr><th scope=\"row\">Einzelitem-Diagonale</th><td>– (Cronbachs α nicht aus einem Item berechenbar)</td></tr><tr><th scope=\"row\">NEO-Diagonale</th><td>α = .74, .83, .87, .86, .77</td></tr></tbody></table></div><p>Welche Aussagen werden durch diese Matrixbefunde gestützt?</p>","options":["Alle fünf MTHM-Korrelationen sind positiv und liegen zwischen .60 und .80.","Die kleinste MTHM-Korrelation (.60) ist größer als jede sichtbare Heterotrait-Korrelation im Betrag; deren Maximum beträgt .54.","Die Matrix beweist, dass die Einzelitems für jede Anwendung valide sind.","Die leeren Einzelitem-Diagonalen zeigen Reliabilität null.","Das Muster liefert insgesamt konvergente und diskriminante Evidenz, bleibt aber nur ein Teil des Validitätsarguments."],"answer":[0,1,4],"hints":["Vergleiche die kleinste MTHM mit dem größten Betrag außerhalb dieser Klasse.","Eine MTMM-Matrix liefert Evidenz, aber kein universelles Gütesiegel."],"explanation":"Aussage 1 ist richtig: Alle fünf MTHM-Werte sind positiv und liegen zwischen .60 und .80. Aussage 2 ist richtig: Selbst die kleinste MTHM-Korrelation .60 übertrifft den größten sichtbaren Heterotrait-Betrag .54. Aussage 3 ist falsch: Ein günstiges MTMM-Muster beweist keine Validität für jede denkbare Anwendung. Aussage 4 ist falsch: Die leeren Einzelitem-Diagonalen bedeuten, dass Cronbachs α für ein Einzelitem nicht berechenbar ist, nicht Reliabilität null. Aussage 5 ist richtig: Das Muster liefert konvergente und diskriminante Evidenz, bleibt aber nur ein Bestandteil eines umfassenderen Validitätsarguments.","source":"Aufgabenblatt 5 und Lösungen Aufgabenblatt 5, S. 2 · quellenkritische Auswertung","misconception":"originalmatrix_ueberinterpretiert","retry":"Prüfe zunächst, welche Validitätshypothese, Matrixklasse oder Formel die Aufgabe tatsächlich verlangt. Nutze bei Bedarf einen Hinweis; die vollständige Erklärung wird nicht nach dem ersten Fehler offengelegt."},{"id":"method-1","section":"methodsingle","type":"single","title":"Mögliche gemeinsame Methodenvarianz erkennen","level":"Standard","promptHtml":"<div class=\"matrix-wrap\"><table class=\"mini-table item-table\"><caption>Synthetischer Methodenvergleich</caption><thead><tr><th scope=\"col\">Beziehung</th><th scope=\"col\">r</th></tr></thead><tbody><tr><th scope=\"row\">Planung SB – Kooperation SB</th><td>.56</td></tr><tr><th scope=\"row\">Planung FB – Kooperation FB</th><td>.18</td></tr><tr><th scope=\"row\">Planung SB – Planung FB</th><td>.62</td></tr><tr><th scope=\"row\">Kooperation SB – Kooperation FB</th><td>.59</td></tr></tbody></table></div><p>Welcher Befund ist am ehesten mit einem Selbstbericht-Methodeneffekt oder mangelnder Merkmalsabgrenzung vereinbar?</p>","options":["Die hohe Heterotrait-Monomethod-Korrelation Planung SB – Kooperation SB = .56.","Die Fremdbericht-Heterotrait-Korrelation .18.","Die beiden MTHM-Korrelationen .62 und .59.","Dass vier Korrelationen berichtet werden."],"answer":0,"hints":["Ein Methodeneffekt kann verschiedene Merkmale innerhalb derselben Methode künstlich ähnlich machen.","Vergleiche die Heterotrait-Beziehung im Selbstbericht mit der entsprechenden Fremdbericht-Beziehung."],"explanation":"Die hohe Beziehung verschiedener Merkmale innerhalb des Selbstberichts ist auffällig. Sie kann gemeinsame Methodenvarianz oder inhaltliche Überlappung anzeigen und verlangt weitere Prüfung.","source":"PD07 Gütekriterien II, S. 13 und 35–36 · neuer Transferfall","misconception":"methodeneffekt_nicht_erkannt","retry":"Prüfe zunächst, welche Validitätshypothese, Matrixklasse oder Formel die Aufgabe tatsächlich verlangt. Nutze bei Bedarf einen Hinweis; die vollständige Erklärung wird nicht nach dem ersten Fehler offengelegt."},{"id":"method-2","section":"methodsingle","type":"multi","title":"Methodeneffekt angemessen weiter untersuchen","level":"Standard","prompt":"Welche Maßnahmen helfen, einen vermuteten Methodeneffekt zu prüfen?","options":["Zusätzliche, methodisch verschiedene Messungen desselben Konstrukts erheben.","Heterotrait-Beziehungen innerhalb und zwischen Methoden systematisch vergleichen.","Skalenrichtung und inhaltliche Überlappung der Konstrukte prüfen.","Die auffällige Korrelation ohne weitere Analyse löschen.","Befund in einer unabhängigen Stichprobe replizieren."],"answer":[0,1,2,4],"hints":["Methodenvarianz wird durch Vergleiche und zusätzliche Designs untersucht, nicht durch das Entfernen des Befunds.","Eine alternative Methode hilft, Trait- und Methodeneinflüsse auseinanderzuhalten."],"explanation":"Mehrere Methoden, systematische Matrixvergleiche, Inhaltsprüfung und Replikation liefern diagnostische Evidenz. Das bloße Löschen eines widersprüchlichen Befunds löst die Ursache nicht.","source":"PD07 Gütekriterien II, S. 13 und 34–36 · Transfer","misconception":"methodeneffekt_durch_loeschen","retry":"Prüfe zunächst, welche Validitätshypothese, Matrixklasse oder Formel die Aufgabe tatsächlich verlangt. Nutze bei Bedarf einen Hinweis; die vollständige Erklärung wird nicht nach dem ersten Fehler offengelegt."},{"id":"method-3","section":"methodsingle","type":"single","title":"Warum Cronbachs Alpha beim Einzelitem fehlt","level":"Standard","prompt":"Warum stehen in der Big-Five-MTMM-Matrix für die Einzelitems keine Alpha-Werte?","options":["Einzelitems sind per Definition perfekt reliabel.","Cronbachs Alpha benötigt mehrere Items beziehungsweise äquivalente Teilmessungen und kann aus einem einzelnen Item nicht bestimmt werden.","Die Stichprobe von 60 Personen macht Alpha grundsätzlich unmöglich.","Einzelitems dürfen nicht mit anderen Variablen korreliert werden."],"answer":1,"hints":["Alpha basiert auf der internen Beziehung mehrerer Teile.","Nicht berechenbar bedeutet nicht null."],"explanation":"Für ein einzelnes Item fehlt die Interitem-Struktur, auf der Cronbachs Alpha beruht. Andere Reliabilitätsansätze könnten in einem passenden Design separat untersucht werden.","source":"Lösungen Aufgabenblatt 5, S. 2","misconception":"einzelitem_alpha_falsch","retry":"Prüfe zunächst, welche Validitätshypothese, Matrixklasse oder Formel die Aufgabe tatsächlich verlangt. Nutze bei Bedarf einen Hinweis; die vollständige Erklärung wird nicht nach dem ersten Fehler offengelegt."},{"id":"method-4","section":"methodsingle","type":"single","title":"Unbekannte Einzelitem-Reliabilität nicht erfinden","level":"Standard","prompt":"Die Reliabilität eines Einzelitems ist unbekannt. Darf für eine Minderungskorrektur ohne empirische Begründung Rel = .70 eingesetzt werden?","options":["Ja, .70 ist ein allgemeiner Standardwert.","Nein; die Korrektur ist nur so belastbar wie die Reliabilitätsschätzungen und eine willkürliche Zahl erzeugt Scheingenauigkeit.","Ja, sofern die beobachtete Korrelation signifikant ist.","Nein, weil Minderungskorrekturen grundsätzlich unzulässig sind."],"answer":1,"hints":["Die Formel benötigt empirisch oder theoretisch begründete Eingaben.","Eine transparente fehlende Korrektur ist besser als eine präzise wirkende, frei erfundene Schätzung."],"explanation":"Ohne belastbare Reliabilitätsschätzung darf der Wert nicht als korrigierter Befund ausgegeben werden. Die Grenze der Daten muss offen benannt werden.","source":"PD07 Gütekriterien II, S. 30–31 · Transfer aus Aufgabenblatt 5","misconception":"reliabilitaet_erfunden","retry":"Prüfe zunächst, welche Validitätshypothese, Matrixklasse oder Formel die Aufgabe tatsächlich verlangt. Nutze bei Bedarf einen Hinweis; die vollständige Erklärung wird nicht nach dem ersten Fehler offengelegt."},{"id":"mastery-1","section":"mastery","type":"number","title":"Kriteriumsbeziehung korrigieren","level":"Transfer","promptHtml":"<div class=\"matrix-wrap\"><table class=\"mini-table item-table\"><caption>Zusätzliche Angaben zum Abschlussfall</caption><thead><tr><th scope=\"col\">Kennwert</th><th scope=\"col\">Wert</th></tr></thead><tbody><tr><th scope=\"row\">Beobachtete Test–Kriterium-Korrelation</th><td>.36</td></tr><tr><th scope=\"row\">Reliabilität des Tests</th><td>.64</td></tr><tr><th scope=\"row\">Reliabilität des Kriteriums</th><td>.81</td></tr></tbody></table></div><div class=\"formula-card\"><div class=\"formula-main\">Val** = Val / (√Relₓ · √Relᵧ)</div></div><p>Berechne die doppelt minderungskorrigierte Beziehung.</p>","answer":0.5,"tolerance":0.004,"hints":["√.64 = .80 und √.81 = .90.","Teile .36 durch .72."],"explanation":"Val** = .36 / (.80 · .90) = .50. Der korrigierte Wert beschreibt eine Modellschätzung unter angenommenen KTT-Bedingungen.","source":"Neu konstruierter Abschlussfall nach PD07","misconception":"abschluss_minderung_falsch","retry":"Prüfe zunächst, welche Validitätshypothese, Matrixklasse oder Formel die Aufgabe tatsächlich verlangt. Nutze bei Bedarf einen Hinweis; die vollständige Erklärung wird nicht nach dem ersten Fehler offengelegt."},{"id":"mastery-2","section":"mastery","type":"single","title":"Schwächsten Diskriminanzbefund finden","level":"Transfer","promptHtml":"<div class=\"matrix-wrap\"><table class=\"mini-table item-table\"><caption>Ausschnitt aus der MTMM-Matrix</caption><thead><tr><th scope=\"col\">Beziehung</th><th scope=\"col\">r</th></tr></thead><tbody><tr><th scope=\"row\">P–SB mit P–FB</th><td>.66</td></tr><tr><th scope=\"row\">S–SB mit S–FB</th><td>.61</td></tr><tr><th scope=\"row\">K–SB mit K–FB</th><td>.58</td></tr><tr><th scope=\"row\">P–SB mit K–SB</th><td>.52</td></tr><tr><th scope=\"row\">P–FB mit K–FB</th><td>.20</td></tr></tbody></table></div><p>Welcher Befund schwächt die diskriminante Evidenz am deutlichsten?</p>","labels":["P–SB","S–SB","K–SB","P–FB","S–FB","K–FB"],"values":[[1,0.18,0.52,0.66,0.1,0.2],[0.18,1,0.22,0.12,0.61,0.15],[0.52,0.22,1,0.24,0.16,0.58],[0.66,0.12,0.24,1,0.1,0.2],[0.1,0.61,0.16,0.1,1,0.15],[0.2,0.15,0.58,0.2,0.15,1]],"diagDisplay":["1.00","1.00","1.00","1.00","1.00","1.00"],"caption":"Abschlussfall: P = Planung, S = Stresstoleranz, K = Kooperation; SB/FB = Selbst-/Fremdbericht","legend":"<b>Auffällig:</b> Vergleiche Heterotrait-Beziehungen innerhalb der beiden Methoden.","options":["P–SB mit P–FB = .66","S–SB mit S–FB = .61","P–SB mit K–SB = .52","P–FB mit K–FB = .20"],"answer":2,"hints":["Suche eine hohe Beziehung verschiedener Merkmale innerhalb derselben Methode.","Die Selbstbericht-Beziehung .52 liegt nahe an den MTHM-Werten."],"explanation":"P–SB mit K–SB = .52 schwächt die diskriminante Evidenz und kann auf gemeinsame Selbstberichtsmethodenvarianz oder unzureichende Konstrukttrennung hinweisen.","source":"Neu konstruierter Abschlussfall nach PD07","misconception":"abschluss_methodeneffekt_falsch","retry":"Prüfe zunächst, welche Validitätshypothese, Matrixklasse oder Formel die Aufgabe tatsächlich verlangt. Nutze bei Bedarf einen Hinweis; die vollständige Erklärung wird nicht nach dem ersten Fehler offengelegt."},{"id":"mastery-3","section":"mastery","type":"multi","title":"Gesamte Evidenz ausgewogen zusammenfassen","level":"Transfer","promptHtml":"<div class=\"matrix-wrap\"><table class=\"mini-table item-table\"><caption>Abschlussfall: Kriterien- und MTMM-Befunde</caption><thead><tr><th scope=\"col\">Befund</th><th scope=\"col\">Wert</th></tr></thead><tbody><tr><th scope=\"row\">beobachtete Test–Kriterium-Korrelation</th><td>.36</td></tr><tr><th scope=\"row\">Reliabilität Test / Kriterium</th><td>.64 / .81</td></tr><tr><th scope=\"row\">doppelt minderungskorrigierte Beziehung</th><td>.50</td></tr><tr><th scope=\"row\">MTHM P / S / K</th><td>.66 / .61 / .58</td></tr><tr><th scope=\"row\">HTMM Planung–Kooperation im Selbstbericht</th><td>.52</td></tr><tr><th scope=\"row\">HTMM Planung–Kooperation im Fremdbericht</th><td>.20</td></tr></tbody></table></div><p>Welche Aussagen werden durch den Abschlussfall gestützt?</p>","options":["Für alle drei Merkmale bestehen moderate positive MTHM-Beziehungen (.58 bis .66).","Die hohe Selbstbericht-Heterotrait-Beziehung .52 ist ein möglicher Methoden- oder Abgrenzungsbefund.","Die doppelt korrigierte Kriteriumsbeziehung beträgt ungefähr .50.","Die Matrix beweist uneingeschränkte Validität für jede Verwendung.","Die deutlich niedrigere Fremdbericht-Heterotrait-Beziehung .20 stützt dort die Diskriminanz."],"answer":[0,1,2,4],"hints":["Positive und problematische Evidenz können gleichzeitig vorliegen.","Das Urteil soll das gesamte Muster, nicht nur den höchsten Wert, abbilden."],"explanation":"Aussage 1 ist richtig: Die drei MTHM-Beziehungen .58, .61 und .66 sind moderat und positiv und stützen Konvergenz. Aussage 2 ist richtig: Die Heterotrait-Monomethod-Beziehung .52 im Selbstbericht liegt nahe an den MTHM-Werten und kann gemeinsame Methodenvarianz oder mangelnde Merkmalsabgrenzung anzeigen. Aussage 3 ist richtig: .36 / (√.64 · √.81) = .36 / (.80 · .90) = .50. Aussage 4 ist falsch: Das gemischte Muster belegt keine uneingeschränkte Validität für jede Verwendung. Aussage 5 ist richtig: Die deutlich kleinere Heterotrait-Beziehung .20 im Fremdbericht stützt dort die diskriminante Evidenz. Der Fall enthält somit gleichzeitig stützende und begrenzende Evidenz.","source":"Neu konstruierter Abschlussfall nach PD07","misconception":"abschluss_evidenz_einseitig","retry":"Prüfe zunächst, welche Validitätshypothese, Matrixklasse oder Formel die Aufgabe tatsächlich verlangt. Nutze bei Bedarf einen Hinweis; die vollständige Erklärung wird nicht nach dem ersten Fehler offengelegt."},{"id":"mastery-4","section":"mastery","type":"single","title":"Belastbares Validitätsurteil und nächster Schritt","level":"Transfer","promptHtml":"<div class=\"matrix-wrap\"><table class=\"mini-table item-table\"><caption>Entscheidungsgrundlage des Abschlussfalls</caption><thead><tr><th scope=\"col\">Stützende Evidenz</th><th scope=\"col\">Grenzen</th></tr></thead><tbody><tr><td>MTHM .58 bis .66; korrigierte Kriterienbeziehung .50</td><td>Selbstbericht-HTMM .52; Fremdbericht-HTMM .20; bisher nur untersuchter Kontext und Zielpopulation</td></tr></tbody></table></div><p>Welche Empfehlung ist fachlich am besten begründet?</p>","options":["Der Test ist uneingeschränkt valide und kann ohne weitere Prüfung für jede Einzelentscheidung eingesetzt werden.","Die Befunde stützen eine vorläufige Verwendung im untersuchten Kontext; vor weitergehender Nutzung sollten Selbstberichtsmethodenvarianz, inhaltliche Überlappung und Replikation in der Zielpopulation geprüft werden.","Wegen einer auffälligen Zelle ist das gesamte Verfahren wertlos.","Es genügt, ausschließlich den korrigierten Wert .50 zu berichten."],"answer":1,"hints":["Ein gutes Urteil integriert positive Evidenz, Grenzen und einen konkreten Prüfauftrag.","Minderungskorrektur und MTMM-Muster sind Bestandteile, aber kein universelles Gütesiegel."],"explanation":"Die vorläufige Verwendung im untersuchten Kontext ist begründbar, weil MTHM- und Kriterienbefunde stützende Evidenz liefern. Eine uneingeschränkte Freigabe für jede Einzelentscheidung wäre jedoch eine Übergeneralisierung. Die auffällige Selbstbericht-HTMM-Korrelation .52 macht das Verfahren nicht wertlos, verlangt aber eine Prüfung von Methodenvarianz und inhaltlicher Überlappung. Auch der korrigierte Wert .50 genügt nicht allein als Validitätsargument. Deshalb ist die zweite Empfehlung richtig: Geltungsbereich begrenzen, den Methodenbefund untersuchen und in der Zielpopulation replizieren.","source":"PD07 Gütekriterien II, S. 32–36 · neuer Abschlussfall","misconceptionByAnswer":{"0":"abschluss_uebergeneralisiert","2":"abschluss_schwarzweiss","3":"korrektur_als_alleiniger_beweis"},"retry":"Prüfe zunächst, welche Validitätshypothese, Matrixklasse oder Formel die Aufgabe tatsächlich verlangt. Nutze bei Bedarf einen Hinweis; die vollständige Erklärung wird nicht nach dem ersten Fehler offengelegt."}];
