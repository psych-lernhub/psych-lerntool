'use strict';
const MODULE = {"id": "m11a-apptrainer-07-v2", "title": "Kriterienqualität und Testvergleich", "version": "2.0.0", "sections": [{"id": "start", "nav": "Start", "title": "Kriterienqualität vor Testentscheidung prüfen", "intro": true}, {"id": "workflow", "nav": "1 · Prüfkette", "title": "Eine Validierungsstudie vom Zielkriterium bis zum Urteil diagnostizieren", "level": "Basis", "theory": "Die Vorlesung nennt fünf zentrale Probleme der Kriteriumsvalidität: Methodenfaktoren, Kriteriumskontamination und -defizienz, mangelnde Symmetrie zwischen Prädiktor und Kriterium, Varianzeinschränkungen sowie mangelnde Reliabilität in Prädiktor oder Kriterium. Ein Validitätskoeffizient wird deshalb erst nach einer Prüfung dieser Bedingungen interpretiert."}, {"id": "criterion", "nav": "2 · Kriteriumsraum", "title": "Konzeptuelles und verwendetes Kriterium samt Relevanzbereich trennen", "level": "Basis", "theory": "Das konzeptuelle Kriterium bezeichnet das, was eigentlich erfasst werden soll, etwa berufliche Leistung. Das verwendete Kriterium ist die konkrete Operationalisierung, etwa Umsatz, Unfallzahl oder Fehlzeiten. Die Überlappung beider Bereiche ist Kriteriumsrelevanz. Was das verwendete Kriterium zusätzlich erfasst, ist Kontamination; was vom konzeptuellen Kriterium fehlt, ist Defizienz."}, {"id": "defcont", "nav": "3 · Defizienz & Kontamination", "title": "Fehlende Leistungsanteile und sachfremde Einflüsse zellgenau klassifizieren", "level": "Standard", "theory": "Defizienz und Kontamination sind keine Gegensätze, die sich gegenseitig ausschließen. Ein enges Außenkriterium kann wichtige Leistungsanteile auslassen und zugleich durch Kontextbedingungen beeinflusst werden. Die Diagnose muss daher für jeden Einfluss einzeln begründet werden."}, {"id": "methodsym", "nav": "4 · Methode & Symmetrie", "title": "Gemeinsame Methodenvarianz und unpassende Generalitätsniveaus erkennen", "level": "Standard", "theory": "Werden Prädiktor und Kriterium mit demselben Methodentyp erfasst, kann gemeinsame Methodenvarianz die Korrelation künstlich erhöhen. Die Vorlesung nennt unter anderem Motivation, soziale Erwünschtheit und Antwortstile. Mangelnde Symmetrie liegt vor, wenn Prädiktor und Kriterium in Inhalt oder Generalitätsniveau nicht korrespondieren."}, {"id": "variance", "nav": "5 · Varianz & Reliabilität", "title": "Range Restriction und Messungenauigkeit als Grenzen beobachteter Validität beurteilen", "level": "Standard", "theory": "Die Höhe einer Korrelation hängt von der Streuung beider Variablen und ihrer Reliabilität ab. Eine bereits selektierte Stichprobe kann die Varianz im Prädiktor einschränken; selektiver Verbleib im Unternehmen kann die Varianz im Kriterium einschränken. Seltene Ereignisse liefern in kurzen Zeiträumen ebenfalls wenig Differenzierung."}, {"id": "buscase", "nav": "6 · Busfall", "title": "Den Originalfall zu Unfallhäufigkeit und Fehlzeiten vollständig revidieren", "level": "Transfer", "theory": "Aufgabenblatt 5 verlangt eine Beurteilung von Unfallzahl und Fehltagen als prognostische Kriterien beruflicher Leistung. Die Lösung verweist auf seltene Unfälle, längere Beobachtungszeiträume, Schuld beziehungsweise Vermeidbarkeit, differenziertere Fehlzeitenindikatoren sowie zusätzliche Leistungsbereiche wie Freundlichkeit, Pünktlichkeit und Unterstützung von Kolleginnen und Kollegen."}, {"id": "compare", "nav": "7 · Testvergleich", "title": "Zwei Tests unter identischer Zeitrestriktion rechnerisch fair vergleichen", "level": "Transfer", "theory": "Im Originalfall stehen 30 Itemzeiten zur Verfügung. Test A besitzt 10 Items, Rel = .25 und Val = .40; Test B besitzt 15 Items, Rel = .64 und Val = .50. Für einen fairen Vergleich werden beide Tests zunächst auf 30 parallele Items verlängert, anschließend die reliabilitätskorrigierten Beziehungen bestimmt und auf die neuen Reliabilitäten zurückgeführt."}, {"id": "percent", "nav": "8 · Zielgleichheit & Prozent", "title": "Erforderliche Testlänge und Prozentangaben mit korrekter Bezugsgröße bestimmen", "level": "Transfer", "theory": "Um zwei Tests auf dieselbe empirische Validität zu bringen, wird zunächst die erforderliche Reliabilität und anschließend der Verlängerungsfaktor bestimmt. Ganzzahlige Testlängen müssen aufgerundet werden. Prozentangaben sind nur eindeutig, wenn ausdrücklich benannt wird, ob der Mehrbedarf relativ zum kürzeren oder die Ersparnis relativ zum längeren Test gemeint ist."}, {"id": "mastery", "nav": "9 · Abschlussfall", "title": "Kriterienaudit und Testvergleich in einer neuen Auswahlstudie integrieren", "level": "Transfer", "theory": "Der Abschlussfall verbindet Kriterienrelevanz, Defizienz, Kontamination, Methodenfaktoren, Varianzeinschränkung und einen rechnerischen Testvergleich. Ein minimaler Validitätsunterschied wird nicht isoliert als Entscheidungskriterium behandelt, wenn die Qualität des Außenkriteriums noch ungeklärt ist."}, {"id": "result", "nav": "Ergebnis", "title": "Lernstand und Fehlkonzeptprofil", "result": true}]};
const tasks = [{"id": "workflow-1", "section": "workflow", "type": "order", "title": "Validierungsstudie in eine belastbare Prüfreihenfolge bringen", "level": "Basis", "prompt": "Ordne die Schritte so, dass eine niedrige oder hohe Korrelation nicht vorschnell dem Test zugeschrieben wird.", "items": ["Konzeptuelles Kriterium und beabsichtigte Aussage definieren", "Verwendetes Kriterium und Erhebungszeitraum festlegen", "Relevanz, Defizienz und Kontamination prüfen", "Methodenfaktoren und Symmetrie von Prädiktor und Kriterium beurteilen", "Varianz und Reliabilität beider Messungen prüfen", "Validitätskoeffizient berechnen und mit den Vorhersagen vergleichen", "Grenzen, Alternativerklärungen und praktische Folgen formulieren"], "start": [5, 2, 0, 6, 3, 1, 4], "answer": [0, 1, 2, 3, 4, 5, 6], "hints": ["Die Zielbedeutung muss vor der Operationalisierung feststehen.", "Die Korrelation wird erst nach der Qualitätsprüfung interpretiert."], "explanation": "Die Reihenfolge trennt zunächst Zielkonstrukt und Messung, prüft danach die fünf zentralen Problemgruppen und führt erst anschließend zu Berechnung und Urteil.", "source": "PD07 Gütekriterien II, S. 13–31 · Aufgabenblatt 5", "misconception": "korrelation_vor_kriteriumspruefung", "retry": "Prüfe, ob du das konzeptuelle Kriterium, die konkrete Messung und den vermuteten Störeinfluss getrennt hast. Bei Rechenaufgaben kontrolliere zuerst Bezugsgröße und Formel. Die vollständige Erklärung wird nach dem ersten Fehler noch nicht offengelegt."}, {"id": "workflow-2", "section": "workflow", "type": "match", "title": "Fünf Hauptprobleme der Kriteriumsvalidität diagnostisch zuordnen", "level": "Basis", "prompt": "Ordne jedem Problem die passende Leitfrage zu.", "rows": ["Methodenfaktoren", "Kontamination und Defizienz", "Mangelnde Symmetrie", "Varianzeinschränkung", "Mangelnde Reliabilität"], "options": ["Erzeugen gleiche Erhebungsformen gemeinsame Varianz?", "Erfasst das Kriterium Irrelevantes oder lässt Relevantes aus?", "Passen In ass=\"overlap-label deficiency\">Defizienz</div></div></figure><p>Ein Unternehmen möchte berufliche Gesamtleistung erfassen und verwendet dafür ausschließlich den Umsatz. Was ist das konzeptuelle Kriterium?</p>", "options": ["der Umsatz", "die berufliche Gesamtleistung", "die Testpunktzahl", "die Reliabilität des Umsatzes"], "answer": 1, "hints": ["Konzeptuell bedeutet: Was soll eigentlich erfasst werden?", "Die konkrete Zahl ist das verwendete Kriterium."], "explanation": "Berufliche Gesamtleistung ist das Zielkonstrukt. Umsatz ist eine konkrete, potenziell nur teilweise passende Operationalisierung.", "source": "PD07 Gütekriterien II, S. 14", "misconception": "konzeptuell_mit_beobachtet_verwechselt", "retry": "Prüfe, ob du das konzeptuelle Kriterium, die konkrete Messung und den vermuteten Störeinfluss getrennt hast. Bei Rechenaufgaben kontrolliere zuerst Bezugsgröße und Formel. Die vollständige Erklärung wird nach dem ersten Fehler noch nicht offengelegt."}, {"id": "criterion-2", "section": "criterion", "type": "match", "title": "Bereiche des Überlappungsmodells klassifizieren", "level": "Basis", "promptHtml": "<figure class=\"criterion-overlap\"><figcaption>Verwendetes und konzeptuelles Kriterium</figcaption><div class=\"overlap-stage\"><div class=\"circle used\"><b>verwendetes Kriterium</b><span>z. B. Umsatz</span></div><div class=\"circle conceptual\"><b>konzeptuelles Kriterium</b><span>z. B. berufliche Leistung</span></div><div class=\"overlap-label contamination\">Kontamination</div><div class=\"overlap-label relevance\">Relevanz</div><div class=\"overlap-label deficiency\">Defizienz</div></div></figure><p>Ordne die drei Bereiche ihren Bedeutungen zu.</p>", "rows": ["Kriteriumsrelevanz", "Kriteriumskontamination", "Kriteriumsdefizienz"], "options": ["Überlappung von verwendeter Messung und eigentlich gemeintem Kriterium", "Anteile der verwendeten Messung, die nicht zum Zielkriterium gehören", "Anteile des Zielkriteriums, die durch die Messung nicht erfasst werden"], "answer": [0, 1, 2], "hints": ["Relevanz ist die Schnittmenge.", "Defizienz liegt auf der Seite des Zielkriteriums, Kontamination auf der Seite der Messung."], "explanation": "Das Überlappungsmodell lokalisiert sauber, ob relevante Inhalte enthalten, irrelevante Inhalte hinzugefügt oder relevante Inhalte ausgelassen werden.", "source": "PD07 Gütekriterien II, S. 14", "misconception": "ueberlappungsbereiche_vertauscht", "retry": "Prüfe, ob du das konzeptuelle Kriterium, die konkrete Messung und den vermuteten Störeinfluss getrennt hast. Bei Rechenaufgaben kontrolliere zuerst Bezugsgröße und Formel. Die vollständige Erklärung wird nach dem ersten Fehler noch nicht offengelegt."}, {"id": "criterion-3", "section": "criterion", "type": "multi", "title": "Relevante Leistungsanteile im Busfall identifizieren", "level": "Basis", "prompt": "Welche in der Lösung genannten Leistungsanteile fehlen, wenn berufliche Leistung nur über Unfälle und Fehlzeiten gemessen wird?", "options": ["Freundlichkeit gegenüber Kundinnen und Kunden", "Pünktlichkeit", "Unterstützung von Kolleginnen und Kollegen", "private Fahrzeugfarbe", "Augenfarbe"], "answer": [0, 1, 2], "hints": ["Die Lösung nennt drei Beispiele ausdrücklich.", "Private Merkmale sind keine beruflichen Leistungsanteile."], "explanation": "Freundlichkeit, Pünktlichkeit und kollegiale Unterstützung sind relevante Leistungsaspekte, die beide engen Kriterien nicht abbilden.", "source": "Lösungen Aufgabenblatt 5, S. 3", "misconception": "kriteriumsrelevanz_falsch", "retry": "Prüfe, ob du das konzeptuelle Kriterium, die konkrete Messung und den vermuteten Störeinfluss getrennt hast. Bei Rechenaufgaben kontrolliere zuerst Bezugsgröße und Formel. Die vollständige Erklärung wird nach dem ersten Fehler noch nicht offengelegt."}, {"id": "criterion-4", "section": "criterion", "type": "single", "title": "Mehrere Kriterien nicht automatisch als perfekt behandeln", "level": "Basis", "prompt": "Warum kann ein Kriterienpaket aus mehreren Indikatoren besser sein als ein einzelner Wert?", "options": ["Weil jedes zusätzliche Kriterium automatisch valide und reliabel ist.", "Weil mehrere relevante Aspekte abgedeckt und spezifische Fehlerquellen sichtbar gemacht werden können, sofern jede Messung selbst geprüft wird.", "Weil dann keine Definition beruflicher Leistung mehr nötig ist.", "Weil mehrere Kriterien Varianzeinschränkung grundsätzlich ausschließen."], "answer": 1, "hints": ["Mehr Breite kann Defizienz reduzieren, garantiert aber keine Messqualität.", "Jeder Indikator kann eigene Kontamination und Unreliabilität besitzen."], "explanation": "Ein Kriterienpaket kann breiter und diagnostisch informativer sein. Die Qualität jedes Indikators und seine theoretische Rolle müssen dennoch separat begründet werden.", "source": "PD07 Gütekriterien II, S. 8 und 13–14 · Transfer", "misconception": "mehr_kriterien_automatisch_perfekt", "retry": "Prüfe, ob du das konzeptuelle Kriterium, die konkrete Messung und den vermuteten Störeinfluss getrennt hast. Bei Rechenaufgaben kontrolliere zuerst Bezugsgröße und Formel. Die vollständige Erklärung wird nach dem ersten Fehler noch nicht offengelegt."}, {"id": "defcont-1", "section": "defcont", "type": "match", "title": "Originalbeispiele als Relevanz, Defizienz oder Kontamination einordnen", "level": "Standard", "prompt": "Ordne jede Aussage der primär beschriebenen Kategorie zu.", "rows": ["Unfallzahl wird durch unfallträchtige Strecken beeinflusst.", "Fehlzeiten werden durch tatsächliche Erkrankungen beeinflusst.", "Freundlichkeit gegenüber Kundinnen und Kunden fehlt.", "Pünktlichkeit fehlt.", "Vermeidbare, selbstverschuldete Unfälle bilden einen sicherheitsbezogenen Leistungsanteil ab.", "Unterstützung von Kolleginnen und Kollegen fehlt."], "options": ["Kriteriumsrelevanz", "Kriteriumskontamination", "Kriteriumsdefizienz"], "answer": [1, 1, 2, 2, 0, 2], "hints": ["Kontamination ist leistungsfremder Einfluss auf die Messung.", "Defizienz bezeichnet ausgelassene relevante Inhalte."], "explanation": "Streckenrisiko und Erkrankung sind sachfremde Einflüsse; die drei ausgelassenen Leistungsbereiche sind Defizienz. Vermeidbares Fehlverhalten kann dem relevanten Sicherheitsbereich näherkommen.", "source": "Lösungen Aufgabenblatt 5, S. 2–3", "misconception": "defizienz_kontamination_verwechselt", "retry": "Prüfe, ob du das konzeptuelle Kriterium, die konkrete Messung und den vermuteten Störeinfluss getrennt hast. Bei Rechenaufgaben kontrolliere zuerst Bezugsgröße und Formel. Die vollständige Erklärung wird nach dem ersten Fehler noch nicht offengelegt."}, {"id": "defcont-2", "section": "defcont", "type": "single", "title": "Gleichzeitige Defizienz und Kontamination erkennen", "level": "Standard", "prompt": "Kann die reine Unfallzahl gleichzeitig kontaminiert und defizient sein?", "options": ["Nein, ein Kriterium kann immer nur eines von beidem sein.", "Ja: Streckenrisiko kann die Zahl kontaminieren, während Service, Pünktlichkeit und Kooperation fehlen.", "Nur bei perfekter Reliabilität.", "Nur wenn keine Unfälle auftreten."], "answer": 1, "hints": ["Kontamination und Defizienz beziehen sich auf unterschiedliche Bereiche des Überlappungsmodells.", "Ein irrelevanter Einfluss schließt fehlende relevante Inhalte nicht aus."], "explanation": "Beide Probleme können gleichzeitig auftreten: Die Messung enthält sachfremde Einflüsse und deckt das Zielkonstrukt trotzdem nur unvollständig ab.", "source": "PD07 Gütekriterien II, S. 14 · Lösungen Aufgabenblatt 5, S. 3", "misconception": "defizienz_kontamination_exklusiv", "retry": "Prüfe, ob du das konzeptuelle Kriterium, die konkrete Messung und den vermuteten Störeinfluss getrennt hast. Bei Rechenaufgaben kontrolliere zuerst Bezugsgröße und Formel. Die vollständige Erklärung wird nach dem ersten Fehler noch nicht offengelegt."}, {"id": "defcont-3", "section": "defcont", "type": "multi", "title": "Kontaminationsquellen im Unfall- und Fehlzeitenkriterium auswählen", "level": "Standard", "prompt": function renderResult(){const done=tasks.filter(t=>taskState(t.id).correct).length;const attempts=tasks.reduce((a,t)=>a+taskState(t.id).attempts,0);const hints=tasks.reduce((a,t)=>a+taskState(t.id).hints,0);const errs=Object.entries(state.errors).sort((a,b)=>b[1]-a[1]);return `<div class="section-head"><div><div class="eyebrow">Auswertung</div><h2>Lernstand und Fehlkonzeptprofil</h2></div></div><div class="dashboard"><div class="metric"><span>Gelöste Aufgaben</span><b>${done}/${tasks.length}</b></div><div class="metric"><span>Abgaben</span><b>${attempts}</b></div><div class="metric"><span>Genutzte Hinweise</span><b>${hints}</b></div><div class="metric"><span>Kompetenzabdeckung</span><b>${tasks.length?Math.round(done/tasks.length*100):0}%</b></div></div><div class="card"><h3>Bereiche</h3>${MODULE.sections.filter(s=>sectionTasks(s.id).length).map(s=>{const ts=sectionTasks(s.id),d=ts.filter(t=>taskState(t.id).correct).length;return `<div class="error-item"><span>${esc(s.nav)} – ${esc(s.title)}</span><strong>${d}/${ts.length}</strong></div>`}).join('')}</div><div class="card" style="margin-top:16px"><h3>Wiederkehrende Fehlkonzepte</h3>${errs.length?`<div class="error-list">${errs.map(([e,n])=>`<div class="error-item"><span>${esc(humanError(e))}</span><strong>${n}×</strong></div>`).join('')}</div>`:'<p>Noch keine klassifizierten Fehlversuche.</p>'}</div><div class="callout"><strong>Beherrschungskriterium:</strong> Du kannst ein konzeptuelles Kriterium operationalisieren, die fünf zentralen Probleme der Kriteriumsvalidität diagnostizieren, den Busfall quellengetreu revidieren, Test A und B unter gleichem Zeitbudget verrechnen und Prozentangaben mit eindeutiger Bezugsgröße formulieren.</div><div class="footer-nav"><button class="btn" data-goto="mastery">← Abschlussfall</button><button class="btn btn-primary" data-goto="workflow">Training wiederholen</button></div>`}

ne_ereignisse_ignoriert": "Geringe Varianz seltener Ereignisse im kurzen Beobachtungszeitraum übersehen", "varianz_reliabilitaet_falsch_revidiert": "Varianz- oder Reliabilitätsproblem durch künstliche Datenänderung statt Designverbesserung behandelt", "busfall_unvollstaendig": "Varianz, Kontamination oder Defizienz im Originalfall ausgelassen", "busverbesserungen_vertauscht": "Quellennahe Verbesserungsmaßnahmen dem falschen Kriterienproblem zugeordnet", "laengerer_zeitraum_als_allheilmittel": "Längeren Beobachtungszeitraum als vollständige Lösung aller Kriterienprobleme behandelt", "buskriterium_einseitig": "Ein enges Einzelkriterium als vollständiges Leistungsmaß ausgewählt", "verlaengerungsfaktoren_falsch": "Verlängerungsfaktoren für das 30-Item-Zeitbudget falsch bestimmt", "testvergleich_rel_a_falsch": "Reliabilität von Test A nach Verlängerung falsch berechnet", "testvergleich_rel_b_falsch": "Reliabilität von Test B nach Verlängerung falsch berechnet", "korrigierte_validitaeten_falsch": "Einfache Minderungskorrektur der Ausgangsvaliditäten falsch durchgeführt", "ausgangsvaliditaet_allein": "Testvergleich nur anhand der ursprünglichen Validitätskoeffizienten vorgenommen", "zielreliabilitaet_b_falsch": "Erforderliche Reliabilität von Test B für die Zielvalidität falsch berechnet", "testlaenge_b_falsch": "Verlängerungsfaktor oder ganzzahlige Testlänge von Test B falsch abgeleitet", "prozent_nenner_falsch": "Mehrbedarf und Ersparnis mit derselben oder falschen Bezugsgröße berechnet", "abschluss_kriterienprobleme_falsch": "Kriterienprobleme und Varianzeinschränkung im Abschlussfall unvollständig diagnostiziert", "abschluss_val_x_falsch": "Erwartete Validität von Prädiktor X nach Verlängerung falsch berechnet", "abschluss_val_y_falsch": "Erwartete Validität von Prädiktor Y nach Verlängerung falsch berechnet", "abschluss_minimalunterschied_ueberbewertet": "Minimalen Rechenunterschied als alleinige Testentscheidung überbewertet"})[e]||String(e).replaceAll('_',' ')}
function bindTaskEvents(){document.querySelectorAll('[data-task]').forEach(el=>{el.querySelectorAll('[data-check]').forEach(b=>b.addEventListener('click',()=>checkTask(el.dataset.task)));el.querySelectorAll('[data-hint]').forEach(b=>b.addEventListener('click',()=>showHint(el.dataset.task,Number(b.dataset.hint),b)));el.querySelectorAll('[data-move]').forEach(b=>b.addEventListener('click',()=>moveOrder(b)));el.querySelectorAll('.matrix-cell').forEach(b=>b.addEventListener('click',()=>{b.setAttribute('aria-pressed',b.getAttribute('aria-pressed')!=='true')}))})}
function bindPageButtons(){document.querySelectorAll('[data-goto]').forEach(b=>b.addEventListener('click',()=>showPage(b.dataset.goto)))}
function moveOrder(btn){const li=btn.closest('li'),list=li.parentElement;if(btn.dataset.move==='up'&&li.previousElementSibling)list.insertBefore(li,li.previousElementSibling);if(btn.dataset.move==='down'&&li.nextElementSibling)list.insertBefore(li.nextElementSibling,li);[...list.children].forEach((x,i)=>x.querySelector('strong').textContent=`${i+1}.`)}
function showHint(id,i,btn){const box=document.getElementById(`hint-${id}-${i}`);if(!box)return;const opening=box.style.display!=='block';box.style.display=opening?'block':'none';btn.textContent=opening?`Hinweis ${i+1} ausblenden`:`Hinweis ${i+1} anzeigen`;if(opening){const st=taskState(id);st.hints+=1;saveState()}}
function selectedValues(article){return [...article.querySelectorAll('input:checked')].map(x=>Number(x.value)).sort((a,b)=>a-b)}
function arraysEqual(a,b){return JSON.stringify(a)===JSON.stringify(b)}
function getMisconception(t,ans){if(t.misconceptionByAnswer&&t.type==='single'&&ans!=null)return t.misconceptionByAnswer[String(ans)]||t.misconception;return t.misconception}
function nextRetryGuidance(t,article,st){const hints=t.hints||[];for(let i=0;i<hints.length;i++){const box=document.getElementById(`hint-${t.id}-${i}`);if(box&&box.style.display!=='block'){box.style.display='block';const btn=article.querySelector(`[data-hint="${i}"]`);if(btn)btn.textContent=`Hinweis ${i+1} ausblenden`;st.hints+=1;return `Nächster Schritt – Hinweis ${i+1}: ${hints[i]}`}}const fallback={order:'Fixiere zuerst den eindeutigsten Anfang und das Ende; ordne danach nur die verbleibenden Übergänge.',match:'Ordne zuerst die eindeutigsten Paare zu und prüfe anschließend jede verbleibende Zeile gegen die noch freien Kategorien.',multi:'Bewerte jede Aussage einzeln: Wird sie durch Prompt und Theorie gestützt oder widerspricht sie einer sichtbaren Angabe?',number:'Notiere gegebene Werte und Formel, setze mit Einheiten ein und kontrolliere jeden Zwischenschritt.',single:'Streiche zunächst Optionen, die einer sichtbaren Angabe oder dem Grundprinzip widersprechen.'};return fallback[t.type]||'Prüfe deine Antwort anhand von Prompt, Theorie und den bereits geöffneten Hinweisen.'}
function checkTask(id){const t=tasks.find(x=>x.id===id),article=document.getElementById(`task-${id}`),st=taskState(id);let ans,ok=false;
 if(t.type==='single'||t.type==='multi'){ans=selectedValues(article);if(t.type==='single')ans=ans.length?ans[0]:null;ok=t.type==='single'?ans===t.answer:arraysEqual(ans,[...t.answer].sort((a,b)=>a-b))}
 else if(t.type==='number'){const raw=article.querySelector('.number-input').value.trim().replace(',','.');ans=Number(raw);ok=raw!==''&&Number.isFinite(ans)&&Math.abs(ans-t.answer)<=Number(t.tolerance||0)}
 else if(t.type==='order'){ans=[...article.querySelectorAll('.order-item')].map(x=>Number(x.dataset.orig));ok=arraysEqual(ans,t.answer)}
 else if(t.type==='matrix'){ans=[...article.querySelectorAll('.matrix-cell[aria-pressed="true"]')].map(x=>x.dataset.pair).sort();ok=arraysEqual(ans,[...t.answer].sort())}
 else if(t.type==='match'){ans=[...article.querySelectorAll('[data-match-row]')].map(x=>x.value===''?null:Number(x.value));ok=arraysEqual(ans,t.answer)}
 else if(t.type==='grid'){ans=t.gridRows.map((_,ri)=>t.gridCols.map((_,ci)=>{const el=article.querySelector(`[data-grid-row="${ri}"][data-grid-col="${ci}"]`);return el?el.value:''}));ok=arraysEqual(ans,t.answer)}
 st.attempts+=1;st.lastAnswer=ans;if(ok)st.correct=true;const misconception=!ok?getMisconception(t,ans):null;if(misconception)state.errors[misconception]=(state.errors[misconception]||0)+1;const fb=article.querySelector('.feedback');fb.className=`feedback show ${ok?'good':'bad'}`;const body=ok?t.explanation:nextRetryGuidance(t,article,st);const reveal=(!ok&&st.attempts>=2)?`<div class="solution-reveal"><button type="button" data-reveal>Erklärung anzeigen</button></div>`:'';fb.innerHTML=`<strong>${ok?'Richtig.':'Noch nicht richtig.'}</strong><div>${esc(body)}</div>${misconception?`<div class="misconception">Möglicher Denkfehler: ${esc(humanError(misconception))}</div>`:''}${reveal}`;const revealBtn=fb.querySelector('[data-reveal]');if(revealBtn)revealBtn.addEventListener('click',()=>revealExplanation(id,revealBtn));article.classList.toggle('done',st.correct);article.querySelector('.status').textContent=st.correct?'gelöst':`${st.attempts} Versuch${st.attempts===1?'':'e'}`;article.querySelector('.status').classList.toggle('good',st.correct);announce(`${t.title}: ${ok?'richtig':'noch nicht richtig'}`);saveState();renderNav();updateSectionCounts()}
function revealExplanation(id,btn){const t=tasks.find(x=>x.id===id),st=taskState(id),fb=document.querySelector(`#task-${id} .feedback`);if(!t||!fb)return;st.hints+=1;fb.innerHTML+=`<div class="hint" style="display:block;margin-top:10px"><strong>Erklärung:</strong> ${esc(t.explanation)}</div>`;btn.remove();saveState()}
function showPage(id,focus=true){if(!MODULE.sections.some(s=>s.id===id))id='start';current=id;document.querySelectorAll('.page').forEach(p=>p.classList.toggle('active',p.dataset.page===id));document.querySelectorAll('.nav button').forEach(b=>{const active=b.dataset.page===id;b.setAttribute('aria-current',active?'page':'false')});if(id==='result'){const old=document.getElementById('page-result');old.innerHTML=renderResult();bindPageButtons()}saveState();if(focus){window.scrollTo({top:0,behavior:'smooth'});document.getElementById('main').focus()}}
function updateSectionCounts(){MODULE.sections.forEach(s=>{const ts=sectionTasks(s.id);if(!ts.length)return;const page=document.getElementById(`page-${s.id}`);if(!page)return;const el=page.querySelector('.section-count');if(el){const d=ts.filter(t=>taskState(t.id).correct).length;el.textContent=`${d} von ${ts.length} gelöst`}})}
function updateProgress(){const done=tasks.filter(t=>taskState(t.id).correct).length,pct=tasks.length?Math.round(done/tasks.length*100):0;document.getElementById('progressText').textContent=`${done} / ${tasks.length}`;document.getElementById('progressBar').style.width=`${pct}%`;document.querySelector('.progress').setAttribute('aria-valuenow',String(pct))}
function exportState(){const blob=new Blob([JSON.stringify({schema:'m11a-application-trainer-progress',module:MODULE.id,exportedAt:new Date().toISOString(),state},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='m11a_anwendungstrainer_07_lernstand.json';a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}
function importState(file){const reader=new FileReader();reader.onload=()=>{try{const obj=JSON.parse(reader.result);const incoming=obj.state||obj;if(!incoming.tasks)throw new Error('Ungültiges Format');state=incoming;state.version=MODULE.version;current=state.current||'start';saveState();renderNav();renderPages();showPage(current);announce('Lernstand importiert')}catch(e){alert('Die Datei konnte nicht als Lernstand importiert werden.')}};reader.readAsText(file)}
function resetState(){if(!confirm('Soll der gesamte Lernstand dieses Moduls gelöscht werden?'))return;state=defaultState();current='start';try{localStorage.removeItem(MODULE.id)}catch(e){}renderNav();renderPages();showPage('start');announce('Lernstand zurückgesetzt')}
document.getElementById('exportBtn').addEventListener('click',exportState);document.getElementById('importBtn').addEventListener('click',()=>document.getElementById('importFile').click());document.getElementById('importFile').addEventListener('change',e=>{if(e.target.files[0])importState(e.target.files[0]);e.target.value=''});document.getElementById('resetBtn').addEventListener('click',resetState);
window.__TRAINER__={MODULE,tasks,taskState,checkTask,showPage};
renderNav();renderPages();updateProgress();showPage(current,false);
</script>
