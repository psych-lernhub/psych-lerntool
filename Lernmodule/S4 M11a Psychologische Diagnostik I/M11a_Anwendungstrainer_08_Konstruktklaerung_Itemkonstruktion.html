ms:flex-start}.task-kicker{font-size:.78rem;text-transform:uppercase;letter-spacing:.08em;font-weight:800;color:var(--brand)}.task-title{font-weight:800;font-size:1.08rem;margin:3px 0 8px}.status{font-size:.82rem;font-weight:750;border-radius:99px;padding:4px 8px;background:var(--surface-2);white-space:nowrap}.status.good{color:var(--good)}.prompt{margin:13px 0}.options{display:grid;gap:9px;margin:14px 0}.option{display:flex;gap:10px;align-items:flex-start;border:1px solid var(--line);border-radius:11px;padding:11px 12px;background:var(--surface)}.option:hover{background:var(--surface-2)}.option input{margin-top:4px;accent-color:var(--brand)}.answer-row{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-top:13px}.number-input{width:min(210px,100%);padding:10px 12px;border:1px solid var(--line);border-radius:10px;background:var(--surface);color:var(--text)}.hint-box{margin-top:12px}.hint-box button{background:transparent;border:0;color:var(--brand);font-weight:700;padding:4px 0}.hint{display:none;background:var(--surface-2);border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-top:7px}.feedback{display:none;margin-top:14px;padding:13px 14px;border-radius:11px;border:1px solid var(--line)}.feedback.show{display:block}.feedback.good{border-color:var(--good);background:color-mix(in srgb,var(--good) 10%,var(--surface))}.feedback.bad{border-color:var(--bad);background:color-mix(in srgb,var(--bad) 8%,var(--surface))}.feedback strong{display:block;margin-bottom:4px}.misconception{font-size:.88rem;color:var(--muted);margin-top:7px}.order-list{list-style:none;padding:0;margin:14px 0;display:grid;gap:8px}.order-item{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;border:1px solid var(--line);border-radius:11px;padding:10px 11px;background:var(--surface-2)}.order-controls{display:flex;gap:5px}.order-controls button{width:36px;height:36px;border:1px solid var(--line);border-radius:8px;background:var(--surface);color:var(--te <script>
'use strict';
const MODULE = {"id":"m11a-apptrainer-08-v2","title":"Konstruktklärung und Itemkonstruktion","version":"2.0.0","sections":[{"id":"start","nav":"Start","title":"Vom Messziel zur prüfbaren Testrohform","intro":true},{"id":"process","nav":"1 · Konstruktionsweg","title":"Die Reihenfolge von Konstruktklärung, Itemplanung und Vorprüfung rekonstruieren","level":"Basis","theory":"Die Testkonstruktion beginnt mit der Festlegung des Messziels. Erst danach werden Trait/State, Dimensionalität, Konstruktdefinition, Datenart, Konstruktionsstrategie und Rahmenbedingungen geklärt. Die Itemrohform wird anschließend formuliert, vorgeprüft und erst dann empirisch optimiert."},{"id":"target","nav":"2 · Messziel","title":"Trait, State, Dimensionalität und Zielgruppe trennscharf bestimmen","level":"Basis","theory":"Traits bezeichnen relativ stabile Dispositionen, States aktuelle oder situative Zustände. Ob ein Merkmal uni- oder multidimensional modelliert wird, ist zunächst theoretisch zu begründen und später empirisch zu prüfen. Zielgruppe und Einsatzkontext bestimmen, welche Inhalte und Schwierigkeitsbereiche informativ sind."},{"id":"model","nav":"3 · Messprinzip","title":"Reflektive und formative Messlogik anhand der Kausalrichtung unterscheiden","level":"Standard","theory":"Psychologische Tests folgen in der Regel einem reflektiven Messprinzip: Das latente Merkmal erklärt die Itemantworten. In formativen Modellen formen unterschiedliche Indikatoren den Gesamtwert. Daraus folgen unterschiedliche Erwartungen an Austauschbarkeit, Interkorrelationen und interne Konsistenz."},{"id":"definition","nav":"4 · Definition & Netzwerk","title":"Eine enge Konstruktdefinition und ein prüfbares nomologisches Netzwerk aufbauen","level":"Standard","theory":"Eine Konstruktdefinition grenzt ein, was zum Merkmal gehört und was nicht. Bei multidimensionalen Konstrukten werden Teilbereiche benannt. Ein nomologisches Netzwerk ergänzt erwartete positive, negative oder geringe Beziehungen zu anderen Variablen; es ersetzt die Definition nicht."},{"id":"wording","nav":"5 · Itemformulierung","title":"Verständlichkeit, Eindeutigkeit und Konstruktpassung zellgenau prüfen","level":"Standard","theory":"Items sollen für die Zielgruppe verständlich, nicht unnötig lang, eindeutig interpretierbar und frei von doppelten Verneinungen sein. Itemstamm und Antwortskala müssen zusammenpassen; Zeitpunkte und Zeitspannen sind klar festzulegen. Jedes Item soll plausibel das intendierte Merkmal erfassen."},{"id":"response","nav":"6 · Antwortformat","title":"Likert-Skalen, Kategorienzahl und Verankerungen kontextgerecht planen","level":"Standard","theory":"Ratingskalen unterscheiden sich in Kategorienzahl, verbaler, numerischer oder symbolischer Verankerung, Uni- versus Bipolarität sowie Mittel- und Weiß-nicht-Kategorie. Die Vorlesung nennt allgemeine Empfehlungen; Aufgabenblatt 2 legt für das konkrete Projekt eine fünf- bis siebenstufige Likert-Skala mit Aussageformat fest."},{"id":"polarity","nav":"7 · Polung & Antworttendenzen","title":"Polung relativ zum Zielkonstrukt bestimmen und Akquieszenz ohne Methodenartefakte begrenzen","level":"Transfer","theory":"Gleich gepolte Items können Merkmalsausprägung mit allgemeiner Zustimmungstendenz konfundieren. Gegenpolung kann Akquieszenz reduzieren, doch negativ formulierte Items können verwirren oder einen Methodenfaktor bilden. Inhaltliche Klarheit hat Vorrang vor einer mechanischen 50:50-Verteilung."},{"id":"blueprint","nav":"8 · Blueprint & Außenkriterien","title":"Facettenabdeckung, Dokumentation und Validierungshypothesen vor der Erhebung planen","level":"Transfer","theory":"Aufgabenblatt 2 verlangt etwa vier Items pro Subfacette, die Spalten Itemtext, Facette und Polung sowie mindestens zwei praktisch erhebbare Außenkriterien. Außenkriterien werden aus theoretisch erwarteten Beziehungen abgeleitet und nicht erst nach Sichtung der Ergebnisse ausgewählt."},{"id":"mastery","nav":"9 · Abschlussfall","title":"Eine neue Testrohform als zusammenhängendes Konstruktionsaudit begutachten","level":"Transfer","theory":"Der Abschlussfall verbindet Definition, Dimensionalität, reflektive Messlogik, Itemformulierungen, Antwortformat, Polung, Facettenabdeckung und Außenkriterien. Eine Rohform ist erst bereit für die Pilotierung, wenn die theoretische und sprachliche Prüfung nachvollziehbar dokumentiert ist."},{"id":"result","nav":"Ergebnis","title":"Lernstand und Fehlkonzeptprofil","result":true}]};
const tasks = [{"id":"process-1","section":"process","type":"order","title":"Vom Messziel zur empirisch prüfbaren Rohform","level":"Basis","promptHtml":"<figure class=\"construction-flow\"><figcaption>Konstruktionslogik</figcaption><div class=\"flow-grid\"><div class=\"flow-node\"><b>Messziel</b><span>Was und für wen?</span></div><div class=\"flow-arrow\">→</div><div class=\"flow-node\"><b>Definition</b><span>Inhalt und Grenzen</span></div><div class=\"flow-arrow\">→</div><div class=\"flow-node\"><b>Blueprint</b><span>Facetten und Formate</span></div><div class=\"flow-arrow\">→</div><div class=\"flow-node\"><b>Rohform</b><span>mehr Items als Endform</span></div><div class=\"flow-arrow\">→</div><div class=\"flow-node\"><b>Vorprüfung</b><span>Verständlichkeit und Passung</span></div></div></figure><p>Bringe die Arbeitsschritte in eine fachlich sinnvolle Reihenfolge.</p>","items":["Messziel, Zielgruppe und Einsatzkontext festlegen","Trait/State und Dimensionalität theoretisch klären","Konstruktdefinition und nomologisches Netzwerk formulieren","Datenart, Konstruktionsstrategie und Antwortformat planen","Facetten-Blueprint mit Itemzahlen erstellen","eine längere Testrohform formulieren","Items fachlich und sprachlich vorprüfen","Rohform an einer Stichprobe empirisch optimieren"],"start":[5,2,7,0,6,3,1,4],"answer":[0,1,2,3,4,5,6,7],"hints":["Die empirische Optimierung setzt eine bereits formulierte Rohform voraus.","Außenbeziehungen werden aus einer Definition abgeleitet, nicht umgekehrt."],"explanation":"Die Reihenfolge folgt dem Ablauf der Testkonstruktion: Messziel und Theorie strukturieren den Blueprint; erst danach werden Items formuliert, vorgeprüft und empirisch selektiert.","source":"PD02 Testkonstruktion, S. 6–11 und 47–49","misconception":"items_vor_messziel","retry":"Trenne Messziel, Definition, konkrete Itemformulierung und spätere empirische Prüfung. Prüfe bei Items jeweils nur ein Problem nach dem anderen: Konstruktpassung, Verständlichkeit, Antwortformat und Polung."},{"id":"process-2","section":"process","type":"match","title":"Planungsschritt und unmittelbares Arbeitsergebnis verbinden","level":"Basis","prompt":"Ordne jedem Planungsschritt das Ergebnis zu, das unmittelbar daraus hervorgeht.","rows":["Trait/State-Entscheidung","Dimensionalitätsentscheidung","Konstruktdefinition","Recherche bestehender Verfahren","Item-Blueprint","nomologisches Netzwerk"],"options":["zeitlicher Bezugsrahmen","Anzahl und Benennung theoretischer Teilbereiche","inhaltliche Ein- und Ausschlussgrenzen","Liste von mindestens zwei etablierten Tests","geplante Itemzahl je Facette und Polungsrichtung","erwartete Beziehungen zu anderen Variablen"],"answer":[0,1,2,3,4,5],"hints":["Der Blueprint verteilt Items; das Netzwerk verteilt keine Items.","Trait/State betrifft Stabilität und Situationsbezug."],"explanation":"Die Schritte erzeugen unterschiedliche, aufeinander aufbauende Entscheidungen. Die Recherche bestehender Verfahren erfüllt einen eigenen Auftrag aus Aufgabenblatt 1 und ersetzt weder Definition noch Blueprint.","source":"PD02 Testkonstruktion, S. 7–10 · Aufgabenblatt 1","misconception":"planungsergebnisse_vertauscht","retry":"Trenne Messziel, Definition, konkrete Itemformulierung und spätere empirische Prüfung. Prüfe bei Items jeweils nur ein Problem nach dem anderen: Konstruktpassung, Verständlichkeit, Antwortformat und Polung."},{"id":"process-3","section":"process","type":"multi","title":"Arbeitsauftrag aus Aufgabenblatt 1 vollständig erkennen","level":"Basis","prompt":"Welche Punkte verlangt Aufgabenblatt 1 ausdrücklich für die theoretische Konstruktklärung?","options":["Trait oder State einordnen","Uni- oder Multidimensionalität und Teilbereiche klären","eine enge Definition formulieren","Beispielverhalten bei hoher Ausprägung und praktische Folgen beschreiben","mindestens zwei etablierte Messverfahren nennen","Cronbachs Alpha der neuen Skala berechnen"],"answer":[0,1,2,3,4],"hints":["Aufgabenblatt 1 liegt vor der Datenerhebung.","Reliabilitätsberechnungen gehören zu späteren Arbeitsschritten."],"explanation":"Das Blatt verlangt fünf theoretische und recherchierende Schritte. Eine empirische Reliabilitätsanalyse ist dort noch nicht vorgesehen.","source":"Aufgabenblatt 1","misconception":"arbeitsblatt1_mit_statistik_vermischt","retry":"Trenne Messziel, Definition, konkrete Itemformulierung und spätere empirische Prüfung. Prüfe bei Items jeweils nur ein Problem nach dem anderen: Konstruktpassung, Verständlichkeit, Antwortformat und Polung."},{"id":"process-4","section":"process","type":"multi","title":"Arbeitsauftrag aus Aufgabenblatt 2 vollständig erkennen","level":"Basis","prompt":"Welche Anforderungen nennt Aufgabenblatt 2 für die Itemrohform und Validierungsplanung?","options":["etwa vier Items pro Subfacette","Aussagen im Likert-Format mit fünf bis sieben Stufen","ausgewogenes Verhältnis positiv und negativ gepolter Items","Dokumentation von Itemtext, Facette und Polung","mindestens zwei praktisch erhebbare Außenkriterien","nur ein Item pro Gesamtkonstrukt"],"answer":[0,1,2,3,4],"hints":["Das Blatt plant ungefähr 24 Items bei sechs Subfacetten.","Die Außenkriterien sollen in der realen Erhebung mitlaufen können."],"explanation":"Aufgabenblatt 2 verbindet Itemmenge, Format, Polung, Dokumentation und vorab geplante Außenkriterien. Ein Einzelitem pro Gesamtkonstrukt widerspricht diesem Auftrag.","source":"Aufgabenblatt 2","misconception":"arbeitsblatt2_anforderungen_unvollstaendig","retry":"Trenne Messziel, Definition, konkrete Itemformulierung und spätere empirische Prüfung. Prüfe bei Items jeweils nur ein Problem nach dem anderen: Konstruktpassung, Verständlichkeit, Antwortformat und Polung."},{"id":"target-1","section":"target","type":"match","title":"Trait oder State anhand des zeitlichen Bezugs zuordnen","level":"Basis","prompt":"Ordne die vier Messziele zu.","rows":["allgemeine Tendenz, Aufgaben sorgfältig zu planen","momentane Anspannung direkt vor einer Prüfung","Stimmung während der letzten Stunde","langfristige Neigung, soziale Kontakte aktiv zu suchen"],"options":["Trait","State"],"answer":[0,1,1,0],"hints":["„momentan“ und ein enger Situationsbezug sprechen für State.","Eine relativ stabile Tendenz über Situationen hinweg spricht für Trait."],"explanation":"Trait und State unterscheiden sich nicht primär im Inhalt, sondern im beanspruchten zeitlichen und situativen Geltungsbereich.","source":"PD02 Testkonstruktion, S. 7 · Aufgabenblatt 1","misconception":"trait_state_vertauscht","retry":"Trenne Messziel, Definition, konkrete Itemformulierung und spätere empirische Prüfung. Prüfe bei Items jeweils nur ein Problem nach dem anderen: Konstruktpassung, Verständlichkeit, Antwortformat und Polung."},{"id":"target-2","section":"target","type":"single","title":"Dimensionalität theoretisch angemessen planen","level":"Basis","prompt":"Ein Modell der Selbstorganisation unterscheidet Planung, Ablenkungsregulation und Zielpersistenz. Welche Entscheidung ist vor der Datenerhebung am angemessensten?","options":["Die drei Teilbereiche im Blueprint getrennt abbilden und ihre Struktur später empirisch prüfen.","Alle Teilbereiche ohne Begründung zu einem einzigen Item zusammenziehen.","Die Teilbereiche erst nach Kenntnis der Faktorladungen erfinden.","Dimensionalität ist für die Itemkonstruktion irrelevant."],"answer":0,"hints":["Die Vorlesung bezeichnet die Dimensionalität als theoretische Festlegung, die später empirisch überprüft wird.","Jeder postulierte Teilbereich braucht zunächst inhaltliche Repräsentation."],"explanation":"Die theoretische Struktur steuert den Blueprint. Die empirische Analyse kann sie später stützen, verändern oder verwerfen, darf aber keine fehlenden Inhalte nachträglich ersetzen.","source":"PD02 Testkonstruktion, S. 7–8","misconception":"dimensionalitaet_erst_nach_daten","retry":"Trenne Messziel, Definition, konkrete Itemformulierung und spätere empirische Prüfung. Prüfe bei Items jeweils nur ein Problem nach dem anderen: Konstruktpassung, Verständlichkeit, Antwortformat und Polung."},{"id":"target-3","section":"target","type":"multi","title":"Definition, Indikator und praktische Folge auseinanderhalten","level":"Basis","prompt":"Das Zielkonstrukt ist „berufliche Gewissenhaftigkeit“. Welche Aussagen sind eher beobachtbare Indikatoren oder Folgen und nicht bereits eine vollständige Definition?","options":["Eine Person hält vereinbarte Fristen ein.","Eine Person plant Arbeitsschritte vorausschauend.","Die Person wird möglicherweise seltener wegen versäumter Termine kritisiert.","Berufliche Gewissenhaftigkeit ist eine relativ stabile Tendenz zu planvollem, zuverlässigem und zielgerichtetem Arbeitsverhalten."],"answer":[0,1,2],"hints":["Eine Definition benennt den gemeinsamen Merkmalskern.","Ein einzelnes Verhalten oder eine Folge illustriert, aber definiert das gesamte Konstrukt nicht."],"explanation":"Die ersten drei Aussagen operationalisieren oder beschreiben Konsequenzen. Nur die vierte Aussage bündelt Stabilität, Inhalt und Geltungsbereich zu einer Konstruktdefinition.","source":"Aufgabenblatt 1 · PD02 Testkonstruktion, S. 6–10","misconception":"beispiel_als_definition","retry":"Trenne Messziel, Definition, konkrete Itemformulierung und spätere empirische Prüfung. Prüfe bei Items jeweils nur ein Problem nach dem anderen: Konstruktpassung, Verständlichkeit, Antwortformat und Polung."},{"id":"target-4","section":"target","type":"single","title":"Zielgruppe als Teil der Testplanung berücksichtigen","level":"Standard","prompt":"Ein Fragebogen soll digitale Selbstorganisation bei Erstsemesterstudierenden erfassen. Welche Revision verbessert die Zielgruppenpassung am stärksten?","options":["Items auf typische Studienaufgaben, Fristen und digitale Ablenkungen beziehen und unbekannte Fachbegriffe vermeiden.","Items ausschließlich auf Führungserfahrung in Großunternehmen beziehen.","Den gleichen Wortlaut unabhängig von Alter und Kontext verwenden.","Möglichst abstrakte Fremdwörter nutzen, damit der Test wissenschaftlich klingt."],"answer":0,"hints":["Zielgruppenpassung betrifft Verständlichkeit und informative Situationen.","Der Test soll Unterschiede im relevanten Lebensbereich der Zielgruppe sichtbar machen."],"explanation":"Die Zielgruppe bestimmt, welche Situationen verständlich, relevant und ausreichend variabel sind. Kontextfremde oder unnötig abstrakte Inhalte schwächen die Messung.","source":"PD02 Testkonstruktion, S. 20 und 48","misconception":"zielgruppe_ignoriert","retry":"Trenne Messziel, Definition, konkrete Itemformulierung und spätere empirische Prüfung. Prüfe bei Items jeweils nur ein Problem nach dem anderen: Konstruktpassung, Verständlichkeit, Antwortformat und Polung."},{"id":"model-1","section":"model","type":"single","title":"Reflektives Messprinzip an der Kausalrichtung erkennen","level":"Standard","promptHtml":"<div class=\"model-pair\"><figure><figcaption>Reflektiv</figcaption><div class=\"latent\">latentes Merkmal</div><div class=\"model-arrow\">↓</div><div class=\"indicators\"><span>Item 1</span><span>Item 2</span><span>Item 3</span></div><p>Merkmal → Antworten</p></figure><figure><figcaption>Formativ</figcaption><div class=\"indicators\"><span>Indikator 1</span><span>Indikator 2</span><span>Indikator 3</span></div><div class=\"model-arrow\">↓</div><div class=\"latent\">Gesamtwert</div><p>Indikatoren → Konstruktwert</p></figure></div><p>Eine hohe Gewissenhaftigkeit soll dazu führen, dass Personen mehrere planungs- und zuverlässigkeitsbezogene Items entsprechend beantworten. Welches Modell ist gemeint?</p>","options":["reflektives Messmodell","formatives Messmodell","reines Außenkriterium","Retestdesign"],"answer":0,"hints":["Frage: Verursacht das Merkmal die Antworten oder bilden die Indikatoren erst den Gesamtwert?","Hier wird eine gemeinsame latente Ursache angenommen."],"explanation":"Im reflektiven Modell ist das latente Merkmal die Ursache der beobachtbaren Itemantworten. Das entspricht dem üblichen Messprinzip psychologischer Tests.","source":"PD02 Testkonstruktion, S. 3–4","misconception":"reflektiv_formativ_vertauscht","retry":"Trenne Messziel, Definition, konkrete Itemformulierung und spätere empirische Prüfung. Prüfe bei Items jeweils nur ein Problem nach dem anderen: Konstruktpassung, Verständlichkeit, Antwortformat und Polung."},{"id":"model-2","section":"model","type":"single","title":"Formatives Messprinzip erkennen","level":"Standard","prompt":"Ein Index „digitale Belastung“ wird aus täglicher Bildschirmzeit, Zahl paralleler Chats und nächtlichen Benachrichtigungen gebildet. Die Indikatoren müssen nicht miteinander korrelieren. Welche Logik passt am besten?","options":["formativ: Die Indikatoren formen den Index.","reflektiv: Ein einziges latentes Merkmal verursacht zwingend alle Indikatoren.","Kriteriumsvalidität ohne Messmodell.","Paralleltest-Reliabilität."],"answer":0,"hints":["Die Vorlesung nennt fehlende notwendige Interkorrelation als mögliches Merkmal formativer Indikatoren.","Verschiedene Belastungsquellen werden additiv zum Gesamtwert verbunden."],"explanation":"Bei einer formativen Logik konstituieren unterschiedliche Indikatoren den Gesamtwert. Austauschbarkeit und hohe interne Konsistenz sind daher nicht automatisch zu erwarten.","source":"PD02 Testkonstruktion, S. 3","misconception":"formativer_index_reflektiv_gedeutet","retry":"Trenne Messziel, Definition, konkrete Itemformulierung und spätere empirische Prüfung. Prüfe bei Items jeweils nur ein Problem nach dem anderen: Konstruktpassung, Verständlichkeit, Antwortformat und Polung."},{"id":"model-3","section":"model","type":"match","title":"Folgen beider Messmodelle zuordnen","level":"Standard","prompt":"Ordne die Aussagen dem besser passenden Messmodell zu.","rows":["Latentes Merkmal erklärt die Itemantworten.","Indikatoren müssen nicht zwingend korrelieren.","Entfernen eines inhaltlich einzigartigen Indikators kann die Bedeutung des Gesamtwerts verändern.","Mehrere Items sollen beobachtbare Folgen desselben Merkmals abbilden."],"options":["reflektiv","formativ"],"answer":[0,1,1,0],"hints":["Reflektive Items teilen eine angenommene Ursache.","Formative Indikatoren können jeweils einen eigenen Bestandteil beitragen."],"explanation":"Die Zuordnung folgt der Kausalrichtung. Sie bestimmt, ob Items als ähnliche Manifestationen oder als unterschiedliche Bestandteile verstanden werden.","source":"PD02 Testkonstruktion, S. 3–4","misconception":"messmodellfolgen_vertauscht","retry":"Trenne Messziel, Definition, konkrete Itemformulierung und spätere empirische Prüfung. Prüfe bei Items jeweils nur ein Problem nach dem anderen: Konstruktpassung, Verständlichkeit, Antwortformat und Polung."},{"id":"model-4","section":"model","type":"single","title":"Cronbachs Alpha nicht modellblind einsetzen","level":"Standard","prompt":"Welche Aussage ist am angemessensten?","options":["Bei einer reflektiven Skala ist interne Konsistenz relevant, aber sie ersetzt weder Definition noch Dimensionalitätsprüfung.","Ein formativer Index muss zwingend ein sehr hohes Alpha besitzen.","Ein hohes Alpha beweist automatisch Validität.","Das Messmodell ist für die Interpretation von Alpha bedeutungslos."],"answer":0,"hints":["Interne Konsistenz passt vor allem zur Idee gemeinsamer reflektiver Indikatoren.","Alpha beantwortet nicht, ob die richtigen Inhalte gemessen werden."],"explanation":"Die Messlogik begrenzt, welche Kennwerte sinnvoll sind. Selbst bei reflektiven Skalen ist Alpha nur ein Teil der Qualitätsprüfung und kein Validitätsbeweis.","source":"PD02 Testkonstruktion, S. 3–4 · Transfer zu PD06","misconception":"alpha_als_validitaetsbeweis","retry":"Trenne Messziel, Definition, konkrete Itemformulierung und spätere empirische Prüfung. Prüfe bei Items jeweils nur ein Problem nach dem anderen: Konstruktpassung, Verständlichkeit, Antwortformat und Polung."},{"id":"definition-1","section":"definition","type":"single","title":"Eine enge und operationalisierbare Definition auswählen","level":"Standard","prompt":"Welche Definition eignet sich am besten für eine neue Skala „digitale Selbstorganisation im Studium“?","options":["Digitale Selbstorganisation ist alles, was gute Studierende tun.","Digitale Selbstorganisation bezeichnet eine relativ stabile Tendenz, digitale Studienaufgaben vorausschauend zu planen, Ablenkungen zu regulieren und begonnene Aufgaben trotz nachlassender Motivation fortzuführen.","Digitale Selbstorganisation liegt vor, wenn die neue Skala hohe Werte ergibt.","Digitale Selbstorganisation ist Erfolg."],"answer":1,"hints":["Die Definition soll Merkmalskern, Geltungsbereich und Teilbereiche benennen.","Zirkuläre und wertende Formulierungen grenzen das Konstrukt nicht ausreichend ab."],"explanation":"Die zweite Definition ist eng, nicht zirkulär und enthält drei prüfbare Teilbereiche. Sie behauptet keine späteren empirischen Ergebnisse.","source":"Aufgabenblatt 1 · PD02 Testkonstruktion, S. 8–10","misconception":"definition_zu_breit_oder_zirkulaer","retry":"Trenne Messziel, Definition, konkrete Itemformulierung und spätere empirische Prüfung. Prüfe bei Items jeweils nur ein Problem nach dem anderen: Konstruktpassung, Verständlichkeit, Antwortformat und Polung."},{"id":"definition-2","section":"definition","type":"multi","title":"Bestandteile einer tragfähigen Definition prüfen","level":"Standard","prompt":"Welche Informationen sollte eine Definition des neuen Konstrukts enthalten?","options":["zeitlicher Geltungsanspruch, etwa relativ stabil oder situativ","inhaltliche Teilbereiche","Abgrenzung zu nahen Konstrukten","Ziel- oder Anwendungskontext, sofern er Teil des Messziels ist","garantierte spätere Faktorladungen","garantierte Kriteriumsvalidität"],"answer":[0,1,2,3],"hints":["Empirische Kennwerte werden geprüft, nicht in die Definition hineingeschrieben.","Eine Definition klärt Inhalt und Grenzen."],"explanation":"Stabilität, Inhaltsstruktur, Abgrenzung und Geltungsbereich gehören zur theoretischen Festlegung. Faktorladungen und Validität sind spätere empirische Evidenz.","source":"Aufgabenblatt 1 · PD02 Testkonstruktion, S. 7–10","misconception":"definition_empirie_vorweggenommen","retry":"Trenne Messziel, Definition, konkrete Itemformulierung und spätere empirische Prüfung. Prüfe bei Items jeweils nur ein Problem nach dem anderen: Konstruktpassung, Verständlichkeit, Antwortformat und Polung."},{"id":"definition-3","section":"definition","type":"match","title":"Elemente eines nomologischen Netzwerks klassifizieren","level":"Standard","promptHtml":"<figure class=\"network-visual\"><figcaption>Nomologisches Netzwerk für „digitale Selbstorganisation“</figcaption><div class=\"network-stage\"><div class=\"network-center\">digitale<br>Selbstorganisation</div><div class=\"network-node n1\">fristgerechte<br>Abgaben <b>+</b></div><div class=\"network-node n2\">Ablenkbarkeit <b>−</b></div><div class=\"network-node n3\">Gewissenhaftigkeit <b>+</b></div><div class=\"network-node n4\">Schuhgröße <b>0</b></div><span class=\"link l1\"></span><span class=\"link l2\"></span><span class=\"link l3\"></span><span class=\"link l4\"></span></div></figure><p>Ordne die erwarteten Beziehungen zu.</p>","rows":["fristgerechte Abgabequote","Ablenkbarkeit durch Benachrichtigungen","Gewissenhaftigkeit","Schuhgröße"],"options":["positive Beziehung","negative Beziehung","geringe oder keine systematische Beziehung"],"answer":[0,1,0,2],"hints":["Ein Netzwerk enthält sowohl konvergente als auch diskriminante Erwartungen.","Schuhgröße ist hier ein bewusst konstruiertes Nullkriterium."],"explanation":"Das Netzwerk macht vor der Datenauswertung prüfbare Erwartungen sichtbar. Es begründet, welche Beziehungen das Konstrukt stützen oder gegen eine zu breite Interpretation sprechen würden.","source":"PD02 Testkonstruktion, S. 10 · Aufgabenblatt 2","misconception":"nomologisches_netzwerk_falsch","retry":"Trenne Messziel, Definition, konkrete Itemformulierung und spätere empirische Prüfung. Prüfe bei Items jeweils nur ein Problem nach dem anderen: Konstruktpassung, Verständlichkeit, Antwortformat und Polung."},{"id":"definition-4","section":"definition","type":"single","title":"Nachbarkonstrukt von der Zieldefinition abgrenzen","level":"Transfer","prompt":"Das Item „Ich bleibe auch in Prüfungssituationen innerlich ruhig“ soll digitale Selbstorganisation messen. Was ist die beste Diagnose?","options":["Es erfasst wahrscheinlich eher emotionale Stabilität oder Prüfungsangst und benötigt eine inhaltliche Begründung oder Ersetzung.","Es ist automatisch passend, weil ruhige Personen oft organisiert sind.","Es ist nur falsch gepolt, sonst aber eindeutig selbstorganisationsbezogen.","Jedes Verhalten im Studium gehört definitionsgemäß zur Selbstorganisation."],"answer":0,"hints":["Ein empirischer Zusammenhang zwischen Konstrukten macht sie nicht identisch.","Prüfe, ob Planung, Ablenkungsregulation oder Persistenz direkt angesprochen werden."],"explanation":"Das Item beschreibt primär emotionales Erleben. Eine Korrelation mit Selbstorganisation würde die fehlende inhaltliche Konstruktpassung nicht automatisch beheben.","source":"PD02 Testkonstruktion, S. 10 und 49 · neu konstruierter Transferfall","misconception":"nachbarkonstrukt_ignoriert","retry":"Trenne Messziel, Definition, konkrete Itemformulierung und spätere empirische Prüfung. Prüfe bei Items jeweils nur ein Problem nach dem anderen: Konstruktpassung, Verständlichkeit, Antwortformat und Polung."},{"id":"wording-1","section":"wording","type":"single","title":"Doppelte Thematik in einem realen Projektitem erkennen","level":"Standard","prompt":"Projektitem c2 lautet: „Ich fange häufig mehrere Aufgaben gleichzeitig an und beende sie sorgsam“. Was ist das zentrale Formulierungsproblem?","options":["Es verbindet gleichzeitiges Beginnen und sorgfältiges Beenden in einer Aussage.","Es enthält keine Verben.","Es besitzt zu wenige Wörter.","Es ist zwingend ein State-Item."],"answer":0,"hints":["Eine Person könnte dem ersten Teil zustimmen und dem zweiten widersprechen.","Die Vorlesung verlangt möglichst nur eine Thematik pro Item."],"explanation":"Das Item ist doppelt beziehungsweise mehrdeutig. Die beiden Verhaltensanteile sollten in getrennte, jeweils eindeutig interpretierbare Items überführt werden.","source":"Items.xlsx: c2 · PD02 Testkonstruktion, S. 48","misconception":"doppelte_thematik_nicht_erkannt","retry":"Trenne Messziel, Definition, konkrete Itemformulierung und spätere empirische Prüfung. Prüfe bei Items jeweils nur ein Problem nach dem anderen: Konstruktpassung, Verständlichkeit, Antwortformat und Polung."},{"id":"wording-2","section":"wording","type":"single","title":"Doppelte Verneinung verständlich revidieren","level":"Standard","prompt":"Welche Revision ist für „Ich bin selten nicht unpünktlich“ am klarsten?","options":["Ich komme meistens pünktlich.","Ich bin nie selten unpünktlich.","Ich bin nicht unniemals pünktlich.","Unpünktlichkeit ist nicht unwichtig."],"answer":0,"hints":["Die Bedeutung soll ohne mentale Negationsrechnung erfassbar sein.","Eine direkte positive Formulierung ist hier möglich."],"explanation":"Die Revision erhält den intendierten Inhalt und entfernt die doppelte Verneinung. Verständlichkeit hat Vorrang vor künstlich negativer Formulierung.","source":"PD02 Testkonstruktion, S. 48","misconception":"doppelte_verneinung_beibehalten","retry":"Trenne Messziel, Definition, konkrete Itemformulierung und spätere empirische Prüfung. Prüfe bei Items jeweils nur ein Problem nach dem anderen: Konstruktpassung, Verständlichkeit, Antwortformat und Polung."},{"id":"wording-3","section":"wording","type":"single","title":"Zeitbezug eines Trait-Items kritisch prüfen","level":"Transfer","prompt":"Projektitem n10 lautet: „Ich fühle mich in der Klausurenphase gestresst.“ Welche Diagnose ist für eine allgemeine Neurotizismus-Skala am treffendsten?","options":["Der enge situative Kontext kann eher Prüfungsstress als eine situationsübergreifende Tendenz erfassen.","Das Item ist zwingend formativ.","Der Punkt am Satzende macht das Item ungültig.","Jeder Klausurbezug erhöht automatisch die Konstruktvalidität."],"answer":0,"hints":["Vergleiche den engen Zeitraum mit dem beanspruchten Trait-Geltungsbereich.","Ein verständliches Item kann dennoch zu kontextspezifisch sein."],"explanation":"Das Item ist sprachlich verständlich, aber der Situationsbezug ist enger als der allgemeine Trait. Es müsste entweder zum Messziel passen oder breiter formuliert werden.","source":"Items.xlsx: n10 · PD02 Testkonstruktion, S. 7 und 48","misconception":"zeitbezug_und_trait_vermischt","retry":"Trenne Messziel, Definition, konkrete Itemformulierung und spätere empirische Prüfung. Prüfe bei Items jeweils nur ein Problem nach dem anderen: Konstruktpassung, Verständlichkeit, Antwortformat und Polung."},{"id":"wording-4","section":"wording","type":"single","title":"Konstruktpassung eines realen Projektitems beurteilen","level":"Transfer","prompt":"Projektitem o19 lautet: „In Gruppenarbeiten halte ich mich eher zurück.“ Warum ist es für Offenheit problematisch?","options":["Es scheint stärker soziale Zurückhaltung beziehungsweise Extraversion zu betreffen als Offenheit.","Es ist negativ formuliert und daher automatisch ungültig.","Gruppenarbeiten dürfen in Fragebögen nie erwähnt werden.","Es besitzt keine Antwortskala im Satz selbst."],"answer":0,"hints":["Polung und Konstruktzugehörigkeit sind verschiedene Fragen.","Frage, welches Merkmal das beobachtete Verhalten am direktesten erklärt."],"explanation":"Das Item kann sinnvoll formuliert sein und dennoch das falsche Konstrukt adressieren. Eine bloße Invertierung würde den inhaltlichen Zuordnungsfehler nicht lösen.","source":"Items.xlsx: o19 · PD02 Testkonstruktion, S. 49","misconception":"konstruktproblem_als_polungsproblem","retry":"Trenne Messziel, Definition, konkrete Itemformulierung und spätere empirische Prüfung. Prüfe bei Items jeweils nur ein Problem nach dem anderen: Konstruktpassung, Verständlichkeit, Antwortformat und Polung."},{"id":"response-1","section":"response","type":"single","title":"Projektanforderung und allgemeine Vorlesungsempfehlung unterscheiden","level":"Standard","prompt":"Welche Kategorienzahl gilt für die konkrete Big-Five-Rohform aus Aufgabenblatt 2?","options":["fünf bis sieben Stufen","zwingend genau neun Stufen","zwingend zwei Stufen","beliebig viele, solange Zahlen verwendet werden"],"answer":0,"hints":["Die Vorlesung diskutiert allgemeine Empfehlungen, das Arbeitsblatt legt das Projektformat fest.","Gesucht ist die explizite Vorgabe des Aufgabenblatts."],"explanation":"Aufgabenblatt 2 verlangt fünf bis sieben Stufen. Die allgemeine Vorlesungsfolie nennt für Ratingskalen eine breitere Empfehlung von sieben bis neun Optionen; beide Aussagen beziehen sich auf unterschiedliche Ebenen und werden nicht still gleichgesetzt.","source":"Aufgabenblatt 2 · PD02 Testkonstruktion, S. 35","misconception":"projektvorgabe_mit_allgemeiner_empfehlung_vertauscht","retry":"Trenne Messziel, Definition, konkrete Itemformulierung und spätere empirische Prüfung. Prüfe bei Items jeweils nur ein Problem nach dem anderen: Konstruktpassung, Verständlichkeit, Antwortformat und Polung."},{"id":"response-2","section":"response","type":"match","title":"Itemstamm und Antwortskala zusammenpassen lassen","level":"Standard","prompt":"Ordne jedem Itemstamm die passendste Antwortskala zu.","rows":["„Ich plane meine Studienwoche im Voraus.“","„Wie häufig deaktivieren Sie beim Lernen Benachrichtigungen?“","„Wie zufrieden sind Sie mit Ihrer Arbeitsorganisation?“"],"options":["stimme gar nicht zu – stimme voll und ganz zu","nie – selten – gelegentlich – oft – immer","sehr unzufrieden – sehr zufrieden"],"answer":[0,1,2],"hints":["Aussagen passen zu Zustimmung, Häufigkeitsfragen zu Häufigkeit.","Die semantische Dimension des Stamms muss in der Skala fortgesetzt werden."],"explanation":"Passende Skalen reduzieren Übersetzungsfehler bei der Beantwortung. Ein Häufigkeitsstamm mit Zustimmungsskala wäre unnötig schwer interpretierbar.","source":"PD02 Testkonstruktion, S. 36 und 48","misconception":"itemstamm_skala_unpassend","retry":"Trenne Messziel, Definition, konkrete Itemformulierung und spätere empirische Prüfung. Prüfe bei Items jeweils nur ein Problem nach dem anderen: Konstruktpassung, Verständlichkeit, Antwortformat und Polung."},{"id":"response-3","section":"response","type":"multi","title":"Verbale Verankerung differenziert beurteilen","level":"Standard","prompt":"Welche Aussagen werden durch die Vorlesung gestützt?","options":["Verbale Labels können Kategorien klarer beschreiben.","Die Benennung jeder Kategorie kann die Messgenauigkeit erhöhen.","Numerische Etiketten garantieren identische psychologische Abstände.","Zu viele Kategorien werden faktisch nicht immer differenziert genutzt.","Symbolische Verankerungen können bei Kindern oder affektiven Urteilen nützlich sein."],"answer":[0,1,3,4],"hints":["Numerische Labels verfolgen ein Ziel, garantieren es aber nicht.","Die Vorlesung betont sowohl Differenzierungsmöglichkeiten als auch Nutzungsgrenzen."],"explanation":"Verbale Vollverankerung und zielgruppengerechte Symbole können hilfreich sein. Eine größere oder numerische Skala ist jedoch nicht automatisch psychometrisch überlegen.","source":"PD02 Testkonstruktion, S. 35–37","misconception":"verankerung_automatisch_perfekt","retry":"Trenne Messziel, Definition, konkrete Itemformulierung und spätere empirische Prüfung. Prüfe bei Items jeweils nur ein Problem nach dem anderen: Konstruktpassung, Verständlichkeit, Antwortformat und Polung."},{"id":"response-4","section":"response","type":"single","title":"Mittelkategorie und Weiß-nicht-Kategorie nicht gleichsetzen","level":"Transfer","prompt":"Welche Aussage ist am präzisesten?","options":["Eine Mittelkategorie kann Ambivalenz, Unsicherheit oder eine neutrale Position ausdrücken; eine Weiß-nicht-Kategorie bezeichnet fehlende Beurteilbarkeit und sollte getrennt geplant werden.","Mittelkategorie und Weiß nicht sind immer exakt dasselbe.","Eine Mittelkategorie verhindert jede Antworttendenz.","Weiß nicht muss in jedem Persönlichkeitsitem angeboten werden."],"answer":0,"hints":["Die Vorlesung diskutiert beide Optionen getrennt.","Eine neutrale Bewertung und fehlendes Wissen sind unterschiedliche Antwortzustände."],"explanation":"Die Kategorien haben verschiedene Bedeutungen und Risiken. Ihre Verwendung muss zum Gegenstand und zur intendierten Interpretation passen.","source":"PD02 Testkonstruktion, S. 39","misconception":"mitte_und_weissnicht_verwechselt","retry":"Trenne Messziel, Definition, konkrete Itemformulierung und spätere empirische Prüfung. Prüfe bei Items jeweils nur ein Problem nach dem anderen: Konstruktpassung, Verständlichkeit, Antwortformat und Polung."},{"id":"polarity-1","section":"polarity","type":"match","title":"Polung relativ zum Zielkonstrukt bestimmen","level":"Standard","prompt":"Zielkonstrukt ist Extraversion. Ordne die Projektitems nach ihrer Richtung.","rows":["e11: „Mir fällt es leicht in Gruppen das Wort zu ergreifen“","e12: „Ich bevorzuge es, alleine zu sein“","e21: „Ich zeige mich häufig unbeteiligt“"],"options":["positiv gepolt","negativ gepolt"],"answer":[0,1,1],"hints":["Polung ist relativ zur Richtung hoher Extraversion.","Ein negativ gepoltes Item kann sprachlich ohne Negationswort formuliert sein."],"explanation":"e11 steht in Richtung hoher Extraversion. e12 und e21 beschreiben Verhaltensweisen, die bei Zustimmung niedrigere Extraversion anzeigen.","source":"Items.xlsx: e11, e12, e21","misconception":"polung_aus_wortlaut","retry":"Trenne Messziel, Definition, konkrete Itemformulierung und spätere empirische Prüfung. Prüfe bei Items jeweils nur ein Problem nach dem anderen: Konstruktpassung, Verständlichkeit, Antwortformat und Polung."},{"id":"polarity-2","section":"polarity","type":"single","title":"Konstruktfremdheit von bloßer Gegenpolung unterscheiden","level":"Transfer","prompt":"Projektitem e19 lautet: „Mir fällt es schwer, andere abzuweisen“ und war negativ markiert. Welche Diagnose ist am besten?","options":["Das Item könnte eher Nachgiebigkeit oder Verträglichkeit als Extraversion erfassen; eine Invertierung löst dieses Inhaltsproblem nicht.","Jede negative Markierung beweist die Zugehörigkeit zu Extraversion.","Das Item ist nur deshalb falsch, weil es das Wort „schwer“ enthält.","Das Item ist automatisch formativ."],"answer":0,"hints":["Frage zuerst nach Konstruktpassung, erst danach nach Polungsrichtung.","Abweisen betrifft möglicherweise einen anderen interpersonellen Merkmalsbereich."],"explanation":"Eine problematische Konstruktzuordnung ist kein Rechenfehler. Das Item muss inhaltlich geprüft, revidiert oder einer anderen Skala zugeordnet werden.","source":"Items.xlsx: e19 · fa.R-Diagnostik","misconception":"polungsproblem_und_konstruktproblem_verwechselt","retry":"Trenne Messziel, Definition, konkrete Itemformulierung und spätere empirische Prüfung. Prüfe bei Items jeweils nur ein Problem nach dem anderen: Konstruktpassung, Verständlichkeit, Antwortformat und Polung."},{"id":"polarity-3","section":"polarity","type":"multi","title":"Ausgewogene Polung ohne mechanische Regel beurteilen","level":"Transfer","prompt":"Welche Aussagen sind fachlich angemessen?","options":["Gegenpolung kann Akquieszenz reduzieren.","Negativ formulierte Items können Verwirrung oder Methodenfaktoren erzeugen.","Eine exakte 50:50-Verteilung ist wichtiger als klare Inhalte.","Nicht jeder Inhalt lässt sich gleich gut in beide Richtungen formulieren.","Polung muss bei der späteren Auswertung dokumentiert und berücksichtigt werden."],"answer":[0,1,3,4],"hints":["Die Vorlesung nennt sowohl Nutzen als auch Risiken.","Aufgabenblatt 2 verlangt Ausgewogenheit, aber nicht die Verletzung von Formulierungsregeln."],"explanation":"Polungsbalance ist ein Designmittel, kein Selbstzweck. Verständlichkeit, Konstruktpassung und ein nachvollziehbarer Scoring-Key bleiben vorrangig.","source":"Aufgabenblatt 2 · PD02 Testkonstruktion, S. 55–56","misconception":"polungsbalance_mechanisch","retry":"Trenne Messziel, Definition, konkrete Itemformulierung und spätere empirische Prüfung. Prüfe bei Items jeweils nur ein Problem nach dem anderen: Konstruktpassung, Verständlichkeit, Antwortformat und Polung."},{"id":"polarity-4","section":"polarity","type":"single","title":"Akquieszenz bei ausschließlich gleich gepolten Items erklären","level":"Transfer","prompt":"Warum können ausschließlich positiv gepolte Items problematisch sein?","options":["Die Zielausprägung kann mit einer allgemeinen Zustimmungstendenz konfundiert sein.","Cronbachs Alpha wird mathematisch unmöglich.","Alle Personen wählen automatisch dieselbe Kategorie.","Die Skala wird dadurch formativ."],"answer":0,"hints":["Akquieszenz bezeichnet inhaltlich unabhängige Zustimmung.","Wenn Zustimmung bei jedem Item hohe Merkmalsausprägung bedeutet, lassen sich beide Einflüsse schwer trennen."],"explanation":"Gleichgerichtete Polung kann Antwortstil und Merkmalswert vermischen. Gegenpolung kann helfen, muss aber sprachlich sauber umgesetzt werden.","source":"PD02 Testkonstruktion, S. 51 und 55","misconception":"akquieszenz_ignoriert","retry":"Trenne Messziel, Definition, konkrete Itemformulierung und spätere empirische Prüfung. Prüfe bei Items jeweils nur ein Problem nach dem anderen: Konstruktpassung, Verständlichkeit, Antwortformat und Polung."},{"id":"blueprint-1","section":"blueprint","type":"number","title":"Rohformumfang nach Aufgabenblatt 2 berechnen","level":"Transfer","prompt":"Ein Big-Five-Bereich wird in sechs Subfacetten gegliedert. Bei etwa vier Items pro Subfacette: Wie viele Items umfasst die geplante Rohform ungefähr?","answer":24,"tolerance":0.01,"hints":["Multipliziere Anzahl der Subfacetten mit der vorgesehenen Itemzahl je Subfacette.","6 × 4."],"explanation":"Die Projektvorgabe führt zu ungefähr 24 Items. Die Rohform ist bewusst länger als eine mögliche spätere Endform, damit Selektion möglich bleibt.","source":"Aufgabenblatt 2","misconception":"rohformumfang_falsch","retry":"Trenne Messziel, Definition, konkrete Itemformulierung und spätere empirische Prüfung. Prüfe bei Items jeweils nur ein Problem nach dem anderen: Konstruktpassung, Verständlichkeit, Antwortformat und Polung."},{"id":"blueprint-2","section":"blueprint","type":"multi","title":"Blueprint auf Lücken und Designrisiken prüfen","level":"Transfer","promptHtml":"<div class=\"matrix-wrap\"><table class=\"mini-table item-table\"><caption>Blueprint vor der Pilotierung</caption><thead><tr><th scope=\"col\">Facette</th><th scope=\"col\">positive Items</th><th scope=\"col\">negative Items</th><th scope=\"col\">gesamt</th></tr></thead><tbody><tr><th scope=\"row\">Planung</th><td>2</td><td>2</td><td>4</td></tr><tr><th scope=\"row\">Ablenkungsregulation</th><td>3</td><td>0</td><td>3</td></tr><tr><th scope=\"row\">Zielpersistenz</th><td>1</td><td>3</td><td>4</td></tr><tr><th scope=\"row\">Priorisierung</th><td>2</td><td>2</td><td>4</td></tr><tr><th scope=\"row\">Arbeitsabschluss</th><td>2</td><td>2</td><td>4</td></tr><tr><th scope=\"row\">Selbstkontrolle</th><td>2</td><td>2</td><td>4</td></tr></tbody></table></div><p>Welche Punkte sollten vor der Erhebung bearbeitet werden?</p>","options":["Ablenkungsregulation liegt unter dem Zielwert von etwa vier Items.","Ablenkungsregulation besitzt keine Gegenpolung.","Alle anderen Facetten müssen gelöscht werden.","Zielpersistenz ist stärker negativ als positiv gepolt und sollte auf Verständlichkeit geprüft werden.","Die Gesamtzahl allein beweist vollständige Inhaltsvalidität."],"answer":[0,1,3],"hints":["Prüfe pro Facette Itemzahl und Richtung.","Ein passender Gesamtumfang kann lokale Lücken verdecken."],"explanation":"Der Blueprint zeigt eine quantitative Lücke und ungleich verteilte Polung. Das ist ein Anlass zur Revision, nicht zum Löschen theoretisch begründeter Facetten.","source":"Aufgabenblatt 2 · PD02 Testkonstruktion, S. 8 und 55–56 · neu konstruierter Blueprint","misconception":"facettenluecke_uebersehen","retry":"Trenne Messziel, Definition, konkrete Itemformulierung und spätere empirische Prüfung. Prüfe bei Items jeweils nur ein Problem nach dem anderen: Konstruktpassung, Verständlichkeit, Antwortformat und Polung."},{"id":"blueprint-3","section":"blueprint","type":"multi","title":"Außenkriterien vor der Erhebung auswählen","level":"Transfer","prompt":"Welche Kriterien erfüllen die Anforderungen aus Aufgabenblatt 2 für eine erste Validierungsstudie am ehesten?","options":["etablierte Skala zu Selbstorganisation","objektiv protokollierte fristgerechte Abgaben","validierte Ablenkbarkeitsskala mit erwarteter negativer Beziehung","Lieblingsfarbe ohne theoretische Erwartung","nachträglich ausgewählte Variable mit der höchsten Stichprobenkorrelation"],"answer":[0,1,2],"hints":["Kriterien sollen theoretisch begründet und praktisch erhebbar sein.","Eine Hypothese wird vor der Ergebnisansicht formuliert."],"explanation":"Die ersten drei Kriterien bilden konvergente, verhaltensbezogene und negative Netzwerkerwartungen ab. Ergebnisgesteuerte Auswahl würde die Validierungslogik unterlaufen.","source":"Aufgabenblatt 2 · PD02 Testkonstruktion, S. 10","misconception":"validierung_nach_ergebnis_erfunden","retry":"Trenne Messziel, Definition, konkrete Itemformulierung und spätere empirische Prüfung. Prüfe bei Items jeweils nur ein Problem nach dem anderen: Konstruktpassung, Verständlichkeit, Antwortformat und Polung."},{"id":"blueprint-4","section":"blueprint","type":"multi","title":"Itemdatei reproduzierbar dokumentieren","level":"Transfer","prompt":"Welche Spalten verlangt Aufgabenblatt 2 ausdrücklich?","options":["Itemtext","Facette","Polung","Faktorladung","Cronbachs Alpha"],"answer":[0,1,2],"hints":["Das Blatt zeigt ein dreispaltiges Tabellenformat.","Faktorladungen und Alpha entstehen erst nach der Datenerhebung."],"explanation":"Itemtext, Facette und Polung dokumentieren die theoretische Rohform. Statistische Kennwerte werden später ergänzt, gehören aber nicht zur ausdrücklich ge function orderItem(id,text,orig,pos){return `<li class="order-item" data-orig="${orig}"><span><strong>${pos+1}.</strong> ${esc(text)}</span><span class="order-controls"><button type="button" data-move="up" aria-label="Schritt nach oben">↑</button><button type="button" data-move="down" aria-label="Schritt nach unten">↓</button></span></li>`}
function fmtNum(v){if(v===1)return '1.00';const s=Number(v).toFixed(2);return s.replace(/^(-?)0\./,'$1.')}
function renderMatrix(t,st){const selected=new Set(Array.isArray(st.lastAnswer)?st.lastAnswer:[]);let rows='';for(let i=0;i<t.labels.length;i++){let cells=`<th scope="row">${esc(t.labels[i])}</th>`;for(let j=0;j<t.labels.length;j++){const key=`${Math.min(i,j)}-${Math.max(i,j)}`;if(i===j)cells+=`<td class="diag">${fmtNum(t.values[i][j])}</td>`;else if(i<j)cells+=`<td><button type="button" class="matrix-cell" data-pair="${key}" aria-pressed="${selected.has(key)}" aria-label="${esc(t.labels[i])} mit ${esc(t.labels[j])}: ${fmtNum(t.values[i][j])}">${fmtNum(t.values[i][j])}</button></td>`;else cells+=`<td class="mirror">${fmtNum(t.values[i][j])}</td>`}rows+=`<tr>${cells}</tr>`}return `<div class="matrix-wrap"><table class="matrix-table"><caption>Symmetrische Matrix; auswählbar ist das obere Dreieck</caption><thead><tr><th></th>${t.labels.map(x=>`<th scope="col">${esc(x)}</th>`).join('')}</tr></thead><tbody>${rows}</tbody></table></div><div class="answer-row"><button class="btn btn-primary" type="button" data-check>Markierung prüfen</button></div>`}
function renderMatch(t,st){const ans=Array.isArray(st.lastAnswer)?st.lastAnswer:[];const rows=t.rows.map((r,i)=>`<tr><th scope="row">${esc(r)}</th><td><select data-match-row="${i}" aria-label="Kategorie für ${esc(r)}"><option value="">Bitte wählen</option>${t.options.map((o,j)=>`<option value="${j}"${ans[i]===j?' selected':''}>${esc(o)}</option>`).join('')}</select></td></tr>`).join('');return `<table class="match-table"><thead><tr><th>Wert</th><th>Kategorie</th></tr></thead><tbody>${rows}</tbody></table><div class="answer-row"><button class="btn btn-primary" type="button" data-check>Zuordnung prüfen</button></div>`}
function renderFooter(idx){const prev=MODULE.sections[idx-1],next=MODULE.sections[idx+1];return `<div class="footer-nav">${prev?`<button class="btn" data-goto="${prev.id}">← ${esc(prev.nav)}</button>`:'<span></span>'}${next?`<button class="btn btn-primary" data-goto="${next.id}">${esc(next.nav)} →</button>`:''}</div>`}
function renderResult(){const done=tasks.filter(t=>taskState(t.id).correct).length;const attempts=tasks.reduce((a,t)=>a+taskState(t.id).attempts,0);const hints=tasks.reduce((a,t)=>a+taskState(t.id).hints,0);const errs=Object.entries(state.errors).sort((a,b)=>b[1]-a[1]);return `<div class="section-head"><div><div class="eyebrow">Auswertung</div><h2>Lernstand und Fehlkonzeptprofil</h2></div></div><div class="dashboard"><div class="metric"><span>Gelöste Aufgaben</span><b>${done}/${tasks.length}</b></div><div class="metric"><span>Abgaben</span><b>${attempts}</b></div><div class="metric"><span>Genutzte Hinweise</span><b>${hints}</b></div><div class="metric"><span>Kompetenzabdeckung</span><b>${tasks.length?Math.round(done/tasks.length*100):0}%</b></div></div><div class="card"><h3>Bereiche</h3>${MODULE.sections.filter(s=>sectionTasks(s.id).length).map(s=>{const ts=sectionTasks(s.id),d=ts.filter(t=>taskState(t.id).correct).length;return `<div class="error-item"><span>${esc(s.nav)} – ${esc(s.title)}</span><strong>${d}/${ts.length}</strong></div>`}).join('')}</div><div class="card" style="margin-top:16px"><h3>Wiederkehrende Fehlkonzepte</h3>${errs.length?`<div class="error-list">${errs.map(([e,n])=>`<div class="error-item"><span>${esc(humanError(e))}</span><strong>${n}×</strong></div>`).join('')}</div>`:'<p>Noch keine klassifizierten Fehlversuche.</p>'}</div><div class="callout"><strong>Beherrschungskriterium:</strong> Du kannst ein Messziel als Trait oder State eingrenzen, eine theoretische Dimensionalität und Messlogik begründen, eine enge Definition formulieren, Items sprachlich und inhaltlich revidieren, Antwortformat und Polung planen, einen Facetten-Blueprint prüfen und Außenkriterien vor der Erhebung hypothesengeleitet auswählen.</div><div class="footer-nav"><button class="btn" data-goto="mastery">← Abschlussfall</button><button class="btn btn-primary" data-goto="process">Training wiederholen</button></div>`}
function humanError(e){return ({"items_vor_messziel": "Items formuliert, bevor Messziel, Definition und Blueprint geklärt wurden", "planungsergebnisse_vertauscht": "Ergebnisse von Trait/State-, Dimensionalitäts-, Definitions-, Blueprint- oder Netzwerkplanung verwechselt", "arbeitsblatt1_mit_statistik_vermischt": "Theoretische Konstruktklärung aus Aufgabenblatt 1 mit späterer Datenanalyse vermischt", "arbeitsblatt2_anforderungen_unvollstaendig": "Projektanforderungen zu Itemzahl, Format, Polung, Dokumentation oder Außenkriterien ausgelassen", "trait_state_vertauscht": "Relativ stabile Disposition und aktueller Zustand verwechselt", "dimensionalitaet_erst_nach_daten": "Theoretische Teilbereiche erst nach Sichtung der Daten konstruiert", "beispiel_als_definition": "Ein einzelnes Verhalten oder eine Folge als vollständige Konstruktdefinition behandelt", "zielgruppe_ignoriert": "Zielgruppe und Einsatzkontext bei Inhalt oder Sprache ignoriert", "reflektiv_formativ_vertauscht": "Kausalrichtung zwischen latentem Merkmal und Indikatoren verwechselt", "formativer_index_reflektiv_gedeutet": "Unterschiedliche konstituierende Indikatoren als austauschbare reflektive Items behandelt", "messmodellfolgen_vertauscht": "Erwartungen an Austauschbarkeit, Korrelation und Inhaltsbeitrag der Messmodelle verwechselt", "alpha_als_validitaetsbeweis": "Interne Konsistenz als modellunabhängigen Validitätsbeweis interpretiert", "definition_zu_breit_oder_zirkulaer": "Konstruktdefinition zu breit, wertend oder zirkulär formuliert", "definition_empirie_vorweggenommen": "Spätere Faktor- oder Validitätsergebnisse in der Definition garantiert", "nomologisches_netzwerk_falsch": "Erwartete positive, negative und geringe Außenbeziehungen falsch eingeordnet", "nachbarkonstrukt_ignoriert": "Nahes, aber anderes Konstrukt nicht vom Messziel abgegrenzt", "doppelte_thematik_nicht_erkannt": "Mehrere unabhängig beantwortbare Inhalte in einem Item nicht erkannt", "doppelte_verneinung_beibehalten": "Doppelte Verneinung nicht in eine klare Aussage überführt", "zeitbezug_und_trait_vermischt": "Engen Situations- oder Zeitraumbezug ungeprüft als allgemeines Trait-Item behandelt", "konstruktproblem_als_polungsproblem": "Inhaltliche Fehlzuordnung durch bloße Invertierung lösen wollen", "projektvorgabe_mit_allgemeiner_empfehlung_vertauscht": "Projektbezogene fünf bis sieben Kategorien mit allgemeiner Vorlesungsempfehlung verwechselt", "itemstamm_skala_unpassend": "Semantik des Itemstamms und der Antwortskala nicht aufeinander abgestimmt", "verankerung_automatisch_perfekt": "Mehr Kategorien oder numerische Labels automatisch als messgenau interpretiert", "mitte_und_weissnicht_verwechselt": "Neutrale Mittelkategorie und fehlende Beurteilbarkeit gleichgesetzt", "polung_aus_wortlaut": "Polung nach Negationswort statt relativ zur Zielausprägung bestimmt", "polungsproblem_und_konstruktproblem_verwechselt": "Konstruktfremdheit als reinen Polungsfehler behandelt", "polungsbalance_mechanisch": "Exakte Polungsbalance über Verständlichkeit und Inhaltsqualität gestellt", "akquieszenz_ignoriert": "Zustimmungstendenz bei gleichgerichteten Items nicht berücksichtigt", "rohformumfang_falsch": "Itemumfang aus Anzahl der Facetten und Items je Facette falsch berechnet", "facettenluecke_uebersehen": "Lokale Facetten- oder Polungslücke trotz passender Gesamtzahl übersehen", "validierung_nach_ergebnis_erfunden": "Außenkriterium oder Hypothese erst nach Sichtung der Korrelation ausgewählt", "excel_spalten_falsch": "Explizit geforderte Dokumentationsspalten der Rohform falsch angegeben", "abschluss_itemprobleme_falsch": "Doppelte Inhalte, doppelte Verneinung oder Erfolgsfolge im Abschlussfall nicht erkannt", "abschluss_messmodell_falsch": "Kausalrichtung des Abschlussmodells falsch bestimmt", "abschluss_aussenkriterien_falsch": "Theoretisch unbegründete oder nachträglich ausgewählte Außenkriterien akzeptiert", "abschluss_zu_fruehe_freigabe": "Ungeprüfte Rohform vor Definition, Blueprint und Vorprüfung freigegeben"})[e]||String(e).replaceAll('_',' ')}
function bindTaskEvents(){document.querySelectorAll('[data-task]').forEach(el=>{el.querySelectorAll('[data-check]').forEach(b=>b.addEventListener('click',()=>checkTask(el.dataset.task)));el.querySelectorAll('[data-hint]').forEach(b=>b.addEventListener('click',()=>showHint(el.dataset.task,Number(b.dataset.hint),b)));el.querySelectorAll('[data-move]').forEach(b=>b.addEventListener('click',()=>moveOrder(b)));el.querySelectorAll('.matrix-cell').forEach(b=>b.addEventListener('click',()=>{b.setAttribute('aria-pressed',b.getAttribute('aria-pressed')!=='true')}))})}
function bindPageButtons(){document.querySelectorAll('[data-goto]').forEach(b=>b.addEventListener('click',()=>showPage(b.dataset.goto)))}
function moveOrder(btn){const li=btn.closest('li'),list=li.parentElement;if(btn.dataset.move==='up'&&li.previousElementSibling)list.insertBefore(li,li.previousElementSibling);if(btn.dataset.move==='down'&&li.nextElementSibling)list.insertBefore(li.nextElementSibling,li);[...list.children].forEach((x,i)=>x.querySelector('strong').textContent=`${i+1}.`)}
function showHint(id,i,btn){const box=document.getElementById(`hint-${id}-${i}`);if(!box)return;const opening=box.style.display!=='block';box.style.display=opening?'block':'none';btn.textContent=opening?`Hinweis ${i+1} ausblenden`:`Hinweis ${i+1} anzeigen`;if(opening){const st=taskState(id);st.hints+=1;saveState()}}
function selectedValues(article){return [...article.querySelectorAll('input:checked')].map(x=>Number(x.value)).sort((a,b)=>a-b)}
function arraysEqual(a,b){return JSON.stringify(a)===JSON.stringify(b)}
function getMisconception(t,ans){if(t.misconceptionByAnswer&&t.type==='single'&&ans!=null)return t.misconceptionByAnswer[String(ans)]||t.misconception;return t.misconception}
function nextRetryGuidance(t,article,st){const hints=t.hints||[];for(let i=0;i<hints.length;i++){const box=document.getElementById(`hint-${t.id}-${i}`);if(box&&box.style.display!=='block'){box.style.display='block';const btn=article.querySelector(`[data-hint="${i}"]`);if(btn)btn.textContent=`Hinweis ${i+1} ausblenden`;st.hints+=1;return `Nächster Schritt – Hinweis ${i+1}: ${hints[i]}`}}const fallback={order:'Fixiere zuerst den eindeutigsten Anfang und das Ende; ordne danach nur die verbleibenden Übergänge.',match:'Ordne zuerst die eindeutigsten Paare zu und prüfe anschließend jede verbleibende Zeile gegen die noch freien Kategorien.',multi:'Bewerte jede Aussage einzeln: Wird sie durch Prompt und Theorie gestützt oder widerspricht sie einer sichtbaren Angabe?',number:'Notiere gegebene Werte und Formel, setze mit Einheiten ein und kontrolliere jeden Zwischenschritt.',single:'Streiche zunächst Optionen, die einer sichtbaren Angabe oder dem Grundprinzip widersprechen.'};return fallback[t.type]||'Prüfe deine Antwort anhand von Prompt, Theorie und den bereits geöffneten Hinweisen.'}
function revealTask(id){const t=tasks.find(x=>x.id===id),article=document.getElementById(`task-${id}`),st=taskState(id),fb=article.querySelector('.feedback');st.revealed=true;const misconception=t.misconception;fb.className='feedback show bad';fb.innerHTML=`<strong>Auflösung.</strong><div>${esc(t.explanation)}</div>${misconception?`<div class="misconception">Möglicher Denkfehler: ${esc(humanError(misconception))}</div>`:''}`;saveState()}
function checkTask(id){const t=tasks.find(x=>x.id===id),article=document.getElementById(`task-${id}`),st=taskState(id);let ans,ok=false;
 if(t.type==='single'||t.type==='multi'){ans=selectedValues(article);if(t.type==='single')ans=ans.length?ans[0]:null;ok=t.type==='single'?ans===t.answer:arraysEqual(ans,[...t.answer].sort((a,b)=>a-b))}
 else if(t.type==='number'){const raw=article.querySelector('.number-input').value.trim().replace(',','.');ans=Number(raw);ok=raw!==''&&Number.isFinite(ans)&&Math.abs(ans-t.answer)<=Number(t.tolerance||0)}
 else if(t.type==='order'){ans=[...article.querySelectorAll('.order-item')].map(x=>Number(x.dataset.orig));ok=arraysEqual(ans,t.answer)}
 else if(t.type==='matrix'){ans=[...article.querySelectorAll('.matrix-cell[aria-pressed="true"]')].map(x=>x.dataset.pair).sort();ok=arraysEqual(ans,[...t.answer].sort())}
 else if(t.type==='match'){ans=[...article.querySelectorAll('[data-match-row]')].map(x=>x.value===''?null:Number(x.value));ok=arraysEqual(ans,t.answer)}
 st.attempts+=1;st.lastAnswer=ans;if(ok)st.correct=true;const misconception=!ok?getMisconception(t,ans):null;if(misconception)state.errors[misconception]=(state.errors[misconception]||0)+1;const fb=article.querySelector('.feedback');
 if(ok){fb.className='feedback show good';fb.innerHTML=`<strong>Richtig.</strong><div>${esc(t.explanation)}</div>`}
 else if(st.revealed){fb.className='feedback show bad';fb.innerHTML=`<strong>Noch nicht richtig.</strong><div>${esc(t.explanation)}</div>${misconception?`<div class="misconception">Möglicher Denkfehler: ${esc(humanError(misconception))}</div>`:''}`}
 else {const reveal=st.attempts>=2?`<div class="answer-row"><button type="button" class="btn" data-reveal>Auflösung anzeigen</button></div>`:'';const guidance=nextRetryGuidance(t,article,st);fb.className='feedback show bad';fb.innerHTML=`<strong>Noch nicht richtig.</strong><div>${esc(guidance)}</div>${misconception?`<div class="misconception">Möglicher Denkfehler: ${esc(humanError(misconception))}</div>`:''}${reveal}`;const rb=fb.querySelector('[data-reveal]');if(rb)rb.addEventListener('click',()=>revealTask(id))}
 article.classList.toggle('done',st.correct);article.querySelector('.status').textContent=st.correct?'gelöst':`${st.attempts} Versuch${st.attempts===1?'':'e'}`;article.querySelector('.status').classList.toggle('good',st.correct);announce(`${t.title}: ${ok?'richtig':'noch nicht richtig'}`);saveState();renderNav();updateSectionCounts()}
function showPage(id,focus=true){if(!MODULE.sections.some(s=>s.id===id))id='start';current=id;document.querySelectorAll('.page').forEach(p=>p.classList.toggle('active',p.dataset.page===id));document.querySelectorAll('.nav button').forEach(b=>{const active=b.dataset.page===id;b.setAttribute('aria-current',active?'page':'false')});if(id==='result'){const old=document.getElementById('page-result');old.innerHTML=renderResult();bindPageButtons()}saveState();if(focus){window.scrollTo({top:0,behavior:'smooth'});document.getElementById('main').focus()}}
function updateSectionCounts(){MODULE.sections.forEach(s=>{const ts=sectionTasks(s.id);if(!ts.length)return;const page=document.getElementById(`page-${s.id}`);if(!page)return;const el=page.querySelector('.section-count');if(el){const d=ts.filter(t=>taskState(t.id).correct).length;el.textContent=`${d} von ${ts.length} gelöst`}})}
function updateProgress(){const done=tasks.filter(t=>taskState(t.id).correct).length,pct=tasks.length?Math.round(done/tasks.length*100):0;document.getElementById('progressText').textContent=`${done} / ${tasks.length}`;document.getElementById('progressBar').style.width=`${pct}%`;document.querySelector('.progress').setAttribute('aria-valuenow',String(pct))}
function exportState(){const blob=new Blob([JSON.stringify({schema:'m11a-application-trainer-progress',module:MODULE.id,exportedAt:new Date().toISOString(),state},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='m11a_anwendungstrainer_08_lernstand.json';a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}
function importState(file){const reader=new FileReader();reader.onload=()=>{try{const obj=JSON.parse(reader.result);const incoming=obj.state||obj;if(!incoming.tasks)throw new Error('Ungültiges Format');state=incoming;state.version=MODULE.version;current=state.current||'start';saveState();renderNav();renderPages();showPage(current);announce('Lernstand importiert')}catch(e){alert('Die Datei konnte nicht als Lernstand importiert werden.')}};reader.readAsText(file)}
function resetState(){if(!confirm('Soll der gesamte Lernstand dieses Moduls gelöscht werden?'))return;state=defaultState();current='start';try{localStorage.removeItem(MODULE.id)}catch(e){}renderNav();renderPages();showPage('start');announce('Lernstand zurückgesetzt')}
document.getElementById('exportBtn').addEventListener('click',exportState);document.getElementById('importBtn').addEventListener('click',()=>document.getElementById('importFile').click());document.getElementById('importFile').addEventListener('change',e=>{if(e.target.files[0])importState(e.target.files[0]);e.target.value=''});document.getElementById('resetBtn').addEventListener('click',resetState);
window.__TRAINER__={MODULE,tasks,taskState,checkTask,showPage};
renderNav();renderPages();updateProgress();showPage(current,false);
</script>
