const MODULE = {"id":"m11a-apptrainer-09-v2","title":"Skalenbildung und Abschlussvalidierung","version":"2.0.0","sections":[{"id":"start","nav":"Start","title":"Von finalen Items zu einer nachvollziehbaren Validierung","intro":true},{"id":"pipeline","nav":"1 · Analysepipeline","title":"Skalenbildung und Validierung in eine prüfbare Reihenfolge bringen","level":"Basis","theory":"Eine Validierung beginnt nicht mit einer Korrelationsfunktion. Zuerst werden Quellenstand, finale Itemlisten, Polung, Antwortskalen, Missing-Regeln und Aggregationsart festgelegt. Erst anschließend werden Skalenwerte gebildet, Hypothesen geprüft und Ergebnisse mit Reliabilität und Kriterienqualität interpretiert."},{"id":"keys","nav":"2 · Finale Big-Five-Keys","title":"Itemlisten und Polungsrichtungen aus den vorhandenen Quellen rekonstruieren","level":"Basis","theory":"Aufgabenblatt 6 nennt vier finale Big-Five-Skalen. Das Analyse-Skript fa.R dokumentiert dagegen finale Itemlisten für alle fünf Dimensionen und bestätigt damit zusätzlich Gewissenhaftigkeit. Eine Quellenabweichung wird sichtbar dokumentiert, nicht still harmonisiert."},{"id":"direction","nav":"3 · Richtung & Invertierung","title":"Vorbereitete Big-Five-Daten von ungeprüften Validierungskriterien unterscheiden","level":"Standard","theory":"Aufgabenblatt 6 sagt ausdrücklich, dass sose2026i die notwendigen Invertierungen für die Big-Five-Items enthält, nicht aber zwingend für die Validierungskriterien. Daher dürfen finale Big-Five-Items nicht erneut invertiert werden; externe Kriterien benötigen einen eigenen Scoring-Key und eine kontrollierte Invertierung."},{"id":"scores","nav":"4 · Skalenwerte & Missing","title":"Mittelwerte, Mindestregeln und reproduzierbaren R-Code anwenden","level":"Standard","theory":"Bei gleich langen vollständigen Skalen sind Summe und Mittelwert linear äquivalent. Der Mittelwert bewahrt jedoch die Antwortskala. Bei fehlenden Antworten muss vorab festgelegt werden, wie viele gültige Items mindestens erforderlich sind. Ohne Mindestregel kann na.rm=TRUE unzureichend informierte Werte erzeugen."},{"id":"codebook","nav":"5 · Codebuchgrenze","title":"Bekannte Informationen von nicht belegten Scoringregeln trennen","level":"Standard","theory":"Variablennamen wie bfi1, eq1, swls1, phq1 oder stomp1 zeigen nur, dass Variablen vorhanden sind. Sie liefern kein vollständiges Manual. Ohne Itemtexte, Subskalenzuordnung, Antwortskala, Reverse-Key und Missing-Regel darf kein verbindlicher Skalenwert erfunden werden."},{"id":"hypotheses","nav":"6 · Validitätshypothesen","title":"Erwartete Richtung und Evidenzart vor der Ergebnisansicht festlegen","level":"Transfer","theory":"Validität ist ein hypothesengeleiteter Evidenzprozess. Für jedes Außenkriterium werden Variablen, erwartete Richtung, theoretische Begründung, Analyse und Interpretationsregel vorab dokumentiert. Unerwartete Befunde werden berichtet und können explorativ untersucht werden, ohne nachträgliche Umdeutung der ursprünglichen Hypothese."},{"id":"outputs","nav":"7 · Ergebnisse lesen","title":"Korrelationsmuster, Konfidenzintervalle und Stichprobenumfänge gemeinsam interpretieren","level":"Transfer","theory":"Eine Korrelation wird nicht nur nach Vorzeichen oder Signifikanz beurteilt. Entscheidend sind Hypothese, Effektgröße, Unsicherheit, Stichprobenumfang, Reliabilität und Kriterienqualität. Eine nahe Null liegende Beziehung kann diskriminante Evidenz stützen, beweist aber keine exakte Unabhängigkeit."},{"id":"report","nav":"8 · Reproduzierbarkeit","title":"Scoring, Quellenlücken und Analysen vollständig dokumentieren","level":"Transfer","theory":"Ein prüfbarer Bericht nennt Datenstand, Itemkeys, Invertierungen, Wertebereiche, Missing-Regeln, Aggregationsart, Reliabilitäten, Hypothesen, vollständige Ergebnisse und Abweichungen. Synthetische Trainingsfälle werden als synthetisch gekennzeichnet; Quellenlücken bleiben sichtbar."},{"id":"mastery","nav":"9 · Abschlussfall","title":"Einen neuen Scoring- und Validierungsfall vollständig lösen","level":"Transfer","theory":"Der Abschlussfall verbindet Reverse-Key, Mindestzahl gültiger Antworten, Mittelwertbildung, Hypothesenmatrix und Ergebnisbericht. Ziel ist nicht nur ein richtiger Zahlenwert, sondern eine Entscheidung, die von einer anderen Person vollständig nachvollzogen werden kann."},{"id":"result","nav":"Ergebnis","title":"Lernstand und Fehlkonzeptprofil","result":true}]};

function sectionTasks(id){return tasks.filter(t=>t.section===id)}
let state=loadState();let current=state.current||'start';
function defaultState(){return {version:MODULE.version,current:'start',tasks:{},errors:{},startedAt:new Date().toISOString(),updatedAt:new Date().toISOString()}}
function loadState(){try{const raw=localStorage.getItem(MODULE.id);if(!raw)return defaultState();const s=JSON.parse(raw);return s&&s.version===MODULE.version?s:defaultState()}catch(e){return defaultState()}}
function saveState(){state.current=current;state.updatedAt=new Date().toISOString();try{localStorage.setItem(MODULE.id,JSON.stringify(state))}catch(e){}updateProgress()}
function taskState(id){return state.tasks[id]||(state.tasks[id]={attempts:0,correct:false,hints:0,lastAnswer:null})}
function esc(s){return String(s).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
function announce(msg){const live=document.getElementById('live');live.textContent='';setTimeout(()=>live.textContent=msg,20)}
function renderNav(){const nav=document.getElementById('nav');nav.innerHTML='';MODULE.sections.forEach(s=>{const b=document.createElement('button');b.type='button';b.dataset.page=s.id;b.innerHTML=`${esc(s.nav)}<small>${sectionStatus(s.id)}</small>`;b.addEventListener('click',()=>showPage(s.id));nav.appendChild(b)})}
function sectionStatus(id){const ts=sectionTasks(id);if(!ts.length)return id==='result'?'Auswertung':'Übersicht';const done=ts.filter(t=>taskState(t.id).correct).length;return `${done}/${ts.length} gelöst`}
function renderPages(){const root=document.getElementById('pages');root.innerHTML='';MODULE.sections.forEach((s,idx)=>{const page=document.createElement('section');page.className='page';page.id=`page-${s.id}`;page.dataset.page=s.id;if(s.intro)page.innerHTML=renderStart();else if(s.result)page.innerHTML=renderResult();else page.innerHTML=renderSection(s,idx);root.appendChild(page)});bindTaskEvents();bindPageButtons()}
function renderStart(){return `<div class="hero"><div class="eyebrow">Anwendungstrainer 09 · Skalenbildung und Abschlussvalidierung</div><h1>Aus Items werden erst durch dokumentiertes Scoring interpretierbare Skalen.</h1><p class="lead">Dieses Modul führt von den finalen Big-Five-Itemlisten über Polungs- und Missing-Regeln bis zur hypothesengeleiteten Validierung. Eine zentrale Kompetenz ist dabei, belegte Projektinformationen von fehlenden Scoringregeln zu trennen.</p><div class="pill-row"><span class="pill">36 Aufgaben</span><span class="pill">9 Lernbereiche</span><span class="pill">Offline</span><span class="pill">gestuftes Feedback</span></div><div class="callout warn"><strong>Quellenstatus:</strong> Aufgabenblatt 6 nennt finale Items für Offenheit, Extraversion, Verträglichkeit und Neurotizismus und erklärt, dass sose2026i die Big-Five-Invertierungen enthält. fa.R dokumentiert zusätzlich die finale Gewissenhaftigkeitsskala. Für die Validierungskriterien fehlt dagegen ein vollständiges Codebuch; entsprechende Rechenfälle sind deshalb sichtbar als synthetisch gekennzeichnet.</div><figure class="score-flow"><figcaption>Reproduzierbare Abschlussanalyse</figcaption><div class="score-flow-grid"><div><b>1</b><span>Quellenaudit</span></div><i>→</i><div><b>2</b><span>Scoring-Key</span></div><i>→</i><div><b>3</b><span>Invertierung</span></div><i>→</i><div><b>4</b><span>Missing-Regel</span></div><i>→</i><div><b>5</b><span>Skalenwerte</span></div><i>→</i><div><b>6</b><span>Hypothesen</span></div><i>→</i><div><b>7</b><span>Validierung</span></div><i>→</i><div><b>8</b><span>Bericht</span></div></div></figure><div class="grid"><div class="card"><h3>Du trainierst</h3><p>Itemkeys rekonstruieren, doppelte Invertierung verhindern, Skalenwerte mit Missing-Regeln bilden, Codebuchlücken erkennen, Hypothesen vorab formulieren und Korrelationsmuster mit Unsicherheit interpretieren.</p></div><div class="card"><h3>Arbeitsmodus</h3><p>Nach einem Fehlversuch erhältst du zunächst eine Diagnose und einen neuen Versuch. Die vollständige Auflösung kann erst nach zwei Fehlversuchen eingeblendet werden.</p></div><div class="card"><h3>Datenschutz</h3><p>Es werden keine individuellen Originalprofile oder IDs eingebettet. Personenwerte und Validierungsausgaben sind neu konstruiert; echte Projektinformationen werden nur aggregiert oder als Itemkey verwendet.</p></div></div><div class="footer-nav"><button class="btn btn-primary" data-goto="pipeline">Training beginnen →</button></div></div>`}

function checkedAttr(st,i,type){if(st.lastAnswer==null)return '';if(type==='single')return st.lastAnswer===i?' checked':'';return Array.isArray(st.lastAnswer)&&st.lastAnswer.includes(i)?' checked':''}
function renderInput(t,st){

 if(t.type==='number'){const val=typeof st.lastAnswer==='number'?String(st.lastAnswer):'';return `<div class="answer-row"><label><span class="sr-only">Numerische Antwort</span><input class="number-input" type="text" inputmode="decimal" autocomplete="off" aria-label="Numerische Antwort" value="${esc(val)}"></label>${t.unit?`<span>${esc(t.unit)}</span>`:''}<button class="btn btn-primary" type="button" data-check>Antwort prüfen</button></div>`}
 if(t.type==='order'){const seq=Array.isArray(st.lastAnswer)?st.lastAnswer:(st.correct?t.answer:(t.start||t.items.map((_,i)=>i)));const arr=seq.map(orig=>({text:t.items[orig],orig}));return `<ol class="order-list">${arr.map((x,i)=>orderItem(t.id,x.text,x.orig,i)).join('')}</ol><div class="answer-row"><button class="btn btn-primary" type="button" data-check>Reihenfolge prüfen</button></div>`}
 if(t.type==='matrix')return renderMatrix(t,st);

function orderItem(id,text,orig,pos){return `<li class="order-item" data-orig="${orig}"><span><strong>${pos+1}.</strong> ${esc(text)}</span><span class="order-controls"><button type="button" data-move="up" aria-label="Schritt nach oben">↑</button><button type="button" data-move="down" aria-label="Schritt nach unten">↓</button></span></li>`}
function fmtNum(v){if(v===1)return '1.00';const s=Number(v).toFixed(2);return s.replace(/^(-?)0\./,'$1.')}
function renderMatrix(t,st){const selected=new Set(Array.isArray(st.lastAnswer)?st.lastAnswer:[]);let rows='';for(let i=0;i<t.labels.length;i++){let cells=`<th scope="row">${esc(t.labels[i])}</th>`;for(let j=0;j<t.labels.length;j++){const key=`${Math.min(i,j)}-${Math.max(i,j)}`;if(i===j)cells+=`<td class="diag">${fmtNum(t.values[i][j])}</td>`;else if(i<j)cells+=`<td><button type="button" class="matrix-cell" data-pair="${key}" aria-pressed="${selected.has(key)}" aria-label="${esc(t.labels[i])} mit ${esc(t.labels[j])}: ${fmtNum(t.values[i][j])}">${fmtNum(t.values[i][j])}</button></td>`;else cells+=`<td class="mirror">${fmtNum(t.values[i][j])}</td>`}rows+=`<tr>${cells}</tr>`}return `<div class="matrix-wrap"><table class="matrix-table"><caption>Symmetrische Matrix; auswählbar ist das obere Dreieck</caption><thead><tr><th></th>${t.labels.map(x=>`<th scope="col">${esc(x)}</th>`).join('')}</tr></thead><tbody>${rows}</tbody></table></div><div class="answer-row"><button class="btn btn-primary" type="button" data-check>Markierung prüfen</button></div>`}
function renderMatch(t,st){const ans=Array.isArray(st.lastAnswer)?st.lastAnswer:[];const rows=t.rows.map((r,i)=>`<tr><th scope="row">${esc(r)}</th><td><select data-match-row="${i}" aria-label="Kategorie für ${esc(r)}"><option value="">Bitte wählen</option>${t.options.map((o,j)=>`<option value="${j}"${ans[i]===j?' selected':''}>${esc(o)}</option>`).join('')}</select></td></tr>`).join('');return `<table class="match-table"><thead><tr><th>Wert</th><th>Kategorie</th></tr></thead><tbody>${rows}</tbody></table><div class="answer-row"><button class="btn btn-primary" type="button" data-check>Zuordnung prüfen</button></div>`}
function renderFooter(idx){const prev=MODULE.sections[idx-1],next=MODULE.sections[idx+1];return `<div class="footer-nav">${prev?`<button class="btn" data-goto="${prev.id}">← ${esc(prev.nav)}</button>`:'<span></span>'}${next?`<button class="btn btn-primary" data-goto="${next.id}">${esc(next.nav)} →</button>`:''}</div>`}
function renderResult(){const done=tasks.filter(t=>taskState(t.id).correct).length;const attempts=tasks.reduce((a,t)=>a+taskState(t.id).attempts,0);const hints=tasks.reduce((a,t)=>a+taskState(t.id).hints,0);const errs=Object.entries(state.errors).sort((a,b)=>b[1]-a[1]);return `<div class="section-head"><div><div class="eyebrow">Auswertung</div><h2>Lernstand und Fehlkonzeptprofil</h2></div></div><div class="dashboard"><div class="metric"><span>Gelöste Aufgaben</span><b>${done}/${tasks.length}</b></div><div class="metric"><span>Abgaben</span><b>${attempts}</b></div><div class="metric"><span>Genutzte Hinweise</span><b>${hints}</b></div><div class="metric"><span>Kompetenzabdeckung</span><b>${tasks.length?Math.round(done/tasks.length*100):0}%</b></div></div><div class="card"><h3>Bereiche</h3>${MODULE.sections.filter(s=>sectionTasks(s.id).length).map(s=>{const ts=sectionTasks(s.id),d=ts.filter(t=>taskState(t.id).correct).length;return `<div class="error-item"><span>${esc(s.nav)} – ${esc(s.title)}</span><strong>${d}/${ts.length}</strong></div>`}).join('')}</div><div class="card" style="margin-top:16px"><h3>Wiederkehrende Fehlkonzepte</h3>${errs.length?`<div class="error-list">${errs.map(([e,n])=>`<div class="error-item"><span>${esc(humanError(e))}</span><strong>${n}×</strong></div>`).join('')}</div>`:'<p>Noch keine klassifizierten Fehlversuche.</p>'}</div><div class="callout"><strong>Beherrschungskriterium:</strong> Du kannst finale Itemkeys quellenkritisch rekonstruieren, vorbereitete und noch zu invertierende Variablen unterscheiden, eine Mindestregel für fehlende Antworten implementieren, fehlende Codebuchinformationen benennen, gerichtete Validitätshypothesen vorab formulieren und Ergebnisse einschließlich Unsicherheit und Quellenstatus reproduzierbar berichten.</div><div class="footer-nav"><button class="btn" data-goto="mastery">← Abschlussfall</button><button class="btn btn-primary" data-goto="pipeline">Training wiederholen</button></div>`}
function humanError(e){return ({"validierung_ohne_pipeline": "Validierung begonnen, bevor Quellenstand, Scoring und Hypothesen definiert waren", "pipeline_kontrollen_vertauscht": "Kontrollfragen von Quellenaudit, Scoring, Invertierung, Missing und Hypothesen verwechselt", "validierung_voraussetzungen_falsch": "Zentrale Voraussetzungen einer interpretierbaren Validierung ausgelassen", "quellenaudit_ignoriert": "Quellenabweichung und fehlende Kriterienkeys vor der Analyse nicht geprüft", "finale_itemvektoren_vertauscht": "Finale Big-Five-Itemvektoren falsch zugeordnet", "ab6_skalen_falsch": "Aufgabenblatt 6 um eine nicht sichtbare Skalenzeile ergänzt oder sichtbare Skala ausgelassen", "quellenkonflikt_verdeckt": "Auslassung von Gewissenhaftigkeit still harmonisiert oder als erklärte Absicht ausgegeben", "finale_polungskeys_vertauscht": "Negative finale Items den falschen Skalen zugeordnet", "sose2026i_uebergeneralisiert": "Big-Five-Invertierungsstatus ungeprüft auf alle Validierungskriterien übertragen", "doppelte_invertierung": "Bereits richtungsgleiches Big-Five-Item erneut invertiert", "kriterium_invertierung_falsch": "Invertierungsformel oder Antwortgrenzen des Kriteriums falsch angewendet", "invertierung_ohne_kontrolle": "Invertierung ohne Wertebereichs-, Einzelfall-, Inhalts- oder Dokumentationskontrolle durchgeführt", "skalenmittel_falsch": "Mittelwert aus gültigen, richtungsgleichen Items falsch berechnet", "missingregel_umgangen": "Vorab definierte Mindestzahl gültiger Antworten ignoriert", "summe_bei_missing_verglichen": "Summenwerte mit unterschiedlicher Zahl gültiger Items direkt verglichen", "r_missingcode_falsch": "R-Code bildet keinen zeilenweisen Mittelwert mit Mindestzahl gültiger Antworten", "scoring_aus_namen_erfunden": "Scoringregeln aus Variablennamen statt aus einem Codebuch abgeleitet", "codebuch_unvollstaendig": "Erforderliche Angaben zu Inhalt, Richtung, Skala, Zuordnung oder Missing nicht erkannt", "quellenstatus_falsch": "Belegte, unbelegte und widersprüchliche Informationen falsch klassifiziert", "synthetisch_als_original": "Synthetischen Trainingsfall als Originalkey oder Projektergebnis ausgegeben", "hypothese_nach_ergebnis": "Validitätshypothese erst nach Sichtung des Ergebnisses festgelegt", "validitaetshypothesen_vertauscht": "Konvergente, negative, diskriminante und kriteriumsbezogene Erwartung verwechselt", "validierungsplan_unvollstaendig": "Validierungsplan ohne Variablen, Richtung, Begründung, Analyse oder Missing-Regel formuliert", "harking": "Unerwarteten Befund durch nachträgliche Hypothesenänderung als Bestätigung ausgegeben", "output_konvergenz_falsch": "Konvergenten Befund nicht anhand des inhaltlich passenden Vergleichs erkannt", "output_negativ_falsch": "Theoretisch negative Beziehung als Nullbefund, Invertierungsauftrag oder Kausalbeweis interpretiert", "output_ueberinterpretiert": "Korrelationsmuster ohne Unsicherheit, n-Werte oder Kausalitätsgrenze interpretiert", "nichtsignifikant_als_beweis": "Nahe-null oder nicht signifikanten Befund als Beweis exakter Unabhängigkeit behandelt", "scoringbericht_unvollstaendig": "Scoringbericht ohne Datenstand, Key, Transformation, Missing oder Qualitätskennwerte", "alpha_als_validitaetsbeweis": "Interne Konsistenz als hinreichenden Beweis der Validität behandelt", "multiple_tests_ignoriert": "Viele ungeplante Tests und selektive Berichterstattung nicht berücksichtigt", "quellenluecke_verdeckt": "Fehlenden Kriterienkey oder ungeklärte C-Auslassung im Bericht verdeckt", "abschluss_scoring_falsch": "Reverse-Key, gültige Werte oder Mittelwert im Abschlussfall falsch angewendet", "abschluss_missingregel_falsch": "Mindestregel im Abschlussfall ergebnisabhängig verändert oder ignoriert", "abschluss_hypothesen_falsch": "Hypothesenmuster des Abschlussfalls falsch zugeordnet", "abschluss_nicht_reproduzierbar": "Abschlussbericht ohne vollständiges Scoring, Hypothesen, Unsicherheit oder Quellenstatus gewählt"})[e]||String(e).replaceAll('_',' ')}
function bindTaskEvents(){document.querySelectorAll('[data-task]').forEach(el=>{el.querySelectorAll('[data-check]').forEach(b=>b.addEventListener('click',()=>checkTask(el.dataset.task)));el.querySelectorAll('[data-hint]').forEach(b=>b.addEventListener('click',()=>showHint(el.dataset.task,Number(b.dataset.hint),b)));el.querySelectorAll('[data-move]').forEach(b=>b.addEventListener('click',()=>moveOrder(b)));el.querySelectorAll('.matrix-cell').forEach(b=>b.addEventListener('click',()=>{b.setAttribute('aria-pressed',b.getAttribute('aria-pressed')!=='true')}))})}
function bindPageButtons(){document.querySelectorAll('[data-goto]').forEach(b=>b.addEventListener('click',()=>showPage(b.dataset.goto)))}
function moveOrder(btn){const li=btn.closest('li'),list=li.parentElement;if(btn.dataset.move==='up'&&li.previousElementSibling)list.insertBefore(li,li.previousElementSibling);if(btn.dataset.move==='down'&&li.nextElementSibling)list.insertBefore(li.nextElementSibling,li);[...list.children].forEach((x,i)=>x.querySelector('strong').textContent=`${i+1}.`)}
function showHint(id,i,btn){const box=document.getElementById(`hint-${id}-${i}`);if(!box)return;const opening=box.style.display!=='block';box.style.display=opening?'block':'none';btn.textContent=opening?`Hinweis ${i+1} ausblenden`:`Hinweis ${i+1} anzeigen`;if(opening){const st=taskState(id);st.hints+=1;saveState()}}
function selectedValues(article){return [...article.querySelectorAll('input:checked')].map(x=>Number(x.value)).sort((a,b)=>a-b)}
function arraysEqual(a,b){return JSON.stringify(a)===JSON.stringify(b)}
function getMisconception(t,ans){if(t.misconceptionByAnswer&&t.type==='single'&&ans!=null)return t.misconceptionByAnswer[String(ans)]||t.misconception;return t.misconception}
function retryFeedback(t,st){const hs=t.hints||[];if(!hs.length)return 'Prüfe, welche konkrete Regel auf diese Aufgabe angewendet werden muss.';const n=Math.min(Math.max(st.attempts,1),hs.length);return `Arbeite den nächsten Schritt aus: ${hs.slice(0,n).join(' Danach: ')}`}
function revealTask(id){const t=tasks.find(x=>x.id===id),article=document.getElementById(`task-${id}`),st=taskState(id),fb=article.querySelector('.feedback');st.revealed=true;const misconception=t.misconception;fb.className='feedback show bad';fb.innerHTML=`<strong>Auflösung.</strong><div>${esc(t.explanation)}</div>${misconception?`<div class="misconception">Möglicher Denkfehler: ${esc(humanError(misconception))}</div>`:''}`;saveState()}
function checkTask(id){const t=tasks.find(x=>x.id===id),article=document.getElementById(`task-${id}`),st=taskState(id);let ans,ok=false;
 if(t.type==='single'||t.type==='multi'){ans=selectedValues(article);if(t.type==='single')ans=ans.length?ans[0]:null;ok=t.type==='single'?ans===t.answer:arraysEqual(ans,[...t.answer].sort((a,b)=>a-b))}
 else if(t.type==='number'){const raw=article.querySelector('.number-input').value.trim().replace(',','.');ans=Number(raw);ok=raw!==''&&Number.isFinite(ans)&&Math.abs(ans-t.answer)<=Number(t.tolerance||0)}
 else if(t.type==='order'){ans=[...article.querySelectorAll('.order-item')].map(x=>Number(x.dataset.orig));ok=arraysEqual(ans,t.answer)}
 else if(t.type==='matrix'){ans=[...article.querySelectorAll('.matrix-cell[aria-pressed="true"]')].map(x=>x.dataset.pair).sort();ok=arraysEqual(ans,[...t.answer].sort())}
 else if(t.type==='match'){ans=[...article.querySelectorAll('[data-match-row]')].map(x=>x.value===''?null:Number(x.value));ok=arraysEqual(ans,t.answer)}
 st.attempts+=1;st.lastAnswer=ans;if(ok)st.correct=true;const misconception=!ok?getMisconception(t,ans):null;if(misconception)state.errors[misconception]=(state.errors[misconception]||0)+1;const fb=article.querySelector('.feedback');
 if(ok){fb.className='feedback show good';fb.innerHTML=`<strong>Richtig.</strong><div>${esc(t.explanation)}</div>`}
 else if(st.revealed){fb.className='feedback show bad';fb.innerHTML=`<strong>Noch nicht richtig.</strong><div>${esc(t.explanation)}</div>${misconception?`<div class="misconception">Möglicher Denkfehler: ${esc(humanError(misconception))}</div>`:''}`}
 else {const reveal=st.attempts>=2?`<div class="answer-row"><button type="button" class="btn" data-reveal>Auflösung anzeigen</button></div>`:'';fb.className='feedback show bad';fb.innerHTML=`<strong>Noch nicht richtig.</strong><div>${esc(retryFeedback(t,st))}</div>${misconception?`<div class="misconception">Möglicher Denkfehler: ${esc(humanError(misconception))}</div>`:''}${reveal}`;const rb=fb.querySelector('[data-reveal]');if(rb)rb.addEventListener('click',()=>revealTask(id))}
 article.classList.toggle('done',st.correct);article.querySelector('.status').textContent=st.correct?'gelöst':`${st.attempts} Versuch${st.attempts===1?'':'e'}`;article.querySelector('.status').classList.toggle('good',st.correct);announce(`${t.title}: ${ok?'richtig':'noch nicht richtig'}`);saveState();renderNav();updateSectionCounts()}
function showPage(id,focus=true){if(!MODULE.sections.some(s=>s.id===id))id='start';current=id;document.querySelectorAll('.page').forEach(p=>p.classList.toggle('active',p.dataset.page===id));document.querySelectorAll('.nav button').forEach(b=>{const active=b.dataset.page===id;b.setAttribute('aria-current',active?'page':'false')});if(id==='result'){const old=document.getElementById('page-result');old.innerHTML=renderResult();bindPageButtons()}saveState();if(focus){window.scrollTo({top:0,behavior:'smooth'});document.getElementById('main').focus()}}
function updateSectionCounts(){MODULE.sections.forEach(s=>{const ts=sectionTasks(s.id);if(!ts.length)return;const page=document.getElementById(`page-${s.id}`);if(!page)return;const el=page.querySelector('.section-count');if(el){const d=ts.filter(t=>taskState(t.id).correct).length;el.textContent=`${d} von ${ts.length} gelöst`}})}
function updateProgress(){const done=tasks.filter(t=>taskState(t.id).correct).length,pct=tasks.length?Math.round(done/tasks.length*100):0;document.getElementById('progressText').textContent=`${done} / ${tasks.length}`;document.getElementById('progressBar').style.width=`${pct}%`;document.querySelector('.progress').setAttribute('aria-valuenow',String(pct))}
function exportState(){const blob=new Blob([JSON.stringify({schema:'m11a-application-trainer-progress',module:MODULE.id,exportedAt:new Date().toISOString(),state},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='m11a_anwendungstrainer_09_lernstand.json';a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}
function importState(file){const reader=new FileReader();reader.onload=()=>{try{const obj=JSON.parse(reader.result);const incoming=obj.state||obj;if(!incoming.tasks)throw new Error('Ungültiges Format');state=incoming;state.version=MODULE.version;current=state.current||'start';saveState();renderNav();renderPages();showPage(current);announce('Lernstand importiert')}catch(e){alert('Die Datei konnte nicht als Lernstand importiert werden.')}};reader.readAsText(file)}
function resetState(){if(!confirm('Soll der gesamte Lernstand dieses Moduls gelöscht werden?'))return;state=defaultState();current='start';try{localStorage.removeItem(MODULE.id)}catch(e){}renderNav();renderPages();showPage('start');announce('Lernstand zurückgesetzt')}
document.getElementById('exportBtn').addEventListener('click',exportState);document.getElementById('importBtn').addEventListener('click',()=>document.getElementById('importFile').click());document.getElementById('importFile').addEventListener('change',e=>{if(e.target.files[0])importState(e.target.files[0]);e.target.value=''});document.getElementById('resetBtn').addEventListener('click',resetState);
window.__TRAINER__={MODULE,tasks,taskState,checkTask,showPage};
renderNav();renderPages();updateProgress();showPage(current,false);
</script>
